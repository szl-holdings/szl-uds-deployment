# SZL Receipts namespace — labeled for UDS network policies and Istio ambient
apiVersion: v1
kind: Namespace
metadata:
  name: szl-receipts
  labels:
    # Enable Istio ambient mesh (used by uds-core)
    istio.io/dataplane-mode: ambient
    # UDS package label for network policy matching
    uds.dev/package: szl-receipts
    app.kubernetes.io/managed-by: zarf
  annotations:
    # Operator contact
    szl.io/maintainer: "stephen@szlholdings.com"
    szl.io/version: "0.1.0"
