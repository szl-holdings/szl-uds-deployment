kind: UDSBundle
metadata:
  name: szl-full-stack
  description: >
    SZL Holdings full-stack UDS bundle — composes szl-receipts plus the four
    flagship organs (a11oy, sentra, amaru, yupana) as separate Zarf packages.
    The organ members are now AVAILABLE: each is referenced by LOCAL path to its
    packages/<organ>/zarf.yaml, which wraps the LIVE, cosign-signed,
    digest-pinned organ image on ghcr.io (amaru/sentra/yupana pin uds-v0.2.0
    @sha256 digests; a11oy is tag-pinned uds-v0.3.0 by design). This bundle
    therefore pulls ONLY verified images.
    DOCTRINE: the members are published, cosign-signed and INDIVIDUALLY
    deployable; this bundle does NOT claim all five boot together on any single
    cluster.
  version: 0.3.1
  # Doctrine marker: organ members re-pinned from the broken uds-v0.3.1 image-repo
  # placeholders to the verified, digest-pinned packages/<organ> (Task #595).
  # cosign verify + cosign verify-attestation --type slsaprovenance PASS for each
  # pinned organ image (amaru/sentra @refs/heads/main, yupana @refs/tags/uds-v0.3.1;
  # issuer https://token.actions.githubusercontent.com). Do NOT revert these to
  # raw `repository: ghcr.io/szl-holdings/<organ>` + `ref: uds-v0.3.1` — that
  # coordinate is an image repo, not a published Zarf package, and no Zarf
  # package was ever published at uds-v0.3.1.

packages:
  # ─────────────────────────────────────────────────────────────────
  # Package 1: szl-receipts
  # Status: AVAILABLE — Zarf package exists, Pepr policy deployed
  # ─────────────────────────────────────────────────────────────────
  - name: szl-receipts
    description: >
      SZL governance receipt server and Pepr admission webhook.
      Emits Ed25519/DSSE receipts for every Deployment/Job API call cluster-wide.
      The only fully-deployed package in v0.3.x.
    # Receipts server image IS published: ghcr.io/szl-holdings/szl-receipts-server.
    # (The previous `vessels` repository here was a stale copy-paste; vessels is
    #  consolidated into killinchu and is not a standalone module.)
    path: ../../packages/szl-receipts
    # ref matches packages/szl-receipts/zarf.yaml metadata.version (0.4.0), the
    # same ref the canonical root uds-bundle.yaml uses for this local package.
    ref: 0.4.0
    # No overrides/optionalComponents here: the earlier block targeted chart
    # value paths that don't exist in charts/szl-receipts (replicaCount,
    # service.port, receipts.signingMode, receipts.retentionDays) and a
    # non-existent szl-receipts-pepr component. Like the organ members
    # (re-pinned in Task #595), this member now relies on the package's own
    # zarf.yaml + chart defaults: replicas 1, Ed25519/DSSE signing, sharded
    # on-disk retention. Tune via the root bundle's valid override block if
    # full-stack-specific overrides are ever needed.

  # ─────────────────────────────────────────────────────────────────
  # Package 2: szl-a11oy (a11oy-runtime)
  # Status: AVAILABLE — local Zarf package packages/a11oy wraps the live,
  #         cosign-signed image ghcr.io/szl-holdings/a11oy:uds-v0.3.0
  #         (tag-pinned by design; a11oy is intentionally exempt from the
  #         @sha256 digest-pin guard — see image-pin-guard.yml).
  # ─────────────────────────────────────────────────────────────────
  - name: szl-a11oy
    description: >
      a11oy brand-orchestration kernel: L1–L7 receipt chain, 5 anchor formula
      policy gates (LiuHuiPi, MadhavaBound, FalsePosition, SummationInvariant,
      AdversarialRobustness), KS-18 contextuality witness, 248 CI assertions.
      Composed from the LIVE cosign-signed a11oy image (uds-v0.3.0).
    path: ../../packages/a11oy
    ref: "0.2.0"

  # ─────────────────────────────────────────────────────────────────
  # Package 3: szl-sentra (sentra-gates)
  # Status: AVAILABLE — local Zarf package packages/sentra wraps the live,
  #         cosign-signed, digest-pinned image:
  #         ghcr.io/szl-holdings/sentra:uds-v0.2.0
  #           @sha256:60a0efc14366ba392bfe3f3cd4196863fe148bb87a17428be6a57f0a05ac3639
  # ─────────────────────────────────────────────────────────────────
  - name: szl-sentra
    description: >
      sentra cyber-resilience runtime: fail-closed asset-scoped Safety Gate
      (Sentra-V1, NIST CSF 2.0 + D3FEND), L7 forecast engine consuming
      a11oy-gate-emitted UDS receipts. Composed from the LIVE cosign-signed,
      digest-pinned sentra image (uds-v0.2.0).
    path: ../../packages/sentra
    ref: "0.2.0"

  # ─────────────────────────────────────────────────────────────────
  # Package 4: szl-amaru (amaru-attestation)
  # Status: AVAILABLE — local Zarf package packages/amaru wraps the live,
  #         cosign-signed, digest-pinned image:
  #         ghcr.io/szl-holdings/amaru:uds-v0.2.0
  #           @sha256:53301e26adcde49e73df28d8c3b790f2496da9d495307fe8587ffa7452b289ff
  # ─────────────────────────────────────────────────────────────────
  - name: szl-amaru
    description: >
      amaru convergent data-sync runtime: KL drift + hash-chained proof receipts,
      brain organ wiring for anatomy-alive Phase 1 Track 1 (emits formula_witness),
      adversarial regression detection runtime. Composed from the LIVE
      cosign-signed, digest-pinned amaru image (uds-v0.2.0).
    path: ../../packages/amaru
    ref: "0.2.0"

  # ─────────────────────────────────────────────────────────────────
  # Package 5: szl-yupana (yupana-replay)
  # Status: AVAILABLE — local Zarf package packages/yupana wraps the live,
  #         cosign-signed, digest-pinned image:
  #         ghcr.io/szl-holdings/yupana:uds-v0.2.0
  #           @sha256:1984a15f53c2e1b91c7dafaa0ed5df9148d57e3e86eb73db879c2b0443302848
  # ─────────────────────────────────────────────────────────────────
  - name: szl-yupana
    description: >
      yupana governed decision fabric: mandatory witnesses on every decision
      (YUPANA-V1), receipt observability dashboard, receipt-replayable Warhacker
      demo path. Composed from the LIVE cosign-signed, digest-pinned yupana image
      (uds-v0.2.0).
    path: ../../packages/yupana
    ref: "0.2.0"

# ─────────────────────────────────────────────────────────────────
# Bundle metadata
# ─────────────────────────────────────────────────────────────────
# SZL UDS = Unified Decision Span (not Defense Unicorns' "Unified Defense Stack" trademark, formerly "Unicorn Delivery Service", rebranded 2026-06-02)
# Andrew Greene Option-A endorsement 2026-05-22 authorizes operation within UDS licensing.
# This bundle is NOT UDS Catalog accepted. See catalog-submission/ for acceptance status.
#
# Build (members must be pre-built, same flow as bundles/szl-uds-bundle):
#   for o in a11oy sentra amaru yupana; do \
#     zarf package create packages/$o --set VERSION=uds-v0.2.0 -a amd64 --confirm; done
#   zarf package create packages/szl-receipts --confirm
#   uds create bundles/szl-full-stack --confirm
#
# Verify a pinned organ image (example, amaru):
#   cosign verify ghcr.io/szl-holdings/amaru@sha256:53301e26adcde49e73df28d8c3b790f2496da9d495307fe8587ffa7452b289ff \
#     --certificate-identity https://github.com/szl-holdings/amaru/.github/workflows/ghcr-build-push.yml@refs/heads/main \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
# ─────────────────────────────────────────────────────────────────
