# SZL Warhacker Meta-Bundle — v0.4.0
#
# Single UDS bundle that bootstraps the SZL governed-AI substrate on a local
# k3d cluster (cluster name: szl-warhacker) for the Warhacker 2026 demo.
#
# ── HONESTY / DOCTRINE V7 §10 ────────────────────────────────────────────────
# Every package below is labeled with its VERIFIED artifact status. "No 'ready'
# without HTTP 200" — packages whose signed Zarf artifact does NOT yet exist are
# marked STAGED and commented out of the deployable set, documented so the bundle
# is complete the moment they publish, but never presented as working.
#
# ARCHITECTURE (post-consolidation, 2026-06-06): the deployable products are
#   a11oy (governed-AI decision substrate) and killinchu (maritime + drone C2).
# The former standalone "vessels" maritime module has been CONSOLIDATED INTO
# killinchu (killinchu /elite carries the full vessels/maritime capability:
# sanctions screening, dark-vessel/AIS-gap detection, ownership graph, voyage
# analytics — each backed by the same signed-receipt thesis as the drone path).
# There is therefore NO standalone vessels-uds layer; FA-001 (standalone vessels
# GHCR image push) is OBSOLETE and intentionally removed.
#
# What is end-to-end deployable today: szl-receipts — the Apache-2.0 Pepr
# admission webhook + Ed25519/DSSE receipt server (the governance layer Replit's
# brief calls "real and running today"), verifiable offline via `uds run
# demo:verify` (public key only). a11oy and killinchu are now UN-STAGED as
# local-path members (2026-06-15): their container images are LIVE, cosign-signed
# and digest-pinned on ghcr.io (verified HTTP 200, 2026-06-15), and the member
# build mechanics mirror the canonical bundles/szl-uds-bundle. Per the
# bundles/szl-full-stack honesty stance: the members are built from live signed
# images and are individually deployable, but this bundle does NOT yet claim all
# members co-boot on one cluster — full co-boot prove-install + an unsigned bundle
# publish are pending a larger runner (the szl box is disk/RAM constrained).
# amaru/sentra remain STAGED.
#
# References:
#   UDS Bundle schema:  https://github.com/defenseunicorns/uds-cli
#   UDS Core releases:  https://github.com/defenseunicorns/uds-core/releases
#   UDS docs:           https://docs.defenseunicorns.com/
#   Existing honest 5-module bundle: bundles/szl-full-stack/uds-bundle.yaml
#   Talk track:         docs/WARHACKER_DEMO.md

kind: UDSBundle
metadata:
  name: szl-warhacker
  version: 0.4.0
  description: "SZL Holdings governed AI substrate — 5 modules + Pepr receipts. Running deployment for Warhacker 2026."

packages:
  # ── Layer 1: Zarf init — internal registry + agent ──────────────────────────
  # Status: AVAILABLE (upstream artifact). The init package moved to the zarf-dev
  # org; v0.77.0 is the ref uds-core v1.5.0 ships with.
  # (defenseunicorns/uds-core@v1.5.0/bundles/k3d-slim-dev/uds-bundle.yaml)
  - name: init
    repository: ghcr.io/zarf-dev/packages/init
    ref: v0.77.0

  # ── Layer 2: UDS Core — Istio + Pepr (UDS Operator) + Keycloak + Prometheus ─
  # Status: AVAILABLE (upstream Defense Unicorns artifact). For the local k3d demo
  # the documented path is the slim-dev bundle
  # oci://ghcr.io/defenseunicorns/bundles/k3d-core-slim-dev:1.5.0; here we pull the
  # published upstream core package directly. Flavor grammar X.Y.Z-upstream|registry1|unicorn
  # per defenseunicorns/uds-core@v1.5.0/docs/getting-started/production/build-your-bundle.mdx.
  - name: core
    repository: registry.defenseunicorns.com/public/core
    ref: 1.5.0-upstream
    overrides:
      keycloak:
        keycloak:
          values:
            - path: realmInitEnv.INSECURE_ADMIN_PASSWORD_GENERATION
              value: "true"

  # ── Layer 3: szl-receipts — Pepr admission webhook + DSSE receipt server ─────
  # Status: AVAILABLE as a LOCAL Zarf package (path build). This is the
  # Apache-2.0 contribution offer to Defense Unicorns. Deploys cluster-wide;
  # emits a DSSE receipt for every Deployment/Job admission — including the
  # module pods below, once they exist.
  #
  # NOTE: the szl-receipts BUNDLE artifact is not cosign-signed yet (Phase 2,
  # org key provisioning U5). `cosign verify` on the bundle artifact WILL FAIL
  # until then. The receipt server signs every receipt with Ed25519 over the
  # canonical DSSE PAE (keyid szl-receipts-ed25519-2026); verify offline with
  # the public key only via `uds run demo:verify` (GET /pubkey).
  - name: szl-receipts
    path: ../../packages/szl-receipts
    # ref MUST match the built local tarball name
    # zarf-package-szl-receipts-<arch>-<ref>.tar.zst. packages/szl-receipts/zarf.yaml
    # is metadata.version 0.4.0 and its deployable szl-receipts-server component is
    # flavor-gated (only.flavor: upstream), so the bundle build pre-builds it with
    # `zarf package create --flavor upstream`, which zarf (v0.77.0) writes as
    # zarf-package-szl-receipts-amd64-0.4.0-upstream.tar.zst. The member ref must
    # therefore carry the flavor suffix — 0.4.0-upstream — exactly as the canonical
    # root uds-bundle.yaml does. The stale 0.3.1 here made `uds create` fail
    # "no such file or directory" (root-bundle incident #75); see the start/smoke
    # build tasks that now pre-build this member before `uds create`.
    ref: 0.4.0-upstream
    overrides:
      szl-receipts:
        szl-receipts:
          variables:
            - name: DOMAIN
              description: "Cluster domain (must match UDS Core DOMAIN)"
              path: global.domain
              default: "uds.dev"
            # RECEIPT_HMAC_KEY override REMOVED (matches root uds-bundle.yaml,
            # PhD Crypto Finding A2). Receipts are signed with an operator-
            # provisioned Ed25519 Secret (szl-receipts-ed25519); no signing key
            # flows through the bundle. See charts/szl-receipts/templates/secret-keypair.yaml.
            - name: RECEIPTS_REPLICAS
              description: "Receipt server replica count"
              path: server.replicas
              default: "1"
          values:
            - path: server.logLevel
              value: "info"
            - path: ingress.enabled
              value: true
            - path: ingress.host
              value: "receipts.uds.dev"
            - path: podSecurityStandard.enforce
              value: "restricted"

  # ── Layer 4: szl-a11oy — governed-AI decision substrate / orchestration mediator ──
  # UN-STAGED 2026-06-15. Local Zarf package (packages/a11oy) wrapping the LIVE,
  # cosign-signed, digest-pinned organ image (verified HTTP 200, 2026-06-15):
  #   ghcr.io/szl-holdings/a11oy:uds-v0.3.0
  #     @sha256:bafd3f37b0f12b781fa57fe263739d0ff8cc1f9547e78c2df5f8b059fa6478b4
  # a11oy is the ONE flavor-gated organ (only.flavor: upstream|unicorn), so its
  # member is pre-built `--flavor upstream` (see tasks.yaml `start`); zarf names the
  # tarball ...-0.4.0-upstream.tar.zst, so the ref carries the -upstream suffix
  # (warhacker pre-builds in place and does NOT rename, unlike the CI publish path).
  # The workload image is pulled by the digest above, so the package VERSION only
  # names the tarball (no a11oy:0.4.0 tag is required).
  - name: szl-a11oy
    path: ../../packages/a11oy
    ref: 0.4.0-upstream

  # ── Layer 5: szl-killinchu — maritime + drone C2 (carries vessels/maritime) ──
  # UN-STAGED 2026-06-15. Local Zarf package (packages/killinchu) wrapping the LIVE,
  # cosign-signed, digest-pinned organ image (verified HTTP 200, 2026-06-15):
  #   ghcr.io/szl-holdings/killinchu:uds-v0.2.0
  #     @sha256:b8268a90653edcb069fff5a2614322cd64b7da3729507a2fd53b549be9cc32bd
  # killinchu CARRIES the vessels/maritime capability (consolidated) — no separate
  # vessels module. No flavor gate — pre-built without --flavor; tarball
  # ...-0.4.0.tar.zst. Workload image is digest-pinned, so VERSION only names the tarball.
  - name: szl-killinchu
    path: ../../packages/killinchu
    ref: 0.4.0

  # ───────────────────────────────────────────────────────────────────────────
  # ── STAGED MODULES — NOT DEPLOYABLE (Doctrine §10) ──────────────────────────
  # amaru + sentra remain STAGED (the shared governance brain) until their members
  # are built + co-boot prove-installed. They are documented here as the target
  # topology and intentionally COMMENTED OUT so `uds run start` does not
  # misrepresent a non-existent artifact as deployable.
  #
  # Target topology (when live): killinchu and a11oy inherit the shared governance
  # brain (sentra gates + amaru memory) and emit signed receipts to szl-receipts;
  # a11oy is the orchestration mediator. Deploy order: amaru → a11oy → sentra →
  # killinchu. NOTE: a11oy and killinchu deploy STANDALONE against szl-receipts
  # (which is in this bundle); they do not hard-require amaru/sentra to boot.
  # ───────────────────────────────────────────────────────────────────────────

  # STAGED — amaru-uds (memory cortex, shared governance). No signed package yet.
  # - name: amaru-uds
  #   repository: ghcr.io/szl-holdings/amaru-uds
  #   ref: uds-v0.3.0

  # STAGED — sentra-uds (security gates, shared governance). No signed package yet.
  # - name: sentra-uds
  #   repository: ghcr.io/szl-holdings/sentra-uds
  #   ref: uds-v0.3.0
