# UDS Bundle — a11oy product (MESH-READY)
# =============================================================================
# Composes the mesh-ready a11oy Zarf package (+ required backends) into a single
# OCI bundle so the platform deploys with ONE command:
#     uds deploy oci://ghcr.io/szl-holdings/a11oy-bundle:0.5.0 --confirm
#
# The UDSBundle kind conforms to the uds-cli API (AGPL-3.0,
# github.com/defenseunicorns/uds-cli). This YAML is original SZL Holdings work;
# we use the uds-cli BINARY and do not embed its source.
#
# PACKAGING NOTE: the a11oy member is built from packages/a11oy/zarf-mesh-ready.yaml
# (two flavors: upstream + unicorn). Build it before `uds create`:
#     uds zarf package create ../../packages/a11oy -f zarf-mesh-ready.yaml \
#       --set DOMAIN=uds.dev -a amd64 --flavor upstream --confirm
#
# HONEST STATUS (re-verified 2026-06-15T19:1xZ via GHCR registry manifest HEAD,
# digest stable across 3 samples / 40s):
#   - a11oy ORGAN image is FRESH + DIGEST-PINNED across all source files:
#     ghcr.io/szl-holdings/a11oy:uds-v0.3.0
#     digest sha256:bafd3f37b0f12b781fa57fe263739d0ff8cc1f9547e78c2df5f8b059fa6478b4
#     (single-arch v2 manifest — create-safe, not an OCI index). The uds-v0.3.0
#     tag is MUTABLE and CI rebuilds it frequently: this digest superseded
#     0ba52b5a... (18:50Z), which superseded 088f8da1... (16:38Z), which
#     superseded placeholder 99e4ded1... The live registry digest is ASSERTED at
#     prove-it time by ./prove-it.sh (step [1] VALIDATE) and MUST be re-resolved
#     immediately before an air-gap freeze — do not trust this literal if CI has
#     rebuilt since.
#   - a11oy-bundle:0.5.0 currently PUBLISHED on GHCR is STILL STALE
#     (sha256:d801f8e461dfd519b5f8593322e75b89a1e66d4da9f6d72d0937c8ff2de64b51,
#     pushed 2026-06-06; built against the OLD organ image). It must be
#     RE-PUBLISHED against the fresh organ above, then cosign-signed with the
#     FA-001 key (FOUNDER-ONLY — see UDS_COSIGN_FOUNDER_HANDOFF.md). This member
#     resolves via path: build below, so `uds create` picks up the fresh organ
#     automatically; the staleness is in the PUBLISHED OCI artifact only.
#     After republish, the new bundle digest MUST differ from d801f8e4...
#   - For a maintained all-in-one today, prefer: szl-mesh:0.4.0
#     (sha256:7f5fce3238ce3d255b322340bbe18cad1eb656e677065a2757637337300cac7f;
#     VERIFIED-LIVE).
#
# Deploy: uds deploy oci://ghcr.io/szl-holdings/a11oy-bundle:0.5.0 --confirm
kind: UDSBundle
metadata:
  name: a11oy
  description: >-
    SZL A11oy governed-AI decision substrate — UDS Package bundle (mesh-ready).
    Deploys on UDS Core (AGPL-3.0, defenseunicorns/uds-core). Not affiliated with
    Defense Unicorns. Doctrine v11 LOCKED. Lambda=Conjecture 1.
    SLSA L1 honest / L2 roadmap; organ images cosign-signed (L1), L2 attestation NOT yet earned (cosign signature
    is the bundle provenance).
    Current organ capabilities (uds-v0.2.0 image): live USGS seismic-forecast endpoints
    (/api/a11oy/v1/seismic/{health,quakes,forecast}; Reasenberg-Jones + Omori aftershock model),
    graph-router (a11oy.graph.* OTEL spans: lambda/automorphism/position/gcpn_propose), and the
    experimental CI-green frontier formula cards in the console Formulas + Trust-Score tabs
    (NOT folded into locked-5; Λ stays Conjecture 1).
  version: "0.5.0"
  architecture: amd64
  authors: "SZL Holdings <eng@szlholdings.com>"
  url: "https://github.com/szl-holdings/szl-uds-deployment"

packages:
  # Core backend dependencies (sentra + amaru precede a11oy frontend).
  # VERIFIED-LIVE organ images: sentra/amaru uds-v0.2.0 (HTTP 200).
  - name: szl-sentra
    path: ../../packages/sentra
    ref: "0.2.0"

  - name: szl-amaru
    path: ../../packages/amaru
    ref: "0.2.0"

  # Primary a11oy mesh-ready platform package.
  - name: szl-a11oy
    path: ../../packages/a11oy
    ref: "0.5.0-uds.0"
    overrides:
      a11oy:
        a11oy:
          variables:
            - name: DOMAIN
              description: "Istio VirtualService base domain"
              path: domain
