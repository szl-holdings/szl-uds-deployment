#
# SZL UDS Bundle — customer hand-off deliverable (uds-v0.2.0)
#
# Composes the 5 flagship SZL organs into a single OCI bundle artifact:
#     oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0
#
# Each member is a Zarf package (packages/<organ>) built directly from the
# LIVE, cosign-signed container images already published on ghcr.io:
#     ghcr.io/szl-holdings/a11oy:uds-v0.2.0      (cosign .sig present)
#     ghcr.io/szl-holdings/sentra:uds-v0.2.0     (cosign .sig present)
#     ghcr.io/szl-holdings/amaru:uds-v0.2.0      (cosign .sig present)
#     ghcr.io/szl-holdings/killinchu:uds-v0.2.0  (cosign .sig present)
#     ghcr.io/szl-holdings/rosie:uds-v0.2.0      (cosign .sig present)
#
# Members are referenced by LOCAL path (the Zarf packages are built in the same
# CI job by `zarf package create packages/<organ>`). A UDS bundle composes Zarf
# PACKAGES — not raw container images — which is why each organ has its own
# packages/<organ>/zarf.yaml wrapping its live image.
#
# Customer deploy (one command):
#   uds deploy oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0 --confirm
#
# Build + publish: .github/workflows/uds-bundle-publish.yml
#
# References:
#   UDS Bundle schema: https://github.com/defenseunicorns/uds-cli
#   Zarf schema:       https://docs.zarf.dev/ref/zarf-package/

kind: UDSBundle
metadata:
  name: szl-uds-bundle
  description: >-
    SZL Holdings flagship stack — a11oy (policy/receipt orchestrator),
    sentra (cyber-resilience gates), amaru (convergent data-sync + attestation),
    killinchu (receipt/transport courier), and rosie (governed decision fabric)
    composed into one deployable UDS bundle. All 5 member images are live and
    cosign-signed on ghcr.io.
  version: "0.3.0"
  authors: "SZL Holdings <eng@szlholdings.com>"
  url: "https://github.com/szl-holdings/szl-uds-deployment"

packages:
  # ── a11oy — policy + receipt substrate orchestrator ──────────────────────
  - name: szl-a11oy
    path: ../../packages/a11oy
    # a11oy's zarf metadata.version is hardcoded 0.3.0 (chart-based, canonical
    # uds-v0.3.0), so its built tarball is zarf-package-szl-a11oy-amd64-0.3.0;
    # the member ref must match that exact package version (the other 4 organs
    # are templated to the 0.2.0 bundle version).
    ref: "0.3.0"

  # ── sentra — cyber-resilience runtime (fail-closed Safety Gate) ──────────
  - name: szl-sentra
    path: ../../packages/sentra
    ref: "0.3.0"

  # ── amaru — convergent data-sync + attestation runtime ───────────────────
  - name: szl-amaru
    path: ../../packages/amaru
    ref: "0.3.0"

  # ── killinchu — receipt/transport courier organ ──────────────────────────
  - name: szl-killinchu
    path: ../../packages/killinchu
    ref: "0.3.0"

  # ── rosie — governed decision fabric + observability dashboard ────────────
  - name: szl-rosie
    path: ../../packages/rosie
    ref: "0.3.0"
