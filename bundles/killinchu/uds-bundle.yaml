#
# UDS Bundle — killinchu product (MESH-READY)
# =============================================================================
# Composes the mesh-ready killinchu Zarf package (+ governance backends) into a
# single OCI bundle so the field node deploys with ONE command:
#     uds deploy oci://ghcr.io/szl-holdings/killinchu-bundle:0.5.0 --confirm
#
# The UDSBundle kind conforms to the uds-cli API (AGPL-3.0). Original SZL work;
# we use the uds-cli BINARY and do not embed its source.
#
# PACKAGING NOTE: the killinchu member is built from
# packages/killinchu/zarf-mesh-ready.yaml (two flavors: upstream + unicorn):
#     uds zarf package create ../../packages/killinchu -f zarf-mesh-ready.yaml \
#       --set DOMAIN=uds.dev -a amd64 --flavor upstream --confirm
#
# HONEST STATUS (re-verified 2026-06-15T19:1xZ via GHCR registry manifest HEAD,
# digest stable across 3 samples / 40s):
#   - killinchu ORGAN image is FRESH + DIGEST-PINNED across all source files:
#     ghcr.io/szl-holdings/killinchu:uds-v0.2.0
#     digest sha256:6f185dda4e81aa2a347a5210a2f2bdfd19fe1af898e0c14a0a914261b1858f16
#     (single-arch v2 manifest — create-safe, not an OCI index). The uds-v0.2.0
#     tag is MUTABLE and CI rebuilds it frequently: this digest superseded
#     209f9f09... (18:50Z), which superseded 946f1fc9... (14:52Z), which
#     superseded placeholder e0fb6c3a... The live registry digest is ASSERTED at
#     prove-it time by ./prove-it.sh (step [1] VALIDATE) and MUST be re-resolved
#     immediately before an air-gap freeze — do not trust this literal if CI has
#     rebuilt since.
#   - killinchu-bundle:0.5.0 PUBLISHED on GHCR is
#     sha256:e59921332c37408fb5a62b270eeeafb1f1ab44aebb350f18662c37aa2c67426f
#     (pushed 2026-06-06). NOTE: the killinchu organ has since been rebuilt
#     (14:52Z), so the published bundle now predates the current organ. To be
#     fully fresh it should be RE-PUBLISHED + cosign-signed (FA-001, FOUNDER-ONLY)
#     alongside a11oy-bundle. This member resolves via path: build below, so
#     `uds create` already composes the FRESH organ; only the published OCI
#     artifact lags.
#   - The edge relay sidecar image (killinchu-relay:0.5.0) is NOT yet published
#     (no GHCR package) — verify before any relay-dependent deploy.
#
# Deploy: uds deploy oci://ghcr.io/szl-holdings/killinchu-bundle:0.5.0 --confirm
kind: UDSBundle
metadata:
  name: killinchu
  description: >-
    SZL Killinchu maritime + drone C2 — UDS Package bundle (mesh-ready).
    Deploys on UDS Core (AGPL-3.0). Not affiliated with Defense Unicorns.
    Doctrine v11 LOCKED. Lambda=Conjecture 1. SLSA L1 honest on organ images; L2 verification on roadmap.
    Current organ capabilities (uds-v0.2.0 image): 27 warhacker demos (25 baseline + 2 novel:
    cross-domain-deconfliction, sensor-denied-attest), live USGS quake-forecast endpoint
    (/api/killinchu/v1/quake/forecast), gov/chapaq-verdict receipt gate, and live operational feeds
    (adsb.lol ADS-B, Digitraffic maritime AIS, USGS seismic, NVD/CISA-KEV vulnerability feeds).
    killinchu.courier.* OTEL spans: dispatch/verify/deliver.
  version: "0.5.0"
  architecture: amd64
  authors: "SZL Holdings <eng@szlholdings.com>"
  url: "https://github.com/szl-holdings/szl-uds-deployment"

packages:
  # Governance backends (required for the edge receipt gate).
  - name: szl-sentra
    path: ../../packages/sentra
    ref: "0.2.0"

  - name: szl-amaru
    path: ../../packages/amaru
    ref: "0.2.0"

  # killinchu mesh-ready field package.
  - name: szl-killinchu
    path: ../../packages/killinchu
    ref: "0.5.0-uds.0"
    overrides:
      killinchu:
        killinchu:
          variables:
            - name: DOMAIN
              description: "Istio VirtualService base domain"
              path: domain
            - name: A11OY_API_ENDPOINT
              description: "A11oy governed-run API for receipt gate"
              path: a11oyApiEndpoint
