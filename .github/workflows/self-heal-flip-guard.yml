#
# self-heal-flip-guard.yml — Guard the box-scripts/install.sh "one-flip switch"
# (SELF_HEAL=1 sudo box-scripts/install.sh) that writes/removes the systemd
# drop-in (10-self-heal.conf) enabling the box-scripts-drift-check watcher's
# auto-repair mode, from silently regressing.
#
# The reconcile logic lives ONLY in box-scripts/install.sh and was previously
# only ever verified by a manual on-box smoke run. install.sh as a whole cannot
# run in CI (it needs root + systemd + a real box), so the reconcile block is
# wrapped in SELF_HEAL_RECONCILE_BEGIN/END sentinels and drives only off the
# SELF_HEAL / WATCH_SBIN / WATCH_UNITS / SELFHEAL_DROPIN_DIR environment.
#
# scripts/self-heal-flip-guard.sh slices that block out of install.sh and runs
# it (no root, no systemd) against a throwaway SELFHEAL_DROPIN_DIR, asserting the
# real on-disk result for every value:
#   1|true|yes|on  -> drop-in present with Environment=SELF_HEAL=1
#   0|false|no|off -> drop-in absent
#   unset          -> state left untouched
#   other          -> WARN, state unchanged
# plus idempotency (re-running the same value is byte-identical) and that
# WATCH_SBIN / WATCH_UNITS are scoped into the drop-in.
#
# scripts/self-heal-flip-guard.test.sh is a negative-fixture self-test: it
# applies deliberate regressions to a COPY of install.sh (remove the reconcile
# block, neuter enable, neuter disable, break idempotency, mutate the
# unrecognised-value branch) and asserts the guard FAILS on each, so the guard
# can't pass vacuously. It runs as the `self-test` job below, which the guard
# job depends on.

name: Self-heal One-flip Guard

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The self-test MUST pass for the guard to be trustworthy: it proves the
  # guard's assertions still FAIL on a broken reconcile block (i.e. are not
  # silently passing). The guard job depends on it so a broken assertion blocks
  # the build before it can wave a regression through.
  self-test:
    name: Self-test the guard (negative fixtures)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run negative-fixture self-test
        run: bash scripts/self-heal-flip-guard.test.sh

  guard:
    name: Drive the install.sh self-heal one-flip switch end-to-end
    runs-on: ubuntu-latest
    needs: self-test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: install.sh parses clean (bash -n)
        run: bash -n box-scripts/install.sh

      - name: Every SELF_HEAL value flips the drop-in correctly + idempotently
        run: bash scripts/self-heal-flip-guard.sh

      - name: The self-heal one-flip switch is intact
        run: echo "The box-scripts/install.sh SELF_HEAL drop-in reconcile (enable/disable/unset/unrecognised + idempotency) is intact."
