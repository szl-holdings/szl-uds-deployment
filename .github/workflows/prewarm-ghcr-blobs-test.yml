#
# prewarm-ghcr-blobs-test.yml — Run the registry pre-fetch helper's own self-test
# in CI.
#
# Why this exists
# ---------------
# scripts/prewarm-ghcr-blobs.sh is the flaky-registry safety net used by
# uds-bundle-publish.yml: it resumably pre-fetches every blob of each
# digest-pinned organ image into the Zarf cache so `zarf package create`
# cache-hits and skips the fragile, NON-resumable GHCR pull. The whole point of
# its is_cached helper is that a present-but-corrupt/truncated blob must NOT count
# as cached, or the release build would silently consume a broken layer.
#
# tests/test-prewarm-ghcr-blobs.sh already covers the script's pure, offline
# helpers (parse_ref, blob_path, sha256_hex, is_cached) with no network, but it
# was never wired into CI — so a regression in the resumable cache logic would
# only be caught if someone remembered to run it by hand.
#
# Complements (does not duplicate) uds-bundle-publish-guard.yml: that guard
# asserts the *workflow keeps calling* the script; this job asserts the *script
# itself still behaves correctly*.
#
# Path-filtered to the helper + its test (+ this workflow) so it only runs when
# something that could affect the result changes.

name: Prewarm GHCR Blobs Test

on:
  pull_request:
    paths:
      - "scripts/prewarm-ghcr-blobs.sh"
      - "tests/test-prewarm-ghcr-blobs.sh"
      - ".github/workflows/prewarm-ghcr-blobs-test.yml"
  push:
    branches: [main]
    paths:
      - "scripts/prewarm-ghcr-blobs.sh"
      - "tests/test-prewarm-ghcr-blobs.sh"
      - ".github/workflows/prewarm-ghcr-blobs-test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: prewarm-ghcr-blobs helpers self-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run prewarm-ghcr-blobs self-test
        run: bash tests/test-prewarm-ghcr-blobs.sh
