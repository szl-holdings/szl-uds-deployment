#
# chart-guard.yml — Catch a broken receipt-deploy chart before it ships.
#
# The szl-receipts signing-key reliability fix lives entirely in two Helm charts
# plus a shell script embedded in the keygen Job. Nothing else guards them, so a
# typo in the keygen script or a bad template would only surface during a live
# cluster deploy (minutes-to-hours later, on a customer cluster). This workflow
# turns that into a seconds-long CI failure.
#
# The shared self-test scaffolding (negative-fixture self-tests that the render
# jobs depend on) lives in the reusable .github/workflows/guard-scaffold.yml;
# this workflow calls it for the self-test and keeps its own bespoke jobs
# (whole-fleet render/lint, keygen-script checks, requireKey contract, the
# no-committed-snapshots guard, and the deploy-receipt stall alarm tests).
#
# It does four things, all without a cluster:
#   1. helm lint --strict + helm template on EVERY chart under charts/* (a11oy,
#      amaru, killinchu, yupana, sentra, szl-full-stack, szl-key-init,
#      szl-receipts) so any render error (missing value, bad template) fails the
#      build — for any chart, not just the receipt ones. (szl-receipts itself was
#      shipping a NOTES.txt that nil-pointered on a missing values key; the older
#      "render the two receipt charts only" guard would not have caught the same
#      class of breakage in the other six charts.)
#   2. Extracts the rendered keygen Job's shell script and runs `sh -n` +
#      `shellcheck` so a script syntax error fails the build.
#   3. Asserts the keygen script still creates the Secret with a single
#      ed25519.pem key file and keeps its fail-loud guard (set -e + fail()).
#   4. Asserts signing.requireKey=true renders the ed25519-key Secret mount with
#      optional:false (pod refuses to start unsigned) and requireKey=false
#      renders optional:true — the core "fail loud, never sign nothing" contract.
#   5. Fails the build if a generated umbrella subchart snapshot
#      (charts/<umbrella>/charts/*) is ever tracked in git. stub_missing_deps.py
#      writes those into <umbrella>/charts/ at render time and .gitignore keeps
#      them out, but .gitignore only stops an accidental `git add` — `git add -f`
#      or a tree committed before the ignore rule existed would still land a stale
#      snapshot that Helm then treats as the source of truth. This is the hard
#      guard .gitignore can't be.
#   6. Runs the in-cluster deploy-receipt stall alarm's own test suite
#      (charts/szl-receipts/tests/alerts/run-alert-tests.sh) in a dedicated
#      `alert-rules` job: it re-renders templates/prometheusrule.yaml and fails if
#      its `.spec.groups` drifts from tests/alerts/rules.rendered.yaml, then runs
#      `promtool test rules` to prove each alert fires under its failure condition
#      and stays silent while the sink is healthy. Previously that script only ran
#      by hand on the box, so an edit to the rule expressions, chart values, or
#      metric names could silently break the alarm; now any such PR fails here.
#
# Umbrella charts (e.g. szl-full-stack) declare subcharts that are STAGED — their
# OCI charts are not published yet — and Helm refuses to render a chart while any
# declared dependency is missing. .github/scripts/stub_missing_deps.py resolves
# each unvendored dependency before render: it COPIES IN the real local chart when
# one exists in the same charts/ tree (so szl-full-stack renders against the real
# charts/szl-receipts and its `szl-receipts:` overrides are validated against the
# real schema), and drops a template-less placeholder only for genuinely staged
# subcharts. It is a no-op for the leaf charts.
#
# This complements test.yaml (which lints szl-receipts only); it adds whole-fleet
# render coverage, the keygen-script syntax check, and the requireKey contract.

name: Chart Guard

on:
  pull_request:
    paths:
      - "charts/**"
      - "scripts/chart-guard-checks.py"
      - "scripts/chart-guard-checks.test.py"
      - "scripts/check-no-committed-subcharts.sh"
      - "scripts/check-no-committed-subcharts.test.sh"
      - ".github/workflows/chart-guard.yml"
      - ".github/workflows/guard-scaffold.yml"
  push:
    branches: [main]
    paths:
      - "charts/**"
      - "scripts/chart-guard-checks.py"
      - "scripts/chart-guard-checks.test.py"
      - "scripts/check-no-committed-subcharts.sh"
      - "scripts/check-no-committed-subcharts.test.sh"
      - ".github/workflows/chart-guard.yml"
      - ".github/workflows/guard-scaffold.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 0. Self-test the guard logic (negative fixtures) ────────────────────────
  # The guard jobs below assert properties via scripts/chart-guard-checks.py and
  # scripts/check-no-committed-subcharts.sh. That assertion logic could break
  # silently and PASS VACUOUSLY (green while guarding nothing — e.g. an
  # unsigned-boot mount slipping past requireKey). The reusable scaffold feeds the
  # checks deliberately-broken fixtures and asserts they FAIL, so a future edit
  # that neuters a check turns CI red here. The guard jobs `needs: self-test`, so
  # a regressed checker blocks the workflow. The self-test runs BOTH negative
  # fixtures: the chart-guard checks and the no-committed-subcharts guard.
  self-test:
    uses: ./.github/workflows/guard-scaffold.yml
    with:
      runner: ubuntu-24.04
      setup: python3 -m pip install --quiet pyyaml
      test-command: |
        python3 scripts/chart-guard-checks.test.py
        sh scripts/check-no-committed-subcharts.test.sh

  # ── No committed umbrella subchart snapshots ────────────────────────────────
  # .gitignore (charts/*/charts/) keeps the CI-ephemeral vendored/stub subcharts
  # out of git, but .gitignore only blocks an accidental `git add`. A `git add -f`
  # or a branch whose tree was committed before the ignore rule existed could
  # still carry a stale snapshot — and once committed, Helm treats that snapshot
  # as the source of truth and the umbrella silently drifts. This job is the hard
  # guard: it fails if `git ls-files 'charts/*/charts/*'` lists anything tracked.
  # The check lives in scripts/check-no-committed-subcharts.sh so the self-test
  # job above can exercise the SAME code against negative fixtures (a regressed
  # check then turns CI red there — this job `needs: self-test`). It runs straight
  # off the checkout (no stub_missing_deps.py, so the render-time snapshots are
  # never present) so it only ever sees what is actually committed.
  no-committed-snapshots:
    name: No committed umbrella subchart snapshots
    needs: self-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Assert no generated subchart snapshot is tracked in git
        run: sh scripts/check-no-committed-subcharts.sh

  chart-guard:
    name: Render + lint receipt-deploy charts
    needs: self-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v3.14.0

      - name: Install shellcheck + PyYAML
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          python3 -m pip install --quiet pyyaml

      # ── 1. Lint + render EVERY chart (fails on any render error) ──────────────
      # Iterate charts/* so a render bug in ANY chart — not just the two receipt
      # charts — fails the build. Umbrella charts first get their unvendored
      # dependencies resolved: real local subcharts (e.g. charts/szl-receipts)
      # are copied in so their value overrides are validated, and genuinely
      # staged subcharts get template-less placeholders. szl-key-init /
      # szl-receipts are also rendered to the fixed paths the later
      # receipt-specific steps consume.
      - name: helm lint --strict + helm template — every chart
        run: |
          set -euo pipefail
          shopt -s nullglob
          charts=(charts/*/)
          if [ ${#charts[@]} -eq 0 ]; then
            echo "::error::no charts found under charts/"
            exit 1
          fi
          for chart in "${charts[@]}"; do
            name="$(basename "$chart")"
            echo "::group::${name}"
            python3 .github/scripts/stub_missing_deps.py "$chart"
            helm lint "$chart" --strict
            helm template "$name" "$chart" > "/tmp/render-${name}.yaml"
            echo "OK: ${name} — lint --strict + template (default values)"
            echo "::endgroup::"
          done
          # Fixed paths the keygen-script + requireKey steps below read.
          cp /tmp/render-szl-key-init.yaml /tmp/key-init.yaml
          cp /tmp/render-szl-receipts.yaml /tmp/receipts-default.yaml
          echo "All ${#charts[@]} charts under charts/* rendered OK"

      # ── 2 + 3. Extract the keygen script and check its syntax + invariants ────
      # extract-keygen + keygen-invariants live in scripts/chart-guard-checks.py
      # so they can be unit-tested with broken fixtures by the self-test job above
      # (missing Job, no args, lost set -e/fail(), two-file key scheme). sh -n and
      # shellcheck stay in the workflow (external tools).
      - name: Extract rendered keygen Job script
        run: |
          set -euo pipefail
          python3 scripts/chart-guard-checks.py extract-keygen /tmp/key-init.yaml /tmp/keygen.sh

      - name: keygen script — POSIX sh syntax check (sh -n)
        run: |
          set -euo pipefail
          if ! sh -n /tmp/keygen.sh; then
            echo "::error file=charts/szl-key-init/templates/keygen-job.yaml::keygen script failed 'sh -n' syntax check"
            exit 1
          fi
          echo "OK: keygen script passes 'sh -n'"

      - name: keygen script — shellcheck
        run: |
          set -euo pipefail
          # SC2086 (word splitting) is acceptable for this controlled script; the
          # rest must pass. Fail on any error-severity finding.
          if ! shellcheck --shell=sh --severity=error /tmp/keygen.sh; then
            echo "::error file=charts/szl-key-init/templates/keygen-job.yaml::shellcheck found error-level issues in keygen script"
            exit 1
          fi
          echo "OK: keygen script passes shellcheck (severity=error)"

      - name: keygen script — fail-loud + single-key invariants
        run: |
          set -euo pipefail
          python3 scripts/chart-guard-checks.py keygen-invariants /tmp/keygen.sh

      # ── 4. signing.requireKey controls the Secret mount's optional flag ───────
      # requirekey-optional lives in scripts/chart-guard-checks.py so it can be
      # unit-tested with broken fixtures by the self-test job above (an unsigned
      # boot slipping past requireKey=true, a missing ed25519-key volume). helm
      # template stays in the workflow (external tool).
      - name: Assert signing.requireKey toggles Secret mount optional flag
        run: |
          set -euo pipefail
          helm template r charts/szl-receipts/ --set signing.requireKey=true  > /tmp/req-true.yaml
          helm template r charts/szl-receipts/ --set signing.requireKey=false > /tmp/req-false.yaml
          python3 scripts/chart-guard-checks.py requirekey-optional /tmp/req-true.yaml /tmp/req-false.yaml

      - name: All chart guards passed
        run: echo "Receipt-deploy charts render, the keygen script is sound, and requireKey holds."

  # ── 6. Deploy-receipt stall alarm: drift guard + promtool unit tests ────────
  # The in-cluster PrometheusRule that pages when the signed deploy-receipt sink
  # stalls ships with its own test suite (charts/szl-receipts/tests/alerts/), but
  # it previously only ran by hand on the box. This job runs it on every PR/push
  # so an edit to the rule expressions, chart values, or metric names that breaks
  # the alarm fails CI before merge. run-alert-tests.sh re-renders the chart's
  # prometheusrule.yaml and diffs its `.spec.groups` against the rendered fixture
  # (drift guard), then runs `promtool test rules` (each alert fires on failure,
  # nothing fires while healthy). Needs helm (render) + promtool (Prometheus).
  alert-rules:
    name: Deploy-receipt stall alarm — drift guard + promtool tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v3.14.0

      - name: Install promtool (Prometheus) + PyYAML
        run: |
          set -euo pipefail
          PROM_VERSION=2.54.1
          tarball="prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          url="https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/${tarball}"
          curl -fsSL "$url" -o "/tmp/${tarball}"
          tar -xzf "/tmp/${tarball}" -C /tmp
          sudo install -m 0755 "/tmp/prometheus-${PROM_VERSION}.linux-amd64/promtool" /usr/local/bin/promtool
          promtool --version
          python3 -m pip install --quiet pyyaml

      - name: Run deploy-receipt stall alarm tests
        run: bash charts/szl-receipts/tests/alerts/run-alert-tests.sh
