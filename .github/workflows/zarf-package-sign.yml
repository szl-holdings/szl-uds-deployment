#
# zarf-package-sign.yml — Keyless cosign signing for szl-uds-deployment packages
#
# Triggered on push to main or workflow_dispatch. Builds the szl-receipts Zarf
# package and signs it keyless via GitHub OIDC (Sigstore Fulcio).
#
# The existing uds-package-release.yml handles tagged releases for szl-vessels-demo.
# This workflow handles the szl-receipts package (the core UDS deployment artifact)
# on every push to main, enabling continuous signed artifact availability.
#
# Keyless signing — no COSIGN_KEY secret required:
#   - Certificate identity = this workflow URL (GitHub OIDC claim)
#   - Cert issued by Fulcio, logged to Rekor transparency log
#   - Signing bundle is self-contained for offline verification
#
# Verification:
#   cosign verify-blob \
#     --bundle <pkg>.cosign.bundle \
#     --certificate-identity "https://github.com/szl-holdings/szl-uds-deployment/.github/workflows/zarf-package-sign.yml@refs/heads/main" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     <pkg>
#
# Refs:
#   Zarf v0.77.0: https://github.com/zarf-dev/zarf/releases/tag/v0.77.0
#   Keyless docs: https://docs.sigstore.dev/cosign/signing/keyless/
#   SZL_OPERATIONAL_UPGRADES.md U3 (P0, M)

name: Zarf Package Build + Sign (Keyless)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  ZARF_VERSION: "v0.77.0"
  COSIGN_VERSION: "v2.4.3"
  SYFT_VERSION: "v1.18.1"
  REGISTRY: "ghcr.io"
  ORG: "szl-holdings"

jobs:
  package-sign:
    name: Build & Sign Zarf Package
    runs-on: ubuntu-latest
    permissions:
      contents: read      # checkout
      id-token: write     # OIDC token exchange with Fulcio (keyless signing)
      packages: write     # push to ghcr.io

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      # ── Install Zarf v0.77.0 ─────────────────────────────────────────────
      - name: Install Zarf
        run: |
          set -euo pipefail
          curl -sLo /usr/local/bin/zarf \
            https://github.com/zarf-dev/zarf/releases/download/${ZARF_VERSION}/zarf_${ZARF_VERSION}_Linux_amd64
          chmod +x /usr/local/bin/zarf
          zarf version

      # ── Install cosign ────────────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      # ── Install syft (SBOM generator) ─────────────────────────────────────
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: ${{ env.SYFT_VERSION }}

      # ── Log in to ghcr.io ─────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build szl-receipts Zarf package ───────────────────────────────────
      # The canonical szl-receipts package lives in packages/szl-receipts/
      - name: Build szl-receipts Zarf package
        run: |
          set -euo pipefail
          mkdir -p dist

          # Build the szl-receipts package (the core UDS deployment artifact)
          # NOTE: szl-receipts-pepr-policy imports ../../dist/pepr (optional, required: false)
          # Zarf lint validates the import path even for optional components. Create the
          # placeholder dir so lint passes without needing a full Pepr build in CI.
          if [ -f "packages/szl-receipts/zarf.yaml" ]; then
            mkdir -p dist/pepr
            # Create a minimal placeholder zarf.yaml so the import resolves
            printf 'kind: ZarfPackageConfig\nmetadata:\n  name: szl-receipt-policy\n  version: "0.0.0"\n  description: "CI placeholder"\ncomponents:\n  - name: szl-receipt-policy\n    required: false\n    description: "CI placeholder component"\n' > dist/pepr/zarf.yaml
            # IMPORTANT: build with --flavor upstream. The szl-receipts-server
            # component is gated `only.flavor: upstream`; building without the
            # flavor drops the actual server (and its baked image) and produces a
            # hollow package. The published OCI artifact must be the complete one,
            # so the flavor is required here. zarf derives the published tag from
            # metadata version + flavor -> szl-receipts:<version>-upstream.
            zarf package create packages/szl-receipts \
              --flavor upstream \
              --confirm \
              --no-progress \
              --output-directory ./dist
          fi

          # Also build the root zarf.yaml if it exists (szl-vessels-demo).
          # BEST-EFFORT: szl-vessels-demo is owned by uds-package-release.yml and
          # its images (vessels/uds-mesh) are not published in this org, so this
          # build may fail. A failure here must NOT abort signing of the
          # szl-receipts package — the sole focus of this workflow. The template
          # tokens are ###ZARF_PKG_TMPL_VAR_UDSMESH_IMAGE_TAG### /
          # ###...VAR_A11OY_IMAGE_TAG### (note the VAR_ prefix), so --set names
          # must include that prefix or zarf aborts under --confirm.
          if [ -f "uds/zarf.yaml" ]; then
            PKG_VERSION="${GITHUB_REF_NAME#v}"  # strip leading v from tag; default 0.3.1
            case "${PKG_VERSION}" in ""|main|master) PKG_VERSION="0.3.1" ;; esac
            if zarf package create uds \
              --set VERSION="${PKG_VERSION}" \
              --set VAR_UDSMESH_IMAGE_TAG="latest" \
              --set VAR_A11OY_IMAGE_TAG="latest" \
              --confirm \
              --no-progress \
              --output-directory ./dist; then
              echo "Built szl-vessels-demo package from uds/zarf.yaml"
            else
              echo "WARN: uds/zarf.yaml (szl-vessels-demo) build failed; continuing — szl-receipts signing is the goal of this workflow"
            fi
          fi

          ls -lh dist/*.tar.zst 2>/dev/null || { echo "No packages built"; exit 1; }
          FIRST_PKG=$(ls dist/*.tar.zst | head -1)
          echo "FIRST_PKG=${FIRST_PKG}" >> "$GITHUB_ENV"

      # ── Generate SBOM ─────────────────────────────────────────────────────
      - name: Generate SBOM for szl-receipts
        run: |
          set -euo pipefail
          SBOM="dist/szl-receipts.sbom.spdx.json"
          syft packages/szl-receipts -o spdx-json --file "${SBOM}" 2>/dev/null || \
            syft . -o spdx-json --file "${SBOM}"
          echo "SBOM: ${SBOM}"

      # ── Publish szl-receipts package to GHCR + keyless-sign the OCI ref ────
      # This is the core of keyless package signing: the PUBLISHED OCI artifact
      # (what outsiders actually pull) is cosign-signed keyless via GitHub OIDC,
      # exactly like the receipts *image* (receipts-server-image.yml). No private
      # key is ever stored, and no public key needs to be committed — verifiers
      # use --certificate-identity + --certificate-oidc-issuer only.
      - name: Publish szl-receipts package to GHCR + keyless-sign (OCI)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          RECEIPTS_PKG="$(ls dist/zarf-package-szl-receipts-*.tar.zst 2>/dev/null | head -1)"
          if [ -z "${RECEIPTS_PKG}" ]; then
            echo "No szl-receipts package built; cannot publish/sign OCI ref"; exit 1
          fi
          echo "Publishing ${RECEIPTS_PKG} -> oci://${REGISTRY}/${ORG}"

          # Publish to the org root so the package is ghcr.io/<org>/szl-receipts
          # (standard form, same as the szl-receipts-server image). A package
          # created by THIS repo's Actions is auto-linked to the repo, so the
          # built-in GITHUB_TOKEN has packages:write on it (the old standalone
          # ghcr.io/<org>/packages/szl-receipts was created off-CI, unlinked, and
          # rejected the built-in token with 403 — it remains the legacy artifact).
          #
          # zarf derives the published OCI tag from package metadata (version +
          # flavor), e.g. szl-receipts:0.4.0-upstream.
          zarf package publish "${RECEIPTS_PKG}" "oci://${REGISTRY}/${ORG}" \
            --no-progress 2>&1 | tee publish.log

          # Resolve the exact published reference from zarf's output. Fall back to
          # deriving it deterministically from metadata.version + the upstream flavor.
          REF="$(grep -oE "${REGISTRY//./\\.}/${ORG}/szl-receipts:[A-Za-z0-9._-]+" publish.log | tail -1 || true)"
          if [ -z "${REF}" ]; then
            VERSION="$(awk '/^metadata:/{m=1} m&&/^[[:space:]]+version:/{gsub(/[" ]/,"",$2);print $2;exit}' packages/szl-receipts/zarf.yaml)"
            REF="${REGISTRY}/${ORG}/szl-receipts:${VERSION}-upstream"
          fi
          echo "Published reference: ${REF}"

          # Sign by digest (immutable) when resolvable; otherwise sign the tag.
          REPO="${REF%:*}"
          DIGEST="$(docker buildx imagetools inspect "${REF}" --format '{{.Manifest.Digest}}' 2>/dev/null || true)"
          if [ -n "${DIGEST}" ]; then
            SIGN_TARGET="${REPO}@${DIGEST}"
          else
            SIGN_TARGET="${REF}"
          fi
          echo "Keyless-signing published OCI artifact: ${SIGN_TARGET}"
          cosign sign --yes "${SIGN_TARGET}"

          echo "PUBLISHED_REF=${REF}" >> "$GITHUB_ENV"

          CERT_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/zarf-package-sign.yml@refs/heads/main"
          CERT_ISSUER="https://token.actions.githubusercontent.com"
          cat >> "${GITHUB_STEP_SUMMARY}" <<SUMMARY
          ### Published + keyless-signed OCI package

          \`${REF}\`

          Verify (no key file, no login once the package is public):
          \`\`\`bash
          cosign verify ${REF} \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer ${CERT_ISSUER}
          \`\`\`
          SUMMARY

      # ── Keyless sign all package tarballs (airgap / offline) ──────────────
      # Detached cosign bundles for the local tarball(s) — useful for airgap
      # verification of a pulled .tar.zst (verify-blob, no registry needed).
      - name: Sign all Zarf package tarballs (keyless OIDC, airgap)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          CERT_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/zarf-package-sign.yml@refs/heads/main"
          CERT_ISSUER="https://token.actions.githubusercontent.com"

          for PKG in dist/*.tar.zst; do
            echo "Signing: ${PKG}"
            cosign sign-blob \
              --yes \
              --bundle "${PKG}.cosign.bundle" \
              "${PKG}"
            echo "  -> Bundle: ${PKG}.cosign.bundle"
          done

          cat >> "${GITHUB_STEP_SUMMARY}" <<SUMMARY
          ### Airgap tarball bundles

          Verify a pulled \`.tar.zst\` offline with:
          \`\`\`bash
          cosign verify-blob \\
            --bundle <pkg>.cosign.bundle \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}" \\
            <pkg>
          \`\`\`
          SUMMARY

      # ── Attest SBOM ──────────────────────────────────────────────────────
      - name: Attest SBOM (keyless DSSE)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          SBOM="dist/szl-receipts.sbom.spdx.json"
          if [ -f "${SBOM}" ]; then
            for PKG in dist/*.tar.zst; do
              cosign attest-blob \
                --yes \
                --predicate "${SBOM}" \
                --type spdxjson \
                --bundle "${PKG}.sbom.bundle" \
                "${PKG}"
            done
          fi

      # ── Upload signed artifacts ───────────────────────────────────────────
      - name: Upload signed artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: zarf-package-szl-receipts-signed
          retention-days: 14
          path: |
            dist/*.tar.zst
            dist/*.cosign.bundle
            dist/*.sbom.bundle
            dist/*.sbom.spdx.json
