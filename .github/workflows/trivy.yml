name: Trivy + Grype container vulnerability scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  trivy-scan:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Trivy vulnerability scan (filesystem)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'  # Don't fail on scan (gate in grype job)

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true  # GHAS required for private repos; non-blocking
        with:
          sarif_file: trivy-results.sarif

  grype-gate:
    name: Grype CVE gate (fail on HIGH/CRITICAL)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Install Grype directly and refresh its vulnerability DB before scanning.
      # The pinned scan-action embeds a vendored DB that can exceed grype's
      # max-allowed-age (5 days) in CI and fail closed with a stale-DB error
      # rather than a real finding. Downloading a fresh DB makes the gate honest.
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin v0.92.2
          grype version

      - name: Refresh Grype vulnerability DB
        run: grype db update

      - name: Scan with Grype (fail build on HIGH/CRITICAL)
        id: grype-scan
        run: |
          grype dir:. \
            --fail-on high \
            --output sarif \
            --file results.sarif
          echo "sarif=results.sarif" >> "$GITHUB_OUTPUT"

      - name: Upload Grype SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true  # GHAS required for private repos; non-blocking
        with:
          sarif_file: ${{ steps.grype-scan.outputs.sarif || 'results.sarif' }}
