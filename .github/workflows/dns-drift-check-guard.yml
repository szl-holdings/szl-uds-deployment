#
# dns-drift-check-guard.yml — Guard the `dns-drift-check` box alarm (the a-11-oy.com
# public-DNS drift alarm) from silently regressing.
#
# dns-drift-check (box-scripts/sbin/dns-drift-check) runs every ~15 min and pages
# the team if a-11-oy.com's public DNS drifts off the box — a missing/wrong A record
# on the apex/www/killinchu/elite hosts, a lost SPF "-all", or a lost DMARC
# "p=reject". EasyWP silently grabbed the apex once; this alarm catches that class
# of takeover before users notice. Its value rests on a few fragile invariants
# that produce NO visible symptom when broken until a real drift goes unalerted:
#   * it still queries a PUBLIC resolver (dig @8.8.8.8) — never the box's own
#     resolver, which would mask external drift;
#   * it still checks the A records, the SPF "-all", and the DMARC "p=reject";
#   * it is EDGE-triggered via a signature file (exactly one page per drift, one on
#     RECOVERED);
#   * it always writes a fresh status file + heartbeat STATE log (so the
#     monitor-liveness meta-monitor can watch it) and the notifier is FAIL-SOFT;
#   * it stays WIRED into install.sh and documented in README.md.
# A sibling refactor could quietly drop any of these, re-opening the "a-11-oy.com DNS
# got hijacked and nobody is paged" hole this alarm closed.
#
# The check logic lives in scripts/dns-drift-check-guard-checks.sh (pure
# text/lint, no DNS), extracted so it can be UNIT TESTED:
# scripts/dns-drift-check-guard-checks.test.sh feeds each check a
# deliberately-BROKEN fixture and asserts it FAILS (plus that the pristine repo
# PASSES). That self-test runs as the `self-test` job below, so a future edit that
# neuters a check (green while guarding nothing) is caught here.
#
# The asserted invariants:
#   chk1  dns-drift-check exists and parses clean (bash -n)
#   chk2  queries an explicit PUBLIC resolver (dig @\$RESOLVER, default 8.8.8.8)
#   chk3  checks A records + SPF -all + DMARC p=reject
#   chk4  edge-triggered via signature file (de-dup + RECOVERED, exactly 2 pushes)
#   chk5  always writes status (atomic) + heartbeat STATE log; notifier fail-soft
#   chk6  wired into install.sh (script + units copied, timer enabled)
#   chk7  documented in README.md (public-resolver DNS-drift alarm section)

name: DNS Drift Check Guard

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-test:
    name: Self-test the guard checks (negative fixtures)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run negative-fixture self-test
        run: bash scripts/dns-drift-check-guard-checks.test.sh

  guard:
    name: Assert the a-11-oy.com DNS-drift alarm is intact
    runs-on: ubuntu-latest
    needs: self-test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check 1 — dns-drift-check exists and parses clean
        run: bash scripts/dns-drift-check-guard-checks.sh chk1 .

      - name: Check 2 — queries an explicit PUBLIC resolver
        run: bash scripts/dns-drift-check-guard-checks.sh chk2 .

      - name: Check 3 — checks A records + SPF -all + DMARC p=reject
        run: bash scripts/dns-drift-check-guard-checks.sh chk3 .

      - name: Check 4 — edge-triggered (signature file + exactly two pushes)
        run: bash scripts/dns-drift-check-guard-checks.sh chk4 .

      - name: Check 5 — always writes status + heartbeat; notifier fail-soft
        run: bash scripts/dns-drift-check-guard-checks.sh chk5 .

      - name: Check 6 — wired into install.sh (script + timer enabled)
        run: bash scripts/dns-drift-check-guard-checks.sh chk6 .

      - name: Check 7 — documented in README.md
        run: bash scripts/dns-drift-check-guard-checks.sh chk7 .

      - name: a-11-oy.com DNS-drift alarm is intact
        run: echo "The dns-drift-check a-11-oy.com DNS-drift alarm is intact."
