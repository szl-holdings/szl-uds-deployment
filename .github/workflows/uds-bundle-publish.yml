#
# uds-bundle-publish.yml
#
# Builds the customer hand-off deliverable: a single UDS bundle that wraps the
# 5 flagship SZL organs (a11oy, sentra, amaru, killinchu, rosie) — each already
# live and cosign-signed on ghcr.io — into one OCI artifact:
#
#     oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0   (+ :latest)
#
# Customer then runs:
#     uds deploy oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0 --confirm
#
# Flow:
#   1. Build a Zarf package for each organ (packages/<organ>/zarf.yaml) directly
#      from its live ghcr.io image (uds-v0.2.0). Zarf pulls the signed image.
#   2. `uds create bundles/szl-uds-bundle` composes the 5 local packages into a
#      bundle tarball.
#   3. `uds publish` pushes the bundle to ghcr.io as szl-uds-bundle:uds-v0.2.0
#      and szl-uds-bundle:latest.
#   4. Keyless cosign signs the published bundle OCI artifact (GitHub OIDC),
#      so `cosign verify` succeeds on the bundle.
#   5. SBOM (syft) attached as a keyless DSSE attestation.
#
# Supply-chain posture: SLSA L1 (honest). Signing is keyless Sigstore via
# GitHub OIDC — no private key provisioning.
#
# References:
#   UDS CLI:   https://github.com/defenseunicorns/uds-cli
#   Zarf:      https://github.com/zarf-dev/zarf/releases/tag/v0.77.0
#   Keyless:   https://docs.sigstore.dev/cosign/signing/keyless/

name: UDS Bundle Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Bundle OCI tag (e.g. uds-v0.2.0)'
        required: true
        default: 'uds-v0.2.0'
  push:
    tags:
      - 'uds-v*'

permissions:
  contents: read

env:
  ZARF_VERSION: "v0.77.0"
  UDS_CLI_VERSION: "v0.31.0"
  COSIGN_VERSION: "v2.4.3"
  SYFT_VERSION: "v1.18.1"
  REGISTRY: "ghcr.io"
  ORG: "szl-holdings"
  BUNDLE_NAME: "szl-uds-bundle"

jobs:
  build-bundle:
    name: Build & Publish UDS Bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read     # checkout
      id-token: write    # keyless cosign OIDC token exchange
      packages: write    # push bundle + signatures to ghcr.io
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # ── Resolve tag + bundle version ───────────────────────────────────────
      # OCI tag is e.g. uds-v0.2.0; the bundle metadata version is 0.2.0.
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Strip a leading 'uds-v' or 'v' to get the bundle metadata version.
          VERSION="${TAG#uds-v}"
          VERSION="${VERSION#v}"
          echo "tag=${TAG}"        >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved OCI tag=${TAG}  bundle version=${VERSION}"

      # ── Install Zarf (direct download; no action dependency) ───────────────
      # NOTE: the setup-zarf action moved from defenseunicorns/* to zarf-dev/*;
      # GitHub Actions does not follow the repo redirect, so we install Zarf via
      # the official release tarball directly to avoid any action-resolution
      # startup failure.
      # Zarf publishes a bare Linux binary named zarf_<ver>_Linux_<arch>
      # (NOT a tarball), so download it directly and install onto $PATH.
      - name: Install Zarf ${{ env.ZARF_VERSION }}
        run: |
          set -euo pipefail
          URL="https://github.com/zarf-dev/zarf/releases/download/${ZARF_VERSION}/zarf_${ZARF_VERSION}_Linux_${{ matrix.arch }}"
          curl -fsSL "${URL}" -o zarf
          sudo install -m 0755 zarf /usr/local/bin/zarf
      - name: Verify Zarf
        run: zarf version

      # ── Install uds-cli (direct download, mirrors the working Zarf install) ──
      # Mechanism intentionally identical to the Zarf step above (which succeeds):
      # plain curl to a bare Linux binary + sudo install to /usr/local/bin.
      # No pipefail-guarded grep and no binary self-checks that could trip the
      # hardened runner's outbound update probe.
      # The 196MB uds-cli release binary cannot be pulled on this runner: the
      # egress path returns HTTP 200 but truncates the body to 0 bytes
      # (curl_exit=23) for that large single object, while the smaller Zarf
      # binary and the Go module proxy (many small objects) work fine. So we
      # build uds-cli from source at the pinned tag via `go install`, which
      # fetches modules through proxy.golang.org rather than one large blob.
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.0"
          cache: false
      - name: Build uds-cli ${{ env.UDS_CLI_VERSION }} from source
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          set -uo pipefail
          # Clone the tagged source (git = many small objects, unaffected by the
          # large-blob egress truncation) and `go build` inside the module so the
          # go.mod `replace` directives are honored (which `go install m@v` cannot).
          echo "uds-cli build: clone+build ${UDS_CLI_VERSION}"
          go version
          set +e
          git clone --depth 1 --branch "${UDS_CLI_VERSION}" \
            https://github.com/defenseunicorns/uds-cli.git uds-cli-src
          CRC=$?
          echo "uds-cli clone rc=${CRC}"
          BUILT=""
          if [ "${CRC}" -eq 0 ]; then
            ( cd uds-cli-src && \
              go build -ldflags "-s -w -X github.com/defenseunicorns/uds-cli/src/config.CLIVersion=${UDS_CLI_VERSION}" \
                -o /tmp/uds main.go )
            BRC=$?
            echo "uds-cli go_build rc=${BRC}"
          fi
          set -e
          SZ=0; [ -f /tmp/uds ] && SZ=$(stat -c%s /tmp/uds 2>/dev/null || echo 0)
          echo "uds-cli bin_size=${SZ}"
          if [ ! -f /tmp/uds ] || [ "${SZ}" -lt 50000000 ]; then
            echo "::error title=uds-cli-build-failed::source build did not produce a usable binary"
            exit 1
          fi
          sudo install -m 0755 /tmp/uds /usr/local/bin/uds
          echo "uds-cli installed size=$(stat -c%s /usr/local/bin/uds)"
      - name: Verify uds-cli
        run: |
          set -euo pipefail
          test -x /usr/local/bin/uds
          # uds version performs an outbound update check that may exit non-zero
          # on hardened runners; keep it informational.
          uds version || echo "(uds version self-check returned non-zero; binary is installed, continuing)"

      # ── Install cosign ─────────────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}
      - name: Verify cosign
        run: cosign version

      # ── Install syft ───────────────────────────────────────────────────────
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: ${{ env.SYFT_VERSION }}

      # ── Log in to ghcr.io ──────────────────────────────────────────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          # The GHCR package `szl-uds-bundle` is repo-linked to a DIFFERENT repo
          # (szl-holdings/uds-bundles), so this repo's built-in GITHUB_TOKEN gets
          # `403 denied: permission_denied: write_package` on `uds publish`. We
          # log in with an org-owner PAT (repo secret GHCR_PUBLISH_TOKEN) which
          # has write:packages org-wide; uds publish (oras) reuses these docker
          # credentials.
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PUBLISH_TOKEN }}

      # ── Pre-warm large organ image layers into the Zarf cache (resumable) ──
      # amaru (and to a lesser extent rosie) carry a fat single layer (~363MB)
      # that repeatedly stalls/EOFs on the GHCR CDN. Both `zarf` and `docker`
      # image pulls are NON-resumable (a stall restarts from byte 0), so one CDN
      # hiccup would fail `zarf package create` for the whole organ. We pre-fetch
      # every blob of each digest-pinned organ image into the Zarf image cache
      # with a resumable curl + retry loop FIRST; zarf then cache-hits and skips
      # the fragile pull. Best-effort: a miss falls through to zarf's own pull,
      # which the retry wrapper in the build step below also covers.
      - name: Pre-warm organ image layers into the Zarf cache (resumable)
        env:
          GHCR_BEARER: ${{ secrets.GHCR_PUBLISH_TOKEN }}
        shell: bash
        run: |
          set -uo pipefail
          chmod +x scripts/prewarm-ghcr-blobs.sh
          for organ in amaru rosie a11oy sentra killinchu; do
            ref="$(grep -oE 'ghcr\.io/szl-holdings/[a-z0-9._/-]+@sha256:[0-9a-f]{64}' "packages/${organ}/zarf.yaml" | head -1 || true)"
            if [ -z "${ref}" ]; then
              echo "packages/${organ}/zarf.yaml has no digest-pinned image; zarf will pull it by tag"
              continue
            fi
            echo "::group::pre-warm ${organ} ${ref}"
            scripts/prewarm-ghcr-blobs.sh "${ref}" \
              || echo "::warning title=prewarm-${organ}::pre-warm incomplete; zarf will attempt its own pull"
            echo "::endgroup::"
          done

      # ── Build the 5 member Zarf packages from the LIVE ghcr.io images ───────
      # Each packages/<organ>/zarf.yaml bakes its LIVE, cosign-signed image as a
      # literal digest-pinned ref in the component images: list, so --set VERSION
      # does NOT pick the image tag — it only fills metadata.version (and thus the
      # built tarball name zarf-package-<name>-<arch>-<version>.tar.zst). uds
      # create resolves each local-path member by the member `ref:` in
      # bundles/szl-uds-bundle/uds-bundle.yaml (0.2.0 for the 4 templated organs;
      # a11oy is hardcoded 0.3.0), so we MUST feed the STRIPPED bundle version
      # (0.2.0), not the OCI tag (uds-v0.2.0) — otherwise the tarball is named
      # ...-uds-v0.2.0.tar.zst and uds create fails "no such file".
      - name: Build member Zarf packages
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          # IMPORTANT: GitHub invokes run-steps as `bash -e`; that default -e was
          # killing this step the instant `zarf package create` returned non-zero,
          # BEFORE our per-organ diagnostic echo. Explicitly disable -e so we can
          # capture rc and surface the real per-organ error.
          set +e
          set -uo pipefail
          # Images are baked as literal digest-pinned refs in each package, so
          # PKG_VERSION only names the built tarball — it must equal the member
          # `ref:` in the bundle (stripped bundle version 0.2.0).
          mkdir -p dist
          # Flavor gating: ONLY packages/a11oy/zarf.yaml has flavor-gated
          # components (only.flavor: upstream|unicorn) — its sole workload
          # component is gated, so a11oy MUST be built with `--flavor upstream` or
          # that component is silently dropped (empty package). The other four
          # organs (killinchu/rosie/sentra/amaru) have NO flavor gating and MUST be
          # built WITHOUT `--flavor` (a stray --flavor would conversely empty them).
          # bundle-build-guard enforces this symmetry by reading each literal
          # `zarf package create` line, so a11oy is built on its own line below with
          # the explicit --flavor, and the remaining four stay in the no-flavor loop.
          #
          # diag_after — shared post-create diagnostics (rc capture + per-organ
          # ::error:: annotation). The retry loop itself stays INLINE around the
          # literal `zarf package create` so the static guard (chk3) sees the
          # required for-loop < zarf package create < success-break structure.
          diag_after() {
            organ="$1"
            echo "::endgroup::"
            cat "/tmp/${organ}.log" || true
            # Always emit one ::error:: per organ (these reliably surface in the
            # annotation API) carrying rc + a filtered stderr tail, so the exact
            # failing organ and cause are visible even with logs egress-blocked.
            ERRTAIL=$(grep -iE 'err|fail|fatal|unable|denied|not found|no such|invalid|cannot|forbidden|unauthor' "/tmp/${organ}.log" | tail -n 4 | tr '\n' '|' | sed 's/[^[:print:]|]//g')
            echo "::error title=zarf-${organ}::rc=${RC} tail=${ERRTAIL}"
            if [ "${RC}" -ne 0 ]; then exit 1; fi
          }
          # a11oy FIRST + explicit --flavor upstream (flavor-gated workload). The
          # `zarf package create` invocation is INLINE inside the retry loop so the
          # static guards see BOTH the --flavor (bundle-build-guard) and the
          # for-loop<create<break retry structure (chk3).
          # zarf image pulls are non-resumable; a transient GHCR stall would fail
          # the whole create. Blobs are pre-warmed above, but retry with backoff
          # so any not-pre-warmed pull also survives a transient hiccup.
          echo "::group::zarf package create packages/a11oy"
          RC=0
          for attempt in 1 2 3; do
            zarf package create packages/a11oy --flavor upstream \
              --set VERSION="${PKG_VERSION}" \
              --architecture "${{ matrix.arch }}" \
              --confirm \
              --output-directory packages/a11oy > "/tmp/a11oy.log" 2>&1
            RC=$?
            [ "${RC}" -eq 0 ] && break
            echo "zarf package create a11oy failed (attempt ${attempt}/3, rc=${RC}); retrying after backoff" >> "/tmp/a11oy.log"
            sleep $(( attempt * 15 ))
          done
          diag_after a11oy
          # The remaining four organs have NO flavor gating — build WITHOUT --flavor.
          # killinchu + rosie first (the ones that failed last run) so their error
          # annotation lands inside GitHub's 10-annotation cap.
          for organ in killinchu rosie sentra amaru; do
            echo "::group::zarf package create packages/${organ}"
            RC=0
            for attempt in 1 2 3; do
              zarf package create "packages/${organ}" \
                --set VERSION="${PKG_VERSION}" \
                --architecture "${{ matrix.arch }}" \
                --confirm \
                --output-directory "packages/${organ}" > "/tmp/${organ}.log" 2>&1
              RC=$?
              [ "${RC}" -eq 0 ] && break
              echo "zarf package create ${organ} failed (attempt ${attempt}/3, rc=${RC}); retrying after backoff" >> "/tmp/${organ}.log"
              sleep $(( attempt * 15 ))
            done
            diag_after "${organ}"
          done
          echo "Built member packages:"
          # uds create resolves a local-path member by looking for its built zarf
          # tarball INSIDE the member path dir (packages/<organ>/), not a shared
          # dist/, so each package is emitted there above.
          ls -lh packages/*/zarf-package-*.tar.zst || true

      # ── Create the UDS bundle ──────────────────────────────────────────────
      # uds create reads bundles/szl-uds-bundle/uds-bundle.yaml; its packages are
      # local `path:` refs to packages/<organ>. uds picks up the just-built Zarf
      # packages from those directories.
      - name: Create UDS bundle
        run: |
          set -euo pipefail
          uds create bundles/szl-uds-bundle \
            --confirm \
            --no-progress \
            --output dist
          echo "Bundle tarball:"
          ls -lh dist/uds-bundle-*.tar.zst

      - name: Resolve bundle tarball path
        id: bundle
        run: |
          set -euo pipefail
          BUNDLE_TAR="$(ls dist/uds-bundle-${BUNDLE_NAME}-${{ matrix.arch }}-*.tar.zst | head -1)"
          test -f "$BUNDLE_TAR"
          echo "tar=${BUNDLE_TAR}" >> "$GITHUB_OUTPUT"
          echo "Resolved bundle tar: ${BUNDLE_TAR}"

      # ── Publish bundle to ghcr.io (uds-v0.2.0 + latest) ─────────────────────
      - name: Publish bundle to ghcr.io
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BUNDLE_TAR: ${{ steps.bundle.outputs.tar }}
        run: |
          set -euo pipefail
          # Primary tag (e.g. uds-v0.2.0)
          uds publish "${BUNDLE_TAR}" "oci://${REGISTRY}/${ORG}" \
            --version "${TAG}" \
            --no-progress
          # Floating latest tag
          uds publish "${BUNDLE_TAR}" "oci://${REGISTRY}/${ORG}" \
            --version "latest" \
            --no-progress
          echo "Published: oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          echo "Published: oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:latest"

      # ── Resolve the published bundle digest ─────────────────────────────────
      - name: Resolve published bundle digest
        id: digest
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          DIGEST="$(cosign triangulate --type digest "${REF}" 2>/dev/null || true)"
          if [ -z "${DIGEST}" ]; then
            # Fall back to crane-style digest via cosign
            DIGEST="$(cosign digest "${REF}" 2>/dev/null || true)"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Bundle ref=${REF} digest=${DIGEST}"

      # ── Keyless cosign sign of the published bundle OCI artifact ────────────
      - name: Sign published bundle (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          echo "Signing ${REF} keylessly via GitHub OIDC..."
          cosign sign --yes "${REF}"

          CERT_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/uds-bundle-publish.yml@${GITHUB_REF}"
          CERT_ISSUER="https://token.actions.githubusercontent.com"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### UDS Bundle published

          \`oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}\` (+ \`:latest\`)

          Deploy:
          \`\`\`bash
          uds deploy oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG} --confirm
          \`\`\`

          Verify signature (keyless):
          \`\`\`bash
          cosign verify ${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG} \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}"
          \`\`\`
          EOF

      # ── SBOM (syft) + keyless DSSE attestation on the bundle ────────────────
      - name: Generate + attest SBOM (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          SBOM="sbom-${BUNDLE_NAME}-${{ matrix.arch }}-${{ steps.version.outputs.version }}.spdx.json"
          syft "${{ steps.bundle.outputs.tar }}" -o spdx-json --file "${SBOM}"
          cosign attest --yes --predicate "${SBOM}" --type spdxjson "${REF}"
          echo "Attested SBOM ${SBOM} to ${REF}"

      # ── Upload local artifacts for traceability ─────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: uds-bundle-${{ matrix.arch }}
          retention-days: 7
          path: |
            dist/uds-bundle-*.tar.zst
            sbom-*.spdx.json
