#
# uds-bundle-publish.yml
#
# Builds the customer hand-off deliverable: a single UDS bundle that wraps the
# 5 flagship SZL organs (a11oy, sentra, amaru, killinchu, rosie) — each already
# live and cosign-signed on ghcr.io — into one OCI artifact:
#
#     oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0   (+ :latest)
#
# Customer then runs:
#     uds deploy oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0 --confirm
#
# Flow:
#   1. Build a Zarf package for each organ (packages/<organ>/zarf.yaml) directly
#      from its live ghcr.io image (uds-v0.2.0). Zarf pulls the signed image.
#   2. `uds create bundles/szl-uds-bundle` composes the 5 local packages into a
#      bundle tarball.
#   3. `uds publish` pushes the bundle to ghcr.io as szl-uds-bundle:uds-v0.2.0
#      and szl-uds-bundle:latest.
#   4. Keyless cosign signs the published bundle OCI artifact (GitHub OIDC),
#      so `cosign verify` succeeds on the bundle.
#   5. SBOM (syft) attached as a keyless DSSE attestation.
#
# Supply-chain posture: SLSA L1 (honest). Signing is keyless Sigstore via
# GitHub OIDC — no private key provisioning.
#
# References:
#   UDS CLI:   https://github.com/defenseunicorns/uds-cli
#   Zarf:      https://github.com/zarf-dev/zarf/releases/tag/v0.77.0
#   Keyless:   https://docs.sigstore.dev/cosign/signing/keyless/

name: UDS Bundle Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Bundle OCI tag (e.g. uds-v0.2.0)'
        required: true
        default: 'uds-v0.2.0'
  push:
    tags:
      - 'uds-v*'

permissions:
  # Keyless cosign OIDC token exchange
  id-token: write
  # Read repo
  contents: read
  # Push bundle + signatures to ghcr.io
  packages: write

env:
  ZARF_VERSION: "v0.77.0"
  UDS_CLI_VERSION: "v0.31.0"
  COSIGN_VERSION: "v2.4.3"
  SYFT_VERSION: "v1.18.1"
  REGISTRY: "ghcr.io"
  ORG: "szl-holdings"
  BUNDLE_NAME: "szl-uds-bundle"

jobs:
  build-bundle:
    name: Build & Publish UDS Bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # ── Resolve tag + bundle version ───────────────────────────────────────
      # OCI tag is e.g. uds-v0.2.0; the bundle metadata version is 0.2.0.
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Strip a leading 'uds-v' or 'v' to get the bundle metadata version.
          VERSION="${TAG#uds-v}"
          VERSION="${VERSION#v}"
          echo "tag=${TAG}"        >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved OCI tag=${TAG}  bundle version=${VERSION}"

      # ── Install Zarf (direct download; no action dependency) ───────────────
      # NOTE: the setup-zarf action moved from defenseunicorns/* to zarf-dev/*;
      # GitHub Actions does not follow the repo redirect, so we install Zarf via
      # the official release tarball directly to avoid any action-resolution
      # startup failure.
      # Zarf publishes a bare Linux binary named zarf_<ver>_Linux_<arch>
      # (NOT a tarball), so download it directly and install onto $PATH.
      - name: Install Zarf ${{ env.ZARF_VERSION }}
        run: |
          set -euo pipefail
          URL="https://github.com/zarf-dev/zarf/releases/download/${ZARF_VERSION}/zarf_${ZARF_VERSION}_Linux_${{ matrix.arch }}"
          curl -fsSL "${URL}" -o zarf
          sudo install -m 0755 zarf /usr/local/bin/zarf
      - name: Verify Zarf
        run: zarf version

      # ── Install uds-cli (direct download, mirrors the working Zarf install) ──
      # Mechanism intentionally identical to the Zarf step above (which succeeds):
      # plain curl to a bare Linux binary + sudo install to /usr/local/bin.
      # No pipefail-guarded grep and no binary self-checks that could trip the
      # hardened runner's outbound update probe.
      - name: Install uds-cli ${{ env.UDS_CLI_VERSION }}
        run: |
          set -uo pipefail
          REPO="defenseunicorns/uds-cli"
          ASSET="uds-cli_${UDS_CLI_VERSION}_Linux_${{ matrix.arch }}"
          URL="https://github.com/${REPO}/releases/download/${UDS_CLI_VERSION}/${ASSET}"
          # Diagnostics emitted as workflow-command annotations (readable via the
          # check-runs API even when the step-summary/raw-log blob host is egress
          # blocked). Each ::notice:: surfaces as an annotation on the check run.
          echo "::notice title=uds-cli-url::${URL}"
          # Pull the expected sha256 from the release checksums so we can verify
          # integrity AND distinguish a truncated download from a corrupt one.
          CKURL="https://github.com/${REPO}/releases/download/${UDS_CLI_VERSION}/checksums.txt"
          curl -fsSL --retry 5 --retry-all-errors --retry-delay 5 "${CKURL}" -o checksums.txt || true
          EXPECT=$(grep "  ${ASSET}\$" checksums.txt 2>/dev/null | awk '{print $1}')
          echo "::notice title=uds-cli-expected-sha::${EXPECT:-unknown}"
          ASSET_API="https://api.github.com/repos/${REPO}/releases/assets/421085386"
          ok=0
          # Method A: public release CDN (same host that Zarf used successfully).
          # Method B: authenticated GitHub API octet-stream endpoint (different
          # routing; works when the large-asset CDN host is egress-restricted).
          # Each method's exact curl_exit/http/size/sha is emitted as an ::error::
          # annotation (errors are never deduped/dropped by the annotations API).
          # NOTE: keep `set +e` for the whole probe block. Under `set -e -o
          # pipefail`, a failed `sha256sum missingfile | awk` (when the download
          # produced no file) aborts the step BEFORE the diagnostic echo runs,
          # which is exactly why earlier runs showed no method annotation.
          set +e
          for method in A B; do
            rm -f uds
            if [ "${method}" = "A" ]; then
              HTTP=$(curl -L --ipv4 --connect-timeout 30 --max-time 600 \
                     --retry 3 --retry-all-errors --retry-delay 5 \
                     -sS -w '%{http_code}' -o uds "${URL}"); RC=$?
            else
              HTTP=$(curl -L --ipv4 --connect-timeout 30 --max-time 600 \
                     --retry 3 --retry-all-errors --retry-delay 5 \
                     -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                     -H "Accept: application/octet-stream" \
                     -sS -w '%{http_code}' -o uds "${ASSET_API}"); RC=$?
            fi
            SZ=0; [ -f uds ] && SZ=$(stat -c%s uds 2>/dev/null || echo 0)
            GOT="none"; [ -f uds ] && GOT=$(sha256sum uds 2>/dev/null | awk '{print $1}')
            HEAD=""; [ -f uds ] && HEAD=$(head -c 80 uds 2>/dev/null | tr -d '\0' | sed 's/[^[:print:]]//g')
            echo "::error title=uds-cli-method-${method}::curl_exit=${RC} http=${HTTP} size=${SZ} sha=${GOT} head=${HEAD}"
            if [ "${RC}" -eq 0 ] && [ "${SZ}" -gt 100000000 ]; then
              if [ -z "${EXPECT}" ] || [ "${GOT}" = "${EXPECT}" ]; then ok=1; break; fi
            fi
          done
          set -e
          if [ "${ok}" -ne 1 ]; then
            echo "::error title=uds-cli-install-failed::no method produced a valid ${ASSET}"
            exit 1
          fi
          sudo install -m 0755 uds /usr/local/bin/uds
          echo "::notice title=uds-cli-installed::ok size=$(stat -c%s /usr/local/bin/uds)"
      - name: Verify uds-cli
        run: |
          set -euo pipefail
          test -x /usr/local/bin/uds
          # uds version performs an outbound update check that may exit non-zero
          # on hardened runners; keep it informational.
          uds version || echo "(uds version self-check returned non-zero; binary is installed, continuing)"

      # ── Install cosign ─────────────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}
      - name: Verify cosign
        run: cosign version

      # ── Install syft ───────────────────────────────────────────────────────
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: ${{ env.SYFT_VERSION }}

      # ── Log in to ghcr.io ──────────────────────────────────────────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build the 5 member Zarf packages from the LIVE ghcr.io images ───────
      # Each packages/<organ>/zarf.yaml references
      # ghcr.io/szl-holdings/<organ>:###ZARF_PKG_TMPL_VERSION### which Zarf
      # resolves to the live, cosign-signed tag passed via --set VERSION.
      - name: Build member Zarf packages
        env:
          PKG_VERSION: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          # Member images are tagged uds-v0.2.0 on ghcr.io, so the image tag we
          # feed Zarf is the full OCI tag (uds-v0.2.0), not the stripped version.
          for organ in a11oy sentra amaru killinchu rosie; do
            echo "::group::zarf package create packages/${organ}"
            zarf package create "packages/${organ}" \
              --set VERSION="${PKG_VERSION}" \
              --architecture "${{ matrix.arch }}" \
              --confirm \
              --no-progress \
              --output-directory dist
            echo "::endgroup::"
          done
          echo "Built member packages:"
          ls -lh dist/*.tar.zst

      # ── Create the UDS bundle ──────────────────────────────────────────────
      # uds create reads bundles/szl-uds-bundle/uds-bundle.yaml; its packages are
      # local `path:` refs to packages/<organ>. uds picks up the just-built Zarf
      # packages from those directories.
      - name: Create UDS bundle
        run: |
          set -euo pipefail
          uds create bundles/szl-uds-bundle \
            --confirm \
            --no-progress \
            --output dist
          echo "Bundle tarball:"
          ls -lh dist/uds-bundle-*.tar.zst

      - name: Resolve bundle tarball path
        id: bundle
        run: |
          set -euo pipefail
          BUNDLE_TAR="$(ls dist/uds-bundle-${BUNDLE_NAME}-${{ matrix.arch }}-*.tar.zst | head -1)"
          test -f "$BUNDLE_TAR"
          echo "tar=${BUNDLE_TAR}" >> "$GITHUB_OUTPUT"
          echo "Resolved bundle tar: ${BUNDLE_TAR}"

      # ── Publish bundle to ghcr.io (uds-v0.2.0 + latest) ─────────────────────
      - name: Publish bundle to ghcr.io
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BUNDLE_TAR: ${{ steps.bundle.outputs.tar }}
        run: |
          set -euo pipefail
          # Primary tag (e.g. uds-v0.2.0)
          uds publish "${BUNDLE_TAR}" "oci://${REGISTRY}/${ORG}" \
            --version "${TAG}" \
            --no-progress
          # Floating latest tag
          uds publish "${BUNDLE_TAR}" "oci://${REGISTRY}/${ORG}" \
            --version "latest" \
            --no-progress
          echo "Published: oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          echo "Published: oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:latest"

      # ── Resolve the published bundle digest ─────────────────────────────────
      - name: Resolve published bundle digest
        id: digest
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          DIGEST="$(cosign triangulate --type digest "${REF}" 2>/dev/null || true)"
          if [ -z "${DIGEST}" ]; then
            # Fall back to crane-style digest via cosign
            DIGEST="$(cosign digest "${REF}" 2>/dev/null || true)"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Bundle ref=${REF} digest=${DIGEST}"

      # ── Keyless cosign sign of the published bundle OCI artifact ────────────
      - name: Sign published bundle (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          echo "Signing ${REF} keylessly via GitHub OIDC..."
          cosign sign --yes "${REF}"

          CERT_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/uds-bundle-publish.yml@${GITHUB_REF}"
          CERT_ISSUER="https://token.actions.githubusercontent.com"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### UDS Bundle published

          \`oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}\` (+ \`:latest\`)

          Deploy:
          \`\`\`bash
          uds deploy oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG} --confirm
          \`\`\`

          Verify signature (keyless):
          \`\`\`bash
          cosign verify ${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG} \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}"
          \`\`\`
          EOF

      # ── SBOM (syft) + keyless DSSE attestation on the bundle ────────────────
      - name: Generate + attest SBOM (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          SBOM="sbom-${BUNDLE_NAME}-${{ matrix.arch }}-${{ steps.version.outputs.version }}.spdx.json"
          syft "${{ steps.bundle.outputs.tar }}" -o spdx-json --file "${SBOM}"
          cosign attest --yes --predicate "${SBOM}" --type spdxjson "${REF}"
          echo "Attested SBOM ${SBOM} to ${REF}"

      # ── Upload local artifacts for traceability ─────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: uds-bundle-${{ matrix.arch }}
          retention-days: 7
          path: |
            dist/uds-bundle-*.tar.zst
            sbom-*.spdx.json
