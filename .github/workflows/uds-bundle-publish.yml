#
# uds-bundle-publish.yml
#
# Builds the customer hand-off deliverable: a single UDS bundle that wraps the
# 5 flagship SZL organs (a11oy, sentra, amaru, killinchu, rosie) — each already
# live and cosign-signed on ghcr.io — into one OCI artifact:
#
#     oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0   (+ :latest)
#
# Customer then runs:
#     uds deploy oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0 --confirm
#
# Flow:
#   1. Build a Zarf package for each organ (packages/<organ>/zarf.yaml) directly
#      from its live ghcr.io image (uds-v0.2.0). Zarf pulls the signed image.
#   2. `uds create bundles/szl-uds-bundle` composes the 5 local packages into a
#      bundle tarball.
#   3. `uds publish` pushes the bundle to ghcr.io as szl-uds-bundle:uds-v0.2.0
#      and szl-uds-bundle:latest.
#   4. Keyless cosign signs the published bundle OCI artifact (GitHub OIDC),
#      so `cosign verify` succeeds on the bundle.
#   5. SBOM (syft) attached as a keyless DSSE attestation.
#
# Supply-chain posture: SLSA L1 (honest). Signing is keyless Sigstore via
# GitHub OIDC — no private key provisioning.
#
# References:
#   UDS CLI:   https://github.com/defenseunicorns/uds-cli
#   Zarf:      https://github.com/zarf-dev/zarf/releases/tag/v0.77.0
#   Keyless:   https://docs.sigstore.dev/cosign/signing/keyless/

name: UDS Bundle Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Bundle OCI tag (e.g. uds-v0.2.0)'
        required: true
        default: 'uds-v0.2.0'
  push:
    tags:
      - 'uds-v*'

permissions:
  # Keyless cosign OIDC token exchange
  id-token: write
  # Read repo
  contents: read
  # Push bundle + signatures to ghcr.io
  packages: write

env:
  ZARF_VERSION: "v0.77.0"
  UDS_CLI_VERSION: "v0.31.0"
  COSIGN_VERSION: "v2.4.3"
  SYFT_VERSION: "v1.18.1"
  REGISTRY: "ghcr.io"
  ORG: "szl-holdings"
  BUNDLE_NAME: "szl-uds-bundle"

jobs:
  build-bundle:
    name: Build & Publish UDS Bundle (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # ── Reclaim runner disk ────────────────────────────────────────────────
      # "Build member Zarf packages" pulls 5 full member container images into
      # the runner's local store; on the standard github-hosted runner this
      # exhausts the disk ("No space left on device"), killing the job before
      # publish/attest. Drop the large pre-installed toolchains we don't use
      # (Android SDK, .NET, GHC, CodeQL bundles, Swift) to free ~25-30 GB so the
      # Zarf image pulls fit.
      - name: Free disk space
        run: |
          set -uo pipefail
          echo "Before:"; df -h / | tail -1
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            /usr/local/share/powershell /usr/share/swift || true
          sudo docker image prune -af || true
          echo "After:"; df -h / | tail -1

      # ── Resolve tag + bundle version ───────────────────────────────────────
      # OCI tag is e.g. uds-v0.2.0; the bundle metadata version is 0.2.0.
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Strip a leading 'uds-v' or 'v' to get the bundle metadata version.
          VERSION="${TAG#uds-v}"
          VERSION="${VERSION#v}"
          echo "tag=${TAG}"        >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved OCI tag=${TAG}  bundle version=${VERSION}"

      # ── Install Zarf (direct download; no action dependency) ───────────────
      # NOTE: the setup-zarf action moved from defenseunicorns/* to zarf-dev/*;
      # GitHub Actions does not follow the repo redirect, so we install Zarf via
      # the official release tarball directly to avoid any action-resolution
      # startup failure.
      # Zarf publishes a bare Linux binary named zarf_<ver>_Linux_<arch>
      # (NOT a tarball), so download it directly and install onto $PATH.
      - name: Install Zarf ${{ env.ZARF_VERSION }}
        run: |
          set -euo pipefail
          URL="https://github.com/zarf-dev/zarf/releases/download/${ZARF_VERSION}/zarf_${ZARF_VERSION}_Linux_${{ matrix.arch }}"
          curl -fsSL "${URL}" -o zarf
          sudo install -m 0755 zarf /usr/local/bin/zarf
      - name: Verify Zarf
        run: zarf version

      # ── Install uds-cli (direct download, mirrors the working Zarf install) ──
      # Mechanism intentionally identical to the Zarf step above (which succeeds):
      # plain curl to a bare Linux binary + sudo install to /usr/local/bin.
      # No pipefail-guarded grep and no binary self-checks that could trip the
      # hardened runner's outbound update probe.
      # The 196MB uds-cli release binary cannot be pulled on this runner: the
      # egress path returns HTTP 200 but truncates the body to 0 bytes
      # (curl_exit=23) for that large single object, while the smaller Zarf
      # binary and the Go module proxy (many small objects) work fine. So we
      # build uds-cli from source at the pinned tag via `go install`, which
      # fetches modules through proxy.golang.org rather than one large blob.
      - name: Set up Go
        uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version: "1.26.0"
          cache: false
      - name: Build uds-cli ${{ env.UDS_CLI_VERSION }} from source
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
        run: |
          set -uo pipefail
          # Clone the tagged source (git = many small objects, unaffected by the
          # large-blob egress truncation) and `go build` inside the module so the
          # go.mod `replace` directives are honored (which `go install m@v` cannot).
          echo "uds-cli build: clone+build ${UDS_CLI_VERSION}"
          go version
          set +e
          git clone --depth 1 --branch "${UDS_CLI_VERSION}" \
            https://github.com/defenseunicorns/uds-cli.git uds-cli-src
          CRC=$?
          echo "uds-cli clone rc=${CRC}"
          BUILT=""
          if [ "${CRC}" -eq 0 ]; then
            ( cd uds-cli-src && \
              go build -ldflags "-s -w -X github.com/defenseunicorns/uds-cli/src/config.CLIVersion=${UDS_CLI_VERSION}" \
                -o /tmp/uds main.go )
            BRC=$?
            echo "uds-cli go_build rc=${BRC}"
          fi
          set -e
          SZ=0; [ -f /tmp/uds ] && SZ=$(stat -c%s /tmp/uds 2>/dev/null || echo 0)
          echo "uds-cli bin_size=${SZ}"
          if [ ! -f /tmp/uds ] || [ "${SZ}" -lt 50000000 ]; then
            echo "::error title=uds-cli-build-failed::source build did not produce a usable binary"
            exit 1
          fi
          sudo install -m 0755 /tmp/uds /usr/local/bin/uds
          echo "uds-cli installed size=$(stat -c%s /usr/local/bin/uds)"
      - name: Verify uds-cli
        run: |
          set -euo pipefail
          test -x /usr/local/bin/uds
          # uds version performs an outbound update check that may exit non-zero
          # on hardened runners; keep it informational.
          uds version || echo "(uds version self-check returned non-zero; binary is installed, continuing)"

      # ── Install cosign ─────────────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}
      - name: Verify cosign
        run: cosign version

      # ── Install syft ───────────────────────────────────────────────────────
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: ${{ env.SYFT_VERSION }}

      # ── Log in to ghcr.io ──────────────────────────────────────────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build the 5 member Zarf packages from the LIVE ghcr.io images ───────
      # Each packages/<organ>/zarf.yaml decouples two template vars:
      #   VERSION   -> metadata.version (must equal the bundle `ref:`, e.g. 0.2.0)
      #   IMAGE_TAG -> the live ghcr.io image tag to pull (e.g. uds-v0.2.0)
      # The member IMAGE tags on ghcr.io are uds-v0.2.0 (there is no 0.2.0 image
      # tag), but uds-bundle.yaml references each member by `ref: "0.2.0"`, which
      # uds-cli resolves to the tarball name zarf-package-szl-<organ>-<arch>-0.2.0.tar.zst
      # IN THE PACKAGE DIRECTORY. So we build with VERSION=<stripped> +
      # IMAGE_TAG=<oci tag> and output each package into packages/<organ>/ (not
      # dist/) so `uds create` finds it.
      - name: Build member Zarf packages
        env:
          PKG_VERSION: ${{ steps.version.outputs.version }}
          IMG_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          # IMPORTANT: GitHub invokes run-steps as `bash -e`; that default -e was
          # killing this step the instant `zarf package create` returned non-zero,
          # BEFORE our per-organ diagnostic echo. Explicitly disable -e so we can
          # capture rc and surface the real per-organ error.
          set +e
          set -uo pipefail
          # Build killinchu + rosie FIRST (the ones that failed last run) so their
          # error annotation lands inside GitHub's 10-annotation cap; only emit
          # annotations on failure and stop at the first failing organ.
          for organ in killinchu rosie a11oy sentra amaru; do
            echo "::group::zarf package create packages/${organ}"
            # Output INTO the package dir so uds create (which reads bundle `ref`
            # against packages/<organ>) finds zarf-package-szl-${organ}-${arch}-${PKG_VERSION}.tar.zst.
            zarf package create "packages/${organ}" \
              --set VERSION="${PKG_VERSION}" \
              --set IMAGE_TAG="${IMG_TAG}" \
              --architecture "${{ matrix.arch }}" \
              --confirm \
              --output-directory "packages/${organ}" > "/tmp/${organ}.log" 2>&1
            RC=$?
            echo "::endgroup::"
            cat "/tmp/${organ}.log" || true
            # Emit a ::error:: annotation ONLY when an organ actually fails.
            # Emitting unconditionally consumed all 10 annotation slots and masked
            # the real downstream failure (e.g. Create/Publish) in the annotation
            # API, which is our only error channel since run logs are egress-blocked.
            if [ "${RC}" -ne 0 ]; then
              ERRTAIL=$(grep -iE 'err|fail|fatal|unable|denied|not found|no such|invalid|cannot|forbidden|unauthor' "/tmp/${organ}.log" | tail -n 4 | tr '\n' '|' | sed 's/[^[:print:]|]//g')
              echo "::error title=zarf-${organ}::rc=${RC} tail=${ERRTAIL}"
              exit 1
            fi
            echo "zarf-${organ}: rc=0 OK"
          done
          echo "Built member packages:"
          ls -lh packages/*/zarf-package-*.tar.zst || true

      # ── Create the UDS bundle ──────────────────────────────────────────────
      # uds create reads bundles/szl-uds-bundle/uds-bundle.yaml; its packages are
      # local `path:` refs to packages/<organ>. uds picks up the just-built Zarf
      # packages from those directories.
      - name: Create UDS bundle
        run: |
          set -uo pipefail
          uds create bundles/szl-uds-bundle \
            --confirm \
            --no-progress \
            --output dist > /tmp/uds-create.log 2>&1
          RC=$?
          cat /tmp/uds-create.log || true
          if [ "${RC}" -ne 0 ]; then
            ERRTAIL=$(grep -iE 'err|fail|fatal|unable|denied|not found|no such|invalid|cannot|forbidden|unauthor' /tmp/uds-create.log | tail -n 4 | tr '\n' '|' | sed 's/[^[:print:]|]//g')
            echo "::error title=uds-create::rc=${RC} tail=${ERRTAIL}"
            exit 1
          fi
          echo "Bundle tarball:"
          ls -lh dist/uds-bundle-*.tar.zst

      - name: Resolve bundle tarball path
        id: bundle
        run: |
          set -euo pipefail
          BUNDLE_TAR="$(ls dist/uds-bundle-${BUNDLE_NAME}-${{ matrix.arch }}-*.tar.zst | head -1)"
          test -f "$BUNDLE_TAR"
          echo "tar=${BUNDLE_TAR}" >> "$GITHUB_OUTPUT"
          echo "Resolved bundle tar: ${BUNDLE_TAR}"

      # ── Publish bundle to ghcr.io (uds-v0.2.0 + latest) ─────────────────────
      - name: Publish bundle to ghcr.io
        env:
          TAG: ${{ steps.version.outputs.tag }}
          BUNDLE_TAR: ${{ steps.bundle.outputs.tar }}
        run: |
          set -uo pipefail
          # `uds publish` pushes the large bundle tarball through the hardened
          # runner's egress; that path intermittently severs large-blob uploads
          # (the same truncation that forces the uds-cli source build). A single
          # attempt died after ~90s of silence with a bare exit 1 (process killed
          # mid-push), so retry each tag up to 3x with backoff before failing.
          publish_tag() {
            local ver="$1" log="/tmp/uds-publish-${1}.log" attempt
            for attempt in 1 2 3; do
              echo "uds publish ${BUNDLE_NAME}:${ver} attempt ${attempt}/3"
              uds publish "${BUNDLE_TAR}" "oci://${REGISTRY}/${ORG}" \
                --version "${ver}" --no-progress > "${log}" 2>&1
              local rc=$?
              cat "${log}" || true
              if [ "${rc}" -eq 0 ]; then
                echo "Published: oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:${ver}"
                return 0
              fi
              echo "publish ${ver} attempt ${attempt} rc=${rc}; retrying after backoff"
              sleep $(( attempt * 20 ))
            done
            local errtail
            errtail=$(grep -iE 'err|fail|fatal|unable|denied|not found|no such|invalid|cannot|forbidden|unauthor' "${log}" | tail -n 4 | tr '\n' '|' | sed 's/[^[:print:]|]//g')
            echo "::error title=uds-publish-${ver}::3 attempts failed tail=${errtail}"
            return 1
          }
          publish_tag "${TAG}"   || exit 1
          publish_tag "latest"   || exit 1

      # ── Resolve the published bundle digest ─────────────────────────────────
      - name: Resolve published bundle digest
        id: digest
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          DIGEST="$(cosign triangulate --type digest "${REF}" 2>/dev/null || true)"
          if [ -z "${DIGEST}" ]; then
            # Fall back to crane-style digest via cosign
            DIGEST="$(cosign digest "${REF}" 2>/dev/null || true)"
          fi
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Bundle ref=${REF} digest=${DIGEST}"

      # ── Keyless cosign sign of the published bundle OCI artifact ────────────
      - name: Sign published bundle (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          echo "Signing ${REF} keylessly via GitHub OIDC..."
          cosign sign --yes "${REF}"

          CERT_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/uds-bundle-publish.yml@${GITHUB_REF}"
          CERT_ISSUER="https://token.actions.githubusercontent.com"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### UDS Bundle published

          \`oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}\` (+ \`:latest\`)

          Deploy:
          \`\`\`bash
          uds deploy oci://${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG} --confirm
          \`\`\`

          Verify signature (keyless):
          \`\`\`bash
          cosign verify ${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG} \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}"
          \`\`\`
          EOF

      # ── SBOM (syft) + keyless DSSE attestation on the bundle ────────────────
      - name: Generate + attest SBOM (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -uo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          SBOM="sbom-${BUNDLE_NAME}-${{ matrix.arch }}-${{ steps.version.outputs.version }}.spdx.json"
          syft "${{ steps.bundle.outputs.tar }}" -o spdx-json --file "${SBOM}" > /tmp/syft.log 2>&1
          SRC=$?
          cat /tmp/syft.log || true
          if [ "${SRC}" -ne 0 ]; then
            ST=$(tail -n 4 /tmp/syft.log | tr '\n' '|' | sed 's/[^[:print:]|]//g')
            echo "::error title=syft::rc=${SRC} tail=${ST}"
            exit 1
          fi
          cosign attest --yes --predicate "${SBOM}" --type spdxjson "${REF}" > /tmp/sbom-attest.log 2>&1
          ARC=$?
          cat /tmp/sbom-attest.log || true
          if [ "${ARC}" -ne 0 ]; then
            AT=$(tail -n 6 /tmp/sbom-attest.log | tr '\n' '|' | sed 's/[^[:print:]|]//g')
            echo "::error title=sbom-attest::rc=${ARC} tail=${AT}"
            exit 1
          fi
          echo "Attested SBOM ${SBOM} to ${REF}"

      # ── SLSA L2: cosign-NATIVE provenance attestation on the bundle ─────────
      # The SBOM attestation above is spdxjson; SLSA L2 requires a slsaprovenance
      # predicate attached as an OCI referrer so `cosign verify-attestation
      # --type slsaprovenance` returns a slsa.dev/provenance payload for the
      # bundle artifact itself (mirrors the per-organ ghcr-build-push.yml step).
      # Attesting on the published tag ref lets cosign resolve tag->digest.
      - name: cosign attest SLSA provenance on bundle (cosign-verifiable)
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          # SLSA Provenance v0.2 predicate (matches `cosign ... --type slsaprovenance`,
          # which validates the v0.2 schema with a top-level `builder` field).
          cat > bundle-predicate.json <<EOF
          {
            "builder": {
              "id": "${{ github.server_url }}/${{ github.repository }}/.github/workflows/uds-bundle-publish.yml@${{ github.ref }}"
            },
            "buildType": "https://actions.github.io/buildtypes/workflow/v1",
            "invocation": {
              "configSource": {
                "uri": "git+${{ github.server_url }}/${{ github.repository }}@${{ github.ref }}",
                "digest": { "sha1": "${{ github.sha }}" },
                "entryPoint": ".github/workflows/uds-bundle-publish.yml"
              },
              "environment": {
                "event_name": "${{ github.event_name }}",
                "repository_id": "${{ github.repository_id }}",
                "runner_environment": "github-hosted"
              }
            },
            "metadata": {
              "buildInvocationId": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}",
              "completeness": { "parameters": true, "environment": false, "materials": false },
              "reproducible": false
            },
            "materials": [
              {
                "uri": "git+${{ github.server_url }}/${{ github.repository }}@${{ github.ref }}",
                "digest": { "sha1": "${{ github.sha }}" }
              }
            ]
          }
          EOF
          set +e
          cosign attest --yes \
            --type slsaprovenance \
            --predicate bundle-predicate.json \
            "${REF}" > /tmp/slsa-attest.log 2>&1
          PRC=$?
          set -e
          cat /tmp/slsa-attest.log || true
          if [ "${PRC}" -ne 0 ]; then
            PT=$(tail -n 6 /tmp/slsa-attest.log | tr '\n' '|' | sed 's/[^[:print:]|]//g')
            echo "::error title=slsa-attest::rc=${PRC} tail=${PT}"
            exit 1
          fi
          echo "Attested SLSA provenance to ${REF}"

      - name: cosign verify-attestation bundle (SLSA L2 honesty gate)
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          REF="${REGISTRY}/${ORG}/${BUNDLE_NAME}:${TAG}"
          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-identity-regexp="https://github.com/${ORG}/szl-uds-deployment/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            "${REF}" > /dev/null
          echo "SLSA L2 verified: cosign verify-attestation passed for ${REF}"

      # ── Upload local artifacts for traceability ─────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: uds-bundle-${{ matrix.arch }}
          retention-days: 7
          path: |
            dist/uds-bundle-*.tar.zst
            sbom-*.spdx.json
