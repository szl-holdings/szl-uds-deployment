#
# clean-deploy-guard.yml — Guard the szl-receipts clean-deploy invariants.
#
# The "clean from-scratch deploy" property of szl-receipts (a single
# `zarf package deploy` that comes up Ready + signed + rightsized with ZERO
# manual kubectl) lives in exactly five places. Several were once found
# SILENTLY REGRESSED on origin/main (ns pepr-system, two-file key.priv/key.pub,
# no exemption manifest, image uds-v0.3.1) while a correct copy only existed on
# the box working tree — a fresh clone would have reintroduced the
# unsigned-server / ErrImagePull / CPU-Pending-storm failures.
#
# The actual check logic lives in scripts/clean-deploy-checks.sh (pure grep/awk,
# no cluster needed). It was extracted from this workflow so it can be UNIT
# TESTED: scripts/clean-deploy-checks.test.sh feeds each check a deliberately
# BROKEN copy of its source file and asserts the check FAILS, plus asserts the
# pristine copies PASS. The shared run-checks-then-self-test scaffolding lives in
# the reusable .github/workflows/guard-scaffold.yml; this workflow is now a thin
# caller that passes its test + checks scripts. The self-test still gates the
# guard run, so a future edit that neuters a check (making it pass vacuously —
# green while guarding nothing) is caught before the guard can wave it through.
#
# The invariants:
#   1. charts/szl-key-init/values.yaml          -> namespace: szl-receipts
#   2. charts/szl-key-init/templates/keygen-job.yaml
#                                               -> single --from-file=ed25519.pem=
#                                                  (NOT the old two-file
#                                                   key.priv / key.pub)
#   3. manifests/key-init-exemption.yaml         -> a UDS Exemption scoped to
#                                                  RequireNonRootUser, matcher
#                                                  ^szl-key-init.* in ns
#                                                  szl-receipts
#   4. packages/szl-receipts/zarf.yaml           -> szl-key-init-exemption is
#                                                  ordered BEFORE szl-key-init
#                                                  AND the server image tag is
#                                                  uds-v0.4.1
#   5. packages/szl-receipts/zarf.yaml           -> szl-core-rightsize is the
#                                                  FIRST component with an
#                                                  onDeploy.before action that
#                                                  pins pepr-uds-core +
#                                                  zarf agent-hook to replicas=1,
#                                                  gated on the
#                                                  SMALL_SERVER_RIGHTSIZE var
#                                                  (default true)

name: Clean Deploy Guard

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    uses: ./.github/workflows/guard-scaffold.yml
    with:
      test-command: bash scripts/clean-deploy-checks.test.sh
      checks-command: bash scripts/clean-deploy-checks.sh
      checks-args: "inv1 inv2 inv3 inv4 inv5"
      success-message: "All five szl-receipts clean-deploy invariants are intact."
