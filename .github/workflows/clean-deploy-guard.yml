#
# clean-deploy-guard.yml — Guard the szl-receipts clean-deploy invariants.
#
# The "clean from-scratch deploy" property of szl-receipts (a single
# `zarf package deploy` that comes up Ready + signed + rightsized with ZERO
# manual kubectl) lives in exactly five places. Several were once found
# SILENTLY REGRESSED on origin/main (ns pepr-system, two-file key.priv/key.pub,
# no exemption manifest, image uds-v0.3.1) while a correct copy only existed on
# the box working tree — a fresh clone would have reintroduced the
# unsigned-server / ErrImagePull / CPU-Pending-storm failures.
#
# This workflow fails the build (loudly) if any PR or push regresses one of the
# invariants below. It is a pure grep/awk text check — no cluster needed.
#
# The invariants:
#   1. charts/szl-key-init/values.yaml          -> namespace: szl-receipts
#   2. charts/szl-key-init/templates/keygen-job.yaml
#                                               -> single --from-file=ed25519.pem=
#                                                  (NOT the old two-file
#                                                   key.priv / key.pub)
#   3. manifests/key-init-exemption.yaml         -> a UDS Exemption scoped to
#                                                  RequireNonRootUser, matcher
#                                                  ^szl-key-init.* in ns
#                                                  szl-receipts
#   4. packages/szl-receipts/zarf.yaml           -> szl-key-init-exemption is
#                                                  ordered BEFORE szl-key-init
#                                                  AND the server image tag is
#                                                  uds-v0.4.0
#   5. packages/szl-receipts/zarf.yaml           -> szl-core-rightsize is the
#                                                  FIRST component with an
#                                                  onDeploy.before action that
#                                                  pins pepr-uds-core +
#                                                  zarf agent-hook to replicas=1,
#                                                  gated on the
#                                                  SMALL_SERVER_RIGHTSIZE var
#                                                  (default true)

name: Clean Deploy Guard

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  guard:
    name: Assert clean-deploy invariants
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Invariant 1 — key-init Secret lands in ns szl-receipts
        run: |
          set -euo pipefail
          F="charts/szl-key-init/values.yaml"
          test -f "$F" || { echo "::error file=$F::missing — required for clean deploy"; exit 1; }
          if ! grep -Eq '^[[:space:]]*namespace:[[:space:]]*szl-receipts[[:space:]]*$' "$F"; then
            echo "::error file=$F::REGRESSION — 'namespace: szl-receipts' not found."
            echo "::error file=$F::The Ed25519 Secret is namespace-local; if key-init lands it"
            echo "::error file=$F::anywhere but szl-receipts the server boots UNSIGNED (no error)."
            echo "----- current namespace lines -----"
            grep -nE '^[[:space:]]*namespace:' "$F" || echo "(none)"
            exit 1
          fi
          echo "OK: $F sets namespace: szl-receipts"

      - name: Invariant 2 — keygen Secret uses a single ed25519.pem key file
        run: |
          set -euo pipefail
          F="charts/szl-key-init/templates/keygen-job.yaml"
          test -f "$F" || { echo "::error file=$F::missing — required for clean deploy"; exit 1; }
          # Must create the Secret with a single --from-file=ed25519.pem= entry,
          # matching the key file the receipts-server Deployment mounts.
          if ! grep -Eq -- '--from-file="?\$\{?KEY_FILE\}?=|--from-file="?ed25519\.pem=' "$F"; then
            echo "::error file=$F::REGRESSION — single --from-file=ed25519.pem= not found."
            echo "::error file=$F::The server mounts ed25519.pem; a wrong/extra key name = UNSIGNED server."
            grep -nE -- '--from-file' "$F" || echo "(no --from-file lines)"
            exit 1
          fi
          # KEY_FILE must default to ed25519.pem (the name the server mounts).
          if ! grep -Eq 'KEY_FILE=.*default[[:space:]]+"ed25519\.pem"|KEY_FILE="ed25519\.pem"' "$F"; then
            echo "::error file=$F::REGRESSION — KEY_FILE no longer defaults to ed25519.pem."
            grep -nE 'KEY_FILE=' "$F" || echo "(no KEY_FILE assignment)"
            exit 1
          fi
          # Reject the OLD two-file scheme outright.
          if grep -Eq -- '--from-file="?key\.priv|--from-file="?key\.pub|key\.priv=|key\.pub=' "$F"; then
            echo "::error file=$F::REGRESSION — old two-file key.priv/key.pub scheme detected."
            grep -nE 'key\.priv|key\.pub' "$F"
            exit 1
          fi
          echo "OK: $F creates the Secret with a single ed25519.pem key file"

      - name: Invariant 3 — UDS Exemption (RequireNonRootUser) for the keygen pod
        run: |
          set -euo pipefail
          F="manifests/key-init-exemption.yaml"
          test -f "$F" || {
            echo "::error file=$F::REGRESSION — exemption manifest is MISSING."
            echo "::error file=$F::Without it pepr-uds-core DENIES the root keygen pod -> UNSIGNED server."
            exit 1
          }
          grep -Eq '^kind:[[:space:]]*Exemption[[:space:]]*$' "$F" \
            || { echo "::error file=$F::REGRESSION — not a 'kind: Exemption'."; exit 1; }
          grep -Eq 'RequireNonRootUser' "$F" \
            || { echo "::error file=$F::REGRESSION — RequireNonRootUser policy not exempted."; exit 1; }
          grep -Eq 'namespace:[[:space:]]*szl-receipts' "$F" \
            || { echo "::error file=$F::REGRESSION — matcher not scoped to ns szl-receipts."; exit 1; }
          grep -Eq 'name:[[:space:]]*"?\^szl-key-init' "$F" \
            || { echo "::error file=$F::REGRESSION — matcher name not '^szl-key-init.*'."; exit 1; }
          echo "OK: $F is a UDS Exemption (RequireNonRootUser, ^szl-key-init.* in ns szl-receipts)"

      - name: Invariant 4 — exemption ordered before key-init & image tag is uds-v0.4.0
        run: |
          set -euo pipefail
          F="packages/szl-receipts/zarf.yaml"
          test -f "$F" || { echo "::error file=$F::missing — required for clean deploy"; exit 1; }
          # Extract the ORDERED list of top-level component names. The Exemption no
          # longer needs to be literally first (szl-core-rightsize precedes it now,
          # see Invariant 5), but it MUST still be admitted before the root keygen
          # Job runs — i.e. szl-key-init-exemption must come BEFORE szl-key-init.
          COMPONENTS="$(awk '
            /^components:[[:space:]]*$/ { in_c=1; next }
            in_c && /^[^[:space:]#]/   { exit }          # left the components block
            in_c && /^[[:space:]]*-[[:space:]]*name:/ {
              line=$0
              sub(/^[[:space:]]*-[[:space:]]*name:[[:space:]]*/, "", line)
              gsub(/[[:space:]"\x27]/, "", line)
              print line
            }
          ' "$F")"
          echo "Components in order:"; echo "$COMPONENTS" | nl
          EX_POS="$(printf '%s\n' "$COMPONENTS" | grep -nx 'szl-key-init-exemption' | head -1 | cut -d: -f1 || true)"
          KI_POS="$(printf '%s\n' "$COMPONENTS" | grep -nx 'szl-key-init'           | head -1 | cut -d: -f1 || true)"
          if [ -z "$EX_POS" ]; then
            echo "::error file=$F::REGRESSION — szl-key-init-exemption component is MISSING."
            echo "::error file=$F::Without it pepr-uds-core DENIES the root keygen pod -> UNSIGNED server."
            exit 1
          fi
          if [ -z "$KI_POS" ]; then
            echo "::error file=$F::REGRESSION — szl-key-init component is MISSING."
            exit 1
          fi
          if [ "$EX_POS" -ge "$KI_POS" ]; then
            echo "::error file=$F::REGRESSION — szl-key-init-exemption (pos $EX_POS) must come BEFORE szl-key-init (pos $KI_POS)."
            echo "::error file=$F::If the Exemption is not admitted first, the root keygen pod is DENIED -> UNSIGNED server."
            exit 1
          fi
          # The server image tag must be uds-v0.4.0 (chart tag & zarf images: list
          # must stay in lockstep, else ErrImagePull after a registry cold-restart).
          if ! grep -Eq 'ghcr\.io/szl-holdings/szl-receipts-server:uds-v0\.4\.0' "$F"; then
            echo "::error file=$F::REGRESSION — server image tag is not uds-v0.4.0."
            grep -nE 'szl-receipts-server:' "$F" || echo "(no szl-receipts-server image line)"
            exit 1
          fi
          echo "OK: $F orders szl-key-init-exemption (pos $EX_POS) before szl-key-init (pos $KI_POS) and pins uds-v0.4.0"

      - name: Invariant 5 — born-rightsized posture is baked into the package
        run: |
          set -euo pipefail
          F="packages/szl-receipts/zarf.yaml"
          test -f "$F" || { echo "::error file=$F::missing — required for clean deploy"; exit 1; }
          # 5a. The SMALL_SERVER_RIGHTSIZE variable must still exist, defaulting to
          #     "true" — turning it false opts an HA cluster out of the rightsize.
          if ! awk '
            /^variables:[[:space:]]*$/ { in_v=1; next }
            in_v && /^[^[:space:]#]/   { exit }          # left the variables block
            in_v && /^[[:space:]]*-[[:space:]]*name:[[:space:]]*SMALL_SERVER_RIGHTSIZE[[:space:]]*$/ { found=1 }
            in_v && found && /^[[:space:]]*default:[[:space:]]*"?true"?[[:space:]]*$/ { print "ok"; exit }
          ' "$F" | grep -q ok; then
            echo "::error file=$F::REGRESSION — variable SMALL_SERVER_RIGHTSIZE (default \"true\") not found."
            echo "::error file=$F::Without it a fresh deploy keeps the HA replica defaults and a ~2-vCPU node stalls in a CPU Pending storm."
            grep -nE 'SMALL_SERVER_RIGHTSIZE' "$F" || echo "(no SMALL_SERVER_RIGHTSIZE line)"
            exit 1
          fi
          # 5b. szl-core-rightsize must be the FIRST component, so it frees CPU
          #     before the heavier szl-receipts workloads schedule.
          FIRST_COMPONENT="$(awk '
            /^components:[[:space:]]*$/ { in_c=1; next }
            in_c && /^[^[:space:]#]/   { exit }
            in_c && /^[[:space:]]*-[[:space:]]*name:/ {
              line=$0
              sub(/^[[:space:]]*-[[:space:]]*name:[[:space:]]*/, "", line)
              gsub(/[[:space:]"\x27]/, "", line)
              print line
              exit
            }
          ' "$F")"
          echo "First component: '${FIRST_COMPONENT}'"
          if [ "$FIRST_COMPONENT" != "szl-core-rightsize" ]; then
            echo "::error file=$F::REGRESSION — first component is '${FIRST_COMPONENT}', expected 'szl-core-rightsize'."
            echo "::error file=$F::The rightsize patch must run before the heavy receipts pods schedule, or a ~2-vCPU node stalls."
            exit 1
          fi
          # 5c. The szl-core-rightsize component must carry an onDeploy.before action
          #     that pins BOTH pepr-system/pepr-uds-core and zarf/agent-hook to
          #     replicas=1, gated on SMALL_SERVER_RIGHTSIZE. Capture just that
          #     component's YAML block (up to the next top-level component).
          BLOCK="$(awk '
            $0 ~ /^[[:space:]]*-[[:space:]]*name:[[:space:]]*szl-core-rightsize[[:space:]]*$/ { cap=1; print; next }
            cap && /^[[:space:]]*-[[:space:]]*name:/ { exit }   # next component starts
            cap { print }
          ' "$F")"
          check() {
            if ! printf '%s\n' "$BLOCK" | grep -Eq -- "$1"; then
              echo "::error file=$F::REGRESSION — szl-core-rightsize action: $2"
              exit 1
            fi
          }
          check 'onDeploy:'                  "no onDeploy actions block"
          check 'before:'                    "no onDeploy.before action"
          check 'SMALL_SERVER_RIGHTSIZE'     "no longer gated on SMALL_SERVER_RIGHTSIZE"
          check 'pepr-system/pepr-uds-core'  "no longer targets pepr-system/pepr-uds-core"
          check 'zarf/agent-hook'            "no longer targets zarf/agent-hook"
          check '"replicas":[[:space:]]*1'   "no longer patches replicas=1"
          echo "OK: szl-core-rightsize is first, gated on SMALL_SERVER_RIGHTSIZE, pins pepr-uds-core + zarf agent-hook to replicas=1"

      - name: All clean-deploy invariants hold
        run: echo "All five szl-receipts clean-deploy invariants are intact."
