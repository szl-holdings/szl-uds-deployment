#
# clean-deploy-guard.yml — Guard the szl-receipts clean-deploy invariants.
#
# The "clean from-scratch deploy" property of szl-receipts (a single
# `zarf package deploy` that comes up Ready + signed + rightsized with ZERO
# manual kubectl) lives in exactly five places. Several were once found
# SILENTLY REGRESSED on origin/main (ns pepr-system, two-file key.priv/key.pub,
# no exemption manifest, image uds-v0.3.1) while a correct copy only existed on
# the box working tree — a fresh clone would have reintroduced the
# unsigned-server / ErrImagePull / CPU-Pending-storm failures.
#
# The actual check logic lives in scripts/clean-deploy-checks.sh (pure grep/awk,
# no cluster needed). It was extracted from this workflow so it can be UNIT
# TESTED: scripts/clean-deploy-checks.test.sh feeds each check a deliberately
# BROKEN copy of its source file and asserts the check FAILS, plus asserts the
# pristine copies PASS. That self-test runs as the `self-test` job below, so a
# future edit that neuters a check (making it pass vacuously — green while
# guarding nothing) is caught here, not in production.
#
# The invariants:
#   1. charts/szl-key-init/values.yaml          -> namespace: szl-receipts
#   2. charts/szl-key-init/templates/keygen-job.yaml
#                                               -> single --from-file=ed25519.pem=
#                                                  (NOT the old two-file
#                                                   key.priv / key.pub)
#   3. manifests/key-init-exemption.yaml         -> a UDS Exemption scoped to
#                                                  RequireNonRootUser, matcher
#                                                  ^szl-key-init.* in ns
#                                                  szl-receipts
#   4. packages/szl-receipts/zarf.yaml           -> szl-key-init-exemption is
#                                                  ordered BEFORE szl-key-init
#                                                  AND the server image tag is
#                                                  uds-v0.4.1
#   5. packages/szl-receipts/zarf.yaml           -> szl-core-rightsize is the
#                                                  FIRST component with an
#                                                  onDeploy.before action that
#                                                  pins pepr-uds-core +
#                                                  zarf agent-hook to replicas=1,
#                                                  gated on the
#                                                  SMALL_SERVER_RIGHTSIZE var
#                                                  (default true)

name: Clean Deploy Guard

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The self-test MUST pass for the guard to be trustworthy: it proves each
  # check still fails on bad input (i.e. is not silently passing). The guard job
  # depends on it so a broken check blocks the build before it can wave a
  # regression through.
  self-test:
    name: Self-test the guard checks (negative fixtures)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run negative-fixture self-test
        run: bash scripts/clean-deploy-checks.test.sh

  guard:
    name: Assert clean-deploy invariants
    runs-on: ubuntu-latest
    needs: self-test
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Invariant 1 — key-init Secret lands in ns szl-receipts
        run: bash scripts/clean-deploy-checks.sh inv1 .

      - name: Invariant 2 — keygen Secret uses a single ed25519.pem key file
        run: bash scripts/clean-deploy-checks.sh inv2 .

      - name: Invariant 3 — UDS Exemption (RequireNonRootUser) for the keygen pod
        run: bash scripts/clean-deploy-checks.sh inv3 .

      - name: Invariant 4 — exemption ordered before key-init & image tag is uds-v0.4.1
        run: bash scripts/clean-deploy-checks.sh inv4 .

      - name: Invariant 5 — born-rightsized posture is baked into the package
        run: bash scripts/clean-deploy-checks.sh inv5 .

      - name: All clean-deploy invariants hold
        run: echo "All five szl-receipts clean-deploy invariants are intact."
