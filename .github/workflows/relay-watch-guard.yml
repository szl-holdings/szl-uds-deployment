#
# relay-watch-guard.yml — Guard the szl-alert-relay-watch edge-alert watcher (the
# box timer that pages when the szl-alert-relay service itself is down) from
# silently regressing.
#
# szl-alert-relay is the SINGLE delivery path that flattens CI receipt-failure
# Slack webhooks into clean ntfy pushes, so if the relay dies, ALL those alerts
# vanish silently. szl-alert-relay-watch closes that "who watches the watcher"
# gap — but only while its alerting behaviour holds, and that behaviour has NO
# visible symptom when broken until a real relay outage goes unpaged (or a
# persisting outage turns into a paging storm):
#   * EDGE alert on OK->DOWN, de-duped on a persisting outage, RECOVERED once when
#     the relay comes back, with the signature CLEARED so a fresh outage re-alerts;
#   * a crashed systemd unit is paged even when the HTTP probe could still answer.
# The existing scripts/szl-alert-relay-watch-guard-checks.sh is a STATIC text
# check; this guard RUNS the real watcher end-to-end against a fake curl + fake
# systemctl (no real box, no root, never touches the live relay) and asserts the
# actual alert/de-dup/RECOVERED behaviour.
#
# scripts/relay-watch-guard.test.sh is a negative-fixture self-test that mutates a
# COPY of the watcher (neuter the pager / defeat de-dup / drop RECOVERED / never
# clear the signature / ignore the unit probe) and asserts the guard FAILS on
# each, so the guard can't pass vacuously; it runs as the `self-test` job the
# guard depends on.

name: relay-watch e2e Guard

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-test:
    name: Self-test the guard (negative fixtures)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run negative-fixture self-test
        run: bash scripts/relay-watch-guard.test.sh

  guard:
    name: Drive szl-alert-relay-watch end-to-end
    runs-on: ubuntu-latest
    needs: self-test
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Watcher parses clean (bash -n)
        run: bash -n box-scripts/sbin/szl-alert-relay-watch

      - name: Alert / de-dup / RECOVERED / unit-probe behave correctly
        run: bash scripts/relay-watch-guard.sh

      - name: szl-alert-relay-watch alerting is intact
        run: echo "The szl-alert-relay-watch edge-alert, de-dup, RECOVERED and unit-probe paths are intact."
