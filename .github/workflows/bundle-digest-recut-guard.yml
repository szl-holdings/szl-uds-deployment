#
# bundle-digest-recut-guard.yml — Guard the `bundle-digest-recut` box healer (the
# AUTO-re-cut-stale-airgap-tarball healer) from silently regressing.
#
# bundle-digest-watch (box-scripts/sbin/bundle-digest-watch) ALARMS when a
# locally-built airgap deploy tarball on box 167.233.50.75 stops carrying the
# source-pinned szl-receipts image digest; bundle-digest-recut
# (box-scripts/sbin/bundle-digest-recut) HEALS it by re-cutting the receipts
# package + UDS bundle so the new digest is baked in — without bumping
# metadata.version. scripts/pin-receipts-image-digest.sh repins the SOURCE digest
# (and CI re-cuts the published package), but the box's LOCAL tarballs
#   * uds-bundle-szl-receipts-bundle-<arch>-<ver>.tar.zst
#   * packages/szl-receipts/zarf-package-szl-receipts-<arch>-<ver>.tar.zst
# keep baking the OLD digest until re-cut. This healer closes that loop, but its
# value rests on fragile invariants that produce no symptom when broken:
#   * it still extracts the SOURCE-pinned digest from the szl-receipts zarf manifest;
#   * it still performs the RECEIPTS-ONLY re-cut (zarf package create + uds create);
#   * it still VERIFIES the re-cut took (new digest present, old gone);
#   * it never bumps metadata.version (asserts the version is UNCHANGED);
#   * it keeps its SAFETY gates (kill switch + report mode + disk pre-flight + flock);
#   * it stays WIRED into install.sh (script + units copied, timer enabled) and documented.
# A sibling refactor of the script, install.sh, or README could quietly drop any
# of these, re-opening the exact "a stale tarball ships unflagged" hole.
#
# The check logic lives in scripts/bundle-digest-recut-guard-checks.sh (pure
# text/lint, no cluster, no tarball). It was extracted so it can be UNIT TESTED:
# scripts/bundle-digest-recut-guard-checks.test.sh feeds each check a
# deliberately-BROKEN fixture and asserts the check FAILS, plus that the pristine
# repo PASSES. That self-test runs as the `self-test` job below, so a future edit
# that neuters a check (green while guarding nothing) is caught here.
#
# The asserted invariants:
#   chk1  bundle-digest-recut + its units exist and the script parses clean (bash -n)
#   chk2  extracts the source-pinned digest from the szl-receipts zarf manifest
#   chk3  performs the receipts-only re-cut (zarf package create + uds create)
#   chk4  verifies the re-cut took (new digest present, old gone)
#   chk5  never bumps metadata.version (asserts the version is unchanged)
#   chk6  keeps its safety gates (kill switch + report mode + disk pre-flight + flock)
#   chk7  wired into install.sh (script + units copied, timer enabled)
#   chk8  documented (its own README + a mention in box-scripts/README.md)

name: Bundle Digest Recut Guard

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  self-test:
    name: Self-test the guard checks (negative fixtures)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run negative-fixture self-test
        run: bash scripts/bundle-digest-recut-guard-checks.test.sh

  guard:
    name: Assert the auto-recut healer is intact
    runs-on: ubuntu-latest
    needs: self-test
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Check 1 — healer + units exist and the script parses clean
        run: bash scripts/bundle-digest-recut-guard-checks.sh chk1 .

      - name: Check 2 — extracts the source-pinned digest from the zarf manifest
        run: bash scripts/bundle-digest-recut-guard-checks.sh chk2 .

      - name: Check 3 — performs the receipts-only re-cut
        run: bash scripts/bundle-digest-recut-guard-checks.sh chk3 .

      - name: Check 4 — verifies the re-cut took (new present, old gone)
        run: bash scripts/bundle-digest-recut-guard-checks.sh chk4 .

      - name: Check 5 — never bumps metadata.version
        run: bash scripts/bundle-digest-recut-guard-checks.sh chk5 .

      - name: Check 6 — keeps its safety gates
        run: bash scripts/bundle-digest-recut-guard-checks.sh chk6 .

      - name: Check 7 — wired into install.sh (script + units + timer enabled)
        run: bash scripts/bundle-digest-recut-guard-checks.sh chk7 .

      - name: Check 8 — documented (own README + box-scripts/README.md mention)
        run: bash scripts/bundle-digest-recut-guard-checks.sh chk8 .

      - name: Auto-recut healer is intact
        run: echo "The bundle-digest-recut auto-recut healer is intact."
