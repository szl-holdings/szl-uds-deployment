#
# receipts-pin-drift-guard.yml — Catch a STALE receipts-server digest pin before
# it sits on main.
#
# Why this exists
# ---------------
# The receipts-server image is digest-pinned in three places (zarf.yaml,
# packages/szl-receipts/zarf.yaml, charts/szl-receipts/values.yaml). Two sibling
# guards already protect those pins, but neither notices when the pin goes STALE:
#   * image-pin-guard.yml          — the pin is a single-platform manifest, not
#                                    a multi-arch index (so zarf can package it).
#   * receipts-image-digest-guard.yml — the reference is digest-pinned at all
#                                    (i.e. not reverted to a movable tag-only ref).
# Neither asserts the pinned digest STILL MATCHES the digest the published tag
# resolves to today. The auto-repin step opens a PR after a rebuild, but a stale
# pin can still land if that PR is ignored, or be introduced by a hand-edit.
#
# This workflow runs `scripts/pin-receipts-image-digest.sh --check`, which
# resolves the published szl-receipts-server tag and exits non-zero (printing the
# one-line fix command) when the committed pins differ from what's published.
#
# Pure registry inspection (docker buildx imagetools + jq) — no cluster, no
# kubectl, airgap-friendly (it only talks to the image registry, exactly like the
# re-pin tool it wraps).
#
# Direct alerting
# ---------------
# On its DAILY scheduled run a drift failure must page the team, not just turn the
# Actions tab red — nobody watches the tab, and a freshly re-published tag can
# leave main's pins stale for a day before anyone notices. A scheduled-run failure
# posts one clean line through the shared szl-alert-relay -> ntfy path
# (SLACK_WEBHOOK_URL secret), exactly like the a11oy receipt-verify guards. PR
# runs do NOT alert (the contributor already sees the red check), so the relay only
# fires on the unattended schedule.

name: Receipts Pin Drift Guard

on:
  pull_request:
    paths:
      - "zarf.yaml"
      - "packages/szl-receipts/zarf.yaml"
      - "charts/szl-receipts/values.yaml"
      - "scripts/pin-receipts-image-digest.sh"
      - ".github/workflows/receipts-pin-drift-guard.yml"
  schedule:
    # Daily — catches a freshly re-published tag whose new digest main hasn't
    # picked up yet (no PR touches the pinned files in that case).
    - cron: "23 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  pin-drift-guard:
    name: Committed receipts pins match the published image
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Ensure jq is available
        run: |
          set -euo pipefail
          command -v jq >/dev/null 2>&1 || sudo apt-get update -qq && sudo apt-get install -y -qq jq
          jq --version
          docker buildx version

      # docker buildx imagetools needs auth to inspect the (org-private) GHCR
      # receipts-server package. The repo-scoped GITHUB_TOKEN has packages: read
      # on the image built in this same repo (receipts-server-image.yml).
      - name: Authenticate to GHCR
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Run the drift check WITHOUT aborting, so a scheduled-run failure can be
      # turned into a direct alert before the run is failed by the gate below.
      - name: Check committed pins against the published receipts-server image
        id: check
        run: |
          set +e
          out="$(scripts/pin-receipts-image-digest.sh --check 2>&1)"
          rc=$?
          echo "${out}"

          # The tag the guard checked (same default the script infers from zarf.yaml),
          # so the alert can name it and print the exact one-line fix command.
          tag="$(grep -oE 'szl-receipts-server:[^@[:space:]]+' zarf.yaml | head -n1 | cut -d: -f2)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "fix_cmd=scripts/pin-receipts-image-digest.sh --tag ${tag}" >> "$GITHUB_OUTPUT"

          if [ "${rc}" -ne 0 ]; then
            echo "drift=1" >> "$GITHUB_OUTPUT"
            echo "::warning::Receipts-server digest pins are STALE vs the published image."
          else
            echo "drift=0" >> "$GITHUB_OUTPUT"
            echo "OK: committed receipts-server pins match the published image."
          fi
          exit 0

      # Direct push notification so a stale pin found by the UNATTENDED daily run
      # is noticed within a day, not whenever someone next looks at the Actions
      # tab. Fires ONLY on a SCHEDULED run that found drift — contributor PR
      # failures already show a red check, so they never page the team. Posts a
      # Slack-compatible payload via curl (no third-party action, so it stays
      # within the org's github-owned/verified-actions-only policy) to the shared
      # szl-alert-relay -> ntfy webhook. If the webhook secret is unset it logs a
      # notice and soft-skips; the gate below still fails the run.
      - name: Alert the team on a scheduled-run drift failure
        if: ${{ always() && github.event_name == 'schedule' && steps.check.outputs.drift == '1' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.check.outputs.tag }}
          FIX_CMD: ${{ steps.check.outputs.fix_cmd }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret not configured — skipping direct alert. The failed run still stands."
            exit 0
          fi

          # One clean line naming the repo, the stale tag, and the fix command.
          text=":rotating_light: *Receipts pin-drift guard FAILED* in ${REPO} — committed szl-receipts-server digest pins are STALE vs the published tag \`${TAG}\`. Fix: \`${FIX_CMD}\` then commit. Run: ${RUN_URL}"

          # JSON-encode with jq so quotes/backticks can't break the payload.
          payload=$(jq -n --arg text "$text" '{text: $text}')

          echo "Posting pin-drift alert to the szl-alert-relay webhook..."
          code=$(curl -sS -o /tmp/relay_resp.txt -w '%{http_code}' \
                   -X POST -H 'Content-Type: application/json' \
                   --max-time 20 --data "${payload}" "${SLACK_WEBHOOK_URL}")
          echo "Webhook responded HTTP ${code}."
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "::error::Direct alert webhook POST failed (HTTP ${code}): $(cat /tmp/relay_resp.txt)"
            exit 1
          fi
          echo "Direct alert delivered."

      - name: Fail the run if committed pins are stale
        if: always()
        run: |
          set -euo pipefail
          if [ "${{ steps.check.outputs.drift }}" = "1" ]; then
            echo "::error file=zarf.yaml::Receipts-server digest pins are STALE vs the published image. Run the printed fix command and commit the result."
            exit 1
          fi
          echo "OK: committed receipts-server pins match the published image."
