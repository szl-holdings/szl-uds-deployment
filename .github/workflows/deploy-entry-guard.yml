#
# deploy-entry-guard.yml — Catch an internally-inconsistent uds/zarf.yaml deploy
# entry before it ships.
#
# A Zarf component can be SILENTLY self-contradictory in a way that only surfaces
# at deploy time as a multi-minute timeout. Task #507 fixed exactly such an entry:
# the a11oy component installed its chart into namespace `szl-vessels` while the
# chart templates hardcode `szl-a11oy`, and its readiness wait targeted a
# DaemonSet `a11oy-policy-agent` that the chart never creates (the chart deploys a
# Deployment named `a11oy`). `zarf package create` builds it happily; only a live
# `deploy` reveals the never-satisfiable wait. The other components (vessels,
# uds-mesh, pepr) can drift the same way.
#
# This guard statically asserts, with NO live cluster, two internal-consistency
# properties of every component in uds/zarf.yaml:
#   1. NAMESPACE AGREEMENT — each chart whose localPath resolves to a real local
#      chart must RENDER into the same namespace the component declares for it
#      (.Values.namespace, via `helm template`).
#   2. WAIT-TARGET REALITY — every onDeploy wait.cluster target (kind+name+ns)
#      must correspond to a resource the component's own resolvable
#      chart/manifests actually create.
#
# It is conservative: it only FAILS on a provable contradiction against a
# RESOLVABLE source, so it stays green on the pre-existing demo gaps in
# uds/zarf.yaml (vessels/uds-mesh charts and the pepr-webhook manifest are not
# vendored locally — those waits are reported UNVERIFIABLE, not failed). See
# scripts/deploy-entry-checks.py for the full rationale.
#
# The matching logic lives in scripts/deploy-entry-checks.py::validate(), a pure
# function. scripts/deploy-entry-checks.test.py feeds it the deliberately broken
# #507 shapes (the szl-vessels namespace + the a11oy-policy-agent DaemonSet wait)
# and asserts it FAILS, so a future edit that neuters the check turns CI red here,
# not in production. The guard job `needs: self-test`.
#
# Complements clean-deploy-guard.yml / chart-guard.yml / package-build-guard.yml
# (which guard the szl-receipts package) — this one guards the uds/ vessels demo
# package's component wiring.

name: Deploy Entry Guard

on:
  pull_request:
    paths:
      - "uds/zarf.yaml"
      - "charts/**"
      - "manifests/**"
      - "scripts/deploy-entry-checks.py"
      - "scripts/deploy-entry-checks.test.py"
      - ".github/workflows/deploy-entry-guard.yml"
  push:
    branches: [main]
    paths:
      - "uds/zarf.yaml"
      - "charts/**"
      - "manifests/**"
      - "scripts/deploy-entry-checks.py"
      - "scripts/deploy-entry-checks.test.py"
      - ".github/workflows/deploy-entry-guard.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── 0. Self-test the guard logic (negative fixtures) ────────────────────────
  # The guard asserts properties via validate(). That logic could break silently
  # and PASS VACUOUSLY (green while guarding nothing). This job feeds validate()
  # the literal Task #507 bug shapes and asserts it FAILS, so a neutered check
  # turns CI red here. The guard job `needs: self-test`.
  self-test:
    name: Self-test deploy-entry checks (negative fixtures)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml
      - name: Run deploy-entry checks self-test
        run: python3 scripts/deploy-entry-checks.test.py

  deploy-entry-guard:
    name: Validate uds/zarf.yaml component wiring
    needs: self-test
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.14.0

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      - name: Assert every component is internally consistent
        run: python3 scripts/deploy-entry-checks.py check .

      - name: Deploy entries are sound
        run: echo "Every uds/zarf.yaml component renders into its declared namespace and every verifiable wait targets a real resource."
