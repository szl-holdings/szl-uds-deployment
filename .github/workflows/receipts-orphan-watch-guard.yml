#
# receipts-orphan-watch-guard.yml — Guard the `szl-receipts-orphan-watch` box
# alarm (the orphaned receipts-server alarm on the uds-szl-demo cluster) from
# silently regressing.
#
# szl-receipts-orphan-watch (box-scripts/sbin/szl-receipts-orphan-watch) lists
# every namespace running a receipts-server Deployment every ~10 min, drops the
# canonical `szl-receipts`, and pages the team the moment one is owned by NOTHING
# (no Helm release, no UDS Package, no VirtualService) — an ORPHAN that signs
# nothing, holds no durable data, and burns CPU on the 2-vCPU node (Task #283).
# Its value rests on a few fragile invariants that produce NO visible symptom
# when broken until a real orphan goes unalerted:
#   * it still ENUMERATES receipts-server namespaces (`kubectl get deploy -A`,
#     matched by name == szl-receipts-server OR an image matching IMAGE_MATCH);
#   * it DROPS the canonical `szl-receipts` namespace;
#   * it checks ALL THREE ownership signals (Helm / UDS Package / Istio
#     VirtualService) before flagging an orphan;
#   * it is EDGE-triggered (reads + writes a last_status state file) so it pages
#     exactly once on OK->problem and once on RECOVERED, never every cycle;
#   * it NEVER deletes anything (deletion stays a human call);
#   * it NO-OPs (exit 0, no page) when the cluster is absent/unreachable;
#   * it stays WIRED into install.sh (copied + timer enabled) and documented in
#     README.md, or a box rebuild silently ships without the alarm.
# A sibling refactor of the script, install.sh, or README could quietly drop any
# of these, re-opening the exact "an untracked receipts server goes unalerted"
# hole this alarm closed.
#
# The check logic lives in scripts/receipts-orphan-watch-guard-checks.sh (pure
# text/lint, no cluster). It was extracted from this workflow so it can be UNIT
# TESTED: scripts/receipts-orphan-watch-guard-checks.test.sh feeds each check a
# deliberately-BROKEN fixture and asserts the check FAILS, plus asserts the
# pristine repo PASSES. That self-test runs as the `self-test` job below, so a
# future edit that neuters a check (passing vacuously — green while guarding
# nothing) is caught here.
#
# The asserted invariants:
#   chk1  szl-receipts-orphan-watch exists and parses clean (bash -n)
#   chk2  enumerates receipts-server namespaces (get deploy -A, name or image)
#   chk3  drops the canonical `szl-receipts` namespace
#   chk4  checks all three ownership signals (Helm / UDS Package / Istio VS)
#   chk5  edge-triggered: reads+persists last_status, both edge guards present,
#         and makes EXACTLY TWO notify calls (one OK->ALERT, one RECOVERED)
#   chk6  never executes a delete command (logs + pages only)
#   chk7  cluster-absent AND cluster-unreachable paths both no-op (exit 0)
#   chk8  wired into install.sh (script + units copied, timer enabled)
#   chk9  documented in README.md (orphaned receipts-server alarm section)

name: Receipts Orphan Watch Guard

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The self-test MUST pass for the guard to be trustworthy: it proves each check
  # still FAILS on bad input (i.e. is not silently passing). The guard job
  # depends on it so a broken check blocks the build before it can wave a
  # regression through.
  self-test:
    name: Self-test the guard checks (negative fixtures)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Run negative-fixture self-test
        run: bash scripts/receipts-orphan-watch-guard-checks.test.sh

  guard:
    name: Assert the orphaned receipts-server alarm is intact
    runs-on: ubuntu-latest
    needs: self-test
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Check 1 — szl-receipts-orphan-watch exists and parses clean
        run: bash scripts/receipts-orphan-watch-guard-checks.sh chk1 .

      - name: Check 2 — enumerates receipts-server namespaces
        run: bash scripts/receipts-orphan-watch-guard-checks.sh chk2 .

      - name: Check 3 — drops the canonical szl-receipts namespace
        run: bash scripts/receipts-orphan-watch-guard-checks.sh chk3 .

      - name: Check 4 — checks Helm / UDS / Istio ownership
        run: bash scripts/receipts-orphan-watch-guard-checks.sh chk4 .

      - name: Check 5 — edge-triggered (state file + exactly two pushes)
        run: bash scripts/receipts-orphan-watch-guard-checks.sh chk5 .

      - name: Check 6 — never executes a delete command
        run: bash scripts/receipts-orphan-watch-guard-checks.sh chk6 .

      - name: Check 7 — cluster-absent / unreachable no-op
        run: bash scripts/receipts-orphan-watch-guard-checks.sh chk7 .

      - name: Check 8 — wired into install.sh (script + timer enabled)
        run: bash scripts/receipts-orphan-watch-guard-checks.sh chk8 .

      - name: Check 9 — documented in README.md
        run: bash scripts/receipts-orphan-watch-guard-checks.sh chk9 .

      - name: Orphaned receipts-server alarm is intact
        run: echo "The szl-receipts-orphan-watch orphaned receipts-server alarm is intact."
