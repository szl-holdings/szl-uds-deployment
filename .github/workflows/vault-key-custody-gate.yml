#
# Vault Key-Custody Gate — szl-receipts (Tier-2, HashiCorp Vault Transit)
# ============================================================================
# Re-verifies the szl-receipts Tier-2 key-custody deploy on EVERY release.
#
# What this proves, live, on a throwaway cluster, end-to-end:
#   1. The receipts server, deployed with the documented Helm overlay
#      (charts/szl-receipts/values.yaml + values-vault.yaml, signing.backend=vault),
#      boots with NO Ed25519 signing-key Secret in the cluster at all.
#   2. It authenticates to a real HashiCorp Vault by its pod ServiceAccount
#      (Kubernetes auth) and signs receipts via Vault Transit.
#   3. The Transit Ed25519 key is non-exportable: the private key can NEVER
#      leave Vault. Reading any Kubernetes Secret yields no signing key.
#   4. Receipts verify offline against the published public key with the
#      INDEPENDENT auditor tool (verify_receipts_ed25519.py) — the proof is
#      backend-agnostic, so Tier-2 custody changed WHERE the key lives without
#      weakening the cryptographic proof.
#
# It deliberately asserts /pubkey backend=="vault" AND signed==true, because the
# server self-heals to an unsigned state if Vault is unreachable — a silent
# downgrade this gate must catch.
#
# The signing wiring (signing.backend / signing.vault.*) comes ENTIRELY from the
# committed values-vault.yaml; it is NEVER overridden with --set here. The only
# --set flags are CI substrate (local image, drop UDS/monitoring CRDs that need
# UDS Core, emptyDir store) and signing.requireKey=false — which only governs the
# FILE backend's Secret mount and lets the pod boot with zero key Secret present,
# the cleanest possible custody demonstration.

name: Vault Key-Custody Gate

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vault-key-custody-${{ github.ref }}
  cancel-in-progress: false

env:
  CLUSTER: szl-vault-gate
  NS: szl-receipts
  IMG: szl-receipts-server:ci-gate

jobs:
  vault-key-custody:
    name: Vault Transit key-custody (live)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install tools (kubectl, helm, k3d, vault CLI, cryptography)
        run: |
          set -euo pipefail
          # kubectl
          curl -fsSLo /tmp/kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl
          # helm
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          # k3d
          curl -fsSL https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          # vault CLI (needed by scripts/setup-vault-transit.sh and the custody assertion)
          VAULT_VERSION=1.18.5
          curl -fsSLo /tmp/vault.zip "https://releases.hashicorp.com/vault/${VAULT_VERSION}/vault_${VAULT_VERSION}_linux_amd64.zip"
          unzip -o /tmp/vault.zip -d /tmp
          sudo install -m 0755 /tmp/vault /usr/local/bin/vault
          # offline auditor dependency
          python3 -m pip install --quiet cryptography
          kubectl version --client
          helm version
          k3d version
          vault version

      - name: Create throwaway k3d cluster
        run: |
          set -euo pipefail
          k3d cluster create "$CLUSTER" --wait --timeout 180s
          kubectl cluster-info
          kubectl get nodes

      - name: Build receipts-server image and import into the cluster
        run: |
          set -euo pipefail
          docker build -t "$IMG" services/szl-receipts-server
          k3d image import "$IMG" -c "$CLUSTER"

      - name: Deploy persistent Vault (namespace + StatefulSet/Deployment)
        run: |
          set -euo pipefail
          kubectl apply -f manifests/vault-namespace.yaml
          kubectl apply -f k8s/vault/vault-persistent.yaml
          # The Vault pod reports Ready while still SEALED (health override), so
          # rollout completes and we can init/unseal it next.
          kubectl -n vault rollout status deploy/vault --timeout=180s

      - name: Bootstrap Vault (init, unseal, transit + Kubernetes auth)
        run: |
          set -euo pipefail

          echo "==> vault operator init (1 share / 1 threshold)"
          INIT_JSON="$(kubectl -n vault exec deploy/vault -- \
            vault operator init -key-shares=1 -key-threshold=1 -format=json)"
          UNSEAL_KEY="$(printf '%s' "$INIT_JSON" | jq -r '.unseal_keys_b64[0]')"
          ROOT_TOKEN="$(printf '%s' "$INIT_JSON" | jq -r '.root_token')"
          # Never let these surface in any log.
          echo "::add-mask::$UNSEAL_KEY"
          echo "::add-mask::$ROOT_TOKEN"

          echo "==> unseal"
          kubectl -n vault exec deploy/vault -- vault operator unseal "$UNSEAL_KEY" >/dev/null

          echo "==> port-forward Vault API to localhost:8200"
          kubectl -n vault port-forward svc/vault 8200:8200 >/tmp/vault-pf.log 2>&1 &
          PF_PID=$!
          trap 'kill "$PF_PID" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:8200/v1/sys/health?sealedcode=200 >/dev/null 2>&1 && break
            sleep 1
          done

          echo "==> setup-vault-transit.sh (transit engine + non-exportable Ed25519 key + k8s auth role)"
          export VAULT_ADDR="http://127.0.0.1:8200"
          export VAULT_TOKEN="$ROOT_TOKEN"
          # All other flags default to the values baked into values-vault.yaml
          # (role/sa/policy = szl-receipts, transit/szl-receipts key).
          scripts/setup-vault-transit.sh \
            --k8s-auth \
            --k8s-namespace "$NS" \
            --k8s-sa szl-receipts \
            --k8s-role szl-receipts \
            --k8s-host "https://kubernetes.default.svc"

          echo "==> assert the Transit key is NON-EXPORTABLE (private key cannot leave Vault)"
          # Pass/fail logic lives in scripts/vault-key-custody-checks.sh (transit-key),
          # self-tested cluster-free by scripts/vault-key-custody-checks.test.sh.
          vault read -format=json transit/keys/szl-receipts \
            | bash scripts/vault-key-custody-checks.sh transit-key

      - name: Deploy szl-receipts with the Vault overlay (signing wiring un-overridden)
        run: |
          set -euo pipefail
          # -f values.yaml -f values-vault.yaml carries the FULL signing.backend=vault
          # wiring verbatim. --set touches only CI substrate + requireKey (file-only).
          # The chart MANAGES the szl-receipts Namespace (PSA restricted labels via
          # templates/podsecuritystandard.yaml). The Vault bootstrap pre-creates this ns
          # for the k8s-auth ServiceAccount, so stamp Helm ownership metadata onto it so
          # Helm can ADOPT it (else: "cannot be imported ... missing key
          # app.kubernetes.io/managed-by ... meta.helm.sh/release-name").
          kubectl get namespace "$NS" >/dev/null 2>&1 || kubectl create namespace "$NS"
          kubectl label namespace "$NS" app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate namespace "$NS" \
            meta.helm.sh/release-name=szl-receipts \
            meta.helm.sh/release-namespace="$NS" --overwrite
          helm upgrade --install szl-receipts charts/szl-receipts \
            --namespace "$NS" \
            -f charts/szl-receipts/values.yaml \
            -f charts/szl-receipts/values-vault.yaml \
            --set server.image.repository=szl-receipts-server \
            --set server.image.tag=ci-gate \
            --set server.image.digest="" \
            --set server.image.pullPolicy=IfNotPresent \
            --set server.persistence.enabled=false \
            --set signing.requireKey=false \
            --set dashboard.enabled=false \
            --set otel.enabled=false \
            --set udsPackage.enabled=false \
            --set networkPolicy.enabled=false \
            --set prometheusRule.enabled=false \
            --wait --timeout 240s

          DEPLOY="$(kubectl -n "$NS" get deploy -l app.kubernetes.io/name=szl-receipts-server -o name | head -1)"
          [ -n "$DEPLOY" ] || { echo "::error::receipts-server Deployment not found"; exit 1; }
          echo "DEPLOY=$DEPLOY" >> "$GITHUB_ENV"
          kubectl -n "$NS" rollout status "$DEPLOY" --timeout=240s

      - name: Assert no signing-key Secret exists in the cluster
        run: |
          set -euo pipefail
          # helm-direct provisions NO key Secret (szl-key-init is a zarf component,
          # not a helm hook). Reading Secrets must yield no Ed25519 signing key.
          # Pass/fail logic lives in scripts/vault-key-custody-checks.sh (no-key-secret),
          # self-tested cluster-free by scripts/vault-key-custody-checks.test.sh.
          { kubectl -n "$NS" get secret szl-receipts-ed25519 -o name 2>/dev/null || true; } \
            | bash scripts/vault-key-custody-checks.sh no-key-secret

      - name: Assert the server is signing via Vault (not the silent unsigned fallback)
        run: |
          set -euo pipefail
          LOGS="$(kubectl -n "$NS" logs "$DEPLOY" -c receipts-server --tail=-1 2>/dev/null \
                  || kubectl -n "$NS" logs "$DEPLOY" --all-containers --tail=-1)"
          echo "----- receipts-server log -----"
          echo "$LOGS"
          echo "-------------------------------"
          # Pass/fail logic lives in scripts/vault-key-custody-checks.sh (signer-log),
          # self-tested cluster-free by scripts/vault-key-custody-checks.test.sh. It
          # requires a "[vault] Transit signer ready; ... auth=kubernetes" line (proves
          # ServiceAccount auth, not a static token Secret) AND that the most recent
          # signer-state line is "ready", not the silent "running unsigned" fallback
          # (the server self-heals, so a transient unsigned line at boot is tolerated).
          printf '%s' "$LOGS" | bash scripts/vault-key-custody-checks.sh signer-log

      - name: Live custody assertions (/pubkey backend=vault, /receipt signs, offline verify)
        run: |
          set -euo pipefail
          kubectl -n "$NS" port-forward "$DEPLOY" 18080:8080 >/tmp/srv-pf.log 2>&1 &
          PF_PID=$!
          trap 'kill "$PF_PID" 2>/dev/null || true' EXIT
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:18080/healthz >/dev/null 2>&1 && break
            sleep 1
          done

          echo "==> GET /pubkey"
          PUBKEY="$(curl -fsS http://127.0.0.1:18080/pubkey)"
          echo "$PUBKEY"
          # Pass/fail logic lives in scripts/vault-key-custody-checks.sh (pubkey),
          # self-tested cluster-free by scripts/vault-key-custody-checks.test.sh.
          printf '%s' "$PUBKEY" | bash scripts/vault-key-custody-checks.sh pubkey

          echo "==> POST /receipt"
          RESP="$(curl -fsS -X POST http://127.0.0.1:18080/receipt \
            -H 'content-type: application/json' \
            -d '{"subject":"vault-key-custody-gate","action":"release-verify","source":"ci"}')"
          echo "$RESP"
          # Pass/fail logic lives in scripts/vault-key-custody-checks.sh (receipt),
          # self-tested cluster-free by scripts/vault-key-custody-checks.test.sh.
          printf '%s' "$RESP" | bash scripts/vault-key-custody-checks.sh receipt

          echo "==> Independent offline verification against the published public key"
          python3 scripts/verify_receipts_ed25519.py --url http://127.0.0.1:18080

      - name: Diagnostics on failure
        if: failure()
        run: |
          set +e
          echo "===== pods (all ns) ====="; kubectl get pods -A -o wide
          echo "===== receipts ns describe ====="; kubectl -n "$NS" describe pods
          echo "===== receipts logs ====="; kubectl -n "$NS" logs -l app.kubernetes.io/name=szl-receipts-server --all-containers --tail=-1
          echo "===== vault describe ====="; kubectl -n vault describe pods
          echo "===== vault logs ====="; kubectl -n vault logs deploy/vault --tail=200
          echo "===== vault port-forward log ====="; cat /tmp/vault-pf.log 2>/dev/null
          echo "===== server port-forward log ====="; cat /tmp/srv-pf.log 2>/dev/null

      - name: Tear down cluster
        if: always()
        run: k3d cluster delete "$CLUSTER" || true
