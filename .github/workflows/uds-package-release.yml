#
# uds-package-release.yml
#
# Produces signed Zarf packages for szl-vessels-demo on every semver tag push.
# Signing is KEYLESS — no cosign key provisioning required.
# Artifacts are uploaded to the GitHub release and pushed to ghcr.io as OCI.
#
# References:
#   Zarf v0.77.0 release: https://github.com/zarf-dev/zarf/releases/tag/v0.77.0
#   Keyless signing:       https://docs.sigstore.dev/cosign/signing/keyless/
#   defenseunicorns/setup-zarf: https://github.com/defenseunicorns/setup-zarf
#   UDS CLI:               https://github.com/defenseunicorns/uds-cli

name: UDS Package Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.3.1)'
        required: true

permissions:
  # Required for keyless cosign OIDC token exchange
  id-token: write
  # Required to upload release assets
  contents: write
  # Required to push to ghcr.io
  packages: write

env:
  ZARF_VERSION: "v0.77.0"
  COSIGN_VERSION: "v2.4.3"
  SYFT_VERSION: "v1.18.1"
  REGISTRY: "ghcr.io"
  ORG: "szl-holdings"
  PACKAGE_NAME: "szl-vessels-demo"

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 0: Release gate — prove receipts can SIGN on a real cluster before publish
  # ─────────────────────────────────────────────────────────────────────────────
  # The same real-cluster signing proof as the test.yaml `test-install` gate, but
  # wired into the tag-triggered release path so it runs AUTOMATICALLY on every
  # `v*` release (and manual dispatch) instead of only on workflow_dispatch of the
  # Test workflow. build-and-sign (and therefore publish-release) `needs:` this
  # job, so a failing signing proof BLOCKS the release — a version can never ship
  # while the receipts server would boot UNSIGNED. This workflow only triggers on
  # tags / manual dispatch (never on PRs), so the gate adds no per-PR runner cost.
  receipts-signing-gate:
    name: Receipts Signing Gate (real cluster)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install UDS CLI
        uses: defenseunicorns/setup-uds@ab842abcad1f7a3305c2538e3dd1950d0daacfa5 # v1 (v1.0.1)
        with:
          version: v0.31.0

      - name: Install Zarf
        run: |
          curl -sL "https://github.com/zarf-dev/zarf/releases/download/${ZARF_VERSION}/zarf_${ZARF_VERSION}_Linux_amd64" \
            -o /usr/local/bin/zarf && chmod +x /usr/local/bin/zarf
          zarf version

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Install cryptography (Ed25519 / DSSE chain verify)
        # scripts/verify_receipts.sh verifies every receipt's Ed25519 signature
        # over the canonical DSSE PAE using python3 'cryptography' (public-key only).
        run: pip install cryptography

      # ── Real-cluster deploy: UDS Core + the canonical szl-receipts package ───────
      # We deploy the published k3d-core-slim-dev bundle (creates the k3d cluster and
      # installs UDS Core: Istio + the Pepr UDS Operator + Keycloak + Prometheus).
      # UDS Core is required because the canonical receipts package applies a UDS
      # Package CR and a UDS Exemption CR (uds.dev/v1alpha1) — without the operator
      # CRDs the deploy cannot render — and because the keygen hook runs as root and
      # is only admitted via the RequireNonRootUser Exemption the operator enforces.
      - name: Deploy UDS Core (k3d-core-slim-dev)
        run: |
          uds deploy oci://ghcr.io/defenseunicorns/bundles/k3d-core-slim-dev:1.5.0 \
            --confirm --no-progress

      - name: Build szl-receipts-server image into local Docker
        # Build the image locally so `zarf package create` bakes it without depending
        # on the published GHCR tag being reachable from the runner.
        run: |
          docker build -t ghcr.io/szl-holdings/szl-receipts-server:uds-v0.4.0 \
            services/szl-receipts-server

      - name: Build + deploy the szl-receipts Zarf package
        # The canonical package (packages/szl-receipts) provisions the Ed25519 signing
        # key via the real szl-key-init keygen Helm hook (its own RBAC + the
        # RequireNonRootUser Exemption), creates the szl-receipts namespace, and mounts
        # the key Secret into szl-receipts-server at SZL_ED25519_KEY_PATH. The package's
        # onDeploy step already waits for the Deployment to be Available.
        run: |
          zarf package create packages/szl-receipts \
            --flavor upstream \
            --set DOMAIN=uds.dev \
            --confirm --no-progress
          zarf package deploy zarf-package-szl-receipts-*.tar.zst \
            --confirm --no-progress

      # ── Release gate: prove the DEPLOYED server actually signs on a real cluster ──
      # This is the check the lint job (bare-process scheme test) cannot make: it runs
      # against the in-cluster Helm/Zarf deployment, so it catches real-wiring breaks
      # (key Secret not mounted, wrong mount path / key file name, keygen RBAC denied).
      - name: Verify in-cluster receipt signing (Ed25519 / DSSE on the deployed package)
        run: |
          set -euo pipefail
          NS=szl-receipts
          SVC=szl-receipts-server

          echo "── Waiting for ${SVC} to be Available ─────────────────────────────"
          kubectl -n "$NS" rollout status deployment/"$SVC" --timeout=180s
          kubectl -n "$NS" get pods -o wide

          echo "── Port-forward for /pubkey + POST /receipt ───────────────────────"
          kubectl -n "$NS" port-forward "svc/$SVC" 18080:8080 >/tmp/pf.log 2>&1 &
          PF=$!
          trap 'kill $PF 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            curl -sf http://localhost:18080/pubkey >/dev/null 2>&1 && break
            sleep 1
          done

          # (1) FAIL LOUD if the in-cluster server is UNSIGNED (key Secret not mounted).
          PUB="$(curl -sf http://localhost:18080/pubkey)"
          echo "pubkey: $PUB"
          PUB="$PUB" python3 - <<'PY'
          import json, os, sys
          d = json.loads(os.environ["PUB"])
          if not d.get("signed") or not d.get("public_key_b64u"):
              sys.stderr.write(
                  "FATAL: in-cluster szl-receipts-server is UNSIGNED — the Ed25519 key "
                  "Secret was not mounted. Check the szl-key-init keygen RBAC, the chart "
                  "secretName/keyFile, and the SZL_ED25519_KEY_PATH mount.\n")
              sys.exit(1)
          print("OK: server reports signed=true with a published Ed25519 public key.")
          PY

          # (2) POST a receipt; assert the server signed + self-verified it (valid:true).
          RESP="$(curl -sf -X POST http://localhost:18080/receipt \
            -H 'Content-Type: application/json' \
            -d '{"kind":"ci-e2e","actor":"release-gate","detail":"release-gate signing check"}')"
          echo "receipt: $RESP"
          RESP="$RESP" python3 - <<'PY'
          import json, os, sys
          d = json.loads(os.environ["RESP"])
          if d.get("valid") is not True:
              sys.stderr.write("FATAL: POST /receipt did not return valid:true: %r\n" % (d,))
              sys.exit(1)
          ci = (d.get("chain") or {}).get("chain_index")
          print("OK: server signed a fresh receipt and self-verified valid=true (chain_index=%s)." % ci)
          PY

          kill $PF 2>/dev/null || true
          trap - EXIT
          sleep 1

          # (3) Independent offline chain verification (cluster mode): verify_receipts.sh
          #     does its own port-forward to :9999, pulls /pubkey + /receipts, and
          #     verifies every receipt's Ed25519 signature over the DSSE PAE plus the
          #     SHA-256 hash-chain link. Exits non-zero if any receipt fails.
          echo "── scripts/verify_receipts.sh (cluster mode) ──────────────────────"
          bash scripts/verify_receipts.sh

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1: Build + sign packages for both architectures
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-sign:
    name: Build & Sign (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Gate: never build/sign/publish a release until the receipts server has been
    # proven to actually SIGN on a real cluster (see receipts-signing-gate above).
    needs: receipts-signing-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm

    outputs:
      # Passed to the publish job
      package_amd64: ${{ steps.names.outputs.package_amd64 }}
      package_arm64: ${{ steps.names.outputs.package_arm64 }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      # ── Resolve tag + version ──────────────────────────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Strip leading 'v' for Zarf metadata version field
          VERSION="${TAG#v}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG} version=${VERSION}"

      # ── Compute expected package filename ─────────────────────────────────
      - name: Compute package names
        id: names
        run: |
          PKG_AMD="zarf-package-${PACKAGE_NAME}-amd64-${{ steps.version.outputs.version }}.tar.zst"
          PKG_ARM="zarf-package-${PACKAGE_NAME}-arm64-${{ steps.version.outputs.version }}.tar.zst"
          echo "package_amd64=${PKG_AMD}" >> "$GITHUB_OUTPUT"
          echo "package_arm64=${PKG_ARM}" >> "$GITHUB_OUTPUT"
          echo "package_file=zarf-package-${PACKAGE_NAME}-${{ matrix.arch }}-${{ steps.version.outputs.version }}.tar.zst" >> "$GITHUB_OUTPUT"
          echo "sbom_file=sbom-${PACKAGE_NAME}-${{ matrix.arch }}-${{ steps.version.outputs.version }}.spdx.json" >> "$GITHUB_OUTPUT"

      # ── Install Zarf v0.77.0 ───────────────────────────────────────────────
      # Uses the official setup-zarf action; falls back to direct download.
      - name: Install Zarf v0.77.0
        uses: defenseunicorns/setup-zarf@v1
        with:
          version: ${{ env.ZARF_VERSION }}
        # If the action is unavailable for this runner, the next step catches it
        continue-on-error: true
        id: setup_zarf_action

      - name: Install Zarf v0.77.0 (curl fallback)
        if: steps.setup_zarf_action.outcome == 'failure'
        run: |
          set -euo pipefail
          ARCH="${{ matrix.arch }}"
          URL="https://github.com/zarf-dev/zarf/releases/download/${ZARF_VERSION}/zarf_${ZARF_VERSION}_Linux_${ARCH}.tar.gz"
          curl -fsSL "${URL}" | tar -xz zarf
          install -m 0755 zarf /usr/local/bin/zarf
          zarf version

      - name: Verify Zarf installation
        run: zarf version

      # ── Install cosign ────────────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: ${{ env.COSIGN_VERSION }}

      - name: Verify cosign installation
        run: cosign version

      # ── Install syft (SBOM generator) ─────────────────────────────────────
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: ${{ env.SYFT_VERSION }}

      # ── Log in to ghcr.io ─────────────────────────────────────────────────
      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build Zarf package ────────────────────────────────────────────────
      # Zarf infers the architecture from the build environment.
      - name: Build Zarf package (${{ matrix.arch }})
        working-directory: uds
        env:
          ZARF_PACKAGE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          zarf package create . \
            --set VERSION="${ZARF_PACKAGE_VERSION}" \
            --architecture "${{ matrix.arch }}" \
            --confirm \
            --no-progress \
            --output-directory ..
          echo "Package built."
          ls -lh "../${{ steps.names.outputs.package_file }}" || {
            echo "ERROR: Expected package not found. Available files:"
            ls ../*.tar.zst 2>/dev/null || echo "(none)"
            exit 1
          }

      # ── Generate SBOM via syft ────────────────────────────────────────────
      - name: Generate SBOM
        run: |
          set -euo pipefail
          syft uds/ \
            -o spdx-json \
            --file "${{ steps.names.outputs.sbom_file }}"
          echo "SBOM written to ${{ steps.names.outputs.sbom_file }}"
          jq -r '.name, .spdxVersion' "${{ steps.names.outputs.sbom_file }}"

      # ── Keyless sign with cosign + GitHub OIDC ────────────────────────────
      # cosign sign-blob uses GitHub OIDC to obtain a Fulcio certificate.
      # No private key is needed; the certificate identity is the workflow URL.
      - name: Sign Zarf package (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          PKG="${{ steps.names.outputs.package_file }}"

          echo "Signing ${PKG} with keyless Sigstore..."
          cosign sign-blob \
            --yes \
            --bundle "${PKG}.cosign.bundle" \
            "${PKG}"

          echo "Bundle written: ${PKG}.cosign.bundle"

          # Record the expected verify command for release notes generation
          CERT_IDENTITY="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/uds-package-release.yml@refs/tags/${TAG}"
          CERT_ISSUER="https://token.actions.githubusercontent.com"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ### Verification — ${{ matrix.arch }}

          \`\`\`bash
          cosign verify-blob \\
            --bundle ${PKG}.cosign.bundle \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}" \\
            ${PKG}
          \`\`\`

          Or via \`zarf package verify\`:
          \`\`\`bash
          zarf package verify ${PKG} \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}"
          \`\`\`
          EOF

      # ── DSSE attestation for SBOM ─────────────────────────────────────────
      - name: Attest SBOM (keyless DSSE)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          PKG="${{ steps.names.outputs.package_file }}"
          SBOM="${{ steps.names.outputs.sbom_file }}"

          # Write the SBOM predicate and sign a DSSE attestation
          cosign attest-blob \
            --yes \
            --predicate "${SBOM}" \
            --type spdxjson \
            --bundle "${PKG}.sbom.bundle" \
            "${PKG}"

          echo "SBOM attestation bundle: ${PKG}.sbom.bundle"

      # ── Push to ghcr.io OCI registry ──────────────────────────────────────
      - name: Publish to OCI registry
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          PKG="${{ steps.names.outputs.package_file }}"
          OCI_REF="${REGISTRY}/${ORG}/packages/${PACKAGE_NAME}-${{ matrix.arch }}:${TAG}"

          zarf package publish "${PKG}" "oci://${REGISTRY}/${ORG}/packages" \
            --no-progress
          echo "Published: ${OCI_REF}"

      # ── Upload build artifacts for publish job ─────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zarf-package-${{ matrix.arch }}
          retention-days: 1
          path: |
            ${{ steps.names.outputs.package_file }}
            ${{ steps.names.outputs.package_file }}.cosign.bundle
            ${{ steps.names.outputs.package_file }}.sbom.bundle
            ${{ steps.names.outputs.sbom_file }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2: Create GitHub release and attach all artifacts
  # ─────────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: build-and-sign
    environment: release

    steps:
      - name: Checkout (for release notes template)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Download amd64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zarf-package-amd64
          path: dist/

      - name: Download arm64 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: zarf-package-arm64
          path: dist/

      - name: List release artifacts
        run: ls -lh dist/

      - name: Resolve tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ steps.version.outputs.tag }}
          ORG: ${{ env.ORG }}
          PACKAGE_NAME: ${{ env.PACKAGE_NAME }}
          REGISTRY: ${{ env.REGISTRY }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG#v}"
          CERT_IDENTITY="https://github.com/${REPO}/.github/workflows/uds-package-release.yml@refs/tags/${TAG}"
          CERT_ISSUER="https://token.actions.githubusercontent.com"

          cat > release_notes.md <<EOF
          ## szl-vessels-demo ${TAG}

          Zarf packages signed with [keyless Sigstore](https://docs.sigstore.dev/cosign/signing/keyless/) via GitHub OIDC.
          No cosign key provisioning required.

          ### OCI References

          | Architecture | OCI Reference |
          |---|---|
          | amd64 | \`${REGISTRY}/${ORG}/packages/${PACKAGE_NAME}-amd64:${TAG}\` |
          | arm64 | \`${REGISTRY}/${ORG}/packages/${PACKAGE_NAME}-arm64:${TAG}\` |

          ### Verification (cosign)

          \`\`\`bash
          # amd64
          cosign verify-blob \\
            --bundle zarf-package-${PACKAGE_NAME}-amd64-${VERSION}.tar.zst.cosign.bundle \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}" \\
            zarf-package-${PACKAGE_NAME}-amd64-${VERSION}.tar.zst

          # arm64
          cosign verify-blob \\
            --bundle zarf-package-${PACKAGE_NAME}-arm64-${VERSION}.tar.zst.cosign.bundle \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}" \\
            zarf-package-${PACKAGE_NAME}-arm64-${VERSION}.tar.zst
          \`\`\`

          ### Verification (zarf)

          \`\`\`bash
          zarf package verify zarf-package-${PACKAGE_NAME}-amd64-${VERSION}.tar.zst \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}"
          \`\`\`

          ### SBOM Attestation

          \`\`\`bash
          cosign verify-blob-attestation \\
            --bundle zarf-package-${PACKAGE_NAME}-amd64-${VERSION}.tar.zst.sbom.bundle \\
            --certificate-identity "${CERT_IDENTITY}" \\
            --certificate-oidc-issuer "${CERT_ISSUER}" \\
            --type spdxjson \\
            zarf-package-${PACKAGE_NAME}-amd64-${VERSION}.tar.zst
          \`\`\`

          Built with Zarf ${ZARF_VERSION} · Defense Unicorns UDS · Sigstore cosign ${COSIGN_VERSION}
          EOF

          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "szl-vessels-demo ${{ steps.version.outputs.tag }}"
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-rc') || contains(steps.version.outputs.tag, '-alpha') || contains(steps.version.outputs.tag, '-beta') }}
          files: |
            dist/*.tar.zst
            dist/*.cosign.bundle
            dist/*.sbom.bundle
            dist/*.spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
