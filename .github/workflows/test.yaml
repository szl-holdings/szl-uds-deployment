#
# Test workflow — szl-uds-deployment
# Runs helm lint, yamllint, and kubectl dry-run validation on PRs and pushes.
# When a full cluster is available (test-install / test-upgrade), those are gated here too.
#
# References:
#   UDS Testing Guidelines: https://github.com/defenseunicorns/uds-common/blob/main/docs/uds-packages/guidelines/testing-guidelines.md
#   Requirement R18: no CI test workflow in v0.3.1

name: Test

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Static validation (always runs — no cluster needed) ──────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install cryptography (for Ed25519 scheme test)
        run: pip install cryptography

      - name: DSSE receipt scheme regression
        # Pins the signer (server.sign_dsse) and verifier (verify_receipts.sh)
        # to the SAME Ed25519-over-canonical-DSSE-PAE scheme (Finding A2 / PR-4),
        # and proves the LEGACY HMAC verifier is correctly rejected. No cluster.
        # Catches a quiet drift back to HMAC, a dropped PAE prefix, or signer↔
        # verifier divergence that would break offline verification.
        run: python3 scripts/dsse_scheme_regression_test.py

      - name: Install yamllint
        run: pip install yamllint

      - name: yamllint — all YAML
        # Config (incl. Helm template ignores) lives in .yamllint.yml at repo
        # root. Helm chart templates contain Go templating ({{ ... }}) that is
        # not valid standalone YAML and is validated by `helm lint` below.
        run: |
          yamllint -c .yamllint.yml $(find . -name "*.yaml" -o -name "*.yml" \
            | grep -v "node_modules" \
            | grep -v ".git" \
            | grep -vE "(charts|operator|capabilities)/.*/templates/") 2>&1
          # NOTE: every chart's templates/ dir is excluded (charts/*/templates/,
          # operator/chart/templates/, capabilities/*/chart/templates/) because Go
          # templating ({{ }}) is not valid standalone YAML. These are validated by
          # 'helm lint' / 'helm template' instead.
          # yamllint's ignore: config only works with directory args, not explicit file lists.

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        with:
          version: v3.14.0

      - name: helm lint — charts/szl-receipts
        run: helm lint charts/szl-receipts/ --strict 2>&1

      - name: helm template — dry run render
        run: helm template test-release charts/szl-receipts/ > /dev/null && echo "helm template OK"

      - name: helm template — Vault custody preset guard
        # Guards charts/szl-receipts/values-vault.yaml (the committed Vault-custody
        # overlay that replaced the hand-applied `kubectl set env` flow). The other
        # CI renders use DEFAULT values only, so a future edit could silently break
        # the reproducible Vault path with no test failing. This step renders the
        # chart WITH the overlay and asserts the full vault posture is present, then
        # renders the DEFAULT values and asserts it stays backend=file (the
        # clean-deploy / airgap invariant).
        run: |
          set -euo pipefail
          chart=charts/szl-receipts
          values=$chart/values.yaml
          overlay=$chart/values-vault.yaml

          echo "== Rendering Vault-custody overlay =="
          helm template test-release "$chart/" -f "$values" -f "$overlay" > /tmp/vault-render.yaml

          fail=0
          assert() {  # $1 = label, $2 = grep -E pattern
            if grep -qE -- "$2" /tmp/vault-render.yaml; then
              echo "  ok   $1"
            else
              echo "  FAIL $1  (missing pattern: $2)"
              fail=1
            fi
          }
          assert_value() {  # $1 = env var name, $2 = expected rendered value
            # Assert the env var is present AND carries the exact value from the
            # committed values-vault.yaml overlay. The value renders on the line
            # immediately after the name line (helm: `value: "<v>"`); the trailing
            # close-quote in the fixed-string match makes it effectively exact, so
            # a wrong Vault address / transit mount / key / k8s role / auth mount
            # fails here even though the env var is rendered by name.
            if grep -A1 -- "name: $1$" /tmp/vault-render.yaml | grep -qF -- "value: \"$2\""; then
              echo "  ok   $1=\"$2\""
            else
              echo "  FAIL $1 expected value \"$2\" (wrong or missing in render)"
              fail=1
            fi
          }

          # backend flipped to vault (env name + value on adjacent lines)
          if grep -A1 'name: SZL_SIGNING_BACKEND' /tmp/vault-render.yaml | grep -q 'value: "vault"'; then
            echo "  ok   SZL_SIGNING_BACKEND=vault"
          else
            echo "  FAIL SZL_SIGNING_BACKEND is not set to vault"
            fail=1
          fi

          # the remaining 6 vault env vars are vault-only (absent from the file
          # backend). Assert each is present AND carries the exact value from the
          # committed values-vault.yaml overlay — a wrong Vault address, transit
          # mount/key, or k8s auth role/mount would still render the env var by
          # name, so name-only checks could not catch the misconfiguration. These
          # expected values are the canonical source of truth: if values-vault.yaml
          # is edited to a wrong value, the render no longer matches and CI fails.
          assert_value VAULT_ADDR               "http://vault.vault.svc.cluster.local:8200"
          assert_value SZL_VAULT_TRANSIT_MOUNT  "transit"
          assert_value SZL_VAULT_TRANSIT_KEY    "szl-receipts"
          assert_value SZL_VAULT_AUTH_METHOD    "kubernetes"
          assert_value SZL_VAULT_K8S_ROLE       "szl-receipts"
          assert_value SZL_VAULT_K8S_AUTH_MOUNT "kubernetes"

          # pod runs under the szl-receipts ServiceAccount (its Vault k8s-auth identity)
          assert "serviceAccountName: szl-receipts" 'serviceAccountName: szl-receipts'

          # vault egress NetworkPolicy + UDS Package egress rule
          assert "vault egress NetworkPolicy"    'name: szl-receipts-allow-egress-vault'
          assert "UDS Package vault egress rule" 'remoteNamespace: vault'

          if [ "$fail" -ne 0 ]; then
            echo "Vault-custody preset render is missing required pieces (see FAIL lines)." >&2
            exit 1
          fi
          echo "Vault-custody preset render OK"

          echo "== Asserting DEFAULT render stays backend=file (clean-deploy invariant) =="
          helm template test-release "$chart/" -f "$values" > /tmp/default-render.yaml
          if grep -A1 'name: SZL_SIGNING_BACKEND' /tmp/default-render.yaml | grep -q 'value: "file"'; then
            echo "  ok   default backend=file"
          else
            echo "  FAIL default render is not backend=file" >&2
            exit 1
          fi
          # the vault posture must NOT leak into a default (file-backend) deploy
          if grep -qE 'name: szl-receipts-allow-egress-vault|remoteNamespace: vault' /tmp/default-render.yaml; then
            echo "  FAIL vault egress leaked into the default (file-backend) render" >&2
            exit 1
          fi
          echo "  ok   no vault egress in default render"
          echo "Default clean-deploy invariant OK"

      - name: Validate kustomize manifests (offline schema check)
        run: |
          # Install kubectl (for `kubectl kustomize` rendering only)
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          # Install kubeconform for offline manifest schema validation. CI has no
          # API server, so `kubectl apply --dry-run` (even client-side) cannot
          # run: it still contacts the cluster for API discovery / OpenAPI.
          # kubeconform validates the rendered manifests against bundled schemas
          # entirely offline.
          KUBECONFORM_VERSION=v0.6.7
          curl -sL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" \
            | tar -xz -C /usr/local/bin kubeconform
          # Render the kustomization (structural + kustomize-semantic validation)
          # then schema-validate every rendered resource.
          kubectl kustomize kustomize/base/ \
            | kubeconform -strict -summary -verbose - \
            && echo "kustomize manifests valid"

  # ── End-to-end signing test (real running server — no cluster needed) ────────
  receipts-e2e:
    name: Receipts E2E (sign + verify)
    runs-on: ubuntu-24.04
    # Exercises the REAL server end-to-end, closing the gap left by the unit-level
    # dsse_scheme_regression_test.py: it boots services/szl-receipts-server/server.py
    # with a freshly generated Ed25519 key, POSTs a receipt, asserts the server
    # actually signed it (valid:true + non-empty /pubkey + signed:true), then runs
    # the SAME offline verifier the demo ships (scripts/verify_receipts.sh) and
    # asserts every receipt VERIFIED. A wiring break — server booting unsigned
    # because the key path/secret is wrong, or verify_receipts.sh drifting — passes
    # the unit test but fails loudly here, so broken "provable receipts" never ship.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cryptography (server signer + offline verifier)
        run: pip install cryptography

      - name: Generate an Ed25519 signing key
        run: |
          mkdir -p "${RUNNER_TEMP}/szl-receipts"
          openssl genpkey -algorithm ED25519 \
            -out "${RUNNER_TEMP}/szl-receipts/ed25519.pem"
          echo "Generated Ed25519 key at ${RUNNER_TEMP}/szl-receipts/ed25519.pem"

      - name: Start szl-receipts-server (signed mode)
        env:
          SZL_ED25519_KEY_PATH: ${{ runner.temp }}/szl-receipts/ed25519.pem
          SZL_RECEIPT_STORE: ${{ runner.temp }}/szl-receipts/store
          SZL_PORT: "8080"
        run: |
          python3 services/szl-receipts-server/server.py \
            > "${RUNNER_TEMP}/server.log" 2>&1 &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          # Wait for the server to answer /health (max ~15s).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "Server is up."
              break
            fi
            sleep 0.5
          done
          curl -sf http://localhost:8080/health >/dev/null \
            || { echo "::error::receipts server never became healthy"; \
                 cat "${RUNNER_TEMP}/server.log"; exit 1; }

      - name: Fail loudly if the server booted UNSIGNED
        run: |
          # The whole point of this job: a server that boots without its key still
          # accepts receipts (honest degraded mode) but cannot sign them. That must
          # NEVER reach a release, so we hard-fail here.
          if grep -qiE "running unsigned|cryptography unavailable" "${RUNNER_TEMP}/server.log"; then
            echo "::error::server booted in UNSIGNED mode — signing setup is broken"
            cat "${RUNNER_TEMP}/server.log"
            exit 1
          fi
          PUBKEY_JSON=$(curl -sf http://localhost:8080/pubkey)
          echo "GET /pubkey -> ${PUBKEY_JSON}"
          PUBKEY_JSON="${PUBKEY_JSON}" python3 - << 'PYEOF'
          import os, sys, json
          d = json.loads(os.environ["PUBKEY_JSON"])
          pub = d.get("public_key_b64u")
          if not d.get("signed"):
              print("::error::/pubkey reports signed=false - server is not signing")
              sys.exit(1)
          if not pub:
              print("::error::/pubkey returned an empty public key")
              sys.exit(1)
          print(f"Server is signing. pubkey={pub[:24]} keyid={d.get('keyid')}")
          PYEOF

      - name: POST a receipt and assert valid:true
        run: |
          RESP=$(curl -sf -X POST http://localhost:8080/receipt \
            -H "Content-Type: application/json" \
            -d '{"action":"deploy","subject":"ci-e2e","ts":"'"$(date -u +%FT%TZ)"'"}')
          echo "POST /receipt -> ${RESP}"
          RESP="${RESP}" python3 - << 'PYEOF'
          import os, sys, json
          r = json.loads(os.environ["RESP"])
          if r.get("valid") is not True:
              print("::error::server did NOT sign the receipt (valid != true) - "
                    "signing wiring is broken")
              sys.exit(1)
          print(f"Receipt signed and valid: id={r.get('id','?')[:16]}")
          PYEOF

      - name: Verify all receipts with the shipped offline verifier
        env:
          SZL_RECEIPTS_URL: http://localhost:8080
        run: |
          # Runs the exact public-key-only verifier the demo ships (uds run
          # demo:verify). Exits non-zero if ANY receipt fails Ed25519 sig or
          # hash-chain verification.
          bash scripts/verify_receipts.sh

      - name: Tamper a stored receipt and assert the verifier REJECTS it
        run: |
          # NEGATIVE path. The step above only proves a clean chain is ACCEPTED.
          # That alone is hollow: a regression that swallows InvalidSignature (an
          # always-pass verifier) would still print "all VERIFIED". Here we flip a
          # single byte in a stored receipt and require verify_receipts.sh to exit
          # non-zero AND name a FAILED receipt — so "all VERIFIED" keeps meaning
          # "tampering would have been caught."
          mkdir -p "${RUNNER_TEMP}/tamper"
          # Snapshot the real signed chain + the public key (offline verify needs
          # only the public key — never the private one).
          curl -sf http://localhost:8080/receipts > "${RUNNER_TEMP}/tamper/chain.json"
          curl -sf http://localhost:8080/pubkey \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['public_key_b64u'])" \
            > "${RUNNER_TEMP}/tamper/pub.b64"
          # Flip one bit of the first stored receipt's signed payload. This breaks
          # both its Ed25519 signature (signed over the DSSE PAE of the payload)
          # and its SHA-256 hash-chain link — exactly like on-disk tampering of a
          # receipt under SZL_RECEIPT_STORE.
          python3 - << 'PYEOF'
          import os, json, base64
          p = os.path.join(os.environ["RUNNER_TEMP"], "tamper", "chain.json")
          with open(p) as f:
              receipts = json.load(f)
          assert receipts, "no receipts to tamper"
          env = receipts[0]["envelope"]
          raw = bytearray(base64.b64decode(env["payload"]))
          raw[0] ^= 0x01
          env["payload"] = base64.b64encode(bytes(raw)).decode()
          with open(p, "w") as f:
              json.dump(receipts, f)
          print("Flipped one byte in receipt #1 payload.")
          PYEOF
          # Feed the doctored chain to the SHIPPED verifier (offline file mode).
          # It MUST fail; if it passes, the negative path is broken.
          if SZL_CHAIN_FILE="${RUNNER_TEMP}/tamper/chain.json" \
             SZL_PUBKEY_FILE="${RUNNER_TEMP}/tamper/pub.b64" \
             bash scripts/verify_receipts.sh > "${RUNNER_TEMP}/tamper/verify.log" 2>&1; then
            echo "::error::verifier ACCEPTED a tampered receipt — the negative path is broken (always-pass verifier?)"
            cat "${RUNNER_TEMP}/tamper/verify.log"
            exit 1
          fi
          if ! grep -q "FAILED" "${RUNNER_TEMP}/tamper/verify.log"; then
            echo "::error::verifier exited non-zero but never reported a FAILED receipt"
            cat "${RUNNER_TEMP}/tamper/verify.log"
            exit 1
          fi
          echo "Tamper correctly detected — verifier rejected the doctored chain:"
          grep -E "FAILED|Summary" "${RUNNER_TEMP}/tamper/verify.log"

      - name: Stop the server
        if: always()
        run: |
          [ -n "${SERVER_PID:-}" ] && kill "${SERVER_PID}" 2>/dev/null || true

  # ── Bounded-memory boot guard (real server, large synthetic store — no cluster) ─
  receipts-memory-guard:
    name: Receipts Memory Guard (bounded boot/append)
    runs-on: ubuntu-24.04
    # Locks in the OOM fix (commit 8c399d7): the server once held the ENTIRE
    # receipt chain in RAM and got OOM-killed (exit 137) into a crashloop once the
    # chain reached hundreds of thousands of receipts. This seeds a large
    # synthetic on-disk store (20k receipts) and proves, on BOTH boot paths
    # (legacy streaming scan + O(1) head-pointer resume) AND the append path, that
    # the in-memory window stays <= MAX_IN_MEMORY, the chain index/length stay
    # correct, and peak RSS stays well under the 512Mi chart limit. A refactor
    # that reintroduces a whole-chain load makes len(_receipts) == 20000 >>
    # MAX_IN_MEMORY and fails here.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install cryptography (server signer — used by the append path)
        run: pip install cryptography

      - name: Run the receipts memory guard (20k-receipt store)
        run: python3 scripts/receipts_memory_guard.py

  # ── Sharding + archival chain-validity guard (real signed server — no cluster) ─
  receipts-sharding-guard:
    name: Receipts Sharding Guard (shard + verify-store + archive)
    runs-on: ubuntu-24.04
    # Guards the index-SHARDING write path, the bounded `verify-store` audit, and
    # the verify-gated `archive-shards` cold-storage rollup (validated once by a
    # throwaway sandbox script in Task #512, never committed). Boots the REAL
    # server with a real Ed25519 key and a small SZL_RECEIPT_SHARD_SIZE, POSTs N
    # genuinely-signed receipts spanning several buckets, then proves:
    #   * receipts shard into the expected buckets;
    #   * `verify-store` reports total==valid==N and chain_ok=true;
    #   * `archive-shards --delete` seals ONLY the buckets below the tail (tail
    #     preserved) with a tarball+manifest+ledger per sealed bucket, and a
    #     post-archive `verify-store` over what remains still passes;
    #   * a single flipped byte flips chain_ok to false (the audit isn't a hollow
    #     always-pass);
    #   * `archive-shards` REFUSES to seal a bucket that fails verification —
    #     skipping it, never archiving or deleting it (no loss, no laundering),
    #     while clean sealed buckets still archive.
    # A regression in bucket math, the sealed-vs-tail boundary, or the verify gate
    # passes the unit test but fails loudly here.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install cryptography (server signer + offline audit)
        run: pip install cryptography

      - name: Run the receipts sharding + archival guard
        run: python3 scripts/receipts_sharding_guard.py

  # ── Full install test (requires cluster — manual dispatch or scheduled) ────
  test-install:
    name: Test Install
    runs-on: ubuntu-24.04
    # Only run on workflow_dispatch to avoid burning runner minutes on every PR
    # until the full UDS stack is stable. Remove 'if' to enable on all PRs.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install UDS CLI
        uses: defenseunicorns/setup-uds@ab842abcad1f7a3305c2538e3dd1950d0daacfa5 # v1 (v1.0.1)
        with:
          version: v0.31.0

      - name: Install Zarf
        run: |
          curl -sL "https://github.com/zarf-dev/zarf/releases/download/v0.77.0/zarf_v0.77.0_Linux_amd64" \
            -o /usr/local/bin/zarf && chmod +x /usr/local/bin/zarf

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          kubectl version --client

      - name: Install cryptography (Ed25519 / DSSE chain verify)
        # scripts/verify_receipts.sh verifies every receipt's Ed25519 signature
        # over the canonical DSSE PAE using python3 'cryptography' (public-key only).
        run: pip install cryptography

      # ── Real-cluster deploy: UDS Core + the canonical szl-receipts package ───────
      # We deploy the published k3d-core-slim-dev bundle (creates the k3d cluster and
      # installs UDS Core: Istio + the Pepr UDS Operator + Keycloak + Prometheus).
      # UDS Core is required because the canonical receipts package applies a UDS
      # Package CR and a UDS Exemption CR (uds.dev/v1alpha1) — without the operator
      # CRDs the deploy cannot render — and because the keygen hook runs as root and
      # is only admitted via the RequireNonRootUser Exemption the operator enforces.
      - name: Deploy UDS Core (k3d-core-slim-dev)
        run: |
          uds deploy oci://ghcr.io/defenseunicorns/bundles/k3d-core-slim-dev:1.5.0 \
            --confirm --no-progress

      - name: Build szl-receipts-server image into local Docker
        # Build the image locally so `zarf package create` bakes it without depending
        # on the published GHCR tag being reachable from the runner.
        run: |
          docker build -t ghcr.io/szl-holdings/szl-receipts-server:uds-v0.4.0 \
            services/szl-receipts-server

      - name: Build + deploy the szl-receipts Zarf package
        # The canonical package (packages/szl-receipts) provisions the Ed25519 signing
        # key via the real szl-key-init keygen Helm hook (its own RBAC + the
        # RequireNonRootUser Exemption), creates the szl-receipts namespace, and mounts
        # the key Secret into szl-receipts-server at SZL_ED25519_KEY_PATH. The package's
        # onDeploy step already waits for the Deployment to be Available.
        run: |
          zarf package create packages/szl-receipts \
            --flavor upstream \
            --set DOMAIN=uds.dev \
            --confirm --no-progress
          zarf package deploy zarf-package-szl-receipts-*.tar.zst \
            --confirm --no-progress

      # ── Release gate: prove the DEPLOYED server actually signs on a real cluster ──
      # This is the check the lint job (bare-process scheme test) cannot make: it runs
      # against the in-cluster Helm/Zarf deployment, so it catches real-wiring breaks
      # (key Secret not mounted, wrong mount path / key file name, keygen RBAC denied).
      - name: Verify in-cluster receipt signing (Ed25519 / DSSE on the deployed package)
        run: |
          set -euo pipefail
          NS=szl-receipts
          SVC=szl-receipts-server

          echo "── Waiting for ${SVC} to be Available ─────────────────────────────"
          kubectl -n "$NS" rollout status deployment/"$SVC" --timeout=180s
          kubectl -n "$NS" get pods -o wide

          echo "── Port-forward for /pubkey + POST /receipt ───────────────────────"
          kubectl -n "$NS" port-forward "svc/$SVC" 18080:8080 >/tmp/pf.log 2>&1 &
          PF=$!
          trap 'kill $PF 2>/dev/null || true' EXIT
          for _ in $(seq 1 30); do
            curl -sf http://localhost:18080/pubkey >/dev/null 2>&1 && break
            sleep 1
          done

          # (1) FAIL LOUD if the in-cluster server is UNSIGNED (key Secret not mounted).
          PUB="$(curl -sf http://localhost:18080/pubkey)"
          echo "pubkey: $PUB"
          PUB="$PUB" python3 - <<'PY'
          import json, os, sys
          d = json.loads(os.environ["PUB"])
          if not d.get("signed") or not d.get("public_key_b64u"):
              sys.stderr.write(
                  "FATAL: in-cluster szl-receipts-server is UNSIGNED — the Ed25519 key "
                  "Secret was not mounted. Check the szl-key-init keygen RBAC, the chart "
                  "secretName/keyFile, and the SZL_ED25519_KEY_PATH mount.\n")
              sys.exit(1)
          print("OK: server reports signed=true with a published Ed25519 public key.")
          PY

          # (2) POST a receipt; assert the server signed + self-verified it (valid:true).
          RESP="$(curl -sf -X POST http://localhost:18080/receipt \
            -H 'Content-Type: application/json' \
            -d '{"kind":"ci-e2e","actor":"test-install","detail":"release-gate signing check"}')"
          echo "receipt: $RESP"
          RESP="$RESP" python3 - <<'PY'
          import json, os, sys
          d = json.loads(os.environ["RESP"])
          if d.get("valid") is not True:
              sys.stderr.write("FATAL: POST /receipt did not return valid:true: %r\n" % (d,))
              sys.exit(1)
          ci = (d.get("chain") or {}).get("chain_index")
          print("OK: server signed a fresh receipt and self-verified valid=true (chain_index=%s)." % ci)
          PY

          kill $PF 2>/dev/null || true
          trap - EXIT
          sleep 1

          # (3) Independent offline chain verification (cluster mode): verify_receipts.sh
          #     does its own port-forward to :9999, pulls /pubkey + /receipts, and
          #     verifies every receipt's Ed25519 signature over the DSSE PAE plus the
          #     SHA-256 hash-chain link. Exits non-zero if any receipt fails.
          echo "── scripts/verify_receipts.sh (cluster mode) ──────────────────────"
          bash scripts/verify_receipts.sh

  # ── Upgrade test (requires cluster — manual dispatch only) ────────────────
  test-upgrade:
    name: Test Upgrade
    runs-on: ubuntu-24.04
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install UDS CLI
        uses: defenseunicorns/setup-uds@ab842abcad1f7a3305c2538e3dd1950d0daacfa5 # v1 (v1.0.1)
        with:
          version: v0.31.0

      - name: Install Zarf
        run: |
          curl -sL "https://github.com/zarf-dev/zarf/releases/download/v0.77.0/zarf_v0.77.0_Linux_amd64" \
            -o /usr/local/bin/zarf && chmod +x /usr/local/bin/zarf

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Run test-upgrade
        run: uds run test-upgrade

  # ── Teardown busy-cluster proof (real cluster — manual dispatch only) ──────
  teardown-busy-proof:
    name: Teardown Busy-Cluster Proof
    runs-on: ubuntu-24.04
    # The text-level teardown-guard.yml only proves the `uds run teardown` task
    # still REFERENCES the idle-check gate + FORCE override and that
    # scripts/idle-check.sh parses. It cannot prove the gate actually refuses a
    # teardown while a deploy is in flight: a regression in idle-check.sh's
    # rollout-state logic (e.g. always reporting "idle") would sail through the
    # text guard yet silently re-open the original hazard — one agent's blind
    # teardown destroying a sibling's in-flight deploy on the shared k3d cluster.
    #
    # This job closes that gap on a REAL throwaway k3d cluster: it puts an
    # in-flight (never-Ready) deploy on the cluster, then asserts the three
    # behaviours that matter:
    #   1. `uds run idle-check` reports BUSY (exit non-zero),
    #   2. `uds run teardown` (no FORCE) REFUSES and leaves the cluster intact,
    #   3. `uds run teardown --set FORCE=true` succeeds and deletes the cluster.
    # If a regression lets a busy cluster be torn down, step 1 or 2 fails loud.
    #
    # workflow_dispatch only (mirrors test-install) to avoid burning runner
    # minutes / spinning a cluster on every PR.
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install UDS CLI
        uses: defenseunicorns/setup-uds@ab842abcad1f7a3305c2538e3dd1950d0daacfa5 # v1 (v1.0.1)
        with:
          version: v0.31.0

      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash

      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Create a throwaway k3d cluster
        run: |
          # Use the default CLUSTER_NAME the idle-check / teardown tasks target.
          k3d cluster create uds-szl-demo --timeout 180s
          kubectl cluster-info
          k3d cluster list

      - name: Put an in-flight (never-Ready) deploy on the cluster
        run: |
          # A Deployment whose single pod can never schedule (an impossible CPU
          # request) stays Pending forever. That is an unambiguous in-flight
          # signal the rollout-state logic must catch: the pod is not
          # Running-and-Ready, the Deployment never reaches Available, and its
          # ReplicaSet is freshly created. We do NOT rely on an image pull, so
          # the busy state is deterministic and immediate.
          kubectl apply -f - << 'YAML'
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: inflight-deploy
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: inflight-deploy
            template:
              metadata:
                labels:
                  app: inflight-deploy
              spec:
                containers:
                  - name: pause
                    image: registry.k8s.io/pause:3.9
                    resources:
                      requests:
                        cpu: "1000"
          YAML
          # Wait for the API server to create the ReplicaSet + Pod objects so
          # idle-check observes the in-flight state (the pod stays Pending).
          phase=""
          for _ in $(seq 1 30); do
            phase=$(kubectl get pods -l app=inflight-deploy \
              -o jsonpath='{.items[0].status.phase}' 2>/dev/null || true)
            [ -n "$phase" ] && break
            sleep 1
          done
          echo "inflight-deploy pod phase: ${phase:-<none>}"
          kubectl get deploy,rs,pods -l app=inflight-deploy

      - name: idle-check MUST report BUSY
        run: |
          set +e
          OUT=$(uds run idle-check 2>&1); RC=$?
          set -e
          echo "$OUT"
          if [ "$RC" -eq 0 ]; then
            echo "::error::idle-check reported IDLE while an in-flight deploy is on the cluster — the rollout-state gate is broken (always-idle regression?)"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "BUSY"; then
            echo "::error::idle-check exited non-zero but never printed BUSY — unexpected failure, not the gate"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "inflight-deploy"; then
            echo "::error::idle-check reported BUSY but did not name the in-flight workload — it may be tripping on something other than the deploy it must catch"
            exit 1
          fi
          echo "OK: idle-check correctly reports BUSY and names the in-flight deploy."

      - name: teardown WITHOUT FORCE must REFUSE and leave the cluster intact
        run: |
          set +e
          OUT=$(uds run teardown 2>&1); RC=$?
          set -e
          echo "$OUT"
          if [ "$RC" -eq 0 ]; then
            echo "::error::teardown SUCCEEDED on a busy cluster without FORCE — the safety gate failed to block a destructive teardown"
            exit 1
          fi
          if ! echo "$OUT" | grep -q "Refusing to destroy"; then
            echo "::error::teardown exited non-zero but never printed the refusal message — it failed for some other reason, not the gate"
            exit 1
          fi
          # The decisive proof: the cluster must STILL EXIST. A non-zero exit
          # alone is not enough — the gate must have actually prevented the delete.
          if ! k3d cluster list 2>/dev/null | awk 'NR>1{print $1}' | grep -qx "uds-szl-demo"; then
            echo "::error::cluster 'uds-szl-demo' was deleted despite the refusal — teardown destroyed work it claimed to refuse"
            exit 1
          fi
          echo "OK: teardown refused and the cluster is intact."

      - name: teardown --set FORCE=true must succeed and delete the cluster
        run: |
          uds run teardown --set FORCE=true
          # The override must actually destroy the cluster.
          if k3d cluster list 2>/dev/null | awk 'NR>1{print $1}' | grep -qx "uds-szl-demo"; then
            echo "::error::FORCE=true teardown did not delete cluster 'uds-szl-demo'"
            exit 1
          fi
          echo "OK: FORCE=true override tore the cluster down."

      - name: Clean up the cluster (always)
        if: always()
        run: k3d cluster delete uds-szl-demo 2>/dev/null || true
