#
# Build + push the szl-receipts-server OCI image to GHCR.
# =============================================================================
# Fixes UDS deploy stall Gap 1: the receipts-server image was never published,
# so `uds deploy` stalled pulling ghcr.io/szl-holdings/szl-receipts-server.
#
# This is the standard GHCR push from GitHub Actions — it uses the built-in
# GITHUB_TOKEN with `packages: write`. It does NOT require a founder secret to
# PUBLISH the image.
#
# Two ways to run it:
#   1. gh workflow run receipts-server-image.yml -f version=uds-v0.3.1
#   2. push a tag matching  receipts-server-v*   (e.g. receipts-server-v0.3.1)
#
# OPTIONAL cosign key-pair signing (Gap 2): if the repo secrets
# COSIGN_PRIVATE_KEY (+ COSIGN_PASSWORD) are present, the pushed image is signed
# with the committed cosign.pub keypair. If they are absent the job still
# publishes the image and signs it KEYLESSLY via OIDC (no founder secret needed),
# so the image is always verifiable. Nothing is faked when the key is missing.
#
# Refs:
#   GHCR from Actions: https://docs.github.com/en/actions/use-cases-and-examples/publishing-packages/publishing-docker-images
#   cosign:            https://github.com/sigstore/cosign

name: Build + push szl-receipts-server image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to publish (e.g. uds-v0.3.1)"
        required: true
        default: "uds-v0.3.1"
  push:
    tags:
      - "receipts-server-v*"

permissions:
  contents: read

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/szl-receipts-server
  CONTEXT: services/szl-receipts-server

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # Gate: prove the BUILT image actually SIGNS before it is pushed/signed
  # ───────────────────────────────────────────────────────────────────────────
  # Task #362 wired a signing proof into the v* package release
  # (uds-package-release.yml). But the receipts-server container image has its own
  # publish path (THIS workflow, on receipts-server-v* tags / manual dispatch). An
  # image that boots UNSIGNED could still be published here, undermining the same
  # guarantee — so it gets the same proof.
  #
  # This job builds the SAME image this workflow is about to publish, boots it as a
  # container with a freshly generated Ed25519 key mounted at the chart's
  # SZL_ED25519_KEY_PATH, and proves the running server actually signs:
  #   * it did NOT log "running unsigned" / "cryptography unavailable";
  #   * GET /pubkey reports signed:true with a non-empty Ed25519 public key;
  #   * POST /receipt returns valid:true (server signed + self-verified it);
  #   * scripts/verify_receipts.sh re-verifies the whole chain offline
  #     (Ed25519 over the canonical DSSE PAE + SHA-256 hash-chain, public key only).
  # build-push `needs:` this job, so a failing signing proof BLOCKS the image
  # publish — an UNSIGNED image can never ship. This is the bare-process receipts-e2e
  # proof booted against the real OCI image (stronger than server.py: it also covers
  # the Dockerfile, the nonroot uid, and the key mount). Tags / dispatch only, so it
  # adds no per-PR runner cost.
  receipts-signing-gate:
    name: Receipts Signing Gate (built image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install cryptography (offline receipt verifier)
        # scripts/verify_receipts.sh verifies each receipt's Ed25519 signature over
        # the canonical DSSE PAE using python3 'cryptography' (public key only).
        run: pip install cryptography

      - name: Generate an Ed25519 signing key
        run: |
          set -euo pipefail
          KEYDIR="${RUNNER_TEMP}/szl-receipts"
          mkdir -p "${KEYDIR}"
          openssl genpkey -algorithm ED25519 -out "${KEYDIR}/ed25519.pem"
          # The image runs as the nonroot uid 65532 (Dockerfile). A bind-mounted
          # key written 0600 by the runner user would be unreadable inside the
          # container, so make this EPHEMERAL CI key world-readable. It never leaves
          # the runner and is discarded with the job.
          chmod 0755 "${KEYDIR}"
          chmod 0644 "${KEYDIR}/ed25519.pem"
          echo "Generated Ed25519 key at ${KEYDIR}/ed25519.pem"

      - name: Build the receipts-server image (no push)
        # Same Dockerfile/context the publish job uses below; built here only to
        # prove it signs. Nothing from this build is pushed.
        run: |
          set -euo pipefail
          docker build -t szl-receipts-server:signing-gate "${CONTEXT}"

      - name: Boot the built image in signed mode
        run: |
          set -euo pipefail
          KEYDIR="${RUNNER_TEMP}/szl-receipts"
          docker run -d --name szl-receipts-gate \
            -p 18080:8080 \
            -e SZL_PORT=8080 \
            -e SZL_ED25519_KEY_PATH=/run/secrets/szl-receipts/ed25519.pem \
            -v "${KEYDIR}/ed25519.pem:/run/secrets/szl-receipts/ed25519.pem:ro" \
            szl-receipts-server:signing-gate
          # Wait for /health (max ~30s).
          for _ in $(seq 1 60); do
            if curl -sf http://localhost:18080/health >/dev/null 2>&1; then
              echo "Server is up."
              break
            fi
            sleep 0.5
          done
          curl -sf http://localhost:18080/health >/dev/null \
            || { echo "::error::receipts-server image never became healthy"; \
                 docker logs szl-receipts-gate || true; exit 1; }

      - name: Fail loudly if the image booted UNSIGNED
        run: |
          set -euo pipefail
          # The whole point of this gate: an image that boots without its key still
          # accepts receipts (honest degraded mode) but cannot SIGN them. That must
          # NEVER be published, so hard-fail here.
          if docker logs szl-receipts-gate 2>&1 | grep -qiE "running unsigned|cryptography unavailable"; then
            echo "::error::receipts-server image booted in UNSIGNED mode — signing setup is broken"
            docker logs szl-receipts-gate || true
            exit 1
          fi
          PUBKEY_JSON="$(curl -sf http://localhost:18080/pubkey)"
          echo "GET /pubkey -> ${PUBKEY_JSON}"
          PUBKEY_JSON="${PUBKEY_JSON}" python3 - <<'PYEOF'
          import os, sys, json
          d = json.loads(os.environ["PUBKEY_JSON"])
          if not d.get("signed"):
              print("::error::/pubkey reports signed=false - image is not signing")
              sys.exit(1)
          if not d.get("public_key_b64u"):
              print("::error::/pubkey returned an empty public key")
              sys.exit(1)
          print(f"Image is signing. keyid={d.get('keyid')}")
          PYEOF

      - name: POST a receipt and assert valid:true
        run: |
          set -euo pipefail
          RESP="$(curl -sf -X POST http://localhost:18080/receipt \
            -H 'Content-Type: application/json' \
            -d '{"kind":"ci-e2e","actor":"image-gate","detail":"image signing gate"}')"
          echo "POST /receipt -> ${RESP}"
          RESP="${RESP}" python3 - <<'PYEOF'
          import os, sys, json
          r = json.loads(os.environ["RESP"])
          if r.get("valid") is not True:
              print("::error::image did NOT sign the receipt (valid != true) - signing wiring is broken")
              sys.exit(1)
          print("Receipt signed and self-verified valid=true.")
          PYEOF

      - name: Verify all receipts with the shipped offline verifier
        env:
          SZL_RECEIPTS_URL: http://localhost:18080
        run: |
          # The exact public-key-only verifier the demo ships (uds run demo:verify).
          # Exits non-zero if ANY receipt fails Ed25519 sig or hash-chain verification.
          bash scripts/verify_receipts.sh

      - name: Stop the container
        if: always()
        run: docker rm -f szl-receipts-gate 2>/dev/null || true

  build-push:
    name: Build + push (+ sign) receipts-server
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the auto-repin branch
      packages: write
      id-token: write # keyless cosign fallback
      pull-requests: write # open the auto-repin PR
    # Gate: never push/sign the receipts-server image until the freshly built image
    # has been proven to actually SIGN (see receipts-signing-gate above). A failing
    # signing proof blocks the publish — an UNSIGNED image can never ship.
    needs: receipts-signing-gate
    env:
      # secrets.* cannot be used directly in step-level `if:` expressions, so we
      # surface presence of the cosign key as a job env flag here.
      HAS_COSIGN_KEY: ${{ secrets.COSIGN_PRIVATE_KEY != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve version tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            # tag receipts-server-vX.Y.Z -> uds-vX.Y.Z (matches charts/szl-receipts/values.yaml)
            RAW="${GITHUB_REF_NAME#receipts-server-}"
            V="uds-${RAW}"
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Publishing ${IMAGE}:${V}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Publish a SINGLE-ARCH amd64 manifest — NOT a multi-arch OCI index.
      #
      # `provenance`/`sbom: true` make buildx wrap the image in an OCI index with
      # an `unknown/unknown` attestation child. zarf v0.51 refuses an index
      # digest ("resolved to an OCI image index ... select a specific platform"),
      # so the zarf `images:` lists had to be hand-pinned to the amd64 child
      # digest, and every rebuild silently broke the bundle build until someone
      # re-hunted that child. Pinning `platforms: linux/amd64` + disabling the
      # attestations makes `steps.build.outputs.digest` a plain manifest digest
      # zarf can consume directly. Supply-chain stays intact: the image is still
      # cosign-signed below, and `zarf package create` generates its own SBOMs.
      - name: Build + push image (single-arch amd64, no attestation index)
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.CONTEXT }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
          provenance: false
          sbom: false

      - name: Show published digest
        run: |
          echo "Published ${IMAGE}:${{ steps.ver.outputs.version }}"
          echo "digest=${{ steps.build.outputs.digest }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Gap 2 wiring: prefer the committed cosign.pub key-pair if the founder has
      # provisioned COSIGN_PRIVATE_KEY (+ COSIGN_PASSWORD) repo secrets; otherwise
      # fall back to keyless OIDC so the image is ALWAYS signed (no founder block).
      - name: Sign image with cosign key-pair (if secret present)
        id: keysign
        if: ${{ env.HAS_COSIGN_KEY == 'true' }}
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          printf '%s' "$COSIGN_PRIVATE_KEY" > /tmp/cosign.key
          REF="${IMAGE}@${{ steps.build.outputs.digest }}"
          cosign sign --yes --key /tmp/cosign.key "${REF}"
          rm -f /tmp/cosign.key
          echo "Signed ${REF} with COSIGN_PRIVATE_KEY (cosign.pub key-pair)"
          # Verify against the committed public key.
          cosign verify --key cosign/cosign.pub "${REF}"

      - name: Sign image keylessly (OIDC fallback)
        if: ${{ env.HAS_COSIGN_KEY != 'true' }}
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          REF="${IMAGE}@${{ steps.build.outputs.digest }}"
          cosign sign --yes "${REF}"
          echo "Signed ${REF} keylessly via OIDC (no founder secret required)"

      # Auto-repin: resolve the just-published digest and update every pin site
      # (zarf.yaml, packages/szl-receipts/zarf.yaml, charts/szl-receipts/values.yaml)
      # so nobody has to hand-hunt a digest after a rebuild. main is protected, so
      # this opens a PR (built-in gh, no third-party action) instead of pushing to
      # main directly. No-op when the pins already match (idempotent).
      - name: Auto-repin receipts image digest (open PR)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          set -euo pipefail
          scripts/pin-receipts-image-digest.sh --tag "${VERSION}"
          if git diff --quiet; then
            echo "Pins already match ${IMAGE}:${VERSION}; nothing to do."
            exit 0
          fi
          BRANCH="auto/repin-receipts-${VERSION}-${GITHUB_SHA::7}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add zarf.yaml packages/szl-receipts/zarf.yaml charts/szl-receipts/values.yaml
          git commit -m "chore(receipts): repin ${IMAGE}:${VERSION} to published digest"
          git push --force-with-lease origin "${BRANCH}"

          PR_TITLE="chore(receipts): repin ${VERSION} image digest"
          PR_BODY="Auto-generated after publishing \`${IMAGE}:${VERSION}\`. Updates the zarf + chart pins to the freshly published digest so the bundle build stays green. Generated by \`scripts/pin-receipts-image-digest.sh\`."
          COMPARE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/main...${BRANCH}?expand=1"

          # Open the PR. Org policy forbids GitHub Actions from creating PRs
          # ("GitHub Actions is not permitted to create or approve pull requests" —
          # org-wide can_approve_pull_request_reviews=false, repo override 409s), so
          # `gh pr create` can legitimately fail here. The branch is already pushed,
          # so we do NOT hard-fail the publish job (the image is published). But we
          # must NOT mask the failure as success either: surface a loud ::warning::
          # and a Job Summary with a one-click compare URL so an owner opens the PR.
          if gh pr create \
              --base main --head "${BRANCH}" \
              --title "${PR_TITLE}" \
              --body "${PR_BODY}"; then
            echo "Opened repin PR for ${BRANCH}."
          else
            echo "::warning title=Auto-repin PR not opened::gh pr create failed (likely org policy blocks Actions from opening PRs, or a PR already exists). Branch ${BRANCH} is pushed — open the PR manually: ${COMPARE_URL}"
            {
              echo "## ⚠️ Auto-repin PR could NOT be opened"
              echo ""
              echo "The digest-repin branch was pushed successfully, but \`gh pr create\` exited non-zero."
              echo "This is expected when org policy forbids GitHub Actions from creating pull requests"
              echo "(\`GitHub Actions is not permitted to create or approve pull requests\` — org-wide"
              echo "\`can_approve_pull_request_reviews=false\`; the repo-level override returns HTTP 409),"
              echo "or when a PR for this branch already exists."
              echo ""
              echo "**A maintainer must open the PR manually (one click):**"
              echo ""
              echo "- Branch: \`${BRANCH}\`"
              echo "- 👉 [Open the pull request](${COMPARE_URL})"
              echo ""
              echo "Suggested title: \`${PR_TITLE}\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
