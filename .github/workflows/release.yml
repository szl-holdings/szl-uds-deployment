name: Release artifacts (SBOM + attestation)
on:
  release:
    types: [created, published]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  attest:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Generate SBOM (CycloneDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.17.9
        with:
          format: cyclonedx-json
          output-file: ${{ github.event.repository.name }}.sbom.cdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: '${{ github.event.repository.name }}.sbom.cdx.json'
          push-to-registry: false

      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-path: '${{ github.event.repository.name }}.sbom.cdx.json'
          sbom-path: '${{ github.event.repository.name }}.sbom.cdx.json'

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Cosign attest SBOM
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest-blob --yes \
            --predicate ${{ github.event.repository.name }}.sbom.cdx.json \
            --type cyclonedx \
            --output-attestation ${{ github.event.repository.name }}.intoto.jsonl \
            ${{ github.event.repository.name }}.sbom.cdx.json

      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        if: github.event_name == 'release'
        with:
          files: |
            ${{ github.event.repository.name }}.sbom.cdx.json
            ${{ github.event.repository.name }}.intoto.jsonl
