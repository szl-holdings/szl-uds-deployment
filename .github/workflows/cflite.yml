#
# ClusterFuzzLite — continuous fuzzing of the SZL receipts server's
# untrusted-input parsers (resolves OSSF Scorecard "Fuzzing").
#
# This repo merges directly to main (no PR flow), so the heavy fuzz run is wired
# to `workflow_dispatch` (verify on demand) and `pull_request` (for any future PR
# flow). The build config lives in .clusterfuzzlite/ and the target in
# services/szl-receipts-server/fuzz_receipts.py.
name: ClusterFuzzLite

on:
  pull_request:
    paths:
      - "services/szl-receipts-server/**"
      - ".clusterfuzzlite/**"
      - ".github/workflows/cflite.yml"
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: "Total fuzzing time (seconds)"
        required: false
        default: "120"

permissions:
  contents: read

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Build fuzzers
        id: build
        uses: google/clusterfuzzlite/actions/build_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          language: python
          sanitizer: address
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run fuzzers
        id: run
        uses: google/clusterfuzzlite/actions/run_fuzzers@884713a6c30a92e5e8544c39945cd7cb630abcd1 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fuzz-seconds: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.fuzz_seconds || '120' }}
          mode: ${{ github.event_name == 'pull_request' && 'code-change' || 'batch' }}
          sanitizer: address
          output-sarif: false
