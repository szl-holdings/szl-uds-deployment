#
# image-pin-guard.yml — Catch an unbuildable image pin before it lands.
#
# Why this exists
# ---------------
# `zarf package create` CANNOT package a multi-arch image when the `@sha256:`
# pin points at the OCI *index* (a.k.a. manifest list) digest — zarf needs a
# single-platform manifest it can pull and bake into the airgap tarball. A
# sibling commit once pinned ghcr.io/szl-holdings/szl-receipts-server to its
# multi-arch INDEX digest; every clean checkout then failed `uds run bundle`
# / `zarf package create`, but nothing caught it until someone tried a manual
# build minutes-to-hours later. The fix is always to pin the linux/amd64 CHILD
# digest (see deploy/.../szl-uds-deployment-push notes). This workflow turns
# "discovered during a manual build" into a seconds-long CI failure on the PR.
#
# What it asserts (no cluster, no docker daemon required)
# -------------------------------------------------------
#   1. For EVERY `@sha256:` image pin in zarf.yaml, packages/**/zarf.yaml AND
#      every chart `image.digest` in charts/**/values.yaml, the digest resolves
#      to a SINGLE-PLATFORM manifest — NOT an OCI index / Docker manifest list.
#      (crane manifest + a `.manifests != null` / index-mediaType check.) This
#      now covers a11oy: a chart-side digest (charts/a11oy/values.yaml) was never
#      resolved before, so a multi-arch INDEX pinned only in the chart could slip
#      past CI and break airgap pulls.
#   2. The `bundle` task exists (`uds run --list`) and the `start` task ROUTES
#      to it (`- task: bundle`), so `uds run start` and `uds run bundle` keep
#      building from one clean-checkout code path.
#   3. When a chart pins `image.digest`, the zarf package that wraps that chart
#      pins the BYTE-IDENTICAL digest in its `images:` list, so the deploy-time
#      Zarf agent image rewrite cannot drift (chart-zarf-digest-match).
#
# It complements chart-guard.yml (chart render/lint) and clean-deploy-guard.yml
# (grep invariants); this one guards the zarf image pins + the bundle task wiring.

name: Image Pin Guard

on:
  pull_request:
    paths:
      - "zarf.yaml"
      - "packages/**/zarf.yaml"
      - "charts/**/values.yaml"
      - "tasks.yaml"
      - "scripts/image-pin-checks.py"
      - "scripts/image-pin-checks.test.py"
      - "scripts/fixtures/image-pin/**"
      - ".github/workflows/image-pin-guard.yml"
  push:
    branches: [main]
    paths:
      - "zarf.yaml"
      - "packages/**/zarf.yaml"
      - "charts/**/values.yaml"
      - "tasks.yaml"
      - "scripts/image-pin-checks.py"
      - "scripts/image-pin-checks.test.py"
      - "scripts/fixtures/image-pin/**"
      - ".github/workflows/image-pin-guard.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  # ── 0. Self-test the guard logic (negative fixtures) ────────────────────────
  # The guard job below asserts properties via scripts/image-pin-checks.py. That
  # assertion logic could break silently and PASS VACUOUSLY (green while guarding
  # nothing — e.g. a multi-arch index slipping past the classifier). This job
  # feeds the checks deliberately-broken fixtures and asserts they FAIL, so a
  # future edit that neuters a check turns CI red here. The guard job
  # `needs: self-test`, so a regressed checker blocks the whole workflow.
  self-test:
    name: Self-test image-pin checks (negative fixtures)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml
      - name: Run image-pin checks self-test
        run: python3 scripts/image-pin-checks.test.py

  # ── 0b. End-to-end proof: the REAL classify path catches a REAL bad pin ────
  # The self-test above unit-tests classify-manifest with synthetic JSON. This
  # job feeds the REAL nginx manifests through classify-manifest — but OFFLINE,
  # from two COMMITTED fixtures (scripts/fixtures/image-pin/), not a live Docker
  # Hub pull. Anonymous docker.io pulls from CI are rate-limited and sometimes
  # unavailable; gating this proof on a live pull turned the guard RED for
  # reasons unrelated to the code under review (and tempted people to ignore it).
  #
  # The fixtures are the genuine, IMMUTABLE nginx manifests: OCI content-
  # addressing means sha256(manifest bytes) IS the image digest, and
  # verify-fixture-digest asserts each fixture hashes to its pinned digest, so a
  # doctored fixture (e.g. an index edited to look single-platform) is rejected.
  #   * the multi-arch OCI INDEX manifest (the exact "bad pin" zarf cannot
  #     package) MUST be rejected, and
  #   * its linux/amd64 CHILD manifest (a correct single-platform pin) MUST be
  #     accepted.
  # This OFFLINE classify proof runs on EVERY run regardless of Docker Hub, so a
  # genuine classification regression still fails and an outage never silently
  # turns the negative case into a no-op.
  #
  # A best-effort LIVE step then pulls the same digests via crane (retry+backoff)
  # to exercise the real crane->classify path and detect fixture drift. Only on a
  # PROVEN network/registry outage does it emit a ::warning:: and skip — never
  # masking a real classification failure (the offline gate already caught that).
  pin-pipeline-e2e:
    name: Guard rejects a real multi-arch index pin (offline fixture + live drift)
    runs-on: ubuntu-24.04
    env:
      CRANE_VERSION: v0.20.2
      # docker.io/library/nginx:1.27-alpine multi-arch INDEX (manifest list)
      # digest — mediaType application/vnd.oci.image.index.v1+json. This is the
      # unbuildable "bad pin"; the committed fixture below hashes to it.
      NGINX_INDEX_DIGEST: "sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10"
      # The linux/amd64 CHILD of that same index — a single-platform manifest,
      # i.e. a CORRECT pin that the guard must accept.
      NGINX_CHILD_DIGEST: "sha256:62223d644fa234c3a1cc785ee14242ec47a77364226f1c811d2f669f96dc2ac8"
      INDEX_FIXTURE: scripts/fixtures/image-pin/nginx-index.json
      CHILD_FIXTURE: scripts/fixtures/image-pin/nginx-child.json
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      # ── Offline gate (no Docker Hub): the always-run proof ───────────────────
      - name: Verify committed fixtures content-address to the pinned digests
        run: |
          set -euo pipefail
          python3 scripts/image-pin-checks.py verify-fixture-digest "$INDEX_FIXTURE" --expect "$NGINX_INDEX_DIGEST"
          python3 scripts/image-pin-checks.py verify-fixture-digest "$CHILD_FIXTURE" --expect "$NGINX_CHILD_DIGEST"

      - name: Offline — a multi-arch INDEX fixture must be REJECTED (guard bites)
        run: |
          set -euo pipefail
          if python3 scripts/image-pin-checks.py classify-manifest "$INDEX_FIXTURE"; then
            echo "::error::image-pin guard FAILED to reject the known multi-arch INDEX manifest ($NGINX_INDEX_DIGEST). The guard has regressed to an always-pass no-op."
            exit 1
          fi
          echo "OK: guard correctly rejected the multi-arch index fixture."

      - name: Offline — a single-platform CHILD fixture must be ACCEPTED (no false positive)
        run: |
          set -euo pipefail
          if ! python3 scripts/image-pin-checks.py classify-manifest "$CHILD_FIXTURE"; then
            echo "::error::image-pin guard wrongly REJECTED the valid single-platform CHILD manifest ($NGINX_CHILD_DIGEST). False positive — the guard would block correct pins."
            exit 1
          fi
          echo "OK: guard correctly accepted the single-platform child fixture."

      # ── Live drift check (best-effort): keeps the fixtures honest ────────────
      - name: Install crane
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin crane
          crane version

      - name: Live crane->classify + drift check (skips only on a proven outage)
        run: |
          set -uo pipefail

          # Pull a digest with retry+backoff. Prints "OK" or "OUTAGE" on stdout;
          # crane's manifest body goes to the file. Network/registry failures
          # (rate limit, DNS, 5xx) are treated as a possible outage; only after
          # all attempts fail do we report OUTAGE.
          pull() {
            ref="$1"; out="$2"; attempt=1
            while [ "$attempt" -le 5 ]; do
              if crane manifest "$ref" > "$out" 2>/tmp/crane.err; then
                echo OK
                return 0
              fi
              echo "::notice::crane manifest $ref failed (attempt $attempt); retrying..." >&2
              cat /tmp/crane.err >&2 || true
              sleep "$((attempt * 5))"
              attempt="$((attempt + 1))"
            done
            echo OUTAGE
            return 0
          }

          idx_ref="docker.io/library/nginx@${NGINX_INDEX_DIGEST}"
          child_ref="docker.io/library/nginx@${NGINX_CHILD_DIGEST}"
          status_idx="$(pull "$idx_ref" /tmp/live-index.json)"
          status_child="$(pull "$child_ref" /tmp/live-child.json)"

          if [ "$status_idx" = "OUTAGE" ] || [ "$status_child" = "OUTAGE" ]; then
            echo "::warning::Docker Hub unreachable/rate-limited after retries — skipping the LIVE crane drift check. The offline fixture classification proof already gated this run, so this is NOT a code failure."
            exit 0
          fi

          # Content-addressing: a digest can only ever return the same bytes, so a
          # live-vs-fixture digest mismatch means the committed fixture has drifted.
          fail=0
          check_drift() {
            live="$1"; dig="$2"; fix="$3"
            got="sha256:$(sha256sum "$live" | cut -d' ' -f1)"
            if [ "$got" != "$dig" ]; then
              echo "::warning::live manifest for $dig hashed to $got (crane re-encoding?) — committed fixture $fix may be stale; re-capture with: crane manifest docker.io/library/nginx@$dig > $fix"
            else
              echo "OK: live manifest content-addresses to $dig (fixture $fix is current)."
            fi
          }
          check_drift /tmp/live-index.json "$NGINX_INDEX_DIGEST" "$INDEX_FIXTURE"
          check_drift /tmp/live-child.json "$NGINX_CHILD_DIGEST" "$CHILD_FIXTURE"

          # Real crane->classify path, end to end (only runs when crane succeeded).
          if python3 scripts/image-pin-checks.py classify-manifest /tmp/live-index.json; then
            echo "::error::live crane->classify FAILED to reject the multi-arch index pin — guard regressed."
            fail=1
          fi
          if ! python3 scripts/image-pin-checks.py classify-manifest /tmp/live-child.json; then
            echo "::error::live crane->classify wrongly rejected the single-platform child pin."
            fail=1
          fi
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "Live crane->classify path confirmed: rejects the index pin, accepts the child pin."

      - name: End-to-end pin-catching proof passed
        run: echo "Offline fixture classification gated this run; the live crane->classify drift check confirmed it (or was skipped on a proven Docker Hub outage)."

  # ── 0b-chart. End-to-end proof: a CHART image.digest flows through the REAL
  #             collect-pins -> crane manifest -> classify-manifest pipeline ───
  # pin-pipeline-e2e above feeds the classifier RAW fixtures/refs directly. It
  # proves crane->classify, but NOT that a digest pinned in a chart's
  # `image.digest` (charts/**/values.yaml) actually survives `collect-pins` and
  # reaches that classify pipeline. That chart-side collection path
  # (_chart_image_pins / _iter_image_blocks -> collect-pins) is new (Task #630):
  # if it regressed and dropped chart digests, a multi-arch OCI INDEX pinned ONLY
  # in a chart would never be classified — yet the synthetic unit self-test (which
  # never runs crane) and the docker.io/GHCR direct-ref proofs would all stay
  # green. This job closes that gap end to end:
  #   1. Build a synthetic chart values.yaml that pins a known multi-arch INDEX
  #      digest in image.digest (the exact field charts/a11oy uses), and a second
  #      pinning that index's linux/amd64 CHILD digest.
  #   2. Run the REAL `collect-pins` and assert BOTH chart digests are emitted —
  #      proving the chart-side collection path feeds the classifier.
  #   3. Feed each collected chart ref through the REAL crane manifest ->
  #      classify-manifest pipeline and assert the INDEX is REJECTED and the
  #      CHILD is ACCEPTED.
  #
  # Like pin-pipeline-e2e it uses the docker.io/library/nginx index+child whose
  # immutable manifests are the committed fixtures (scripts/fixtures/image-pin/),
  # so an OFFLINE gate (no Docker Hub) always runs and FAILS LOUDLY on a bad chart
  # index — never a vacuous skip. A best-effort LIVE crane fetch of the same chart
  # refs then exercises the real network path and only skips on a PROVEN outage.
  chart-pin-pipeline-e2e:
    name: Guard catches a bad multi-arch index pinned in a CHART image.digest (collect-pins + real crane)
    runs-on: ubuntu-24.04
    env:
      CRANE_VERSION: v0.20.2
      CHART_REPO: docker.io/library/nginx
      # docker.io/library/nginx multi-arch INDEX (manifest list) digest — the
      # unbuildable "bad pin"; the committed nginx-index.json fixture hashes to it.
      NGINX_INDEX_DIGEST: "sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10"
      # The linux/amd64 CHILD of that same index — a correct single-platform pin.
      NGINX_CHILD_DIGEST: "sha256:62223d644fa234c3a1cc785ee14242ec47a77364226f1c811d2f669f96dc2ac8"
      INDEX_FIXTURE: scripts/fixtures/image-pin/nginx-index.json
      CHILD_FIXTURE: scripts/fixtures/image-pin/nginx-child.json
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install PyYAML
        run: python3 -m pip install --quiet pyyaml

      # ── Build a synthetic chart tree that pins the index + child digests ──────
      # Two charts under charts/**/values.yaml, one pinning the multi-arch INDEX
      # digest and one the amd64 CHILD digest, in the SAME image.digest field the
      # real charts (charts/a11oy/values.yaml) use. A tag-only zarf.yaml satisfies
      # collect-pins' file list without adding any zarf-side @sha256: pins, so the
      # ONLY pins it can emit are the chart-side digests under test.
      - name: Build a synthetic chart tree pinning the index + child digests
        run: |
          set -euo pipefail
          ROOT="$(mktemp -d)"
          echo "CHART_E2E_ROOT=$ROOT" >> "$GITHUB_ENV"
          mkdir -p "$ROOT/charts/idxchart" "$ROOT/charts/childchart"
          cat > "$ROOT/zarf.yaml" <<'EOF'
          kind: ZarfPackageConfig
          metadata:
            name: chart-pin-e2e
          components:
            - name: noop
          EOF
          cat > "$ROOT/charts/idxchart/values.yaml" <<EOF
          image:
            repository: ${CHART_REPO}
            tag: "1.27-alpine"
            digest: "${NGINX_INDEX_DIGEST}"
          EOF
          cat > "$ROOT/charts/childchart/values.yaml" <<EOF
          image:
            repository: ${CHART_REPO}
            tag: "1.27-alpine"
            digest: "${NGINX_CHILD_DIGEST}"
          EOF

      # ── The chart collection path MUST emit both chart-pinned digests ─────────
      - name: collect-pins must emit the chart image.digest pins
        run: |
          set -euo pipefail
          python3 scripts/image-pin-checks.py collect-pins --root "$CHART_E2E_ROOT" --out /tmp/chart-pins.txt
          echo "--- collected chart pins ---"; cat /tmp/chart-pins.txt
          idx_ref="${CHART_REPO}@${NGINX_INDEX_DIGEST}"
          child_ref="${CHART_REPO}@${NGINX_CHILD_DIGEST}"
          for want in "$idx_ref" "$child_ref"; do
            if ! grep -qxF "$want" /tmp/chart-pins.txt; then
              echo "::error::collect-pins did NOT emit the chart-pinned digest $want — the chart image.digest collection path has regressed, so a multi-arch INDEX pinned only in a chart would never reach crane->classify."
              exit 1
            fi
          done
          echo "OK: collect-pins emitted both chart-pinned digests."

      # ── Offline gate (no Docker Hub): classify the immutable fixtures the chart
      #    refs point at. Always runs; a bad chart index FAILS LOUDLY here. ───────
      - name: Verify committed fixtures content-address to the chart-pinned digests
        run: |
          set -euo pipefail
          python3 scripts/image-pin-checks.py verify-fixture-digest "$INDEX_FIXTURE" --expect "$NGINX_INDEX_DIGEST"
          python3 scripts/image-pin-checks.py verify-fixture-digest "$CHILD_FIXTURE" --expect "$NGINX_CHILD_DIGEST"

      - name: Offline — chart-pinned multi-arch INDEX must be REJECTED (guard bites)
        run: |
          set -euo pipefail
          if python3 scripts/image-pin-checks.py classify-manifest "$INDEX_FIXTURE"; then
            echo "::error::image-pin guard FAILED to reject a multi-arch INDEX digest pinned in a chart image.digest ($NGINX_INDEX_DIGEST). The chart pin path has regressed to an always-pass no-op."
            exit 1
          fi
          echo "OK: guard correctly rejected the chart-pinned multi-arch index."

      - name: Offline — chart-pinned single-platform CHILD must be ACCEPTED
        run: |
          set -euo pipefail
          if ! python3 scripts/image-pin-checks.py classify-manifest "$CHILD_FIXTURE"; then
            echo "::error::image-pin guard wrongly REJECTED a valid single-platform CHILD digest pinned in a chart image.digest ($NGINX_CHILD_DIGEST). False positive — correct chart pins would be blocked."
            exit 1
          fi
          echo "OK: guard correctly accepted the chart-pinned single-platform child."

      # ── Live drift check (best-effort): fetch the collected chart refs via the
      #    REAL crane->classify path; skip ONLY on a proven outage. ──────────────
      - name: Install crane
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin crane
          crane version

      - name: Live — feed the collected chart refs through real crane->classify
        run: |
          set -uo pipefail

          # Pull a digest with retry+backoff. Prints "OK" or "OUTAGE" on stdout;
          # crane's manifest body goes to the file.
          pull() {
            ref="$1"; out="$2"; attempt=1
            while [ "$attempt" -le 5 ]; do
              if crane manifest "$ref" > "$out" 2>/tmp/crane.err; then
                echo OK
                return 0
              fi
              echo "::notice::crane manifest $ref failed (attempt $attempt); retrying..." >&2
              cat /tmp/crane.err >&2 || true
              sleep "$((attempt * 5))"
              attempt="$((attempt + 1))"
            done
            echo OUTAGE
            return 0
          }

          # Use the refs collect-pins actually emitted, so this is the chart digest
          # flowing through the SAME crane->classify pipeline the prod guard runs.
          idx_ref="$(grep -F "@${NGINX_INDEX_DIGEST}" /tmp/chart-pins.txt | head -n1)"
          child_ref="$(grep -F "@${NGINX_CHILD_DIGEST}" /tmp/chart-pins.txt | head -n1)"
          echo "chart index ref: $idx_ref"
          echo "chart child ref: $child_ref"
          status_idx="$(pull "$idx_ref" /tmp/chart-live-index.json)"
          status_child="$(pull "$child_ref" /tmp/chart-live-child.json)"

          if [ "$status_idx" = "OUTAGE" ] || [ "$status_child" = "OUTAGE" ]; then
            echo "::warning::Docker Hub unreachable/rate-limited after retries — skipping the LIVE crane chart-digest check. The offline fixture classification proof already gated this run, so this is NOT a code failure."
            exit 0
          fi

          fail=0
          # The chart-pinned multi-arch INDEX digest MUST be rejected.
          if python3 scripts/image-pin-checks.py classify-manifest /tmp/chart-live-index.json; then
            echo "::error::live crane->classify FAILED to reject the chart-pinned multi-arch index ($idx_ref) — the chart pin guard regressed."
            fail=1
          else
            echo "OK: chart-pinned index correctly REJECTED via real crane->classify."
          fi
          # The chart-pinned single-platform CHILD digest MUST be accepted.
          if ! python3 scripts/image-pin-checks.py classify-manifest /tmp/chart-live-child.json; then
            echo "::error::live crane->classify wrongly REJECTED the chart-pinned single-platform child ($child_ref)."
            fail=1
          else
            echo "OK: chart-pinned child correctly ACCEPTED via real crane->classify."
          fi
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "Chart image.digest e2e confirmed: collect-pins -> crane -> classify rejects the index pin, accepts the child pin."

      - name: Chart image.digest pin-catching proof passed
        run: echo "A chart image.digest flowed through the REAL collect-pins -> crane -> classify pipeline; the index pin was caught and the child pin accepted (or the live step was skipped on a proven Docker Hub outage after the offline gate passed)."

  # ── 0c. End-to-end proof on a PRIVATE GHCR image (authenticated) ───────────
  # pin-pipeline-e2e above only exercises the docker.io ANONYMOUS code path. The
  # pins that matter in production — receipts-server + the 5 organ images — live
  # on authenticated GHCR (ghcr.io/szl-holdings/...). The GHCR auth + header
  # handling in `crane auth login` / `crane manifest` could regress (token/header
  # bug) while the docker.io proof stays green, leaving the guard silently
  # always-pass for the images it most needs to protect.
  #
  # So this job runs the SAME `crane manifest -> classify-manifest` pipeline
  # against a REAL org-private GHCR image, authenticated with the workflow's repo
  # GITHUB_TOKEN, and asserts the verdict:
  #   * receipts-server's multi-arch OCI INDEX digest (the image is published via
  #     buildx with SBOM/provenance attestations, so its tag digest is a genuine
  #     manifest list — the exact "bad pin" zarf cannot package) MUST be rejected,
  #   * its linux/amd64 CHILD digest (a correct single-platform pin) MUST be
  #     accepted.
  # The receipts-server image is built by receipts-server-image.yml in THIS repo,
  # so the repo GITHUB_TOKEN has packages:read for it.
  #
  # Robustness: if the image is ABSENT (old tag pruned/retagged) or GHCR is
  # unreachable, the job emits a ::warning:: and skips — a clear skip, never a
  # false pass. But a DENIED response after authenticating IS the auth/header
  # regression this job exists to catch, so that fails loudly.
  ghcr-pin-pipeline-e2e:
    name: Guard rejects a real multi-arch index pin on PRIVATE GHCR (authenticated)
    runs-on: ubuntu-24.04
    env:
      CRANE_VERSION: v0.20.2
      GHCR_REPO: ghcr.io/szl-holdings/szl-receipts-server
      # The receipts-server:uds-v0.3.1 tag is a genuine multi-arch OCI INDEX
      # (mediaType application/vnd.oci.image.index.v1+json) — the unbuildable
      # "bad pin" — published to org-private GHCR by receipts-server-image.yml.
      GHCR_INDEX_DIGEST: "sha256:3a5aedc1a2cbb99b12b357026e175e2e85e09fb764040c853bd16a084ef74fda"
      # The linux/amd64 CHILD of that same index — a single-platform manifest,
      # i.e. a CORRECT pin that the guard must accept.
      GHCR_CHILD_DIGEST: "sha256:a9b124e30745ca088f860eee5c80463fe6895127c9daf5e1b0400434fb120b86"
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install crane + PyYAML
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin crane
          crane version
          python3 -m pip install --quiet pyyaml

      # Same auth path the real image-pin-guard job uses: the repo-scoped
      # GITHUB_TOKEN has packages:read on packages built in this repo
      # (receipts-server-image.yml).
      - name: Authenticate crane to GHCR
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Authenticated crane->classify against a real private GHCR image
        run: |
          set -uo pipefail

          # Pull a digest with retry+backoff, classifying WHY a pull failed so we
          # can tell apart: ABSENT (image pruned -> skip), DENIED (auth/header
          # regression -> the failure we want to catch), and OUTAGE (transient
          # network/registry -> skip). Prints exactly one status word on stdout.
          pull() {
            ref="$1"; out="$2"; attempt=1
            while [ "$attempt" -le 5 ]; do
              if crane manifest "$ref" > "$out" 2>/tmp/crane.err; then
                echo OK; return 0
              fi
              if grep -qiE 'MANIFEST_UNKNOWN|NAME_UNKNOWN|not found|status code 404' /tmp/crane.err; then
                echo ABSENT; return 0
              fi
              if grep -qiE 'UNAUTHORIZED|DENIED|forbidden|status code 401|status code 403' /tmp/crane.err; then
                # Could be a brief blip; retry a couple times before declaring a
                # genuine auth regression.
                if [ "$attempt" -ge 3 ]; then echo DENIED; return 0; fi
              fi
              echo "::notice::crane manifest $ref failed (attempt $attempt); retrying..." >&2
              cat /tmp/crane.err >&2 || true
              sleep "$((attempt * 5))"
              attempt="$((attempt + 1))"
            done
            echo OUTAGE; return 0
          }

          idx_ref="${GHCR_REPO}@${GHCR_INDEX_DIGEST}"
          child_ref="${GHCR_REPO}@${GHCR_CHILD_DIGEST}"
          status_idx="$(pull "$idx_ref" /tmp/ghcr-index.json)"
          status_child="$(pull "$child_ref" /tmp/ghcr-child.json)"
          echo "pull status: index=$status_idx child=$status_child"

          # Auth/header regression: a private GHCR image must NOT come back DENIED
          # once we authenticated with the repo GITHUB_TOKEN. That is exactly the
          # token/header-handling regression this job exists to catch.
          if [ "$status_idx" = "DENIED" ] || [ "$status_child" = "DENIED" ]; then
            echo "::error::crane was DENIED reading the private GHCR image ${GHCR_REPO} after authenticating with the repo GITHUB_TOKEN. The GHCR auth/header path has regressed — the guard would silently stop protecting the org's private images."
            exit 1
          fi

          # Robust to the image being absent (old tag pruned/retagged): skip with
          # a clear warning, never a false pass.
          if [ "$status_idx" = "ABSENT" ] && [ "$status_child" = "ABSENT" ]; then
            echo "::warning::${GHCR_REPO} index+child digests are absent on GHCR (image pruned/retagged?). Skipping the authenticated GHCR negative-case proof — this is a SKIP, not a pass. Re-point GHCR_INDEX_DIGEST/GHCR_CHILD_DIGEST at a current multi-arch org image."
            exit 0
          fi
          if [ "$status_idx" = "OUTAGE" ] || [ "$status_child" = "OUTAGE" ]; then
            echo "::warning::GHCR unreachable after retries — skipping the authenticated GHCR negative-case proof (proven outage, not a code failure). The docker.io offline fixture proof already gated this workflow."
            exit 0
          fi

          fail=0
          # The multi-arch INDEX pin MUST be rejected.
          if [ "$status_idx" = "OK" ]; then
            if python3 scripts/image-pin-checks.py classify-manifest /tmp/ghcr-index.json; then
              echo "::error::authenticated crane->classify FAILED to reject the multi-arch INDEX pin ${idx_ref} — the guard regressed to always-pass for private GHCR images."
              fail=1
            else
              echo "OK: private GHCR index pin correctly REJECTED."
            fi
          else
            echo "::warning::GHCR index digest not fetched (status=$status_idx) — skipping its assertion."
          fi
          # Its single-platform CHILD pin MUST be accepted.
          if [ "$status_child" = "OK" ]; then
            if ! python3 scripts/image-pin-checks.py classify-manifest /tmp/ghcr-child.json; then
              echo "::error::authenticated crane->classify wrongly REJECTED the single-platform CHILD pin ${child_ref} — false positive on a correct private-registry pin."
              fail=1
            else
              echo "OK: private GHCR child pin correctly ACCEPTED."
            fi
          else
            echo "::warning::GHCR child digest not fetched (status=$status_child) — skipping its assertion."
          fi
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "Authenticated GHCR crane->classify path confirmed: rejects the private index pin, accepts its amd64 child."

  image-pin-guard:
    name: Image pins are single-platform + bundle task wired
    needs: [self-test, pin-pipeline-e2e, chart-pin-pipeline-e2e, ghcr-pin-pipeline-e2e]
    runs-on: ubuntu-24.04
    env:
      CRANE_VERSION: v0.20.2
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install crane + PyYAML
        run: |
          set -euo pipefail
          curl -sSL \
            "https://github.com/google/go-containerregistry/releases/download/${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin crane
          crane version
          python3 -m pip install --quiet pyyaml

      # crane needs auth for the (org-private) GHCR receipts-server package.
      # The repo-scoped GITHUB_TOKEN has package: read on packages built in
      # this same repo (receipts-server-image.yml). docker.io stays anonymous.
      - name: Authenticate crane to GHCR
        run: |
          set -euo pipefail
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin

      # ── 1. Every @sha256: pin must be a single-platform manifest ──────────────
      # collect-pins + classify-manifest live in scripts/image-pin-checks.py so
      # they can be unit-tested with broken fixtures by the self-test job above
      # (a multi-arch index, a missing pin). crane stays in the workflow (network
      # tool); its manifest body is piped to classify-manifest for the verdict.
      - name: "Collect @sha256: image pins from zarf packages"
        run: |
          set -euo pipefail
          python3 scripts/image-pin-checks.py collect-pins --root . --out /tmp/pins.txt

      - name: Assert each pin resolves to a single-platform manifest
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r ref; do
            [ -n "$ref" ] || continue
            # Normalize "registry/repo:tag@sha256:..." -> "registry/repo@sha256:..."
            digest="${ref##*@}"
            name="${ref%@*}"
            last="${name##*/}"
            head="${name%/*}"
            last="${last%%:*}"          # strip any :tag on the final path segment
            dref="${head}/${last}@${digest}"

            echo "::group::$dref"
            if ! crane manifest "$dref" > /tmp/manifest.json 2>/tmp/crane.err; then
              echo "::error::could not fetch manifest for $dref"
              cat /tmp/crane.err
              fail=1
              echo "::endgroup::"
              continue
            fi
            if ! python3 scripts/image-pin-checks.py classify-manifest /tmp/manifest.json; then
              echo "::error file=zarf.yaml::$ref is pinned to a multi-arch INDEX digest. zarf package create cannot package an index — pin the linux/amd64 CHILD digest instead."
              fail=1
            fi
            echo "::endgroup::"
          done < /tmp/pins.txt
          if [ "$fail" -ne 0 ]; then
            echo "::error::one or more image pins are unbuildable (index digest or unresolvable)."
            exit 1
          fi
          echo "All @sha256: image pins are single-platform — zarf can package them."

      # ── 1b. chart image.digest must match the wrapping zarf images: digest ─────
      # A chart can pin image.digest independently of the zarf images: list. If
      # they drift (chart pins X, zarf pins Y or tag-only), the deploy-time Zarf
      # agent rewrite deploys the wrong image / breaks airgap. chart-zarf-digest-
      # match lives in scripts/image-pin-checks.py so the self-test can feed it
      # drifted fixtures and assert it FAILS.
      - name: "Assert chart image.digest byte-matches the zarf images digest"
        run: |
          set -euo pipefail
          python3 scripts/image-pin-checks.py chart-zarf-digest-match --root .

      # ── 2. bundle task exists + start routes to it ────────────────────────────
      - name: Install uds-cli
        run: |
          set -euo pipefail
          UDS_VERSION=v0.32.0
          curl -sSL -o /tmp/uds \
            "https://github.com/defenseunicorns/uds-cli/releases/download/${UDS_VERSION}/uds-cli_${UDS_VERSION}_Linux_amd64"
          sudo install -m 0755 /tmp/uds /usr/local/bin/uds
          uds version

      - name: Assert `uds run --list` includes the bundle task
        run: |
          set -euo pipefail
          uds run --list | tee /tmp/uds-tasks.txt
          if ! grep -Eq '(^|[[:space:]])bundle([[:space:]]|$)' /tmp/uds-tasks.txt; then
            echo "::error file=tasks.yaml::`uds run --list` does not include a `bundle` task"
            exit 1
          fi
          echo "OK: bundle task is listed by uds run --list"

      # start-routes-bundle lives in scripts/image-pin-checks.py so it can be
      # unit-tested with broken fixtures by the self-test job above (missing
      # bundle/start task, a start that skips bundle).
      - name: Assert the start task routes to the bundle task
        run: |
          set -euo pipefail
          python3 scripts/image-pin-checks.py start-routes-bundle --root .

      - name: All image-pin guards passed
        run: echo "Image pins are single-platform and the bundle build path is wired."
