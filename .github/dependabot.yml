# Dependabot configuration for szl-uds-deployment
# Doctrine v6 — supply-chain hygiene
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/pepr"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
