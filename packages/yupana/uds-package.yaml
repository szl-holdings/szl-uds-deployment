# UDS Package CR — yupana (operator console, human-facing TOP of stack)
#
# yupana is the only module exposed to humans through the UDS tenant gateway,
# and the only module that takes interactive human auth (SSO via authservice +
# Keycloak). It commands a11oy and reads back events for display; it never
# reaches amaru/sentra/vessels directly (operator commands route through a11oy).
#
# Every field below is documented in the UDS Package CR (v1alpha1) reference:
#   https://uds.defenseunicorns.com/reference/configuration/custom-resources/packages-v1alpha1-cr/
# Field-by-field citations:
#   spec.sso.clientId / redirectUris / enableAuthserviceSelector / groups : same URL, "sso fields"
#   spec.network.expose.service/selector/gateway/host/port/targetPort     : same URL, "network.expose fields"
#   spec.network.allow.direction/selector/remoteNamespace/remoteSelector/remoteGenerated/port/description : same URL, "network.allow fields"
#   spec.monitor.portName/selector/targetPort/path/kind/description       : same URL, "monitor fields"
# UDS Core consumes this CR via the UDS Operator (Pepr) and generates the Istio
# VirtualService, NetworkPolicies, Keycloak client, authservice protection, and
# ServiceMonitor: https://uds.defenseunicorns.com/reference/uds-core/overview/
---
apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: yupana
  namespace: szl-yupana
  labels:
    app.kubernetes.io/name: yupana
    szl.io/component: uds-package
    szl.io/mesh-version: v0.4.0
  annotations:
    szl.io/role: "operator console (human-facing top of stack)"
    szl.io/image-status: >-
      PUBLISHED + cosign-signed — ghcr.io/szl-holdings/yupana:uds-v0.2.1@sha256:c5c48ca7410f1917564a9a6e4d595151801e72384ab3f16dca07c539259e0efa
      (.sig + .att SLSA attestation present in GHCR; FA-001 resolved)
spec:
  # ── SSO — yupana is human-facing; protect with authservice + Keycloak OIDC ──
  # gateway: tenant exposure puts yupana behind the authservice sidecar so every
  # request carries a verified OIDC identity before reaching the Gradio app.
  sso:
    - name: SZL Yupana Operator Console
      clientId: szl-yupana
      redirectUris:
        - "https://yupana.uds.dev/login/callback"
      enableAuthserviceSelector:
        app: yupana
      groups:
        anyOf:
          - "/szl/operators"   # only members of the operators group may sign in

  network:
    # serviceMesh.mode: ambient -- the live uds-szl-demo cluster AND the prove-install
    # k3d substrate run the Istio AMBIENT dataplane under restricted PodSecurity; sidecar
    # mode injects an istio-init (NET_ADMIN) container restricted PSS rejects. No authz/peerauth manifests ship here (namespace+deployment only) -> ambient weakens no gate.
    # The v1alpha1 CRD defaults to ambient; we set it explicitly.
    # (CRD: defenseunicorns/uds-core@v1.5.0/schemas/package-v1alpha1.schema.json,
    #  ServiceMesh.mode enum [sidecar, ambient]. Declared-explicitly idiom from
    #  uds-packages/reference-package/chart/templates/uds-package.yaml.)
    serviceMesh:
      mode: ambient
    expose:
      # Gradio UI on 7860, fronted by the UDS tenant Istio gateway at https://yupana.<domain>
      - service: yupana
        selector:
          app: yupana
        gateway: tenant
        host: yupana
        port: 7860
        targetPort: 7860
        description: "yupana Gradio operator console — tenant gateway"
        # uptime.checks.paths enables blackbox-exporter uptime monitoring of the
        # exposed host. Gradio serves its root at /.
        # (pattern: uds-packages/reference-package/chart/templates/uds-package.yaml;
        #  CRD Uptime.Checks.paths, defenseunicorns/uds-core@v1.5.0 schema)
        uptime:
          checks:
            paths:
              - /

    allow:
      # DNS resolution (required for every svc.cluster.local lookup)
      - direction: Egress
        selector:
          app: yupana
        remoteGenerated: KubeAPI
        description: "Kubernetes API / DNS resolution"
      # yupana -> a11oy : ALLOW (operator commands the policy substrate)
      - direction: Egress
        selector:
          app: yupana
        remoteNamespace: szl-a11oy
        remoteSelector:
          app: a11oy
        port: 7860
        description: "yupana commands a11oy (operator -> policy substrate)"
      # yupana -> szl-receipts : ALLOW (human-confirmation receipt emission)
      - direction: Egress
        selector:
          app: yupana
        remoteNamespace: szl-receipts
        remoteSelector:
          app: szl-receipts-server
        port: 8080
        description: "yupana emits human-confirmation receipts to the chain authority"
      # a11oy -> yupana : ALLOW (a11oy pushes events to yupana for display)
      - direction: Ingress
        selector:
          app: yupana
        remoteNamespace: szl-a11oy
        remoteSelector:
          app: a11oy
        port: 7860
        description: "a11oy emits events to yupana for human display"
      # sentra -> yupana : ALLOW (immune system may inspect operator surface)
      - direction: Ingress
        selector:
          app: yupana
        remoteNamespace: szl-sentra
        remoteSelector:
          app: sentra
        port: 7860
        description: "sentra (immune system) may inspect the operator surface"
      # Ingress from tenant gateway is generated by the expose block above; no
      # explicit allow needed for gateway -> yupana.

  monitor:
    - portName: metrics
      selector:
        app: yupana
      targetPort: 7860
      path: /metrics
      kind: ServiceMonitor
      description: "yupana Gradio metrics scrape"
