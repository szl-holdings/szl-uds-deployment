#
# zarf.yaml — szl-yupana (UDS-bundle member package)
#
# Zarf v0.77.0-compliant package. Wraps the LIVE, already-published and
# cosign-signed container image:
#     ghcr.io/szl-holdings/yupana:###ZARF_PKG_TMPL_VERSION###
# (tag uds-v0.2.1 confirmed live on ghcr.io with a cosign .sig present).
#
# Build (CI):
#   zarf package create packages/yupana \
#     --set VERSION=0.2.0 --architecture amd64 --confirm
#
# This package is composed into oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0
# by bundles/szl-uds-bundle/uds-bundle.yaml via a local path reference.
#
# References:
#   Zarf schema: https://docs.zarf.dev/ref/zarf-package/
#   UDS Operator: https://uds.defenseunicorns.com/reference/uds-core/overview/
#   yupana repo: https://github.com/szl-holdings/yupana

# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig

metadata:
  name: szl-yupana
  version: "###ZARF_PKG_TMPL_VERSION###"
  description: >-
    SZL yupana — governed decision fabric: mandatory witnesses on every decision (YUPANA-V1), receipt observability dashboard and replay engine.
  url: "https://szlholdings.com"
  authors: "SZL Holdings <eng@szlholdings.com>"
  documentation: "https://github.com/szl-holdings/szl-uds-deployment"
  image: "ghcr.io/szl-holdings/yupana:uds-v0.2.1@sha256:f59dc4818950a7b30effc297714dd3dbd13a983094aee1125ab41678e9f504e7"
  uncompressed: false

variables:
  - name: VERSION
    description: "Image tag / package version (injected from the release tag, 'v'/'uds-' stripped)"
    default: "0.2.0"
  - name: DOMAIN
    description: "Cluster domain — must match UDS Core DOMAIN"
    default: "uds.dev"
  - name: REPLICAS
    description: "yupana replica count"
    default: "1"

components:
  # 1. Namespace + UDS Operator Package CR (Istio/NetworkPolicy/SSO/ServiceMonitor)
  - name: szl-yupana-operator
    required: true
    description: >-
      Create the szl-yupana namespace and apply the UDS Operator Package CR that
      generates Istio sidecar config, NetworkPolicies, SSO client and the
      ServiceMonitor for yupana.
    manifests:
      - name: szl-yupana-namespace
        namespace: szl-yupana
        files:
          - manifests/namespace.yaml
      - name: szl-yupana-uds-package
        namespace: szl-yupana
        files:
          - ../yupana/uds-package.yaml

  # 2. The yupana workload itself (pulls the live signed image)
  - name: szl-yupana-workload
    required: true
    description: >-
      Deploy the yupana workload from the live signed image
      ghcr.io/szl-holdings/yupana:###ZARF_PKG_TMPL_VERSION###.
    images:
      - ghcr.io/szl-holdings/yupana:uds-v0.2.1@sha256:f59dc4818950a7b30effc297714dd3dbd13a983094aee1125ab41678e9f504e7
    manifests:
      - name: szl-yupana-workload
        namespace: szl-yupana
        files:
          - manifests/deployment.yaml
    actions:
      onDeploy:
        after:
          - description: "Wait for yupana Deployment to be Available"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: yupana
                namespace: szl-yupana
                condition: Available
