---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yupana
  namespace: szl-yupana
  labels:
    app: yupana
    app.kubernetes.io/name: yupana
    szl.io/component: uds-workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yupana
  template:
    metadata:
      labels:
        app: yupana
        app.kubernetes.io/name: yupana
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: yupana
          # Live, cosign-signed image. Zarf rewrites this to the in-cluster
          # registry reference at deploy time.
          image: ghcr.io/szl-holdings/yupana:uds-v0.2.1@sha256:f59dc4818950a7b30effc297714dd3dbd13a983094aee1125ab41678e9f504e7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7860
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: yupana
  namespace: szl-yupana
  labels:
    app: yupana
    app.kubernetes.io/name: yupana
spec:
  selector:
    app: yupana
  ports:
    - name: http
      port: 7860
      targetPort: 7860
      protocol: TCP
