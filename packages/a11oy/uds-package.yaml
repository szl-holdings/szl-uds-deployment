# UDS Package CR — a11oy (policy + receipt substrate; the orchestrator)
#
# a11oy is the real orchestrator service the PhD Systems verdict asked for. It is
# commanded by rosie, delegates to amaru (memory), sentra (immune), and vessels
# (deployment fabric), emits events back to rosie, and emits decision-time
# receipts. It is the busiest node in the mesh: it talks to every other module.
#
# UDS Package CR (v1alpha1) reference for every field:
#   https://uds.defenseunicorns.com/reference/configuration/custom-resources/packages-v1alpha1-cr/
#   - sso fields / network.expose fields / network.allow fields / monitor fields  (named sections on that page)
# UDS Operator generation (Istio + NetworkPolicy + Keycloak + ServiceMonitor):
#   https://uds.defenseunicorns.com/reference/uds-core/overview/
---
apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: a11oy
  namespace: szl-a11oy
  labels:
    app.kubernetes.io/name: a11oy
    szl.io/component: uds-package
    szl.io/mesh-version: v0.4.0
  annotations:
    szl.io/role: "policy + receipt substrate (orchestrator a11oy.szl-a11oy.svc.cluster.local:7860)"
    szl.io/blocked-by: "FA-001 — ghcr.io/szl-holdings/a11oy image not yet pushed"
spec:
  # ── SSO — service-to-service only (machine identity), not a human login UI ──
  # a11oy does not expose a browser UI; it is protected by mTLS + AuthorizationPolicy.
  # A confidential client is registered for service-account token exchange so a11oy
  # can present an OIDC identity to authservice-gated callees when required.
  sso:
    - name: SZL a11oy Orchestrator
      clientId: szl-a11oy
      standardFlowEnabled: false
      serviceAccountsEnabled: true   # client-credentials grant (machine-to-machine)
      enabled: true

  network:
    # serviceMesh.mode: sidecar — our mesh relies on Istio sidecar
    # AuthorizationPolicies (mesh/authpolicies/*) and strict PeerAuthentication
    # (mesh/peerauth/peerauthentication-strict.yaml), which require sidecar mode.
    # The v1alpha1 CRD defaults to ambient; we set it explicitly.
    # (CRD: defenseunicorns/uds-core@v1.5.0/schemas/package-v1alpha1.schema.json,
    #  ServiceMesh.mode enum [sidecar, ambient]. Declared-explicitly idiom from
    #  uds-packages/reference-package/chart/templates/uds-package.yaml.)
    serviceMesh:
      mode: sidecar
    allow:
      - direction: Egress
        selector:
          app: a11oy
        remoteGenerated: KubeAPI
        description: "Kubernetes API / DNS resolution"
      # a11oy -> amaru : ALLOW (query memory)
      - direction: Egress
        selector:
          app: a11oy
        remoteNamespace: szl-amaru
        remoteSelector:
          app: amaru
        port: 8080
        description: "a11oy queries amaru (memory cortex)"
      # a11oy -> sentra : ALLOW (delegate security verdicts)
      - direction: Egress
        selector:
          app: a11oy
        remoteNamespace: szl-sentra
        remoteSelector:
          app: sentra
        port: 8080
        description: "a11oy delegates security checks to sentra (immune system)"
      # a11oy -> vessels : ALLOW (command the deployment fabric)
      - direction: Egress
        selector:
          app: a11oy
        remoteNamespace: szl-vessels
        remoteSelector:
          app: vessels
        port: 8080
        description: "a11oy commands vessels (deployment fabric)"
      # a11oy -> rosie : ALLOW (emit events to operator console)
      - direction: Egress
        selector:
          app: a11oy
        remoteNamespace: szl-rosie
        remoteSelector:
          app: rosie
        port: 7860
        description: "a11oy emits events to rosie for human display"
      # a11oy -> szl-receipts : ALLOW (decision-time receipt emission)
      - direction: Egress
        selector:
          app: a11oy
        remoteNamespace: szl-receipts
        remoteSelector:
          app: szl-receipts-server
        port: 8080
        description: "a11oy emits gate accept/deny receipts to the chain authority"
      # rosie -> a11oy : ALLOW (operator commands)
      - direction: Ingress
        selector:
          app: a11oy
        remoteNamespace: szl-rosie
        remoteSelector:
          app: rosie
        port: 7860
        description: "rosie commands a11oy"
      # amaru -> a11oy : ALLOW (memory responses)
      - direction: Ingress
        selector:
          app: a11oy
        remoteNamespace: szl-amaru
        remoteSelector:
          app: amaru
        port: 7860
        description: "amaru responds to a11oy memory queries"
      # sentra -> a11oy : ALLOW (immune verdicts + inspection)
      - direction: Ingress
        selector:
          app: a11oy
        remoteNamespace: szl-sentra
        remoteSelector:
          app: sentra
        port: 7860
        description: "sentra returns verdicts / inspects a11oy"
      # vessels -> a11oy : ALLOW (deployment status up)
      - direction: Ingress
        selector:
          app: a11oy
        remoteNamespace: szl-vessels
        remoteSelector:
          app: vessels
        port: 7860
        description: "vessels reports deployment status up to a11oy"

  monitor:
    - portName: metrics
      selector:
        app: a11oy
      targetPort: 7860
      path: /metrics
      kind: ServiceMonitor
      description: "a11oy orchestrator metrics scrape"
