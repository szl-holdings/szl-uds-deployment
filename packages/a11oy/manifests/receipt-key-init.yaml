#
# Receipt-key init — raw-manifest auto-provisioning for the bundle deploy path.
# ============================================================================
# The chart path (charts/a11oy) provisions a11oy's persistent signing key via a
# Helm pre-install hook. The canonical raw-manifest path (manifests/deployment.yaml,
# deployed by zarf-mesh-ready.yaml / bundles/a11oy + bundles/szl-uds-bundle) has
# no Helm hooks, so it previously only had a persistent identity if an operator
# pre-created the Secret (BYOK). This Job closes that gap: on a clean deploy it
# generates the persistent ECDSA P-256 receipt-signing key into Secret
# `szl-a11oy-receipts-ecdsa-p256` in `szl-a11oy` (unless it already exists — BYOK),
# so a11oy's wow `/cosign.pub` survives pod restarts with no manual step.
#
# It mirrors the chart hook's behaviour — idempotent (created only if absent) and
# fail-loud (any unexpected API error aborts the Job) — but uses the a11oy image's
# own python3 + cryptography talking to the in-cluster Kubernetes API (no `kubectl`
# binary, no `apk add`), which is airgap-friendly: the only image pulled is the
# already-baked, cosign-signed a11oy organ image. Key material is generated inside
# the cluster and is never logged.
#
# The curve is ECDSA P-256 (SECP256R1) to match a11oy's signing-key loader
# (a11oy_signing_key.py), which mounts the Secret at /etc/szl/receipt-key and
# rejects anything that is not secp256r1. The private key is stored under
# `ecdsa-p256.key` (the loader's first candidate filename) and the public key
# under `ecdsa-p256.pem`.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: a11oy-receipt-key-init
  namespace: szl-a11oy
  labels:
    app.kubernetes.io/name: a11oy-receipt-key-init
    szl.ai/doctrine-version: "v11"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: a11oy-receipt-key-init
  namespace: szl-a11oy
  labels:
    app.kubernetes.io/name: a11oy-receipt-key-init
rules:
  # Minimal: read to honour BYOK, create to provision when absent. No update/delete.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: a11oy-receipt-key-init
  namespace: szl-a11oy
  labels:
    app.kubernetes.io/name: a11oy-receipt-key-init
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: a11oy-receipt-key-init
subjects:
  - kind: ServiceAccount
    name: a11oy-receipt-key-init
    namespace: szl-a11oy
---
apiVersion: batch/v1
kind: Job
metadata:
  name: a11oy-receipt-key-init
  namespace: szl-a11oy
  labels:
    app.kubernetes.io/name: a11oy-receipt-key-init
    szl.io/component: uds-workload
    szl.ai/doctrine-version: "v11"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: a11oy-receipt-key-init
      annotations:
        # Jobs must terminate; never wrap them in an Istio sidecar (no-op in
        # ambient mode, prevents the never-completing-sidecar trap in sidecar mode).
        sidecar.istio.io/inject: "false"
    spec:
      serviceAccountName: a11oy-receipt-key-init
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keygen
          # The already-baked, cosign-signed a11oy organ image (python3 +
          # cryptography). Zarf rewrites this to the in-cluster registry at deploy.
          image: ghcr.io/szl-holdings/a11oy:uds-v0.3.0@sha256:82ee4c3217b864a9205a21d6cdf11cde977810ef108fc7c9248003308c135272
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          env:
            - name: KEY_NS
              value: szl-a11oy
            - name: KEY_SECRET
              value: szl-a11oy-receipts-ecdsa-p256
          command: ["python3", "-c"]
          args:
            - |
              import base64, json, os, ssl, sys, urllib.request, urllib.error
              from cryptography.hazmat.primitives.asymmetric import ec
              from cryptography.hazmat.primitives import serialization

              ns = os.environ["KEY_NS"]
              secret = os.environ["KEY_SECRET"]
              sa = "/var/run/secrets/kubernetes.io/serviceaccount"
              with open(sa + "/token") as fh:
                  token = fh.read().strip()
              host = "https://kubernetes.default.svc"
              ctx = ssl.create_default_context(cafile=sa + "/ca.crt")

              def api(method, path, body=None):
                  data = json.dumps(body).encode() if body is not None else None
                  req = urllib.request.Request(host + path, data=data, method=method)
                  req.add_header("Authorization", "Bearer " + token)
                  req.add_header("Accept", "application/json")
                  if data is not None:
                      req.add_header("Content-Type", "application/json")
                  try:
                      with urllib.request.urlopen(req, context=ctx) as r:
                          return r.status, r.read()
                  except urllib.error.HTTPError as e:
                      return e.code, e.read()

              # 1) Idempotent BYOK check — never touch an existing Secret.
              status, _ = api("GET", "/api/v1/namespaces/%s/secrets/%s" % (ns, secret))
              if status == 200:
                  print("receipt key Secret %s already present in %s -- BYOK, leaving untouched." % (secret, ns))
                  sys.exit(0)
              if status != 404:
                  sys.stderr.write("FATAL: unexpected status %s probing Secret %s\n" % (status, secret))
                  sys.exit(1)

              # 2) Generate a persistent ECDSA P-256 (secp256r1) keypair.
              priv = ec.generate_private_key(ec.SECP256R1())
              key_pem = priv.private_bytes(
                  serialization.Encoding.PEM,
                  serialization.PrivateFormat.PKCS8,
                  serialization.NoEncryption(),
              )
              pub_pem = priv.public_key().public_bytes(
                  serialization.Encoding.PEM,
                  serialization.PublicFormat.SubjectPublicKeyInfo,
              )

              # 3) Create the Secret (fail-loud on anything but success / BYOK race).
              body = {
                  "apiVersion": "v1",
                  "kind": "Secret",
                  "metadata": {
                      "name": secret,
                      "namespace": ns,
                      "labels": {
                          "app.kubernetes.io/name": "a11oy-receipt-key-init",
                          "szl.ai/doctrine-version": "v11",
                      },
                  },
                  "type": "Opaque",
                  "data": {
                      "ecdsa-p256.key": base64.b64encode(key_pem).decode("ascii"),
                      "ecdsa-p256.pem": base64.b64encode(pub_pem).decode("ascii"),
                  },
              }
              status, resp = api("POST", "/api/v1/namespaces/%s/secrets" % ns, body)
              if status == 409:
                  print("Secret %s created concurrently -- BYOK race, leaving untouched." % secret)
                  sys.exit(0)
              if status not in (200, 201):
                  sys.stderr.write("FATAL: create Secret %s failed (status %s): %s\n" % (secret, status, resp[:300]))
                  sys.exit(1)
              print("created persistent ECDSA P-256 receipt-signing Secret %s in %s" % (secret, ns))
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
