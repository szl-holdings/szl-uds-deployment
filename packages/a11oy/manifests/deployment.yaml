---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: a11oy
  namespace: szl-a11oy
  labels:
    app: a11oy
    app.kubernetes.io/name: a11oy
    szl.io/component: uds-workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: a11oy
  template:
    metadata:
      labels:
        app: a11oy
        app.kubernetes.io/name: a11oy
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: a11oy
          # Live, cosign-signed image. Zarf rewrites this to the in-cluster
          # registry reference at deploy time.
          image: ghcr.io/szl-holdings/a11oy:uds-v0.2.0@sha256:88bc323cd81c799b486c88fec5a04f110e4cd495e4acbc373e0d8d3b31d6881a
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            # Persistent signing-key mount dir (matches a11oy_signing_key.py default).
            - name: A11OY_RECEIPT_KEY_DIR
              value: /etc/szl/receipt-key
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Persistent ECDSA P-256 receipt-signing key. Auto-provisioned by the
            # a11oy-receipt-key-init component (or BYOK). Mounted read-only; marked
            # optional so the pod still boots (ephemeral fallback) if it is absent.
            - name: receipt-key
              mountPath: /etc/szl/receipt-key
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: receipt-key
          secret:
            secretName: szl-a11oy-receipts-ecdsa-p256
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: a11oy
  namespace: szl-a11oy
  labels:
    app: a11oy
    app.kubernetes.io/name: a11oy
spec:
  selector:
    app: a11oy
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
