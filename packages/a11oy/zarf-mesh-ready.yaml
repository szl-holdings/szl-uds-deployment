# zarf.yaml — szl-a11oy (MESH-READY profile, two flavors: upstream + unicorn)
# =============================================================================
# Packaging pattern adopted from zarf-dev/zarf (Apache-2.0). Original SZL work.
#
# DIGEST HONESTY (re-probed against GHCR 2026-06; anonymous token + manifest HEAD):
#   VERIFIED-LIVE (HTTP 200):
#     ghcr.io/szl-holdings/a11oy:uds-v0.3.0
#       @sha256:0b03632f416fd6539766a5e73a12a18639ade75e66a06a11660a57c73457e170
#       NOTE: this digest DIFFERS from the value recorded in HETZNER roadmap
#       (e2ef6184...). The a11oy organ image was rebuilt again -> a11oy-bundle:0.5.0
#       (d801f8e4...) remains STALE. Prefer szl-mesh:0.4.0 or a re-pinned bundle.
#   NOT-YET-PUBLISHED (HTTP 404 on GHCR -> 'verify before deploy'):
#     ghcr.io/szl-holdings/a11oy:0.5.0            (404)
#     ghcr.io/szl-holdings/a11oy:0.5.0-wolfi      (404)  <- unicorn flavor target
#     ghcr.io/szl-holdings/a11oy-ledger:0.5.0     (404)
#   The upstream flavor below therefore pins the VERIFIED uds-v0.3.0 image so the
#   package is buildable/deployable TODAY. The unicorn flavor + 0.5.0 tags are
#   labeled 'verify before deploy' until those images are published.
#
# Build (CI):  uds zarf package create packages/a11oy -f zarf-mesh-ready.yaml \
#                --set DOMAIN=uds.dev -a amd64 --confirm --flavor upstream
#
# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: szl-a11oy
  description: "SZL A11oy — Governed-AI Decision Substrate. UDS Package for uds-core mesh deployment."
  version: "0.5.0-uds.0"
  url: https://github.com/szl-holdings/a11oy
  image: ghcr.io/szl-holdings/a11oy:uds-v0.3.0
  authors: SZL Holdings Platform Team
  documentation: https://github.com/szl-holdings/szl-uds-deployment

variables:
  - name: DOMAIN
    description: "Base domain for Istio VirtualService hosts (must match UDS Core DOMAIN)"
    default: uds.dev
  - name: RECEIPTS_ENDPOINT
    description: "DSSE receipt verification service endpoint"
    default: "https://szl-receipts.szl-receipts.svc.cluster.local:8443"

components:
  # ── receipt-key init: auto-provision a11oy's persistent signing identity ─────
  # Runs FIRST (before the workload + UDS Package CR) so the persistent ECDSA
  # P-256 Secret szl-a11oy-receipts-ecdsa-p256 exists in szl-a11oy before the
  # a11oy pod boots and its signing-key loader mounts /etc/szl/receipt-key.
  # Flavor-agnostic (no `only:` gate) — the keygen Job uses the verified-live
  # uds-v0.3.0 image (python3 + cryptography) regardless of the workload flavor.
  # Idempotent BYOK: if the Secret already exists the Job is a no-op.
  - name: a11oy-receipt-key-init
    required: true
    description: "Auto-provision a11oy's persistent ECDSA P-256 receipt-signing Secret (idempotent BYOK)"
    manifests:
      - name: szl-a11oy-namespace
        namespace: szl-a11oy
        files:
          - manifests/namespace.yaml
      - name: szl-a11oy-receipt-key-init
        namespace: szl-a11oy
        files:
          - manifests/receipt-key-init.yaml
    images:
      - ghcr.io/szl-holdings/a11oy:uds-v0.3.0@sha256:0b03632f416fd6539766a5e73a12a18639ade75e66a06a11660a57c73457e170
    actions:
      onDeploy:
        after:
          - description: "Wait for the a11oy receipt-key-init Job to complete"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Job
                name: a11oy-receipt-key-init
                namespace: szl-a11oy
                condition: Complete

  # ── upstream flavor: VERIFIED-LIVE public GHCR image (uds-v0.3.0) ───────────
  - name: a11oy
    required: true
    description: "Deploy a11oy with upstream images (VERIFIED-LIVE uds-v0.3.0 organ image)"
    only:
      flavor: upstream
    manifests:
      - name: szl-a11oy-uds-package
        namespace: a11oy
        files:
          - uds-package-mesh-ready.yaml
      - name: szl-a11oy-workload
        namespace: a11oy
        files:
          - manifests/namespace.yaml
          - manifests/deployment.yaml
    images:
      # VERIFIED-LIVE on GHCR (HTTP 200). Digest pinned for supply-chain integrity.
      - ghcr.io/szl-holdings/a11oy:uds-v0.3.0@sha256:0b03632f416fd6539766a5e73a12a18639ade75e66a06a11660a57c73457e170
    actions:
      onDeploy:
        after:
          - description: "Wait for a11oy Deployment to be Available"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: a11oy
                namespace: a11oy
                condition: Available

  # ── unicorn flavor: minimal CVE baseline (Chainguard/Wolfi) ─────────────────
  # verify before deploy: ghcr.io/szl-holdings/a11oy:0.5.0-wolfi NOT yet published (404).
  - name: a11oy
    required: true
    description: "Deploy a11oy with unicorn images (Wolfi/Chainguard) — verify before deploy"
    only:
      flavor: unicorn
    manifests:
      - name: szl-a11oy-uds-package
        namespace: a11oy
        files:
          - uds-package-mesh-ready.yaml
      - name: szl-a11oy-workload
        namespace: a11oy
        files:
          - manifests/namespace.yaml
          - manifests/deployment.yaml
    images:
      # verify before deploy — Wolfi/Chainguard image not yet published to GHCR.
      - ghcr.io/szl-holdings/a11oy:0.5.0-wolfi
    actions:
      onDeploy:
        after:
          - description: "Wait for a11oy Deployment to be Available"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: a11oy
                namespace: a11oy
                condition: Available

  # ── SBOM attestation component (ships in-bundle) ────────────────────────────
  # verify before deploy: SBOM files are produced by the organ-image build
  # pipeline. Marked not-required so `zarf package create` does not fail when the
  # SBOM artifacts have not yet been staged into this directory.
  - name: a11oy-sbom-attest
    required: false
    description: "SBOM + SLSA Build L2 provenance roadmap (organ images only; not yet earned; bundle attestation = cosign signature)"
    files:
      - source: sbom/a11oy.spdx.json
        target: /zarf-sbom/a11oy.spdx.json
      - source: sbom/a11oy.cyclonedx.json
        target: /zarf-sbom/a11oy.cyclonedx.json
