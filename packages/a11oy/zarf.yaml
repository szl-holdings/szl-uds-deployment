# zarf.yaml — szl-a11oy (UDS-bundle member package)
# =============================================================================
# Packages the a11oy flagship as a proper, self-contained Zarf package, the same
# way packages/szl-receipts ships: the workload is rendered from the localPath
# Helm chart charts/a11oy, and the canonical, cosign-signed container image is
# BAKED into the package tarball at `zarf package create` time. A clean
# `uds deploy` therefore brings a11oy up on ANY UDS Core cluster with no manual
# `k3d image import` and no `zarfAgentIgnore` workaround — the Zarf deploy-time
# agent mirrors the baked image into the in-cluster registry and rewrites the
# chart's image reference to point at it.
#
# Canonical image (published + cosign keyless-signed on GHCR):
#   ghcr.io/szl-holdings/a11oy:uds-v0.3.0   (single-arch linux/amd64 manifest)
# The reference baked here is byte-identical to what charts/a11oy renders
# (values: image.repository + image.tag + image.digest), so the agent rewrite
# resolves cleanly.
#
# Build (CI / local):
#   zarf package create packages/a11oy --set DOMAIN=uds.dev -a amd64 --confirm
#
# Composed into the full-organ szl-uds-bundle by
#   bundles/szl-uds-bundle/uds-bundle.yaml
#   (packages: - name: szl-a11oy / path: ../../packages/a11oy).
#
# References:
#   Zarf schema:  https://docs.zarf.dev/ref/zarf-package/
#   UDS Operator: https://uds.defenseunicorns.com/reference/uds-core/overview/
#   a11oy repo:   https://github.com/szl-holdings/a11oy

# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig

metadata:
  name: szl-a11oy
  version: "0.3.0"
  description: >-
    SZL a11oy — governance + policy + receipt-substrate flagship. Runs inside UDS
    Core (Istio ambient mTLS + NetworkPolicy + ServiceMonitor via its UDS Package
    CR) and emits decision-time DSSE receipts to the szl-receipts chain authority.
  url: "https://szlholdings.com"
  authors: "SZL Holdings <eng@szlholdings.com>"
  documentation: "https://github.com/szl-holdings/szl-uds-deployment"

variables:
  - name: DOMAIN
    description: "Cluster domain — must match UDS Core DOMAIN"
    default: "uds.dev"

components:
  # The a11oy workload, rendered from the localPath Helm chart with its baked,
  # cosign-signed image. The chart ships the UDS Package CR, Deployment, Service,
  # PeerAuthentication (STRICT mTLS), the doctrine ConfigMap, AND the idempotent
  # receipt-key-init pre-install hook (Job + RBAC) — so the package is fully
  # chart-based with NO separate manifests-based component.
  - name: szl-a11oy
    required: true
    description: >-
      Deploy the a11oy flagship from charts/a11oy, pulling the baked
      ghcr.io/szl-holdings/a11oy image (no k3d import / zarfAgentIgnore needed).
    charts:
      - name: a11oy
        namespace: szl-a11oy
        version: 0.3.0
        localPath: ../../charts/a11oy
        valuesFiles:
          - ../../charts/a11oy/values.yaml
        # Map the package DOMAIN variable onto the chart so the standalone
        # `zarf package deploy --set DOMAIN=...` path configures the UDS Package
        # CR endpoint host (the bundle path sets the same via global.domain).
        variables:
          - name: DOMAIN
            description: "Cluster domain (UDS Core DOMAIN)"
            path: global.domain
    images:
      # Canonical, cosign-signed image, DIGEST-PINNED to the linux/amd64 child
      # manifest so a re-pushed/mutated tag cannot change what runs. Byte-matches
      # charts/a11oy values image.digest (a11oy-package-guard + image-pin-guard
      # enforce both the match and that it is a single-platform manifest, not an
      # OCI index). Baked into the tarball at build time and rewritten to the
      # in-cluster registry by the Zarf agent at deploy time.
      - ghcr.io/szl-holdings/a11oy:uds-v0.3.0@sha256:bafd3f37b0f12b781fa57fe263739d0ff8cc1f9547e78c2df5f8b059fa6478b4
    actions:
      onDeploy:
        after:
          - description: "Wait for a11oy Deployment to be Available"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: a11oy
                namespace: szl-a11oy
                condition: Available
