# zarf.yaml — szl-a11oy (UDS-bundle member package)
#
# Zarf v0.77.0-compliant package. Wraps the LIVE, already-published and
# cosign-signed container image:
#     ghcr.io/szl-holdings/a11oy:###ZARF_PKG_TMPL_VERSION###
# (tag uds-v0.2.0 confirmed live on ghcr.io with a cosign .sig present).
#
# Build (CI):
#   zarf package create packages/a11oy \
#     --set VERSION=0.2.0 --architecture amd64 --confirm
#
# This package is composed into oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0
# by bundles/szl-uds-bundle/uds-bundle.yaml via a local path reference.
#
# References:
#   Zarf schema: https://docs.zarf.dev/ref/zarf-package/
#   UDS Operator: https://uds.defenseunicorns.com/reference/uds-core/overview/
#   a11oy repo: https://github.com/szl-holdings/a11oy

# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig

metadata:
  name: szl-a11oy
  version: "###ZARF_PKG_TMPL_VERSION###"
  description: >-
    SZL a11oy — policy + receipt substrate orchestrator (commands rosie/amaru/sentra/vessels, emits decision-time DSSE receipts).
  url: "https://szlholdings.com"
  authors: "SZL Holdings <eng@szlholdings.com>"
  documentation: "https://github.com/szl-holdings/szl-uds-deployment"
  image: "ghcr.io/szl-holdings/a11oy:uds-v0.2.0@sha256:88bc323cd81c799b486c88fec5a04f110e4cd495e4acbc373e0d8d3b31d6881a"
  uncompressed: false

variables:
  - name: VERSION
    description: "Image tag / package version (injected from the release tag, 'v'/'uds-' stripped)"
    default: "0.2.0"
  - name: DOMAIN
    description: "Cluster domain — must match UDS Core DOMAIN"
    default: "uds.dev"
  - name: REPLICAS
    description: "a11oy replica count"
    default: "1"

components:
  # 1. Namespace + UDS Operator Package CR (Istio/NetworkPolicy/SSO/ServiceMonitor)
  - name: szl-a11oy-operator
    required: true
    description: >-
      Create the szl-a11oy namespace and apply the UDS Operator Package CR that
      generates Istio sidecar config, NetworkPolicies, SSO client and the
      ServiceMonitor for a11oy.
    manifests:
      - name: szl-a11oy-namespace
        namespace: szl-a11oy
        files:
          - manifests/namespace.yaml
      - name: szl-a11oy-uds-package
        namespace: szl-a11oy
        files:
          - ../a11oy/uds-package.yaml

  # 2. The a11oy workload itself (pulls the live signed image)
  - name: szl-a11oy-workload
    required: true
    description: >-
      Deploy the a11oy workload from the live signed image
      ghcr.io/szl-holdings/a11oy:###ZARF_PKG_TMPL_VERSION###.
    images:
      - ghcr.io/szl-holdings/a11oy:uds-v0.2.0@sha256:88bc323cd81c799b486c88fec5a04f110e4cd495e4acbc373e0d8d3b31d6881a
    manifests:
      - name: szl-a11oy-workload
        namespace: szl-a11oy
        files:
          - manifests/deployment.yaml
    actions:
      onDeploy:
        after:
          - description: "Wait for a11oy Deployment to be Available"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: a11oy
                namespace: szl-a11oy
                condition: Available
