# UDS Package CR — rosie (Jarvis operator console, human-facing TOP of stack)
#
# rosie is the only module exposed to humans through the UDS tenant gateway,
# and the only module that takes interactive human auth (SSO via authservice +
# Keycloak). It commands a11oy and reads back events for display; it never
# reaches amaru/sentra/vessels directly (operator commands route through a11oy).
#
# Every field below is documented in the UDS Package CR (v1alpha1) reference:
#   https://uds.defenseunicorns.com/reference/configuration/custom-resources/packages-v1alpha1-cr/
# Field-by-field citations:
#   spec.sso.clientId / redirectUris / enableAuthserviceSelector / groups : same URL, "sso fields"
#   spec.network.expose.service/selector/gateway/host/port/targetPort     : same URL, "network.expose fields"
#   spec.network.allow.direction/selector/remoteNamespace/remoteSelector/remoteGenerated/port/description : same URL, "network.allow fields"
#   spec.monitor.portName/selector/targetPort/path/kind/description       : same URL, "monitor fields"
# UDS Core consumes this CR via the UDS Operator (Pepr) and generates the Istio
# VirtualService, NetworkPolicies, Keycloak client, authservice protection, and
# ServiceMonitor: https://uds.defenseunicorns.com/reference/uds-core/overview/
---
apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: rosie
  namespace: szl-rosie
  labels:
    app.kubernetes.io/name: rosie
    szl.io/component: uds-package
    szl.io/mesh-version: v0.4.0
  annotations:
    szl.io/role: "Jarvis operator console (human-facing top of stack)"
    szl.io/blocked-by: "FA-001 — ghcr.io/szl-holdings/rosie image not yet pushed"
spec:
  # ── SSO — rosie is human-facing; protect with authservice + Keycloak OIDC ──
  # gateway: tenant exposure puts rosie behind the authservice sidecar so every
  # request carries a verified OIDC identity before reaching the Gradio app.
  sso:
    - name: SZL Rosie Operator Console
      clientId: szl-rosie
      redirectUris:
        - "https://rosie.uds.dev/login/callback"
      enableAuthserviceSelector:
        app: rosie
      groups:
        anyOf:
          - "/szl/operators"   # only members of the operators group may sign in

  network:
    expose:
      # Gradio UI on 7860, fronted by the UDS tenant Istio gateway at https://rosie.<domain>
      - service: rosie
        selector:
          app: rosie
        gateway: tenant
        host: rosie
        port: 7860
        targetPort: 7860
        description: "rosie Gradio operator console — tenant gateway"

    allow:
      # DNS resolution (required for every svc.cluster.local lookup)
      - direction: Egress
        selector:
          app: rosie
        remoteGenerated: KubeAPI
        description: "Kubernetes API / DNS resolution"
      # rosie -> a11oy : ALLOW (operator commands the policy substrate)
      - direction: Egress
        selector:
          app: rosie
        remoteNamespace: szl-a11oy
        remoteSelector:
          app: a11oy
        port: 8080
        description: "rosie commands a11oy (operator -> policy substrate)"
      # rosie -> szl-receipts : ALLOW (human-confirmation receipt emission)
      - direction: Egress
        selector:
          app: rosie
        remoteNamespace: szl-receipts
        remoteSelector:
          app: szl-receipts-server
        port: 8080
        description: "rosie emits human-confirmation receipts to the chain authority"
      # a11oy -> rosie : ALLOW (a11oy pushes events to rosie for display)
      - direction: Ingress
        selector:
          app: rosie
        remoteNamespace: szl-a11oy
        remoteSelector:
          app: a11oy
        port: 7860
        description: "a11oy emits events to rosie for human display"
      # sentra -> rosie : ALLOW (immune system may inspect operator surface)
      - direction: Ingress
        selector:
          app: rosie
        remoteNamespace: szl-sentra
        remoteSelector:
          app: sentra
        port: 7860
        description: "sentra (immune system) may inspect the operator surface"
      # Ingress from tenant gateway is generated by the expose block above; no
      # explicit allow needed for gateway -> rosie.

  monitor:
    - portName: metrics
      selector:
        app: rosie
      targetPort: 7860
      path: /metrics
      kind: ServiceMonitor
      description: "rosie Gradio metrics scrape"
