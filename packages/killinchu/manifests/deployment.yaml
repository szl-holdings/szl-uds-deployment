---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: killinchu
  namespace: szl-killinchu
  labels:
    app: killinchu
    app.kubernetes.io/name: killinchu
    szl.io/component: uds-workload
spec:
  replicas: 1
  selector:
    matchLabels:
      app: killinchu
  template:
    metadata:
      labels:
        app: killinchu
        app.kubernetes.io/name: killinchu
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: killinchu
          # Live, cosign-signed image. Zarf rewrites this to the in-cluster
          # registry reference at deploy time.
          image: ghcr.io/szl-holdings/killinchu:uds-v0.2.0@sha256:6f185dda4e81aa2a347a5210a2f2bdfd19fe1af898e0c14a0a914261b1858f16
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7860
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            # serve.py listens on $PORT (default 7860). Pin it so the
            # containerPort / Service targetPort below match the real listener.
            - name: PORT
              value: "7860"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
# Service name szl-killinchu (NOT killinchu) so the UDS bundle/test path deploys
# the same Service the live chart path (charts/killinchu) and prod cluster use.
# This keeps the UDS Package expose (service: szl-killinchu) non-dangling whether
# killinchu is brought up via the Zarf bundle (test) or the Helm chart (prod).
kind: Service
metadata:
  name: szl-killinchu
  namespace: szl-killinchu
  labels:
    app: killinchu
    app.kubernetes.io/name: killinchu
spec:
  selector:
    app: killinchu
  ports:
    - name: http
      port: 7860
      targetPort: 7860
      protocol: TCP
