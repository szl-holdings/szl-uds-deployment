#
# zarf.yaml — szl-killinchu (MESH-READY profile, two flavors: upstream + unicorn)
# =============================================================================
# Packaging pattern adopted from zarf-dev/zarf (Apache-2.0). Original SZL work.
#
# DIGEST HONESTY (re-probed against GHCR 2026-06; anonymous token + manifest HEAD):
#   VERIFIED-LIVE (HTTP 200):
#     ghcr.io/szl-holdings/killinchu:uds-v0.2.0
#       @sha256:f6fd13ed28c65a195fd96369861adb2bba9ec2d1717ea494442fc0a79e5d6f85
#   NOT-YET-PUBLISHED (HTTP 404 -> 'verify before deploy'):
#     ghcr.io/szl-holdings/killinchu:0.5.0-wolfi  (404)  <- unicorn flavor target
#     ghcr.io/szl-holdings/killinchu-relay:0.5.0  (404)
#   NOTE: tag killinchu:0.5.0 resolves to the killinchu-BUNDLE digest
#     (sha256:e59921...), i.e. it is NOT a real organ image tag — do not wire to it.
#   The upstream flavor pins the VERIFIED uds-v0.2.0 organ image so the package
#   is buildable/deployable today.
#
# Build (CI):  uds zarf package create packages/killinchu -f zarf-mesh-ready.yaml \
#                --set DOMAIN=uds.dev -a amd64 --confirm --flavor upstream
#
# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: szl-killinchu
  description: "SZL Killinchu — Maritime + Drone C2. UDS Package for uds-core mesh deployment."
  version: "0.5.0-uds.0"
  url: https://github.com/szl-holdings/killinchu
  image: ghcr.io/szl-holdings/killinchu:uds-v0.2.0
  authors: SZL Holdings Platform Team
  documentation: https://github.com/szl-holdings/szl-uds-deployment

variables:
  - name: DOMAIN
    description: "Base domain for Istio VirtualService hosts (must match UDS Core DOMAIN)"
    default: uds.dev
  - name: A11OY_API_ENDPOINT
    description: "A11oy governed-run API endpoint for receipt gate"
    default: "http://a11oy.a11oy.svc.cluster.local:7860"

components:
  # ── upstream flavor: VERIFIED-LIVE public GHCR image (uds-v0.2.0) ───────────
  - name: killinchu
    required: true
    description: "Deploy killinchu with upstream images (VERIFIED-LIVE uds-v0.2.0 organ image)"
    only:
      flavor: upstream
    manifests:
      - name: szl-killinchu-uds-package
        namespace: killinchu
        files:
          - uds-package-mesh-ready.yaml
      - name: szl-killinchu-workload
        namespace: killinchu
        files:
          - manifests/namespace.yaml
          - manifests/deployment.yaml
    images:
      # VERIFIED-LIVE on GHCR (HTTP 200). Digest pinned for supply-chain integrity.
      - ghcr.io/szl-holdings/killinchu:uds-v0.2.0@sha256:dafe4a4d1f881d95ee3890f51fc3a5c13b7f3ad422b511de1b17b4171b690a9b
    actions:
      onDeploy:
        after:
          - description: "Wait for killinchu Deployment to be Available"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: killinchu
                namespace: killinchu
                condition: Available

  # ── unicorn flavor: minimal CVE baseline (Chainguard/Wolfi) ─────────────────
  # verify before deploy: ghcr.io/szl-holdings/killinchu:0.5.0-wolfi NOT yet published (404).
  - name: killinchu
    required: true
    description: "Deploy killinchu with unicorn images (Wolfi/Chainguard) — verify before deploy"
    only:
      flavor: unicorn
    manifests:
      - name: szl-killinchu-uds-package
        namespace: killinchu
        files:
          - uds-package-mesh-ready.yaml
      - name: szl-killinchu-workload
        namespace: killinchu
        files:
          - manifests/namespace.yaml
          - manifests/deployment.yaml
    images:
      # verify before deploy — Wolfi/Chainguard image not yet published to GHCR.
      - ghcr.io/szl-holdings/killinchu:0.5.0-wolfi
    actions:
      onDeploy:
        after:
          - description: "Wait for killinchu Deployment to be Available"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: killinchu
                namespace: killinchu
                condition: Available

  # ── SBOM attestation component (ships in-bundle) ────────────────────────────
  - name: killinchu-sbom-attest
    required: false
    description: "SBOM + SLSA Build L2 provenance roadmap (organ images only; not yet earned)"
    files:
      - source: sbom/killinchu.spdx.json
        target: /zarf-sbom/killinchu.spdx.json
      - source: sbom/killinchu.cyclonedx.json
        target: /zarf-sbom/killinchu.cyclonedx.json
