---
apiVersion: v1
kind: Namespace
metadata:
  name: szl-energy-harvest
  labels:
    app.kubernetes.io/name: energy-harvest
    szl.io/component: uds-workload
    # Istio AMBIENT data plane (matches the live k3d uds-szl-demo mesh; no sidecar).
    istio.io/dataplane-mode: ambient
    # Pod Security Standards: restricted enforcement (doctrine).
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
