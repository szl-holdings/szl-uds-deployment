---
apiVersion: v1
kind: Namespace
metadata:
  name: szl-tawantin
  labels:
    app.kubernetes.io/name: tawantin
    szl.io/component: uds-workload
    # UDS Core runs Istio in AMBIENT mode (ztunnel, no per-pod sidecar/init).
    # A sidecar would add a privileged istio-init container (NET_ADMIN/NET_RAW,
    # runAsUser 0) that violates restricted PodSecurity and gets every pod in the
    # namespace rejected. Mirrors packages/a11oy + the proven szl-receipts ns.
    istio.io/dataplane-mode: ambient
    # No SSO/authservice on this fabric-overview Package, so no per-namespace
    # waypoint pod is created and full `restricted` PodSecurity can be enforced
    # (the workload pod is runAsNonRoot, seccompProfile RuntimeDefault, drop ALL).
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
