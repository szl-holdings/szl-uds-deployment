# SZL Receipts — UDS Zarf Package (packages/szl-receipts/zarf.yaml)
#
# This file is the built package reference for uds-bundle.yaml path: ./packages/szl-receipts
# It delegates to the root zarf.yaml by importing the szl-receipts package.
#
# Reference: https://docs.zarf.dev/ref/zarf-package/
kind: ZarfPackageConfig
metadata:
  name: szl-receipts
  description: "SZL Governance Receipts — DSSE-wrapped audit receipts emitted from live Kubernetes workloads"
  version: "0.3.1"
  url: "https://szlholdings.com"
  authors: "Stephen Paul Lutar JR <stephen@szlholdings.com>"
  documentation: "https://github.com/szl-holdings/szl-uds-deployment"

variables:
  - name: DOMAIN
    description: "Cluster domain (must match UDS Core DOMAIN variable)"
    default: "uds.dev"

  # NOTE (v0.3.1): the RECEIPT_HMAC_KEY variable was REMOVED. Receipts are now
  # signed with an Ed25519 key the operator provisions as the Secret
  # szl-receipts-ed25519 BEFORE deploy (see charts/szl-receipts NOTES.txt and
  # templates/secret-keypair.yaml). No signing key is baked into this package.

  - name: RECEIPTS_REPLICAS
    description: "Number of szl-receipts-server replicas"
    default: "1"

  - name: LOG_LEVEL
    description: "Log level for szl-receipts-server"
    default: "info"

components:
  - name: szl-receipts-namespace
    required: true
    description: "Create the szl-receipts namespace with required labels"
    manifests:
      - name: szl-namespace
        namespace: szl-receipts
        files:
          - ../../manifests/namespace.yaml

  - name: szl-receipts-server
    required: true
    description: "Deploy the SZL receipts MCP server and dashboard"
    only:
      flavor: upstream
    charts:
      - name: szl-receipts
        namespace: szl-receipts
        version: 0.3.1
        localPath: ../../charts/szl-receipts
        valuesFiles:
          - ../../charts/szl-receipts/values.yaml
    images:
      # v0.3.1: built OCI image (services/szl-receipts-server/Dockerfile) replaces
      # the ConfigMap-on-python:3.12-slim approach.
      - ghcr.io/szl-holdings/szl-receipts-server:uds-v0.3.1
      - docker.io/library/nginx:1.27-alpine
    actions:
      onDeploy:
        after:
          - description: "Wait for szl-receipts-server to be ready"
            maxTotalSeconds: 120
            wait:
              cluster:
                kind: Deployment
                name: szl-receipts-server
                namespace: szl-receipts
                condition: Available

  - name: szl-receipts-pepr-policy
    required: false
    description: "Deploy the SZL Pepr policy (optional — requires pepr build: cd pepr && pnpm build)"
    import:
      name: szl-receipt-policy
      path: ../../dist/pepr

  - name: szl-ui-dashboard
    required: false
    description: "NGINX-served SZL anatomy demo UI (optional — requires ui/chart)"
    charts:
      - name: szl-ui-dashboard
        namespace: szl-receipts
        version: 0.1.0
        localPath: ../../ui/chart
    images:
      - docker.io/library/nginx:1.27-alpine
