# SZL Receipts — UDS Zarf Package (packages/szl-receipts/zarf.yaml)
#
# This file is the built package reference for uds-bundle.yaml path: ./packages/szl-receipts
#
# Reference: https://docs.zarf.dev/ref/zarf-package/
# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: szl-receipts
  description: "SZL Governance Receipts — DSSE-wrapped audit receipts emitted from live Kubernetes workloads"
  version: "0.4.0"
  url: "https://szlholdings.com"
  authors: "Stephen Paul Lutar JR <stephen@szlholdings.com>"
  documentation: "https://github.com/szl-holdings/szl-uds-deployment"

variables:
  - name: DOMAIN
    description: "Cluster domain (must match UDS Core DOMAIN variable)"
    default: "uds.dev"

  # NOTE (v0.3.1): the RECEIPT_HMAC_KEY variable was REMOVED. Receipts are now
  # signed with an Ed25519 key auto-generated at first deploy (see szl-key-init
  # component below) or pre-provisioned by the operator (BYOK path).

  - name: RECEIPTS_REPLICAS
    description: "Number of szl-receipts-server replicas"
    default: "1"

  - name: LOG_LEVEL
    description: "Log level for szl-receipts-server"
    default: "info"

  # Small-server CPU posture toggle. On a ~2-vCPU node (uds-szl-demo) the shared
  # UDS-core HA admission components do not fit at their HA defaults; pin them to
  # single-replica + no-surge so a fresh deploy is born rightsized. Set to "false"
  # on multi-node / HA clusters that should keep the upstream HA defaults.
  - name: SMALL_SERVER_RIGHTSIZE
    description: "Pin shared UDS-core HA admission components (pepr-uds-core, zarf agent-hook) to single-replica + no-surge for small (~2-vCPU) nodes. Set false on HA clusters."
    default: "true"

components:
  # ── Small-server CPU posture (MUST be first) ──────────────────────────────────
  # Pin the shared UDS-core HA admission components to single-replica + no-surge so a
  # fresh `uds deploy` / `zarf package deploy` on the ~2-vCPU uds-szl-demo node comes
  # up rightsized with no Pending storm BEFORE the runtime self-heal guard
  # (/usr/local/sbin/szl-core-rightsize) ever runs. The guard remains the safety net
  # for later drift (cold restart, core helm/zarf reset-to-HA, manual scale).
  #
  # Why an action and not a values override: Pepr 1.2.0 and the zarf init agent
  # HARDCODE `replicas: 2` (and the default 25% rolling surge) directly in their
  # generated templates — there is no Helm value to set — so the only way to bake
  # this posture into the deploy artifact is a post-deploy patch. This component
  # runs after init + UDS Core (which deploy earlier in the bundle) are up, and
  # before the heavier szl-receipts workloads schedule, freeing CPU just in time.
  - name: szl-core-rightsize
    required: true
    description: "Small-server CPU posture: pin pepr-uds-core + zarf agent-hook to single-replica, no-surge (born-rightsized fresh deploy)"
    actions:
      onDeploy:
        before:
          - description: "Rightsize pepr-uds-core admission + zarf agent-hook to single-replica, no-surge"
            maxTotalSeconds: 90
            cmd: |
              set -uo pipefail
              if [ "${ZARF_VAR_SMALL_SERVER_RIGHTSIZE:-true}" != "true" ]; then
                echo "[szl-core-rightsize] SMALL_SERVER_RIGHTSIZE != true -> leaving upstream HA defaults in place"
                exit 0
              fi
              # Pin the shared UDS-core HA admission components to single-replica +
              # no-surge. Mirrors /usr/local/sbin/szl-core-rightsize. Idempotent and a
              # true no-op once conformant. A merge patch of replicas (2->1) only scales
              # the extra pod away; the remaining admission pod keeps serving, so there
              # is no webhook downtime. Strategy-aware: Recreate deploys get replicas
              # only (Recreate never surges); RollingUpdate deploys also get maxSurge=0.
              for t in pepr-system/pepr-uds-core zarf/agent-hook; do
                ns="${t%%/*}"; name="${t##*/}"
                if ! kubectl -n "$ns" get deploy "$name" >/dev/null 2>&1; then
                  echo "[szl-core-rightsize] $t not present yet, skipping"; continue
                fi
                stype="$(kubectl -n "$ns" get deploy "$name" -o jsonpath='{.spec.strategy.type}' 2>/dev/null)"
                if [ "$stype" = "Recreate" ]; then
                  kubectl -n "$ns" patch deploy "$name" --type=merge \
                    -p '{"spec":{"replicas":1}}'
                else
                  kubectl -n "$ns" patch deploy "$name" --type=merge \
                    -p '{"spec":{"replicas":1,"strategy":{"rollingUpdate":{"maxSurge":0,"maxUnavailable":1}}}}'
                fi
                echo "[szl-core-rightsize] $t -> replicas=1, no-surge (was strategy=${stype:-RollingUpdate})"
              done

  # ── UDS Exemption (MUST be first) ─────────────────────────────────────────────
  # The Ed25519 keygen hook (szl-key-init) must run as root (uid 0) to `apk add`
  # openssl + install kubectl. UDS Core's pepr-uds-core admission webhook enforces
  # non-root cluster-wide on application namespaces, so without this Exemption the
  # keygen Job pod is DENIED ("Pod level securityContext does not meet the non-root
  # user requirement") and the server comes up UNSIGNED. The Exemption is scoped to
  # RequireNonRootUser only and matched tightly to the keygen pod in szl-receipts.
  - name: szl-key-init-exemption
    required: true
    description: "UDS Exemption: allow the root Ed25519 keygen hook (RequireNonRootUser only)"
    manifests:
      - name: szl-key-init-exemption
        namespace: uds-policy-exemptions
        files:
          - ../../manifests/key-init-exemption.yaml

  # ── Namespace (before key-init) ───────────────────────────────────────────────
  # Create the szl-receipts namespace before the key-init hook runs, so the
  # auto-generated Ed25519 Secret and its RBAC land in the same namespace as the
  # receipts-server Deployment that mounts it (Secrets are namespace-local).
  - name: szl-receipts-namespace
    required: true
    description: "Create the szl-receipts namespace with required labels"
    manifests:
      - name: szl-namespace
        namespace: szl-receipts
        files:
          - ../../manifests/namespace.yaml

  # ── Ed25519 key auto-generation (runs before deploy via Helm pre-install hook) ──
  # On first `uds deploy`, a Helm pre-install hook Job generates an Ed25519 keypair
  # in the szl-receipts namespace as Secret szl-receipts-ed25519 (key file
  # ed25519.pem — the exact name the receipts-server Deployment mounts). Idempotent
  # (BYOK): if the Secret already exists the Job exits clean without touching it.
  # Doctrine v11 LOCKED 749/14/163 at kernel commit c7c0ba17
  - name: szl-key-init
    required: true
    description: "Helm pre-install hook: auto-generate Ed25519 signing key on first deploy"
    charts:
      - name: szl-key-init
        namespace: szl-receipts
        version: 0.1.0
        localPath: ../../charts/szl-key-init
        valuesFiles:
          - ../../charts/szl-key-init/values.yaml
    images:
      # alpine:3.21 used in the keygen Job (replaces cgr.dev/chainguard/openssl — no public auth)
      - docker.io/library/alpine:3.21

  # ── Persistent Vault for Tier-2 key custody (OPTIONAL) ──────────────────
  # OPT-IN (required: false): a default \`uds deploy\` / \`zarf package deploy --confirm\`
  # SKIPS this component, so the airgap file-backend clean-deploy demo is unchanged.
  # Select it for the managed-KMS (signing.backend=vault) posture:
  #   zarf package deploy <pkg> --components szl-vault-persistent --confirm
  # It creates the \`vault\` namespace and applies the persistent Vault (file-storage
  # PVC + Shamir unseal + system:auth-delegator for Kubernetes auth), REPLACING the
  # previous ad-hoc \`kubectl apply -f k8s/vault/vault-persistent.yaml\`. Vault is pulled
  # from its upstream image (the \`vault\` namespace carries zarf.dev/agent: ignore, so
  # the Zarf mutating webhook does not rewrite it) — matching the live deployment.
  #
  # Vault still needs a ONE-TIME manual init/unseal + scripts/setup-vault-transit.sh
  # (file storage cannot auto-unseal), and the receipts chart must then be deployed
  # with charts/szl-receipts/values-vault.yaml to flip the server to backend=vault.
  # Full runbook: docs/operations/VAULT_PERSISTENT_RUNBOOK.md.
  - name: szl-vault-persistent
    required: false
    description: "OPTIONAL Tier-2 custody: persistent HashiCorp Vault (Transit KMS) + namespace"
    manifests:
      - name: vault-persistent
        files:
          - ../../manifests/vault-namespace.yaml
          - ../../k8s/vault/vault-persistent.yaml

  - name: szl-receipts-server
    required: true
    description: "Deploy the SZL receipts MCP server and dashboard"
    only:
      flavor: upstream
    charts:
      - name: szl-receipts
        namespace: szl-receipts
        version: 0.4.0
        localPath: ../../charts/szl-receipts
        valuesFiles:
          - ../../charts/szl-receipts/values.yaml
    images:
      # v0.4.1: built OCI image (services/szl-receipts-server/Dockerfile)
      - ghcr.io/szl-holdings/szl-receipts-server:uds-v0.4.1@sha256:758052db66fd6257e4ac6b9834918df25dc819097beb387062b9e54e6cd8f0f4
      - docker.io/library/nginx:1.27-alpine@sha256:62223d644fa234c3a1cc785ee14242ec47a77364226f1c811d2f669f96dc2ac8
    actions:
      onDeploy:
        after:
          - description: "Wait for szl-receipts-server to be ready"
            maxTotalSeconds: 120
            wait:
              cluster:
                kind: Deployment
                name: szl-receipts-server
                namespace: szl-receipts
                condition: Available

  # szl-receipts-pepr-policy and szl-ui-dashboard are NOT included in this package
  # because their dependencies (dist/pepr build, ui/chart) are not available in CI.
  # They are documented in charts/ and pepr/ for local/production deployment.
