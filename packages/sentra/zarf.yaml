#
# zarf.yaml — szl-sentra (UDS-bundle member package)
#
# Zarf v0.77.0-compliant package. Wraps the LIVE, already-published and
# cosign-signed container image:
#     ghcr.io/szl-holdings/sentra:###ZARF_PKG_TMPL_VERSION###
# (tag uds-v0.2.0 confirmed live on ghcr.io with a cosign .sig present).
#
# Build (CI):
#   zarf package create packages/sentra \
#     --set VERSION=0.2.0 --architecture amd64 --confirm
#
# This package is composed into oci://ghcr.io/szl-holdings/szl-uds-bundle:uds-v0.2.0
# by bundles/szl-uds-bundle/uds-bundle.yaml via a local path reference.
#
# References:
#   Zarf schema: https://docs.zarf.dev/ref/zarf-package/
#   UDS Operator: https://uds.defenseunicorns.com/reference/uds-core/overview/
#   sentra repo: https://github.com/szl-holdings/sentra

# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig

metadata:
  name: szl-sentra
  version: "###ZARF_PKG_TMPL_VERSION###"
  description: >-
    SZL sentra — cyber-resilience runtime: fail-closed asset-scoped Safety Gate (Sentra-V1, NIST CSF 2.0 + D3FEND) and L7 forecast engine.
  url: "https://szlholdings.com"
  authors: "SZL Holdings <eng@szlholdings.com>"
  documentation: "https://github.com/szl-holdings/szl-uds-deployment"
  image: "ghcr.io/szl-holdings/sentra:uds-v0.2.0@sha256:60a0efc14366ba392bfe3f3cd4196863fe148bb87a17428be6a57f0a05ac3639"
  uncompressed: false

variables:
  - name: VERSION
    description: "Image tag / package version (injected from the release tag, 'v'/'uds-' stripped)"
    default: "0.2.0"
  - name: DOMAIN
    description: "Cluster domain — must match UDS Core DOMAIN"
    default: "uds.dev"
  - name: REPLICAS
    description: "sentra replica count"
    default: "1"

components:
  # 1. Namespace + UDS Operator Package CR (Istio/NetworkPolicy/SSO/ServiceMonitor)
  - name: szl-sentra-operator
    required: true
    description: >-
      Create the szl-sentra namespace and apply the UDS Operator Package CR that
      generates Istio sidecar config, NetworkPolicies, SSO client and the
      ServiceMonitor for sentra.
    manifests:
      - name: szl-sentra-namespace
        namespace: szl-sentra
        files:
          - manifests/namespace.yaml
      - name: szl-sentra-uds-package
        namespace: szl-sentra
        files:
          - ../sentra/uds-package.yaml

  # 2. The sentra workload itself (pulls the live signed image)
  - name: szl-sentra-workload
    required: true
    description: >-
      Deploy the sentra workload from the live signed image
      ghcr.io/szl-holdings/sentra:###ZARF_PKG_TMPL_VERSION###.
    images:
      - ghcr.io/szl-holdings/sentra:uds-v0.2.0@sha256:60a0efc14366ba392bfe3f3cd4196863fe148bb87a17428be6a57f0a05ac3639
    manifests:
      - name: szl-sentra-workload
        namespace: szl-sentra
        files:
          - manifests/deployment.yaml
    actions:
      onDeploy:
        after:
          - description: "Wait for sentra Deployment to be Available"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: sentra
                namespace: szl-sentra
                condition: Available
