# UDS Package CR — sentra (immune system; HUKLLA tripwires + SENTRA egress inspector)
#
# sentra is the immune system. Per the matrix it may EGRESS to ANY module
# (rosie/a11oy/amaru/vessels) for inspection, and receives ingress from a11oy
# (delegated verdicts). It also owns the cluster egress-inspection role, so it is
# the one module granted broad egress to the other namespaces.
#
# UDS Package CR (v1alpha1) reference for every field:
#   https://uds.defenseunicorns.com/reference/configuration/custom-resources/packages-v1alpha1-cr/
#   (sso fields / network.allow fields / monitor fields sections)
# remoteNamespace: "*" semantics ("Use * or empty string to allow all namespaces")
#   documented on the same page under network.allow fields.
# UDS Operator generation: https://uds.defenseunicorns.com/reference/uds-core/overview/
---
apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: sentra
  namespace: szl-sentra
  labels:
    app.kubernetes.io/name: sentra
    szl.io/component: uds-package
    szl.io/mesh-version: v0.4.0
  annotations:
    szl.io/role: "immune system (sentra.szl-sentra.svc.cluster.local:8080)"
    szl.io/image-status: "PUBLISHED + cosign-signed — ghcr.io/szl-holdings/sentra:uds-v0.2.0@sha256:60a0efc14366ba392bfe3f3cd4196863fe148bb87a17428be6a57f0a05ac3639 (.sig + .att SLSA attestation present in GHCR; FA-001 resolved)"
spec:
  sso:
    - name: SZL sentra Immune
      clientId: szl-sentra
      standardFlowEnabled: false
      serviceAccountsEnabled: true
      enabled: true

  network:
    # serviceMesh.mode: sidecar — our mesh relies on Istio sidecar
    # AuthorizationPolicies (mesh/authpolicies/*) and strict PeerAuthentication
    # (mesh/peerauth/peerauthentication-strict.yaml), which require sidecar mode.
    # The v1alpha1 CRD defaults to ambient; we set it explicitly.
    # (CRD: defenseunicorns/uds-core@v1.5.0/schemas/package-v1alpha1.schema.json,
    #  ServiceMesh.mode enum [sidecar, ambient]. Declared-explicitly idiom from
    #  uds-packages/reference-package/chart/templates/uds-package.yaml.)
    serviceMesh:
      mode: sidecar
    allow:
      - direction: Egress
        selector:
          app: sentra
        remoteGenerated: KubeAPI
        description: "Kubernetes API / DNS resolution"
      # sentra -> ANY SZL module : ALLOW (immune system may inspect all traffic).
      # Scoped to the SZL module namespaces explicitly to avoid a cluster-wide
      # wildcard; one rule per target keeps the generated NetworkPolicy auditable.
      - direction: Egress
        selector:
          app: sentra
        remoteNamespace: szl-a11oy
        remoteSelector:
          app: a11oy
        port: 8080
        description: "sentra inspects / returns verdicts to a11oy"
      - direction: Egress
        selector:
          app: sentra
        remoteNamespace: szl-amaru
        remoteSelector:
          app: amaru
        port: 8080
        description: "sentra inspects amaru"
      - direction: Egress
        selector:
          app: sentra
        remoteNamespace: szl-vessels
        remoteSelector:
          app: vessels
        port: 8080
        description: "sentra inspects vessels"
      - direction: Egress
        selector:
          app: sentra
        remoteNamespace: szl-rosie
        remoteSelector:
          app: rosie
        port: 7860
        description: "sentra inspects rosie operator surface"
      # sentra -> szl-receipts : ALLOW (egress accept/deny receipt emission)
      - direction: Egress
        selector:
          app: sentra
        remoteNamespace: szl-receipts
        remoteSelector:
          app: szl-receipts-server
        port: 8080
        description: "sentra emits egress accept/deny receipts to the chain authority"
      # a11oy -> sentra : ALLOW (delegated security checks)
      - direction: Ingress
        selector:
          app: sentra
        remoteNamespace: szl-a11oy
        remoteSelector:
          app: a11oy
        port: 8080
        description: "a11oy delegates security checks to sentra"

  monitor:
    - portName: metrics
      selector:
        app: sentra
      targetPort: 8080
      path: /metrics
      kind: ServiceMonitor
      description: "sentra immune metrics scrape"
