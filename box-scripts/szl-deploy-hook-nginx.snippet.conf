# szl-deploy-hook — token-gated remote-deploy webhook for a-11-oy.com. Included
# from the a-11-oy.com 443 server block, ABOVE `location /`. Proxies the deploy
# trigger/status POST/GET to the loopback hook, which runs `a11oy-rebuild` and
# reports status. install.sh wires this in idempotently (same mechanism as the
# szl-alert-relay snippet).
#
# Wire it once into /etc/nginx/sites-available/a11oy by adding, just before
# `location / {`:
#     include /etc/nginx/snippets/szl-deploy-hook.conf;
#
# Safe to expose publicly: the hook validates an unguessable token in the path
# (/deploy/rebuild/<token>, /deploy/status/<token>), so a wrong/absent token
# gets a 404 and the token is never echoed. /deploy/health needs no token.
# proxy_read_timeout is generous because a trigger returns 202 immediately, but
# the loopback hop should never stall the front door.
location ^~ /deploy/ {
    proxy_pass http://127.0.0.1:9110;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 40s;
    proxy_buffering off;
}
