# Authelia config TEMPLATE for the /uds/ dashboard SSO (no secrets).
# This is the file install-authelia-sso.sh writes to /opt/authelia/configuration.yml.
# Secrets (session / storage-encryption / reset-password JWT) are NOT here — they are
# generated by the installer into /opt/authelia/secrets/{session,storage,jwt} and fed in
# via AUTHELIA_*_FILE env vars. Users (argon2 hashes) live in users_database.yml (box-only).
theme: dark
server:
  address: 'tcp://0.0.0.0:9091/authelia'
log:
  level: info
totp:
  issuer: a-11-oy.com
authentication_backend:
  password_reset:
    disable: true
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2
access_control:
  default_policy: deny
  rules:
    - domain: 'a-11-oy.com'
      resources: ['^/uds(/.*)?$']
      policy: one_factor
session:
  cookies:
    - name: authelia_session
      domain: 'a-11-oy.com'
      authelia_url: 'https://a-11-oy.com/authelia'
      expiration: '12 hours'
      inactivity: '1 hour'
regulation:
  max_retries: 5
  find_time: '2 minutes'
  ban_time: '5 minutes'
storage:
  local:
    path: /config/db.sqlite3
notifier:
  filesystem:
    filename: /config/notification.txt
