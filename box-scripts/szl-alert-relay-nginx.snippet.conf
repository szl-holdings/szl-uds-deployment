# szl-alert-relay — clean-text alert relay (Task: receipt-failure alerts read as
# clean text, not raw JSON). Included from the a-11-oy.com 443 server block, ABOVE
# `location /`. Proxies the Slack-format webhook POST to the loopback relay,
# which extracts `.text` and republishes it as a clean ntfy page.
#
# Wire it once into /etc/nginx/sites-available/a11oy (install.sh does this
# idempotently) by adding, just before `location / {`:
#     include /etc/nginx/snippets/szl-alert-relay.conf;
#
# The relay validates an unguessable token in the path (/relay/ntfy/<token>),
# so this can be exposed publicly: a wrong/absent token gets a 404.
location ^~ /relay/ {
    proxy_pass http://127.0.0.1:9099;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 40s;
    proxy_buffering off;
}
