# AUTHELIA-SSO-PATCH — nginx snippet that gates the /uds/ dashboard behind Authelia.
#
# install-authelia-sso.sh injects these three location blocks AUTOMATICALLY and
# idempotently (marker-guarded) into the a11oy.net HTTPS server block, then runs
# `nginx -t && systemctl reload nginx`. You do NOT need to paste them by hand —
# this file is the source of truth the installer reads, and is kept here as a
# human-readable reference. (To inject manually anyway, paste the three location
# blocks below inside the HTTPS `server { ... }` block of
# /etc/nginx/sites-available/a11oy and reload nginx.)
#
# This REPLACES the old shared basic-auth on /uds/ (auth_basic +
# /etc/nginx/.htpasswd-uds, now retired). The `proxy_set_header Authorization "";`
# line in the /uds/ block is REQUIRED regardless of SSO: Headlamp would otherwise
# forward nginx's auth header to the kube API, which 401s every cluster call.
# Authelia gating is layered ON TOP of that strip, not a replacement for it.
#
# Upstreams referenced: Authelia at 127.0.0.1:9091 (subpath /authelia),
# Headlamp/UDS dashboard at 127.0.0.1:7863.

    # AUTHELIA-SSO-PATCH portal (subpath /authelia)
    location ^~ /authelia {
        proxy_pass http://127.0.0.1:9091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Uri $request_uri;
    }

    # AUTHELIA-SSO-PATCH internal verify endpoint
    location = /internal/authelia/authz {
        internal;
        proxy_pass http://127.0.0.1:9091/authelia/api/authz/auth-request;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-Method $request_method;
        proxy_set_header X-Original-URL $scheme://$http_host$request_uri;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # UDS-DASHBOARD-LOCATION (AUTHELIA-SSO-PATCH: per-user SSO replaces basic-auth)
    location /uds/ {
        auth_request /internal/authelia/authz;
        auth_request_set $redirection_url $upstream_http_location;
        auth_request_set $user $upstream_http_remote_user;
        auth_request_set $groups $upstream_http_remote_groups;
        auth_request_set $name $upstream_http_remote_name;
        auth_request_set $email $upstream_http_remote_email;
        error_page 401 =302 $redirection_url;

        proxy_set_header Remote-User $user;
        proxy_set_header Remote-Groups $groups;
        proxy_set_header Remote-Name $name;
        proxy_set_header Remote-Email $email;

        proxy_set_header Authorization "";
        proxy_pass http://127.0.0.1:7863;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }
