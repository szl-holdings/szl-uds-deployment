# DEPLOY-TIME VERIFICATION ONLY: lula validate must run against a live UDS Core
# cluster (the K8s resource queries below return nothing offline). The OSCAL
# document + Rego are validated here for structure/syntax; the control PASS/FAIL
# verdicts can only be earned on the live Hetzner/tower cluster.

component-definition:
  uuid: d070db48-5d8a-420e-9cae-b77fc8f18e27
  metadata:
    title: SZL A11oy Governed-AI Decision Substrate — Compliance Component
    last-modified: "2026-06-06T13:55:00Z"
    version: "0.5.0"
    oscal-version: "1.1.2"
    remarks: >-
      This component definition expresses a11oy's security controls as machine-checkable
      OSCAL assessments using lula1 (Apache-2.0). Controls map to NIST SP 800-53 Rev 5.
      Honest status: REAL = Kubernetes resource query + Rego evaluation on live cluster.
      ROADMAP = requires additional infrastructure (marked inline).
      Lambda = Conjecture 1 (not a theorem). Doctrine v11 LOCKED.
    parties:
      - uuid: bea51b9b-3414-42b9-ac61-d405406f84f2
        type: organization
        name: SZL Holdings
        links:
          - href: https://github.com/szl-holdings
            rel: website

  components:
    # ── Component 1: Pepr Receipt Gate Admission Control ─────────────────────
    - uuid: f20f26f3-9050-4f4a-97cd-de305ecb7452
      type: software
      title: A11oy Pepr Receipt Gate
      description: |
        Pepr ValidatingWebhook (Apache-2.0, szl-holdings/szl-pepr-governance) that
        enforces SZL receipt annotation presence on all Pods in the a11oy namespace.
        REAL: annotation format validation. ROADMAP: full DSSE cryptographic verify.
      purpose: Enforce DSSE receipt annotation gate at Kubernetes admission time
      responsible-roles:
        - role-id: provider
          party-uuids:
            - bea51b9b-3414-42b9-ac61-d405406f84f2
      control-implementations:
        - uuid: acadb643-b2d7-4dd2-aac0-fa6dc033c02d
          source: https://raw.githubusercontent.com/usnistgov/oscal-content/master/nist.gov/SP800-53/rev5/json/NIST_SP-800-53_rev5_catalog.json
          description: >-
            Controls implemented by the Pepr receipt gate admission webhook.
          implemented-requirements:
            # ── SI-7: Software + Information Integrity ──────────────────────
            - uuid: 12c43c40-1a78-4706-9678-06be4547f911
              control-id: si-7
              description: >-
                REAL: Validates that every Pod admitted to the a11oy namespace
                carries the szl.io/receipt annotation in the required v1:<sha256>:<sig> format.
                Denies admission if absent or malformed, preventing unsigned workloads
                from running in the governed namespace.
                ROADMAP: Full DSSE envelope signature verification (P1).
              links:
                - href: "#45af94a7-2aad-4e41-b397-7d28f8906e25"
                  rel: lula

            # ── AC-7: Unsuccessful Logon Attempts / Admission Enforcement ───
            - uuid: 28ef0e12-dfbd-4167-abd3-8929d47d7639
              control-id: ac-7
              description: >-
                REAL: Pepr webhook enforces receipt gate on every Pod admission event.
                Denials are logged to Pepr controller stdout (Loki-ingested).
                ROADMAP: Denial counter published as Prometheus metric szl_a11oy_gate_denials_total.
              links:
                - href: "#45af94a7-2aad-4e41-b397-7d28f8906e25"
                  rel: lula

    # ── Component 2: Append-Only Receipt Ledger ───────────────────────────────
    - uuid: 9af29d99-08ae-44bb-a142-160187f7dd8e
      type: software
      title: A11oy Append-Only Receipt Ledger
      description: |
        PostgreSQL-backed append-only receipt ledger. Receipts are written on governed-run
        completion; no update/delete operations are permitted at the application layer.
        Enforced by application code + DB role grants (INSERT-only role for writer).
      purpose: Provide tamper-evident audit log of all DSSE receipt events
      responsible-roles:
        - role-id: provider
          party-uuids:
            - bea51b9b-3414-42b9-ac61-d405406f84f2
      control-implementations:
        - uuid: 975bfdea-2742-4ffe-96aa-bddbe9f8272b
          source: https://raw.githubusercontent.com/usnistgov/oscal-content/master/nist.gov/SP800-53/rev5/json/NIST_SP-800-53_rev5_catalog.json
          description: >-
            Controls implemented by the append-only receipt ledger.
          implemented-requirements:
            # ── AU-9: Protection of Audit Information ───────────────────────
            - uuid: 25b96cc9-178a-4a80-a2fa-30951bb73dcb
              control-id: au-9
              description: >-
                REAL: Kubernetes Secret audit-db-credentials exists in a11oy namespace,
                populated by UDS Operator from SSO client. DB writer role has INSERT-only
                grant on receipts table (enforced by Postgres GRANT, verifiable via pg_roles).
                ROADMAP: WAL-based tamper detection + SLSA L3 bundle attestation on ledger.
              links:
                - href: "#ad882348-a6fb-4bcc-ad3b-8c989a5e38b0"
                  rel: lula

            # ── AU-3: Audit Record Content ───────────────────────────────────
            - uuid: 7da575ff-0dc8-4a9d-b38b-9efa09df5be2
              control-id: au-3
              description: >-
                REAL: Every receipt row in the ledger contains: receipt_id (UUID),
                payload_sha256 (64-char hex), dsse_signature (base64url), created_at
                (timestamptz, server-set, NOT NULL), pod_name, namespace, governed_by.
                Schema enforced at DB level (NOT NULL constraints).
              links:
                - href: "#135f8faf-a742-42f9-9757-72333b80530c"
                  rel: lula

    # ── Component 3: Conjunctive Gate (Λ-gate) ────────────────────────────────
    - uuid: 05150f3c-cc4c-4c6a-9a7c-3a027fa63a72
      type: software
      title: A11oy Conjunctive Lambda-Gate (Agentic P1-P6)
      description: |
        The a11oy conjunctive gate (Lambda) requires ALL of: P1 structure-valid,
        P2 tone-safe, P3 evidence-present, P4 lineage-traceable, P5 policy-clear,
        P6 human-confirmed before issuing a signed DSSE receipt. A single failing
        sub-gate blocks the entire gate. Lambda = Conjecture 1 (empirically CI-green on
        main @ 958c09f9; not a mathematical theorem).
      purpose: Ensure all 6 agentic conditions are met before a governed action is signed
      responsible-roles:
        - role-id: provider
          party-uuids:
            - bea51b9b-3414-42b9-ac61-d405406f84f2
      control-implementations:
        - uuid: 98208581-85c7-44fd-a4eb-5aeb463b3299
          source: https://raw.githubusercontent.com/usnistgov/oscal-content/master/nist.gov/SP800-53/rev5/json/NIST_SP-800-53_rev5_catalog.json
          description: >-
            Controls implemented by the conjunctive Lambda-gate.
          implemented-requirements:
            # ── SA-17: Developer Security Testing + Evaluation ───────────────
            - uuid: 743ee1cb-dc89-4c23-9ca8-de4cba5d2cea
              control-id: sa-17
              description: >-
                REAL: ConfigMap szl-a11oy-gate-config in a11oy namespace exists and
                contains all 6 gate keys (p1_enabled=true ... p6_enabled=true).
                This is machine-checkable evidence that the gate is deployed and configured.
                REAL: CI pipeline enforces all P1-P6 tests pass before image publish (CI-green
                on main @ 958c09f9). ROADMAP: Pepr mutation adds gate-score annotation to
                receipts; OSCAL assessment validates score >= threshold.
              links:
                - href: "#4536e82b-b0a5-4ca4-969b-845c8e90ca1a"
                  rel: lula

  back-matter:
    resources:
      # ── LULA VALIDATION 1: Pepr gate webhook deployed ─────────────────────
      - uuid: 45af94a7-2aad-4e41-b397-7d28f8906e25
        title: "Lula: Pepr receipt gate webhook is deployed and active"
        rlinks:
          - href: lula.dev
        description: >-
          domain:
            type: kubernetes
            kubernetes-spec:
              resources:
                - name: peprwebhooks
                  resource-rule:
                    group: admissionregistration.k8s.io
                    version: v1
                    resource: validatingwebhookconfigurations
                    namespaces: []
                - name: peprpods
                  resource-rule:
                    group: ""
                    version: v1
                    resource: pods
                    namespaces: ["pepr-system"]
                    field:
                      jsonpath: .status.phase
                      type: string
          provider:
            type: opa
            opa-spec:
              rego: |
                package validate

                import future.keywords.every
                import future.keywords.in

                # REAL: Validates that the SZL Pepr governance webhook exists
                # and the pepr-system pod is Running.
                validate {
                  some webhook in input.peprwebhooks
                  contains(webhook.metadata.name, "szl-pepr-governance")
                  count(input.peprpods) > 0
                  every pod in input.peprpods {
                    pod.status.phase == "Running"
                  }
                }

      # ── LULA VALIDATION 2: Ledger DB secret exists ────────────────────────
      - uuid: ad882348-a6fb-4bcc-ad3b-8c989a5e38b0
        title: "Lula: Ledger DB credentials secret exists in a11oy namespace"
        rlinks:
          - href: lula.dev
        description: >-
          domain:
            type: kubernetes
            kubernetes-spec:
              resources:
                - name: secrets
                  resource-rule:
                    group: ""
                    version: v1
                    resource: secrets
                    namespaces: ["a11oy"]
          provider:
            type: opa
            opa-spec:
              rego: |
                package validate

                import future.keywords.in

                # REAL: Validates that the audit-db-credentials secret exists.
                # NOTE: Rego cannot read secret data (base64 values) without explicit
                # permissions; this validates existence only.
                validate {
                  some secret in input.secrets
                  secret.metadata.name == "audit-db-credentials"
                  secret.metadata.namespace == "a11oy"
                }

      # ── LULA VALIDATION 3: Ledger schema ConfigMap exists ─────────────────
      - uuid: 135f8faf-a742-42f9-9757-72333b80530c
        title: "Lula: Ledger schema ConfigMap exists with required fields declared"
        rlinks:
          - href: lula.dev
        description: >-
          domain:
            type: kubernetes
            kubernetes-spec:
              resources:
                - name: configmaps
                  resource-rule:
                    group: ""
                    version: v1
                    resource: configmaps
                    namespaces: ["a11oy"]
          provider:
            type: opa
            opa-spec:
              rego: |
                package validate

                import future.keywords.in

                required_fields := {
                  "receipt_id", "payload_sha256", "dsse_signature",
                  "created_at", "pod_name", "namespace", "governed_by"
                }

                # REAL: Validates that the ledger-schema ConfigMap documents all
                # required fields. The ConfigMap acts as a machine-readable schema
                # declaration shipped with the Helm chart.
                validate {
                  some cm in input.configmaps
                  cm.metadata.name == "a11oy-ledger-schema"
                  declared_fields := {field | cm.data[field]}
                  required_fields == declared_fields
                }

      # ── LULA VALIDATION 4: Lambda gate ConfigMap configured ───────────────
      - uuid: 4536e82b-b0a5-4ca4-969b-845c8e90ca1a
        title: "Lula: Conjunctive Lambda-gate ConfigMap exists with all 6 gates enabled"
        rlinks:
          - href: lula.dev
        description: >-
          domain:
            type: kubernetes
            kubernetes-spec:
              resources:
                - name: configmaps
                  resource-rule:
                    group: ""
                    version: v1
                    resource: configmaps
                    namespaces: ["a11oy"]
          provider:
            type: opa
            opa-spec:
              rego: |
                package validate

                import future.keywords.in
                import future.keywords.every

                gate_keys := {
                  "p1_enabled", "p2_enabled", "p3_enabled",
                  "p4_enabled", "p5_enabled", "p6_enabled"
                }

                # REAL: Validates the Lambda-gate ConfigMap exists and all 6 gate
                # keys are present and set to "true".
                # This is OSCAL-machine-checkable evidence the gate is deployed.
                validate {
                  some cm in input.configmaps
                  cm.metadata.name == "szl-a11oy-gate-config"
                  every key in gate_keys {
                    cm.data[key] == "true"
                  }
                }
