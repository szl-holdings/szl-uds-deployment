#
# Strategic merge patch: mount szl-receipts-ed25519 Secret into Pepr admission pods.
#
# The Pepr policy (pepr/policies/szl-receipt-on-deploy.ts) reads the Ed25519
# private key from /etc/szl-receipts-key/key.priv. This patch mounts the
# szl-receipts-ed25519 Secret (created by the founder via scripts/generate-receipt-key.sh)
# at that path.
#
# Secret must exist in pepr-system namespace BEFORE applying this patch:
#   kubectl create secret generic szl-receipts-ed25519 \
#     --namespace pepr-system \
#     --from-file=key.priv=ed25519.pem
#
# The volume is mounted optional: true so Pepr starts in unsigned mode if the
# Secret is absent (fail-open behavior is preserved).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: szl-receipt-policy-watcher
  namespace: pepr-system
spec:
  template:
    spec:
      containers:
        - name: server
          volumeMounts:
            - name: szl-receipts-ed25519
              mountPath: /etc/szl-receipts-key
              readOnly: true
      volumes:
        - name: szl-receipts-ed25519
          secret:
            secretName: szl-receipts-ed25519
            optional: true
            defaultMode: 0400
            items:
              - key: key.priv
                path: key.priv
