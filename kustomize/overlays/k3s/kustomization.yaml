# Kustomize overlay — k3s (lightweight single-node or small cluster)
# Sets replica count to 1 for resource-constrained k3s environments.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: szl-receipts

resources:
  - ../../base

patches:
  - path: replica-patch.yaml
    target:
      kind: Deployment
      name: szl-receipts-server
