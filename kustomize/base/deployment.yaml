apiVersion: apps/v1
kind: Deployment
metadata:
  name: szl-receipts-server
  namespace: szl-receipts
  labels:
    app.kubernetes.io/name: szl-receipts-server
    app.kubernetes.io/component: receipts
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: szl-receipts-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: szl-receipts-server
    spec:
      serviceAccountName: szl-receipts
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: szl-receipts-server
          image: docker.io/library/python:3.12-slim
          ports:
            - name: http
              containerPort: 8443
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /health
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8443
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
