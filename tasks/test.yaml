#
# Test tasks for szl-receipts UDS package.
# Referenced from tasks.yaml includes.
# R16/R17 fix: scaffold Playwright journey + upgrade tests per DU testing guidelines.
# Reference: https://github.com/defenseunicorns/uds-common/blob/main/docs/uds-packages/guidelines/testing-guidelines.md

tasks:
  - name: all
    description: "Run all journey tests (requires live cluster at RECEIPTS_HOST)"
    actions:
      - description: "Install Playwright deps"
        cmd: |
          cd tests && npm ci && npx playwright install --with-deps chromium
      - description: "Run Playwright journey tests"
        cmd: |
          cd tests && RECEIPTS_HOST="${RECEIPTS_HOST:-https://receipts.uds.dev}" \
            SSO_USER="${SSO_USER:-testuser}" \
            SSO_PASSWORD="${SSO_PASSWORD:-testpassword}" \
            npx playwright test --reporter=list

  - name: lint
    description: "Static validation: yamllint + helm lint + kubectl dry-run"
    actions:
      - description: "yamllint"
        cmd: |
          yamllint -d '{extends: default, rules: {line-length: {max: 200}, document-start: disable, truthy: disable}}' \
            $(find . -name "*.yaml" -o -name "*.yml" | grep -v node_modules | grep -v .git) 2>&1
      - description: "helm lint"
        cmd: |
          helm lint charts/szl-receipts/ --strict 2>&1
      - description: "helm template dry-run"
        cmd: |
          helm template test-release charts/szl-receipts/ > /dev/null && echo "helm template OK"
