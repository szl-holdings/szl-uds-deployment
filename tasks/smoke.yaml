#
# Cold-start smoke task for the SZL Warhacker substrate.
#
# `uds run smoke` brings a k3d cluster up from cold, deploys the szl-warhacker
# bundle (init -> uds-core -> szl-receipts [-> 5 apps when their images exist]),
# and asserts readiness honestly:
#   - szl-receipts MUST reach Available (the one end-to-end deployable add-on today).
#   - each of the 5 app namespaces is checked; if an app Deployment is absent or
#     ImagePullBackOff (FA-001: ghcr.io/szl-holdings/<app> not pushed yet) it is
#     reported as SKIPPED — NOT a pass. No fake-green (Doctrine v7 §2/§10).
#
# Requires: uds, zarf, k3d, docker, kubectl. See docs/INSTALL.md.
# Pattern attribution: cold create->cluster->deploy->verify flow mirrors
#   uds-packages/reference-package/tasks.yaml (`default` task) and
#   defenseunicorns/uds-common@v1.24.11/tasks/setup.yaml (k3d cluster setup).

variables:
  - name: CLUSTER_NAME
    default: szl-warhacker
  - name: DOMAIN
    default: uds.dev

tasks:
  - name: smoke
    description: "Cold k3d up + deploy + honest readiness check of receipts and the 5 apps"
    actions:
      - description: "Check required tools"
        cmd: |
          for tool in uds zarf k3d docker kubectl; do
            command -v "$tool" >/dev/null 2>&1 || { echo "ERROR: $tool not installed. See docs/INSTALL.md."; exit 1; }
          done
          echo "All required tools found."

      - description: "Create k3d cluster (cold)"
        cmd: |
          if k3d cluster list | grep -q "${CLUSTER_NAME}"; then
            echo "Cluster ${CLUSTER_NAME} already exists — deleting for a cold start."
            k3d cluster delete "${CLUSTER_NAME}"
          fi
          # coexist-portguard: only publish host 80/443 to the k3d loadbalancer when
          # they are free. On a host where nginx (or anything) already owns
          # 80/443 (e.g. the a11oy.net box) skip them so this cluster never
          # fights for the public site's ports — not even on a full recreate.
          # UDS services are reached via kubectl port-forward / the node IP.
          PORTGUARD=""
          for P in 80 443; do
            if ss -ltnH "sport = :$P" 2>/dev/null | grep -q .; then
              echo "Host port $P already in use — skipping it on the k3d loadbalancer (coexistence mode)."
            else
              PORTGUARD="$PORTGUARD --port $P:$P@loadbalancer"
            fi
          done
          k3d cluster create "${CLUSTER_NAME}" \
            --k3s-arg "--disable=traefik@server:0" \
            --port "8443:8443@loadbalancer" \
            $PORTGUARD \
            --wait

      - description: "Build + deploy the szl-warhacker bundle"
        cmd: |
          cd bundles/szl-warhacker
          uds create . --confirm --no-progress
          uds deploy uds-bundle-szl-warhacker-*.tar.zst \
            --set DOMAIN="${DOMAIN}" \
            --set INSECURE_ADMIN_PASSWORD_GENERATION=true \
            --confirm --no-progress

      - description: "Assert szl-receipts is Available (hard requirement)"
        cmd: |
          echo "== szl-receipts =="
          if kubectl wait --for=condition=Available deployment/szl-receipts-server \
               -n szl-receipts --timeout=180s; then
            echo "PASS: szl-receipts-server Available"
          else
            echo "FAIL: szl-receipts-server did not become Available"
            kubectl get pods -n szl-receipts -o wide || true
            exit 1
          fi

      - description: "Check the 5 apps honestly (SKIPPED if image not pushed — FA-001)"
        cmd: |
          RC=0
          for app in a11oy amaru sentra vessels rosie; do
            ns="szl-${app}"
            echo "== ${app} (${ns}) =="
            if ! kubectl get ns "${ns}" >/dev/null 2>&1; then
              echo "SKIPPED: namespace ${ns} not present (app not deployed)."
              continue
            fi
            dep=$(kubectl get deploy -n "${ns}" -o name 2>/dev/null | head -1)
            if [ -z "${dep}" ]; then
              echo "SKIPPED: no Deployment in ${ns} (FA-001: image not pushed)."
              continue
            fi
            if kubectl wait --for=condition=Available "${dep}" -n "${ns}" --timeout=120s 2>/dev/null; then
              echo "PASS: ${app} ${dep} Available"
            else
              # Distinguish image-pull (expected, SKIP) from a real failure (FAIL).
              if kubectl get pods -n "${ns}" -o jsonpath='{.items[*].status.containerStatuses[*].state.waiting.reason}' 2>/dev/null \
                   | grep -qiE "ImagePull|ErrImagePull|InvalidImageName"; then
                echo "SKIPPED: ${app} ImagePullBackOff (FA-001: ghcr.io/szl-holdings/${app} not pushed)."
              else
                echo "FAIL: ${app} ${dep} not Available for a non-image reason."
                kubectl get pods -n "${ns}" -o wide || true
                RC=1
              fi
            fi
          done
          echo "----"
          if [ "${RC}" -eq 0 ]; then
            echo "SMOKE: receipts PASS; apps PASS-or-SKIPPED (no unexpected failures)."
          else
            echo "SMOKE: at least one app failed for a non-image reason — see above."
          fi
          exit "${RC}"

      - description: "Access info"
        cmd: |
          echo "Receipts: kubectl port-forward svc/szl-receipts-server 8443:8443 -n szl-receipts"
          echo "Then:     curl -s http://localhost:8443/health"
