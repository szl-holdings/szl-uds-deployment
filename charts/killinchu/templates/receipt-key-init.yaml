#
# Receipt-key init — Helm PRE-INSTALL hook (weight -5, runs before workload).
# Generates an Ed25519 receipt-signing keypair into Secret {{ .Values.receiptKeySecret }}
# unless it already exists (BYOK path). Key material never leaves the cluster.
# Image: docker.io/library/alpine:3.21 (public; openssl via apk).
apiVersion: batch/v1
kind: Job
metadata:
  name: killinchu-receipt-key-init
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: killinchu-receipt-key-init
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.ai/doctrine-version: "v11"
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": hook-succeeded,before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: killinchu-receipt-key-init
    spec:
      serviceAccountName: killinchu-receipt-key-init
      restartPolicy: OnFailure
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keygen
          image: docker.io/library/alpine:3.21
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              SECRET="{{ .Values.receiptKeySecret }}"
              NS="{{ .Values.namespace }}"
              if kubectl -n "$NS" get secret "$SECRET" >/dev/null 2>&1; then
                echo "receipt key Secret $SECRET already present in $NS — BYOK, leaving untouched."
                exit 0
              fi
              apk add --no-cache openssl >/dev/null
              openssl genpkey -algorithm ed25519 -out /tmp/receipt.key
              openssl pkey -in /tmp/receipt.key -pubout -out /tmp/receipt.pub
              kubectl -n "$NS" create secret generic "$SECRET" \
                --from-file=ed25519.key=/tmp/receipt.key \
                --from-file=ed25519.pub=/tmp/receipt.pub
              echo "created receipt-signing Secret $SECRET in $NS"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: killinchu-receipt-key-init
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: killinchu-receipt-key-init
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: killinchu-receipt-key-init
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: killinchu-receipt-key-init
subjects:
  - kind: ServiceAccount
    name: killinchu-receipt-key-init
    namespace: {{ .Values.namespace }}
