# AMBIENT mesh: NO sidecar.istio.io/inject annotation (forbidden by the
# pepr-uds-core webhook in ambient mode). The container listens on
# .Values.service.targetPort.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: killinchu
  namespace: {{ .Values.namespace }}
  labels:
    app: killinchu
    app.kubernetes.io/name: killinchu
    app.kubernetes.io/part-of: szl-uds-mesh
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: killinchu
  template:
    metadata:
      labels:
        app: killinchu
    spec:
      # killinchu serves HTTP only; it makes no in-cluster Kubernetes API calls,
      # so its SA token is never needed in the pod. Dropping the automount keeps
      # a stolen-token blast radius at zero and matches the hardened raw-manifest
      # path (packages/killinchu/manifests/deployment.yaml).
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
        seccompProfile:
          type: {{ .Values.securityContext.seccompProfile.type }}
      containers:
        - name: killinchu
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}{{ if .Values.image.digest }}@{{ .Values.image.digest }}{{ end }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
              name: http
          envFrom:
            - configMapRef:
                name: killinchu-doctrine
          volumeMounts:
            # readOnlyRootFilesystem is true, so give the app a writable scratch
            # dir at /tmp (parity with the raw-manifest deploy path).
            - name: tmp
              mountPath: /tmp
            - name: receipt-key
              mountPath: /etc/szl/receipt-key
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ .Values.securityContext.capabilities.drop | toYaml | nindent 16 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthPath }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{ .Values.resources | toYaml | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: receipt-key
          secret:
            secretName: {{ .Values.receiptKeySecret }}
            optional: true
