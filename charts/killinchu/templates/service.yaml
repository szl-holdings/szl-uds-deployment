# Service for killinchu — Istio sidecar provides STRICT mTLS (UDS Operator managed).
apiVersion: v1
kind: Service
metadata:
  name: szl-killinchu
  namespace: {{ .Values.namespace }}
  labels:
    app: killinchu
    app.kubernetes.io/name: killinchu
spec:
  selector:
    app: killinchu
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
