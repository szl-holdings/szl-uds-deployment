# STRICT mTLS for the killinchu workload (Istio PeerAuthentication).
{{- if .Values.istio.strictMtls }}
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: killinchu-strict-mtls
  namespace: {{ .Values.namespace }}
spec:
  selector:
    matchLabels:
      app: killinchu
  mtls:
    mode: STRICT
{{- end }}
