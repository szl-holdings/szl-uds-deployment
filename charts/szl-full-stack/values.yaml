# SZL Full Stack — Helm Umbrella Values
#
# ─────────────────────────────────────────────────────────────────
# DEPRECATED CHART — do not deploy.
# ─────────────────────────────────────────────────────────────────
# This umbrella chart is retired in favour of the UDS bundle
# bundles/szl-full-stack/uds-bundle.yaml. It previously declared organ image
# tags at `uds-v0.3.1`, which were never built or pushed (the published,
# cosign-signed organ images are uds-v0.2.0, with a11oy tag-pinned uds-v0.3.0),
# and it depended on an OCI Helm chart repo that was never published. All of
# those deployable claims have been removed. Every component below is disabled;
# the keys are retained only so the chart still renders to an inert, empty
# release and existing references do not error.
#
# To deploy the verified full stack, use the UDS bundle:
#   uds create bundles/szl-full-stack
#   uds deploy szl-full-stack-bundle-<ver>.tar.zst --confirm
# ─────────────────────────────────────────────────────────────────

global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  doctrineVersion: "v11"

# All sub-components are disabled — this chart no longer composes any organ.
# The real organ packages live under packages/<organ>/ and are composed by
# bundles/szl-full-stack/uds-bundle.yaml (verified, digest-pinned images).
szl-receipts:
  enabled: false

a11oy-runtime:
  enabled: false

sentra-gates:
  enabled: false

amaru-attestation:
  enabled: false

yupana-replay:
  enabled: false
