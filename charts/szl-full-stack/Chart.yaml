apiVersion: v2
name: szl-full-stack
description: >
  DEPRECATED — retired in favour of the UDS bundle
  bundles/szl-full-stack/uds-bundle.yaml. This Helm umbrella chart was a
  Doctrine-v6 STAGED duplicate that composed non-existent organ sub-charts
  (a11oy-runtime, sentra-gates, amaru-attestation, rosie-replay) from an OCI
  chart repo (oci://ghcr.io/szl-holdings/charts) that was never published, and
  pinned the broken uds-v0.3.1 organ images that were never built. The real,
  verified full-stack definition is the UDS bundle, whose organ members are
  referenced by local path to packages/<organ>/ (cosign-signed, digest-pinned
  uds-v0.2.0 / a11oy uds-v0.3.0). Do NOT deploy this chart; use `uds` with the
  bundle instead. See STATUS.md (What's Deprecated) and the chart README.
type: application
# Deprecation release. Helm prints a deprecation warning for deprecated: true.
version: 0.3.2
appVersion: "0.3.2"
deprecated: true

# Doctrine markers
annotations:
  szl.holdings/doctrine-version: "v11"
  szl.holdings/deprecated: "true"
  szl.holdings/deprecated-on: "2026-06-11"
  szl.holdings/superseded-by: "bundles/szl-full-stack/uds-bundle.yaml"
  szl.holdings/deprecation-reason: >-
    Duplicate full-stack definition; depended on an unpublished OCI chart repo
    and broken uds-v0.3.1 organ images. The UDS bundle is the verified path.

maintainers:
  - name: SZL Holdings Engineering
    url: https://github.com/szl-holdings

keywords:
  - szl
  - uds
  - receipts
  - governance
  - policy-gates
  - anchor-formula
  - deprecated

home: https://github.com/szl-holdings/szl-uds-deployment

sources:
  - https://github.com/szl-holdings/szl-uds-deployment
  - https://github.com/szl-holdings/a11oy
  - https://github.com/szl-holdings/sentra
  - https://github.com/szl-holdings/amaru
  - https://github.com/szl-holdings/rosie
  - https://github.com/szl-holdings/vessels
  - https://github.com/szl-holdings/uds-mesh

# Dependencies removed on deprecation. They previously pointed at
# `oci://ghcr.io/szl-holdings/charts`, an OCI Helm chart repo that was never
# published, so `helm dependency build` could never resolve them and the chart
# could not be deployed with organs. The verified organ packages live under
# packages/<organ>/ and are composed by bundles/szl-full-stack/uds-bundle.yaml.
dependencies: []
