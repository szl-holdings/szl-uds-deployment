apiVersion: v2
name: szl-full-stack
description: >
  SZL Holdings full-stack Helm chart — umbrella chart composing szl-receipts,
  a11oy-runtime, sentra-gates, amaru-attestation, and rosie-replay sub-charts.
  Doctrine v6 strict: STAGED dependencies indicate charts pending container
  push and Zarf package creation (blocked on FA-001 founder action).
type: application
version: 0.3.1
appVersion: "0.3.1"

# Doctrine markers
annotations:
  szl.holdings/doctrine-version: "v6"
  szl.holdings/staged-dependencies: "a11oy-runtime,sentra-gates,amaru-attestation,rosie-replay"
  szl.holdings/available-dependencies: "szl-receipts"
  szl.holdings/uds-catalog-status: "not-submitted"
  szl.holdings/andrew-greene-endorsement: "Option-A 2026-05-22"
  szl.holdings/warhacker-target: "2026-06-16"

maintainers:
  - name: SZL Holdings Engineering
    url: https://github.com/szl-holdings

keywords:
  - szl
  - uds
  - receipts
  - governance
  - policy-gates
  - anchor-formula

home: https://github.com/szl-holdings/szl-uds-deployment

sources:
  - https://github.com/szl-holdings/szl-uds-deployment
  - https://github.com/szl-holdings/a11oy
  - https://github.com/szl-holdings/sentra
  - https://github.com/szl-holdings/amaru
  - https://github.com/szl-holdings/rosie
  - https://github.com/szl-holdings/vessels
  - https://github.com/szl-holdings/uds-mesh

dependencies:
  # Available now
  - name: szl-receipts
    version: "0.3.1"
    repository: "oci://ghcr.io/szl-holdings/charts"
    # STAGED: repository not yet published — use local path override until GHCR available
    # alias: receipts
    condition: szl-receipts.enabled

  # STAGED: awaiting FA-001 (container push to GHCR + Zarf package create)
  - name: a11oy-runtime
    version: "0.3.1"
    repository: "oci://ghcr.io/szl-holdings/charts"
    condition: a11oy-runtime.enabled
    # STAGED: not functional until ghcr.io/szl-holdings/a11oy:uds-v0.3.1 pushed

  - name: sentra-gates
    version: "0.3.1"
    repository: "oci://ghcr.io/szl-holdings/charts"
    condition: sentra-gates.enabled
    # STAGED: not functional until ghcr.io/szl-holdings/sentra:uds-v0.3.1 pushed

  - name: amaru-attestation
    version: "0.3.1"
    repository: "oci://ghcr.io/szl-holdings/charts"
    condition: amaru-attestation.enabled
    # STAGED: not functional until ghcr.io/szl-holdings/amaru:uds-v0.3.1 pushed

  - name: rosie-replay
    version: "0.3.1"
    repository: "oci://ghcr.io/szl-holdings/charts"
    condition: rosie-replay.enabled
    # STAGED: not functional until ghcr.io/szl-holdings/rosie:uds-v0.3.1 pushed
