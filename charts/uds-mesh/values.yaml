# uds-mesh Helm values. The namespace is value-driven so the chart renders into
# the SAME namespace (szl-vessels) the uds/zarf.yaml `uds-mesh` component declares
# for it — keeping deploy-entry-guard's namespace-agreement check green.

global:
  domain: "uds.dev"

# Namespace every templated resource renders into. The zarf component installs
# this chart into szl-vessels; this value MUST match (Task #507 class).
namespace: szl-vessels

replicaCount: 1

image:
  repository: ghcr.io/szl-holdings/uds-mesh
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  port: 4317

healthPath: "/healthz"

otel:
  # OTLP gRPC endpoint for vsp-otel spans (zarf maps OTEL_ENDPOINT).
  # Empty => relay buffers/no-ops the export (optional dependency).
  endpoint: ""

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]

resources:
  requests: {cpu: 10m, memory: 64Mi}
  limits: {cpu: 250m, memory: 256Mi}
