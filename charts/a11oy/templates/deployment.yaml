apiVersion: apps/v1
kind: Deployment
metadata:
  name: a11oy
  namespace: {{ .Values.namespace }}
  labels:
    app: a11oy
    app.kubernetes.io/name: a11oy
    app.kubernetes.io/part-of: szl-uds-mesh
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: a11oy
  template:
    metadata:
      labels:
        app: a11oy
        app.kubernetes.io/name: a11oy
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}
        seccompProfile:
          type: {{ .Values.securityContext.seccompProfile.type }}
      containers:
        - name: a11oy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: a11oy-doctrine
          env:
            # Where the persistent ECDSA P-256 signing key is mounted from the
            # receiptKeySecret. a11oy_signing_key.load_signing_key() reads this.
            - name: A11OY_RECEIPT_KEY_DIR
              value: /etc/szl/receipt-key
          volumeMounts:
            # a11oy writes runtime state under /tmp (read-only root filesystem).
            - name: tmp
              mountPath: /tmp
            - name: receipt-key
              mountPath: /etc/szl/receipt-key
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ .Values.securityContext.capabilities.drop | toYaml | nindent 16 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthPath }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ .Values.healthPath }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
          resources: {{ .Values.resources | toYaml | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: receipt-key
          secret:
            secretName: {{ .Values.receiptKeySecret }}
            optional: true
