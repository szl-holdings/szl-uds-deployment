# a11oy Helm values — STIG-aligned securityContext, default-deny NetworkPolicy,
# STRICT mTLS via Istio (managed by UDS Operator / uds-core).
#
# Task 301 — run a11oy itself INSIDE UDS Core behind Keycloak SSO, exposed via a
# UDS Core Istio gateway. The UDS Package CR (templates/uds-package.yaml) is
# value-driven: SSO gating (udsPackage.sso.enabled) + gateway exposure
# (udsPackage.expose) mirror the proven szl-receipts pattern.

# Cluster domain — MUST match UDS Core DOMAIN.
global:
  domain: "uds.dev"

namespace: szl-a11oy
replicas: 1

image:
  # Canonical (CI / production) image. On the single-node uds-szl-demo box the
  # live deploy overrides this to the k3d-imported local image:
  #   --set image.repository=a11oy --set image.tag=local --set zarfAgentIgnore=true
  repository: ghcr.io/szl-holdings/a11oy
  tag: "uds-v0.2.0"
  pullPolicy: IfNotPresent

# a11oy (FastAPI + React SPA) listens on 7860 (HF Space app port).
service:
  port: 7860

healthPath: "/healthz"

# When deploying with a k3d-imported local image (no Zarf in the loop), set true
# so the Zarf mutating webhook does NOT rewrite the image to the internal
# registry. Leave false for the canonical Zarf/uds-bundle deploy path.
zarfAgentIgnore: false

# Receipt-signing key (ECDSA P-256 / secp256r1 — matches a11oy's cosign.pub and
# every verify path, deliberately NOT Ed25519). Provisioned by the
# receipt-key-init pre-install/pre-upgrade hook into Secret `receiptKeySecret`
# unless it already exists (BYOK supported). The a11oy pod mounts it read-only at
# /etc/szl/receipt-key and PREFERS it over an ephemeral key, so /cosign.pub is
# stable across pod restarts.
receiptKeySecret: szl-a11oy-receipts-ecdsa-p256

# Cross-organ DSSE receipt sink (a11oy emits decision-time receipts here).
receiptsSink:
  namespace: szl-receipts
  service: szl-receipts-server
  port: 8080

istio:
  enabled: true
  strictMtls: true   # PeerAuthentication STRICT
  # Keep the injected sidecar small so a11oy schedules on the ~2-vCPU node.
  proxyCPU: "10m"
  proxyMemory: "64Mi"

monitoring:
  enabled: true
  path: /metrics
  interval: 30s

networkPolicy:
  enabled: true
  defaultDeny: true

# ── UDS Package CR knobs ──────────────────────────────────────────────────────
udsPackage:
  enabled: true
  # Exposure surface. On the single-node uds-szl-demo only the ADMIN gateway has
  # an LB IP (the tenant gateway stays <pending> — Ceiling 2), so we publish on
  # admin -> endpoint a11oy.admin.<domain>. Multi-node/HA clusters set tenant.
  expose:
    host: a11oy
    gateway: admin
  # SSO (Keycloak OIDC client) registration + authservice gating of a11oy's
  # human UI. Default OFF: when disabled the template emits NO `sso` key at all
  # (an empty `sso: []` still trips the UDS authservice gate and forces an
  # unsatisfiable waypoint). Flip true only after Keycloak is up.
  sso:
    enabled: false

securityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]

resources:
  requests: {cpu: 20m, memory: 192Mi}
  limits: {cpu: "1", memory: 1Gi}

# Receipt-signing key provisioning hook. Generates an ECDSA P-256 keypair into
# `receiptKeySecret` (unless it already exists — BYOK) using the a11oy image's
# in-image Python crypto + the Kubernetes API, so it works on air-gapped / k3d
# clusters with NO alpine/apk/kubectl pull. On by default so a11oy signs with a
# PERSISTENT identity (stable /cosign.pub across restarts) out of the box; set
# false to rely purely on a pre-provisioned BYOK Secret or the ephemeral key.
receiptKeyInit:
  enabled: true
  # Filenames inside the Secret. The server loader (a11oy_signing_key.py) looks
  # for ecdsa-p256.key first; keep these in sync with that candidate list.
  keyFile: ecdsa-p256.key
  pubFile: ecdsa-p256.pub
