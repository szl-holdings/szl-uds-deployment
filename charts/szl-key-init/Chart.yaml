apiVersion: v2
name: szl-key-init
version: 0.1.0
description: >
  Helm pre-install hook that auto-generates an Ed25519 keypair for the SZL
  governance receipt mesh on first cluster deploy. If the Secret
  szl-receipts-ed25519 already exists in the target namespace, the hook exits
  cleanly without touching it — bringing-your-own-key is fully supported.
type: application
keywords:
  - szl
  - receipts
  - ed25519
  - key-management
maintainers:
  - name: Yachay
    email: yachay@szlholdings.ai
annotations:
  # Doctrine v11 LOCKED 749/14/163 at kernel commit c7c0ba17
  # SLSA L1 honest — not L3
  szl.ai/doctrine-version: "v11"
