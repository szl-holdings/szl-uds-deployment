apiVersion: apps/v1
kind: Deployment
metadata:
  name: yupana
  namespace: {{ .Values.namespace }}
  labels:
    app: yupana
    app.kubernetes.io/name: yupana
    app.kubernetes.io/part-of: szl-uds-mesh
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: yupana
  template:
    metadata:
      labels:
        app: yupana
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        seccompProfile:
          type: {{ .Values.securityContext.seccompProfile.type }}
      containers:
        - name: yupana
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: yupana-doctrine
          volumeMounts:
            - name: receipt-key
              mountPath: /etc/szl/receipt-key
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: {{ .Values.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.securityContext.readOnlyRootFilesystem }}
            capabilities:
              drop: {{ .Values.securityContext.capabilities.drop | toYaml | nindent 16 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthPath }}
              port: {{ .Values.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{ .Values.resources | toYaml | nindent 12 }}
      volumes:
        - name: receipt-key
          secret:
            secretName: {{ .Values.receiptKeySecret }}
            optional: true
