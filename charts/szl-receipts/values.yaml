#
# Default values for szl-receipts Helm chart.
# These are overridden by uds-bundle.yaml variable bindings.

global:
  domain: "uds.dev"

# ── MCP Receipts Server ───────────────────────────────────────────────────────
server:
  name: szl-receipts-server
  # OCI image built from services/szl-receipts-server/Dockerfile (v0.4.0).
  # Replaces the prior ConfigMap-mounted source on stock python:3.12-slim.
  image:
    repository: ghcr.io/szl-holdings/szl-receipts-server
    tag: "uds-v0.4.0"
    pullPolicy: IfNotPresent

  replicas: 1

  logLevel: "info"

  # Port the receipts server listens on inside the pod.
  # The OCI image defaults to 8080; the chart sets it explicitly.
  port: 8080

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  # Volume for persisting receipts across pod restarts.
  # v0.3.1: PVC-backed by default so the receipt chain survives reschedule.
  persistence:
    enabled: true
    size: "5Gi"
    # Empty string = use the cluster's default StorageClass.
    storageClass: ""
    # Mount path; matches the server's SZL_RECEIPT_STORE.
    mountPath: "/data/receipts"

  # Readiness probe
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 30

# ── Receipt signing & key custody (Ed25519) ───────────────────────────────────
# The HMAC-SHA-256 demo key was REMOVED in v0.3.1 (PhD Crypto Finding A2).
# Receipts are signed with an Ed25519 key. This chart bakes NO private key
# material in any backend. Custody tiers (see docs/KEY_CUSTODY_RUNBOOK.md):
#
#   backend: file   (Tier 0/1, default)
#     The server reads an Ed25519 PEM mounted from the Secret named in
#     signing.keypair.secretName. Provision it out-of-band (kubectl create
#     secret) OR commit a SealedSecret (signing.sealedSecret.*) so only an
#     ENCRYPTED blob lives in git (Tier 1 — closes the git-leak hole).
#
#   backend: vault  (Tier 2, managed-KMS custody)
#     The server signs via HashiCorp Vault Transit. The Ed25519 private key is
#     generated and HELD INSIDE Vault and never leaves it; the pod holds only a
#     short-lived Vault token. Reading a Kubernetes Secret no longer yields the
#     private key. Bootstrap Vault with scripts/setup-vault-transit.sh.
signing:
  # "file" (Ed25519 PEM Secret / SealedSecret) or "vault" (Vault Transit KMS).
  backend: file

  keypair:
    # Name of the pre-provisioned Secret holding the PEM key file `ed25519.pem`.
    # Used by the "file" backend. Create it BEFORE helm install:
    #   kubectl create secret generic szl-receipts-ed25519 \
    #     --from-file=ed25519.pem=ed25519.pem
    # ...or render it from a SealedSecret (signing.sealedSecret.*) below.
    secretName: szl-receipts-ed25519
    # File name inside the Secret and the in-pod mount path.
    keyFile: ed25519.pem
    mountPath: /run/secrets/szl-receipts
  # Stable identifier surfaced in DSSE signatures[].keyid.
  keyId: szl-receipts-ed25519-2026

  # ── Tier 1: SealedSecret (Bitnami sealed-secrets) — interim GitOps step ──────
  # When enabled, the chart renders a SealedSecret CR that the in-cluster
  # sealed-secrets controller decrypts into the Secret named above. The
  # ENCRYPTED blob (encryptedKey) is safe to commit to git; the plaintext key
  # only ever exists in-cluster. Generate the ciphertext with
  # scripts/seal-signing-key.sh (it runs kubeseal). NEVER put a plaintext key
  # in encryptedKey — the chart fails the render if encryptedKey is empty.
  sealedSecret:
    enabled: false
    # Output of `kubeseal` for the ed25519.pem key (cluster-key-specific
    # ciphertext, NOT plaintext). Empty by default — provide per-cluster.
    encryptedKey: ""
    # Mirror of the controller's scope annotation used when sealing.
    scope: strict   # strict | namespace-wide | cluster-wide

  # ── Tier 2: HashiCorp Vault Transit (managed-KMS custody) ────────────────────
  vault:
    # Vault API address reachable from the pod, e.g.
    #   https://vault.vault.svc.cluster.local:8200  (in-cluster) or an
    #   external Vault URL. Required when backend=vault.
    address: ""
    # Vault Enterprise namespace (leave empty for OSS / root namespace).
    namespace: ""
    # Transit secrets-engine mount path and Ed25519 key name.
    transitMount: transit
    transitKey: szl-receipts
    auth:
      # "kubernetes" (pod ServiceAccount JWT — recommended) or "token".
      method: kubernetes
      # Vault Kubernetes auth role bound to the szl-receipts ServiceAccount.
      role: szl-receipts
      mount: kubernetes
      # Used only when method=token: a Secret holding a Vault token.
      tokenSecret:
        name: ""
        key: token
    # TLS to Vault. Provide a CA cert Secret for private CAs; tlsSkipVerify is
    # for dev only (never in production).
    tlsSkipVerify: false
    caCertSecret:
      name: ""
      key: ca.crt
    # Egress allow-list target for the Vault API (UDS Package + NetworkPolicy).
    egress:
      # In-cluster Vault: allow to this namespace + pod selector.
      remoteNamespace: vault
      remoteSelector:
        app.kubernetes.io/name: vault
      # External Vault: set a CIDR instead (leave remoteNamespace empty).
      cidr: ""
      port: 8200

# ── OpenTelemetry (real OTLP/gRPC exporter) ───────────────────────────────────
# PhD Systems Scope 9 fix: the server now links the OTel SDK and exports spans.
# The uds-package.yaml egress allow-rule already permits monitoring/
# opentelemetry-collector:4317. On by default; set endpoint to "" to disable.
otel:
  enabled: true
  endpoint: "http://opentelemetry-collector.monitoring.svc.cluster.local:4317"
  serviceName: "szl-receipts-server"

# ── Dashboard UI (NGINX) ──────────────────────────────────────────────────────
dashboard:
  enabled: true
  name: szl-dashboard

  # ── Grafana dashboard (UDS Core sidecar auto-import) ───────────────────────
  # Ships a ConfigMap labeled grafana_dashboard:"1" so UDS Core's Grafana
  # sidecar auto-imports the receipt-chain dashboard (#129). No Grafana API
  # calls; the dashboard appears as soon as the ConfigMap is applied.
  grafana:
    enabled: true
    # Folder shown in Grafana's dashboard browser.
    folder: "SZL"
    # Label key the Core Grafana sidecar watches for (stack default).
    sidecarLabel: grafana_dashboard
    # Namespace for the ConfigMap. Empty => the release namespace. The Core
    # sidecar watches ALL namespaces by default, so the release namespace is
    # fine and keeps the dashboard self-contained with the chart.
    namespace: ""
  image:
    repository: docker.io/library/nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent

  replicas: 1

  port: 80

  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ── Human UI reverse-proxy (SSO-gated front, task #128) ───────────────────────
# Created ONLY when udsPackage.sso.enabled=true. This is a thin nginx
# reverse-proxy that authservice protects (Keycloak login) and that proxies
# read requests through to szl-receipts-server in-mesh. Keeping it a separate
# workload is what lets the machine webhook reach the server unauthenticated
# while every browser request is gated by Keycloak.
#
# Uses the unprivileged nginx image so it satisfies the namespace's restricted
# Pod Security Standard (non-root, listens on 8080 without CAP_NET_BIND_SERVICE).
ui:
  name: szl-receipts-ui
  image:
    repository: docker.io/nginxinc/nginx-unprivileged
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent
  replicas: 1
  # Container + service port. nginx-unprivileged listens on 8080 as non-root.
  port: 8080
  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  serverPort: 8080
  dashboardPort: 80

# ── Ingress (UDS VirtualService via Istio) ────────────────────────────────────
ingress:
  enabled: true
  # Host accessed via the UDS tenant gateway
  host: "szl.uds.dev"
  # UDS uses Istio VirtualService; standard Ingress is provided as a fallback
  # for non-Istio clusters.
  gateway: "istio-tenant-gateway/tenant"

# ── Network Policy (UDS Package CRD) ─────────────────────────────────────────
# uds-core uses Package CRDs to generate Istio AuthorizationPolicies and
# K8s NetworkPolicies. This exposes the ports uds-core needs to allow.
networkPolicy:
  enabled: true
  # Allow ingress from the Pepr policy webhook (to POST receipts)
  allowFromPepr: true
  # Allow egress to the K8s API server (for Pepr to annotate resources)
  allowToAPIServer: true

# ── UDS Package custom resource ───────────────────────────────────────────────
# Deployed alongside the chart so uds-core network policies apply correctly.
udsPackage:
  enabled: true
  # Gateway exposure (Istio VirtualService generated by the UDS operator).
  # On single-node k3d, UDS Core brings up only ONE LoadBalancer Istio gateway
  # (admin); the tenant gateway never receives an IP (klipper cannot bind host
  # 80/443 twice). So expose via the admin gateway here -> receipts.admin.<domain>.
  # On a multi-node / tower cluster where the tenant gateway is provisioned,
  # override expose.gateway to "tenant" (-> receipts.<domain>).
  expose:
    gateway: admin
    host: receipts
  # ── SSO (Keycloak via UDS Core) ──────────────────────────────────────────
  # Gated OFF by default. On a single-node k3d demo the full UDS Core Keycloak
  # + authservice + waypoint do not fit a 2-vCPU node (see
  # warhacker-deliverables/KEYCLOAK-SSO-* ); enable on the multi-core tower.
  #
  # When enabled the UDS Operator auto-creates the Keycloak client and gates the
  # szl-receipts-ui reverse-proxy behind authservice. The receipts-server and
  # the Pepr webhook path are unaffected (machine-to-machine stays open).
  sso:
    enabled: false
    name: "SZL Receipts"
    clientId: szl-receipts
    # Name of the operator-generated Secret holding the OIDC client config.
    secretName: szl-receipts-sso
    # Optional Keycloak group gate for human sign-in, e.g.:
    #   groups:
    #     anyOf:
    #       - /szl/operators
    groups: {}
  monitor:
    - portName: http-metrics
      selector:
        app.kubernetes.io/name: szl-receipts-server
      targetPort: 8080
      description: "SZL Receipts server metrics endpoint"
