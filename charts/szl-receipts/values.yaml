#
# Default values for szl-receipts Helm chart.
# These are overridden by uds-bundle.yaml variable bindings.

global:
  domain: "uds.dev"

# ── MCP Receipts Server ───────────────────────────────────────────────────────
server:
  name: szl-receipts-server
  # OCI image built from services/szl-receipts-server/Dockerfile (v0.3.1).
  # Replaces the prior ConfigMap-mounted source on stock python:3.12-slim.
  image:
    repository: ghcr.io/szl-holdings/szl-receipts-server
    tag: "uds-v0.3.1"
    pullPolicy: IfNotPresent

  replicas: 1

  logLevel: "info"

  # Port the receipts server listens on inside the pod.
  # The OCI image defaults to 8080; the chart sets it explicitly.
  port: 8080

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

  # Volume for persisting receipts across pod restarts.
  # v0.3.1: PVC-backed by default so the receipt chain survives reschedule.
  persistence:
    enabled: true
    size: "5Gi"
    # Empty string = use the cluster's default StorageClass.
    storageClass: ""
    # Mount path; matches the server's SZL_RECEIPT_STORE.
    mountPath: "/data/receipts"

  # Readiness probe
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 30

# ── Receipt signing (Ed25519) ─────────────────────────────────────────────────
# The HMAC-SHA-256 demo key was REMOVED in v0.3.1 (PhD Crypto Finding A2).
# Receipts are signed with an Ed25519 key the operator provisions out-of-band.
# This chart bakes NO key material. See templates/secret-keypair.yaml.
signing:
  keypair:
    # Name of the pre-provisioned Secret holding the PEM key file `ed25519.pem`.
    # Create it BEFORE helm install:
    #   kubectl create secret generic szl-receipts-ed25519 \
    #     --from-file=ed25519.pem=ed25519.pem
    secretName: szl-receipts-ed25519
    # File name inside the Secret and the in-pod mount path.
    keyFile: ed25519.pem
    mountPath: /run/secrets/szl-receipts
  # Stable identifier surfaced in DSSE signatures[].keyid.
  keyId: szl-receipts-ed25519-2026

# ── OpenTelemetry (real OTLP/gRPC exporter) ───────────────────────────────────
# PhD Systems Scope 9 fix: the server now links the OTel SDK and exports spans.
# The uds-package.yaml egress allow-rule already permits monitoring/
# opentelemetry-collector:4317. On by default; set endpoint to "" to disable.
otel:
  enabled: true
  endpoint: "http://opentelemetry-collector.monitoring.svc.cluster.local:4317"
  serviceName: "szl-receipts-server"

# ── Dashboard UI (NGINX) ──────────────────────────────────────────────────────
dashboard:
  enabled: true
  name: szl-dashboard
  image:
    repository: docker.io/library/nginx
    tag: "1.27-alpine"
    pullPolicy: IfNotPresent

  replicas: 1

  port: 80

  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  serverPort: 8080
  dashboardPort: 80

# ── Ingress (UDS VirtualService via Istio) ────────────────────────────────────
ingress:
  enabled: true
  # Host accessed via the UDS tenant gateway
  host: "szl.uds.dev"
  # UDS uses Istio VirtualService; standard Ingress is provided as a fallback
  # for non-Istio clusters.
  gateway: "istio-tenant-gateway/tenant"

# ── Network Policy (UDS Package CRD) ─────────────────────────────────────────
# uds-core uses Package CRDs to generate Istio AuthorizationPolicies and
# K8s NetworkPolicies. This exposes the ports uds-core needs to allow.
networkPolicy:
  enabled: true
  # Allow ingress from the Pepr policy webhook (to POST receipts)
  allowFromPepr: true
  # Allow egress to the K8s API server (for Pepr to annotate resources)
  allowToAPIServer: true

# ── UDS Package custom resource ───────────────────────────────────────────────
# Deployed alongside the chart so uds-core network policies apply correctly.
udsPackage:
  enabled: true
  monitor:
    - portName: http-metrics
      selector:
        app.kubernetes.io/name: szl-receipts-server
      targetPort: 8080
      description: "SZL Receipts server metrics endpoint"
