#
# Default values for szl-receipts Helm chart.
# These are overridden by uds-bundle.yaml variable bindings.

global:
  domain: "uds.dev"

# ── MCP Receipts Server ───────────────────────────────────────────────────────
server:
  name: szl-receipts-server
  # OCI image built from services/szl-receipts-server/Dockerfile (v0.4.1).
  # Replaces the prior ConfigMap-mounted source on stock python:3.12-slim.
  image:
    repository: ghcr.io/szl-holdings/szl-receipts-server
    tag: "uds-v0.4.1"
    # Immutable content digest for uds-v0.4.1. Pinning here makes a clean
    # install bit-for-bit reproducible: even if the uds-v0.4.1 tag is later
    # re-pushed with different contents, this digest is what gets deployed.
    digest: "sha256:758052db66fd6257e4ac6b9834918df25dc819097beb387062b9e54e6cd8f0f4"
    pullPolicy: IfNotPresent

  replicas: 1

  logLevel: "info"

  # ── Ingest rate limit (anti-flood, Task #532) ─────────────────────
  # Source-agnostic token-bucket cap on POST /receipt at the chain authority
  # so a runaway emitter (any source) cannot OOM/CPU-starve the 2-vCPU node.
  # The pepr deploy webhook is fail-open, so a shed receipt (HTTP 429) never
  # blocks admission. rateLimit<=0 disables the limiter.
  ingest:
    rateLimit: "1.0"   # receipts/sec sustained
    burst: "20"        # max burst tokens

  # Port the receipts server listens on inside the pod.
  # The OCI image defaults to 8080; the chart sets it explicitly.
  port: 8080

  # Number of most-recent receipts the server keeps in RAM (the live /receipts
  # window). The full chain always stays on disk; this only bounds the in-memory
  # working set so memory stays flat as the chain grows. Maps to
  # SZL_MAX_IN_MEMORY_RECEIPTS (server.py default 2000). Lower it on tiny nodes,
  # raise it for richer /receipts responses — no image rebuild required.
  maxInMemoryReceipts: 2000

  # Max receipts written into a single shard folder before rolling to the next
  # bucket (<store>/shards/<bucket>/), which keeps directory listings fast as the
  # chain grows. Maps to SZL_RECEIPT_SHARD_SIZE (server.py default 10000). Lower
  # it on tiny nodes, or set 0 to disable sharding (flat legacy layout) — no image
  # rebuild required.
  receiptShardSize: 10000

  resources:
    requests:
      cpu: "50m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # Volume for persisting receipts across pod restarts.
  # v0.3.1: PVC-backed by default so the receipt chain survives reschedule.
  #
  # RETENTION: the server shards new receipts into <store>/shards/<bucket>/ so a
  # single directory never holds more than SZL_RECEIPT_SHARD_SIZE (default 10000)
  # files, and sealed shards can be rolled off to cold storage with
  # `server.py archive-shards --delete`. Size this PVC for the hot working set you
  # keep live (=~ unarchived buckets x shard size x avg receipt bytes); periodic
  # archival keeps it bounded. Full procedure + the bounded `verify-store` audit:
  # docs/operations/RECEIPT_STORE_RETENTION_RUNBOOK.md.
  persistence:
    enabled: true
    size: "5Gi"
    # Empty string = use the cluster's default StorageClass.
    storageClass: ""
    # Mount path; matches the server's SZL_RECEIPT_STORE.
    mountPath: "/data/receipts"

  # Readiness probe
  readinessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 15
    periodSeconds: 30

# ── Receipt signing & key custody (Ed25519) ───────────────────────────────────
# The HMAC-SHA-256 demo key was REMOVED in v0.3.1 (PhD Crypto Finding A2).
# Receipts are signed with an Ed25519 key. This chart bakes NO private key
# material in any backend. Custody tiers (see docs/KEY_CUSTODY_RUNBOOK.md):
#
#   backend: file   (Tier 0/1, default)
#     The server reads an Ed25519 PEM mounted from the Secret named in
#     signing.keypair.secretName. Provision it out-of-band (kubectl create
#     secret) OR commit a SealedSecret (signing.sealedSecret.*) so only an
#     ENCRYPTED blob lives in git (Tier 1 — closes the git-leak hole).
#
#   backend: vault  (Tier 2, managed-KMS custody)
#     The server signs via HashiCorp Vault Transit. The Ed25519 private key is
#     generated and HELD INSIDE Vault and never leaves it; the pod holds only a
#     short-lived Vault token. Reading a Kubernetes Secret no longer yields the
#     private key. Bootstrap Vault with scripts/setup-vault-transit.sh.
signing:
  # "file" (Ed25519 PEM Secret / SealedSecret) or "vault" (Vault Transit KMS).
  backend: file

  keypair:
    # Name of the pre-provisioned Secret holding the PEM key file `ed25519.pem`.
    # Used by the "file" backend. Create it BEFORE helm install:
    #   kubectl create secret generic szl-receipts-ed25519 \
    #     --from-file=ed25519.pem=ed25519.pem
    # ...or render it from a SealedSecret (signing.sealedSecret.*) below.
    secretName: szl-receipts-ed25519
    # File name inside the Secret and the in-pod mount path.
    keyFile: ed25519.pem
    mountPath: /run/secrets/szl-receipts
  # Stable identifier surfaced in DSSE signatures[].keyid.
  keyId: szl-receipts-ed25519-2026
  # When true (default) the signing-key Secret mount is REQUIRED: if it is
  # absent the pod refuses to start (readiness never reaches Available and the
  # deploy fails loudly) instead of silently signing nothing. The szl-key-init
  # pre-install hook auto-provisions the Secret on a fresh deploy, so this is
  # safe and gives signed receipts with zero manual steps. Set to false only to
  # intentionally allow the legacy unsigned demo mode.
  requireKey: true

  # ── Tier 1: SealedSecret (Bitnami sealed-secrets) — interim GitOps step ──────
  # When enabled, the chart renders a SealedSecret CR that the in-cluster
  # sealed-secrets controller decrypts into the Secret named above. The
  # ENCRYPTED blob (encryptedKey) is safe to commit to git; the plaintext key
  # only ever exists in-cluster. Generate the ciphertext with
  # scripts/seal-signing-key.sh (it runs kubeseal). NEVER put a plaintext key
  # in encryptedKey — the chart fails the render if encryptedKey is empty.
  sealedSecret:
    enabled: false
    # Output of `kubeseal` for the ed25519.pem key (cluster-key-specific
    # ciphertext, NOT plaintext). Empty by default — provide per-cluster.
    encryptedKey: ""
    # Mirror of the controller's scope annotation used when sealing.
    scope: strict   # strict | namespace-wide | cluster-wide

  # ── Tier 2: HashiCorp Vault Transit (managed-KMS custody) ────────────────────
  vault:
    # Vault API address reachable from the pod, e.g.
    #   https://vault.vault.svc.cluster.local:8200  (in-cluster) or an
    #   external Vault URL. Required when backend=vault.
    address: ""
    # Vault Enterprise namespace (leave empty for OSS / root namespace).
    namespace: ""
    # Transit secrets-engine mount path and Ed25519 key name.
    transitMount: transit
    transitKey: szl-receipts
    auth:
      # "kubernetes" (pod ServiceAccount JWT — recommended) or "token".
      method: kubernetes
      # Vault Kubernetes auth role bound to the szl-receipts ServiceAccount.
      role: szl-receipts
      mount: kubernetes
      # Used only when method=token: a Secret holding a Vault token.
      tokenSecret:
        name: ""
        key: token
    # TLS to Vault. Provide a CA cert Secret for private CAs; tlsSkipVerify is
    # for dev only (never in production).
    tlsSkipVerify: false
    caCertSecret:
      name: ""
      key: ca.crt
    # Egress allow-list target for the Vault API (UDS Package + NetworkPolicy).
    egress:
      # In-cluster Vault: allow to this namespace + pod selector.
      remoteNamespace: vault
      remoteSelector:
        app.kubernetes.io/name: vault
      # External Vault: set a CIDR instead (leave remoteNamespace empty).
      cidr: ""
      port: 8200

# ── OpenTelemetry (real OTLP/gRPC exporter) ───────────────────────────────────
# PhD Systems Scope 9 fix: the server now links the OTel SDK and exports spans.
# The uds-package.yaml egress allow-rule already permits monitoring/
# opentelemetry-collector:4317. On by default; set endpoint to "" to disable.
# OOM decision: the szl-receipts pod OOM-crashloop was accumulated in-memory
# chain bloat, resolved by the bounded-memory server image (uds-v0.4.1+; RAM is
# now flat regardless of chain length). OTel export was investigated as a memory
# suspect and CLEARED -- confirmed safe live on the 2-vCPU box (pod 2/2, ~22Mi of
# the 512Mi limit). KEEP enabled: true; do NOT flip to false to chase a phantom OOM.
otel:
  enabled: true
  endpoint: "http://opentelemetry-collector.monitoring.svc.cluster.local:4317"
  serviceName: "szl-receipts-server"

# ── Dashboard UI (NGINX) ──────────────────────────────────────────────────────
dashboard:
  enabled: true
  name: szl-dashboard

  # ── Grafana dashboard (UDS Core sidecar auto-import) ───────────────────────
  # Ships a ConfigMap labeled grafana_dashboard:"1" so UDS Core's Grafana
  # sidecar auto-imports the receipt-chain dashboard (#129). No Grafana API
  # calls; the dashboard appears as soon as the ConfigMap is applied.
  grafana:
    enabled: true
    # Folder shown in Grafana's dashboard browser.
    folder: "SZL"
    # Label key the Core Grafana sidecar watches for (stack default).
    sidecarLabel: grafana_dashboard
    # Namespace for the ConfigMap. Empty => the release namespace. The Core
    # sidecar watches ALL namespaces by default, so the release namespace is
    # fine and keeps the dashboard self-contained with the chart.
    namespace: ""
  image:
    repository: docker.io/library/nginx
    tag: "1.27-alpine"
    # Immutable content digest for nginx:1.27-alpine (linux/amd64). Pinning here
    # makes a clean install reproducible: even if the 1.27-alpine tag is later
    # re-pushed with different contents, this digest is what gets deployed. The
    # SAME digest is pinned in the zarf images: lists so the chart-rendered image
    # reference byte-matches the baked image for airgap (zarf) deploy rewrites.
    digest: "sha256:62223d644fa234c3a1cc785ee14242ec47a77364226f1c811d2f669f96dc2ac8"
    pullPolicy: IfNotPresent

  replicas: 1

  port: 80

  resources:
    requests:
      cpu: "10m"
      memory: "32Mi"
    limits:
      cpu: "100m"
      memory: "64Mi"

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  serverPort: 8080
  dashboardPort: 80

# ── Ingress (UDS VirtualService via Istio) ────────────────────────────────────
ingress:
  enabled: true
  # Host accessed via the UDS tenant gateway
  host: "szl.uds.dev"
  # UDS uses Istio VirtualService; standard Ingress is provided as a fallback
  # for non-Istio clusters.
  gateway: "istio-tenant-gateway/tenant"

# ── Network Policy (UDS Package CRD) ─────────────────────────────────────────
# uds-core uses Package CRDs to generate Istio AuthorizationPolicies and
# K8s NetworkPolicies. This exposes the ports uds-core needs to allow.
networkPolicy:
  enabled: true
  # Allow ingress from the Pepr policy webhook (to POST receipts)
  allowFromPepr: true
  # Allow egress to the K8s API server (for Pepr to annotate resources)
  allowToAPIServer: true

# ── Resource governance (ResourceQuota + LimitRange) ─────────────────────────
# Default OFF. When enabled, the chart renders a namespace ResourceQuota and
# LimitRange from the sub-values below (resourceQuota.hard, limitRange.*). This
# key MUST exist so the template's `if .Values.resourceGovernance.enabled` guard
# renders with defaults. Ceiling sizing (the CPU posture) is intentionally left
# unset here and supplied by the deploy bundle when this is turned on.
resourceGovernance:
  enabled: false

# ── UDS Package custom resource ───────────────────────────────────────────────
# Deployed alongside the chart so uds-core network policies apply correctly.
udsPackage:
  enabled: true
  # Exposure surface — host + gateway the receipts-server is published on. These
  # MUST exist so templates that reference them (e.g. NOTES.txt's offline-verify
  # URL) render with default values; they mirror the values hard-set in the UDS
  # Package CR's network.expose block (host: receipts, gateway: tenant).
  expose:
    host: receipts
    gateway: tenant
  # SSO (Keycloak OIDC client) registration via the UDS Package CR.
  # Default OFF: when disabled the template emits NO `sso` key at all, because an
  # empty `sso: []` still trips the UDS authservice gate and forces an
  # unsatisfiable waypoint (the receipts route would never serve). Flip
  # enabled=true only after Keycloak is up (FA-002). This key MUST exist so the
  # template's `if .Values.udsPackage.sso.enabled` guard renders with defaults.
  sso:
    enabled: false
  monitor:
    - portName: http-metrics
      selector:
        app.kubernetes.io/name: szl-receipts-server
      targetPort: 8080
      description: "SZL Receipts server metrics endpoint"

# ── Prometheus alerting (in-cluster deploy-receipt stall alarm) ───────────────
# Ships a PrometheusRule (templates/prometheusrule.yaml) consumed by the cluster
# Prometheus (kube-prometheus-stack / UDS Core). This makes the receipt-stall
# alarm independent of the box's host-level systemd timer (receipt-chain-watch):
# if the box goes dark, Prometheus + Alertmanager still fire from in-cluster.
# Reuses the server-driven /metrics endpoint scraped via udsPackage.monitor.
prometheusRule:
  enabled: true
  # Extra labels merged onto the PrometheusRule. kube-prometheus-stack's
  # Prometheus selects rules via its `ruleSelector`. The proven box stack runs
  # ruleSelector={} (selects all); add e.g. `release: kube-prometheus-stack`
  # here if your Prometheus pins a non-empty ruleSelector.
  additionalLabels: {}
  # Namespace for the PrometheusRule (defaults to the release namespace).
  # namespace: monitoring
  # Alert `for:` durations (how long the condition must hold before firing).
  sinkDownFor: "5m"
  sinkAbsentFor: "10m"
  chainTamperFor: "2m"
  # Flood alarm (SZLReceiptsChainFlooding) — the OPPOSITE of the stall alarms.
  # Fires when szl_chain_length grows faster than floodPerMin receipts/min
  # (rate() over floodRateWindow) sustained for floodFor. A receipt flood can
  # overload the Ed25519 signer; this is the in-cluster analog of the host guard
  # receipt-flood-watch. The server's own ingest cap is ~1/s (~60/min), so the
  # default 120/min is comfortably above legitimate activity (see box-scripts).
  floodPerMin: 120
  floodRateWindow: "5m"
  floodFor: "5m"
