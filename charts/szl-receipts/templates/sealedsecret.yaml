#
# SealedSecret for the Ed25519 signing key — Tier 1 key custody (interim).
#
# A SealedSecret (Bitnami sealed-secrets) is an ENCRYPTED wrapper around a
# regular Secret. The ciphertext can be committed to git safely: only the
# in-cluster sealed-secrets controller (holding the cluster's private sealing
# key) can decrypt it, and it decrypts into the Secret named in
# .Values.signing.keypair.secretName — the SAME Secret the "file" backend
# mounts. So enabling this closes the "private key committed to git" hole while
# leaving the server code unchanged.
#
# This template renders ONLY when .Values.signing.sealedSecret.enabled=true and
# REFUSES to render with an empty encryptedKey, so it can never accidentally
# create an empty/plaintext Secret. The ciphertext is cluster-key-specific —
# generate it per cluster with scripts/seal-signing-key.sh.
#
# Honest labeling: a SealedSecret protects the key AT REST IN GIT. Once
# decrypted, the plaintext Ed25519 key still exists as an ordinary Secret in
# cluster etcd and is readable by anyone with get-secret RBAC. For custody where
# the private key NEVER exists in the cluster, use signing.backend=vault (Tier 2).
{{- if .Values.signing.sealedSecret.enabled }}
{{- if not .Values.signing.sealedSecret.encryptedKey }}
{{- fail "signing.sealedSecret.enabled=true but signing.sealedSecret.encryptedKey is empty. Generate it with scripts/seal-signing-key.sh (runs kubeseal) and set the ciphertext — NEVER a plaintext key." }}
{{- end }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ .Values.signing.keypair.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: signing-key
  annotations:
    # Scope MUST match the scope used when sealing (see seal-signing-key.sh).
    {{- if eq .Values.signing.sealedSecret.scope "namespace-wide" }}
    sealedsecrets.bitnami.com/namespace-wide: "true"
    {{- else if eq .Values.signing.sealedSecret.scope "cluster-wide" }}
    sealedsecrets.bitnami.com/cluster-wide: "true"
    {{- end }}
spec:
  encryptedData:
    # Encrypted ed25519.pem. Decrypts into the Secret's `ed25519.pem` key,
    # which the Deployment mounts at signing.keypair.mountPath.
    {{ .Values.signing.keypair.keyFile }}: {{ .Values.signing.sealedSecret.encryptedKey | quote }}
  template:
    metadata:
      name: {{ .Values.signing.keypair.secretName }}
      namespace: {{ .Release.Namespace }}
      labels:
        app.kubernetes.io/name: szl-receipts
        szl.io/component: signing-key
    type: Opaque
{{- end }}
