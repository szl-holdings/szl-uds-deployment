apiVersion: v1
kind: Service
metadata:
  name: szl-receipts-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: receipts-server
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: szl-receipts-server
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.serverPort }}
      targetPort: http
      protocol: TCP
    {{- if .Values.dashboard.enabled }}
    - name: dashboard
      port: {{ .Values.service.dashboardPort }}
      targetPort: dashboard
      protocol: TCP
    {{- end }}
---
# ServiceAccount for the szl-receipts pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: szl-receipts
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts-server
    app.kubernetes.io/instance: {{ .Release.Name }}
# NOTE (v0.3.1): the baked HMAC-SHA-256 demo Secret was REMOVED here
# (PhD Crypto Finding A2). Signing now uses an Ed25519 key the operator
# provisions out-of-band as the Secret named in .Values.signing.keypair.secretName.
# This chart bakes no key material. See templates/secret-keypair.yaml.
