# UDS Package CR — szl-receipts
#
# This Package CR instructs UDS Core (via the Pepr-based UDS Operator) to:
#   1. (when sso.enabled) Register the szl-receipts Keycloak SSO client and wire
#      the authservice sidecar in front of the human-facing UI reverse-proxy.
#   2. Expose the receipts surface via a UDS Core Istio gateway (VirtualService).
#   3. Allow the in-cluster Pepr admission webhook to POST receipts
#      machine-to-machine (mesh / mTLS) regardless of SSO state.
#   4. Allow egress to the OTel collector in the monitoring namespace.
#   5. (when signing.backend=vault) Allow egress to HashiCorp Vault for Transit
#      signing (Tier 2 KMS key custody — see docs/KEY_CUSTODY_RUNBOOK.md).
#
# Prerequisites:
#   - uds-core with core-slim-dev (or full core) deployed first
#   - Keycloak running in the keycloak namespace (provided by core-slim-dev)
#   - Istio service mesh active (provided by core-slim-dev)
#
# References:
#   UDS Package CRD: https://github.com/defenseunicorns/uds-core
#   UDS Pattern guide: https://uds.defenseunicorns.com/docs/
#   Andrew Greene Option A endorsement: 2026-05-22

apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: szl-receipts
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    szl.io/component: uds-package
  annotations:
    szl.io/staged: "SSO functional only after core-slim-dev is deployed (FA-002)"
    szl.io/doc: "https://github.com/szl-holdings/szl-uds-deployment/blob/main/docs/ARCHITECTURE.md"
spec:
  # ── SSO — Keycloak OIDC client registration ────────────────────────────────
  # STAGED: Keycloak must be running from core-slim-dev before this takes effect.
  # auth-service sidecar is injected by Pepr when enableAuthserviceSelector matches.
  #
  # Gated on udsPackage.sso.enabled (default false). When disabled we emit NO
  # `sso` key at all — an empty `sso: []` still trips the UDS authservice gate
  # and forces an unsatisfiable waypoint, so the receipts route never serves.
  # Flip udsPackage.sso.enabled=true only after Keycloak is up (FA-002).
  {{- if .Values.udsPackage.sso.enabled }}
  sso:
    - name: SZL Receipts
      clientId: szl-receipts
      redirectUris:
        - "https://receipts.{{ .Values.global.domain }}/oauth2/callback"
      enableAuthserviceSelector:
        app: szl-receipts-server
      # Standard OIDC scopes; profile + email required for authservice
      secretName: szl-receipts-sso
      # Group-based authorization is enforced by the authservice sidecar
      # via the szl-receipts-sso Secret's OIDC claims. Configure group
      # membership in Keycloak realm /szl/receipts after FA-002 is resolved.
  {{- end }}

  # ── Network — ingress + egress rules (generate Istio + K8s NetworkPolicy) ──
  network:
    expose:
      # Expose receipts-server on the UDS tenant gateway (Istio VirtualService)
      # Accessible at https://receipts.<domain>
      - service: szl-receipts-server
        selector:
          app: szl-receipts-server
        gateway: tenant
        host: receipts
        port: 8080
        targetPort: 8080
        description: "SZL Receipts server — tenant gateway"

    allow:
      # Allow egress to OTel collector for traces/metrics
      - direction: Egress
        selector:
          app: szl-receipts-server
        remoteNamespace: monitoring
        remoteSelector:
          app: opentelemetry-collector
        port: 4317
        description: "OTel collector (OTLP/gRPC)"

      {{- if eq .Values.signing.backend "vault" }}
      # Allow egress to HashiCorp Vault for Transit signing (Tier 2 KMS custody).
      # Only rendered when signing.backend=vault. In-cluster Vault uses a
      # namespace+pod selector; external Vault uses a remoteCidr.
      - direction: Egress
        selector:
          app: szl-receipts-server
        {{- if .Values.signing.vault.egress.cidr }}
        remoteCidr: {{ .Values.signing.vault.egress.cidr }}
        {{- else }}
        remoteNamespace: {{ .Values.signing.vault.egress.remoteNamespace }}
        remoteSelector:
          {{- toYaml .Values.signing.vault.egress.remoteSelector | nindent 10 }}
        {{- end }}
        port: {{ .Values.signing.vault.egress.port }}
        description: "Vault Transit (Ed25519 signing, Tier 2 KMS custody)"
      {{- end }}

      # Allow ingress from the Pepr admission webhook to POST receipts.
      # ALWAYS ON — machine-to-machine, independent of SSO. This is the
      # public/protected split's "protected app, public webhook" half: the
      # webhook authenticates by mesh identity (pepr-system), no browser session.
      - direction: Ingress
        selector:
          app: szl-receipts-server
        remoteNamespace: pepr-system
        remoteSelector:
          app: pepr-szl
        port: 8080
        description: "Pepr webhook — POST /receipt"

  # ── Monitor — Prometheus scrape config (managed by uds-core) ──────────────
  monitor:
    - portName: http
      selector:
        app: szl-receipts-server
      targetPort: 8080
      path: /metrics
      description: "SZL Receipts Prometheus metrics"
