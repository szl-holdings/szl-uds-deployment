# UDS Package CR — szl-receipts
#
# This Package CR instructs UDS Core (via the Pepr-based UDS Operator) to:
#   1. (when sso.enabled) Register the szl-receipts Keycloak SSO client and wire
#      the authservice sidecar in front of the human-facing UI reverse-proxy.
#   2. Expose the receipts surface via a UDS Core Istio gateway (VirtualService).
#   3. Allow the in-cluster Pepr admission webhook to POST receipts
#      machine-to-machine (mesh / mTLS) regardless of SSO state.
#   4. Allow egress to the OTel collector in the monitoring namespace.
#
# ── Public / protected split (task #128) ────────────────────────────────────
# UDS Core authservice (ambient waypoint) protects the WHOLE selected workload,
# and intercepts in-mesh east-west traffic too — so putting authservice on the
# receipts-server pod would also block the Pepr webhook's POST /receipt. The
# split therefore separates the two surfaces into two workloads:
#
#   * szl-receipts-server  — the chain authority. NOT authservice-selected, NOT
#       gateway-exposed (ClusterIP only). The admission webhook reaches it over
#       the mesh via the always-on pepr `allow` rule below. Independent of
#       Keycloak: the audit trail keeps chaining even if SSO is down.
#   * szl-receipts-ui      — an nginx reverse-proxy that is the human surface.
#       authservice-selected (via spec.sso.enableAuthserviceSelector) and
#       gateway-exposed, so a browser hitting the gateway host is redirected to
#       Keycloak and only reaches the receipt API after a valid OIDC session.
#
# When sso.enabled is false (single-node k3d demo, where full Core Keycloak does
# not fit — see warhacker-deliverables) the UI is not created and the server is
# exposed on the gateway directly, preserving the proven admin-gateway state.
#
# Prerequisites for sso.enabled=true:
#   - UDS Core with Keycloak + authservice running (multi-core / tower cluster).
#   - The Istio waypoint for the namespace is provisioned by the operator.
#
# References:
#   UDS Package CRD: https://github.com/defenseunicorns/uds-core
#   spec.sso schema: defenseunicorns/uds-core@v1.5.0 package-v1alpha1.schema.json
#   Pattern (human vs machine clients): docs/KEYCLOAK_SSO.md
apiVersion: uds.dev/v1alpha1
kind: Package
metadata:
  name: szl-receipts
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    szl.io/component: uds-package
  annotations:
    szl.io/doc: "https://github.com/szl-holdings/szl-uds-deployment/blob/main/docs/KEYCLOAK_SSO.md"
spec:
  # ── SSO — Keycloak OIDC client registration (human UI only) ─────────────────
  # The UDS Operator reads this block and auto-creates the matching Keycloak
  # client + injects the authservice sidecar in front of pods matching
  # enableAuthserviceSelector. Only the UI reverse-proxy is selected, so the
  # machine webhook path to szl-receipts-server is never gated.
  {{- if .Values.udsPackage.sso.enabled }}
  {{- $domain := .Values.global.domain }}
  {{- $host := .Values.udsPackage.expose.host }}
  {{- $fqdn := printf "%s.%s" $host $domain }}
  {{- if eq .Values.udsPackage.expose.gateway "admin" }}{{- $fqdn = printf "%s.admin.%s" $host $domain }}{{- end }}
  sso:
    - name: {{ .Values.udsPackage.sso.name | quote }}
      clientId: {{ .Values.udsPackage.sso.clientId | quote }}
      protocol: openid-connect
      # Browser redirect (authorization-code) flow for human sign-in.
      standardFlowEnabled: true
      redirectUris:
        - "https://{{ $fqdn }}/*"
      webOrigins:
        - "https://{{ $fqdn }}"
      # Protect ONLY the human UI reverse-proxy with authservice.
      enableAuthserviceSelector:
        app: szl-receipts-ui
      {{- with .Values.udsPackage.sso.groups }}
      # Gate sign-in on Keycloak group membership (e.g. /szl/operators).
      groups:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      secretConfig:
        name: {{ .Values.udsPackage.sso.secretName | quote }}
  {{- end }}

  # ── Network — ingress + egress rules (generate Istio + K8s NetworkPolicy) ──
  network:
    expose:
      {{- if .Values.udsPackage.sso.enabled }}
      # SSO on: the human surface is the authservice-gated UI reverse-proxy.
      # The receipts-server is intentionally NOT exposed here (ClusterIP only),
      # so the only browser path to receipt data is through Keycloak.
      - service: szl-receipts-ui
        selector:
          app: szl-receipts-ui
        gateway: {{ .Values.udsPackage.expose.gateway }}
        host: {{ .Values.udsPackage.expose.host }}
        port: {{ .Values.ui.port }}
        targetPort: {{ .Values.ui.port }}
        description: "SZL Receipts UI (SSO-gated via Keycloak)"
      {{- else }}
      # SSO off (single-node k3d demo): expose the server directly on the admin
      # gateway, preserving the proven receipts.admin.<domain> state.
      - service: szl-receipts-server
        selector:
          app: szl-receipts-server
        gateway: {{ .Values.udsPackage.expose.gateway }}
        host: {{ .Values.udsPackage.expose.host }}
        port: 8080
        targetPort: 8080
        description: "SZL Receipts server"
      {{- end }}

    allow:
      # Allow egress to OTel collector for traces/metrics
      - direction: Egress
        selector:
          app: szl-receipts-server
        remoteNamespace: monitoring
        remoteSelector:
          app: opentelemetry-collector
        port: 4317
        description: "OTel collector (OTLP/gRPC)"

      # Allow ingress from the Pepr admission webhook to POST receipts.
      # ALWAYS ON — machine-to-machine, independent of SSO. This is the
      # public/protected split's "protected app, public webhook" half: the
      # webhook authenticates by mesh identity (pepr-system), no browser session.
      - direction: Ingress
        selector:
          app: szl-receipts-server
        remoteNamespace: pepr-system
        remoteSelector:
          app: pepr-szl
        port: 8080
        description: "Pepr webhook — POST /receipt (machine-to-machine)"

      {{- if .Values.udsPackage.sso.enabled }}
      # Allow the SSO-gated UI reverse-proxy to read the server's API in-mesh.
      - direction: Ingress
        selector:
          app: szl-receipts-server
        remoteNamespace: {{ .Release.Namespace }}
        remoteSelector:
          app: szl-receipts-ui
        port: 8080
        description: "UI reverse-proxy -> receipts-server read API"
      {{- end }}

  # ── Monitor — Prometheus scrape config (managed by uds-core) ──────────────
  monitor:
    - portName: http
      selector:
        app: szl-receipts-server
      targetPort: 8080
      path: /metrics
      description: "SZL Receipts Prometheus metrics"
