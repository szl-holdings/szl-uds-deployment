#
# PersistentVolumeClaim for the receipt store. Replaces the prior emptyDir so
# the receipt chain survives pod restart/reschedule (PhD Systems Scope 6 fix).
# The server rehydrates the in-memory chain from this volume on startup.
{{- if .Values.server.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.server.name }}-store
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    szl.io/component: receipts-store
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.server.persistence.size | quote }}
  {{- if .Values.server.persistence.storageClass }}
  storageClassName: {{ .Values.server.persistence.storageClass | quote }}
  {{- end }}
{{- end }}
