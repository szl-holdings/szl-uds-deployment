#
# Kubernetes NetworkPolicy — szl-receipts
#
# These policies are supplementary to UDS Core's generated Istio
# AuthorizationPolicies and NetworkPolicies. They provide a defense-in-depth
# layer using standard Kubernetes NetworkPolicy, ensuring policy is enforced
# even without Istio/Cilium in non-UDS environments.
#
# Policy model:
#   - Default deny-all egress from szl-receipts pods
#   - Default deny-all ingress except what is explicitly allowed
#   - Allow egress to OTel collector on port 4317 (OTLP/gRPC)
#   - Allow egress to Keycloak SSO on port 8080
#   - Allow egress to Kubernetes DNS (kube-dns) on port 53
#   - Allow ingress from the UDS tenant gateway (Istio ingress pods)
#   - Allow ingress from Pepr webhook on port 8080
#
# References:
#   Kubernetes NetworkPolicy: https://kubernetes.io/docs/concepts/services-networking/network-policies/
#   PSS restricted: https://kubernetes.io/docs/concepts/security/pod-security-standards/

---
# ── Default: deny all ingress to szl-receipts pods ──────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: szl-receipts-default-deny-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: szl-receipts-server
  policyTypes:
    - Ingress

---
# ── Default: deny all egress from szl-receipts pods ─────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: szl-receipts-default-deny-egress
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: szl-receipts-server
  policyTypes:
    - Egress

---
# ── Allow: egress to kube-dns (UDP 53 + TCP 53) ─────────────────────────────
# Required for any name resolution inside the cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: szl-receipts-allow-egress-dns
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: szl-receipts-server
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# ── Allow: egress to OTel collector on port 4317 (OTLP/gRPC) ────────────────
# Collector runs in the monitoring namespace (part of UDS Core).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: szl-receipts-allow-egress-otel
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: szl-receipts-server
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: opentelemetry-collector
      ports:
        - protocol: TCP
          port: 4317

---
# ── Allow: egress to Keycloak SSO on port 8080 ──────────────────────────────
# STAGED: Requires Keycloak running from core-slim-dev (see FA-002).
# Without core-slim-dev deployed, SSO calls will fail but pods remain healthy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: szl-receipts-allow-egress-keycloak
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: network-policy
    szl.io/staged: "requires-core-slim-dev"
spec:
  podSelector:
    matchLabels:
      app: szl-receipts-server
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: keycloak
          podSelector:
            matchLabels:
              app: keycloak
      ports:
        - protocol: TCP
          port: 8080

---
# ── Allow: ingress from UDS tenant Istio gateway ────────────────────────────
# The UDS tenant gateway pods forward inbound HTTPS traffic to the receipts server.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: szl-receipts-allow-ingress-gateway
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: szl-receipts-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
          podSelector:
            matchLabels:
              istio: ingressgateway
      ports:
        - protocol: TCP
          port: 8080

---
# ── Allow: ingress from Pepr webhook (POST /receipt) ────────────────────────
# The Pepr admission webhook posts receipt payloads to the receipts server
# on every Deployment/Job admission event.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: szl-receipts-allow-ingress-pepr
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: szl-receipts-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: pepr-system
      ports:
        - protocol: TCP
          port: 8080

---
# ── Allow: ingress from Prometheus (metrics scrape on port 8080) ─────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: szl-receipts-allow-ingress-prometheus
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: szl-receipts-server
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - protocol: TCP
          port: 8080
