#
# ServiceMonitor — szl-receipts Prometheus integration
#
# Instructs Prometheus Operator (deployed via UDS Core monitoring stack) to
# scrape the szl-receipts-server /metrics endpoint.
#
# Metrics exposed by the receipts server:
#   szl_receipts_total           — counter: total receipts issued
#   szl_receipts_verified_total  — counter: receipts successfully verified
#   szl_receipts_failed_total    — counter: receipts that failed verification
#   szl_receipt_issue_seconds    — histogram: time to issue a receipt
#   szl_receipt_store_size       — gauge: number of receipts currently stored
#
# These are HONEST metrics — no fake data. In demo mode with no workloads,
# all counters will be zero. This is expected and correct.
#
# References:
#   Prometheus Operator CRDs: https://github.com/prometheus-operator/prometheus-operator
#   UDS Core monitoring: https://github.com/defenseunicorns/uds-core

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: szl-receipts-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    szl.io/component: metrics
    # UDS Core Prometheus discovers ServiceMonitors with this label
    prometheus: kube-prometheus
  annotations:
    szl.io/doc: "https://github.com/szl-holdings/szl-uds-deployment/blob/main/docs/ARCHITECTURE.md"
    szl.io/metrics-honesty: "all-zero in demo mode — no synthetic data"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: szl-receipts-server
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: /metrics
      scheme: http
      interval: 30s
      scrapeTimeout: 10s
      # Honor labels exported by the target (allow app-level label overrides)
      honorLabels: false
      # TLS is termination-only inside the Istio mesh; scrape over cleartext
      # inside the pod-to-pod mTLS plane. If TLS is enabled on the port, set:
      #   scheme: https
      #   tlsConfig:
      #     insecureSkipVerify: true  # only within cluster mTLS boundary
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service
      metricRelabelings:
        # Drop any high-cardinality internal Go runtime metrics to reduce storage
        - sourceLabels: [__name__]
          regex: "go_(gc|goroutine|memstats).*"
          action: drop
