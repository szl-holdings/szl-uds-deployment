#
# SZL Receipts MCP server Deployment
# The server is a lightweight Python FastAPI process that:
#   1. Accepts POST /receipt with a DSSE-wrapped payload
#   2. Verifies the HMAC-SHA-256 signature
#   3. Stores the receipt and streams it to connected dashboard clients via SSE
#   4. Exposes GET /receipts for batch retrieval and GET /health for probes

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.server.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: receipts-server
  annotations:
    szl.io/doc: "https://github.com/szl-holdings/szl-uds-deployment/blob/main/docs/ARCHITECTURE.md"
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: szl-receipts-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        # UDS Package NetworkPolicies + AuthorizationPolicies select `app`.
        # Required for gateway ingress + pepr webhook to reach this pod.
        app: szl-receipts-server
        app.kubernetes.io/name: szl-receipts-server
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Chart.AppVersion }}
        szl.io/component: receipts-server
      annotations:
        # Force pod restart when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: szl-receipts
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: receipts-server
          # OCI image built from services/szl-receipts-server/Dockerfile.
          # ENTRYPOINT runs /app/server.py; no command override needed.
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: SZL_PORT
              value: "{{ .Values.server.port }}"
            - name: SZL_LOG_LEVEL
              value: "{{ .Values.server.logLevel }}"
            - name: SZL_RECEIPT_STORE
              value: "{{ .Values.server.persistence.mountPath }}"
            # ── Ed25519 signing (PhD Crypto Finding A2) ──────────────────────
            - name: SZL_ED25519_KEY_PATH
              value: "{{ .Values.signing.keypair.mountPath }}/{{ .Values.signing.keypair.keyFile }}"
            - name: SZL_KEY_ID
              value: "{{ .Values.signing.keyId }}"
            # ── OpenTelemetry (PhD Systems Scope 9) ──────────────────────────
            # On by default; egress to monitoring/opentelemetry-collector:4317
            # is already permitted by uds-package.yaml. Set otel.endpoint to ""
            # to disable export (server then runs with no exporter).
            {{- if and .Values.otel.enabled .Values.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otel.endpoint }}"
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.otel.serviceName }}"
            {{- end }}
          volumeMounts:
            - name: receipt-store
              mountPath: "{{ .Values.server.persistence.mountPath }}"
            # Ed25519 private key, mounted read-only from the operator-provisioned Secret.
            - name: ed25519-key
              mountPath: "{{ .Values.signing.keypair.mountPath }}"
              readOnly: true
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.server.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.server.livenessProbe | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      {{- if .Values.dashboard.enabled }}
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: dashboard
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          volumeMounts:
            - name: dashboard-html
              mountPath: /usr/share/nginx/html
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      {{- end }}
      volumes:
        # PVC-backed receipt store (v0.3.1). When persistence is disabled the
        # store falls back to emptyDir and the chain is lost on pod restart.
        - name: receipt-store
          {{- if .Values.server.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.server.name }}-store
          {{- else }}
          emptyDir: {}
          {{- end }}
        # Ed25519 signing key from the operator-provisioned Secret.
        # optional: true so the pod still starts (unsigned mode) if absent.
        - name: ed25519-key
          secret:
            secretName: {{ .Values.signing.keypair.secretName }}
            optional: true
            defaultMode: 0400
        {{- if .Values.dashboard.enabled }}
        - name: dashboard-html
          configMap:
            name: szl-receipts-dashboard-html
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        {{- end }}
      terminationGracePeriodSeconds: 30
