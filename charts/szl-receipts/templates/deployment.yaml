#
# SZL Receipts MCP server Deployment
# The server is a lightweight Python process (services/szl-receipts-server) that:
#   1. Accepts POST /receipt and signs the payload with Ed25519 over the
#      canonical DSSE PAE (Finding A2 / PR-4)
#   2. Self-verifies the signature it just produced against the mounted key's
#      public half, setting the receipt `valid` field (a real Ed25519 verify,
#      not HMAC); GET /pubkey publishes the public key for offline verification
#   3. Stores the receipt and streams it to connected dashboard clients via SSE
#   4. Exposes GET /receipts for batch retrieval and GET /health for probes

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.server.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: receipts-server
  annotations:
    szl.io/doc: "https://github.com/szl-holdings/szl-uds-deployment/blob/main/docs/ARCHITECTURE.md"
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: szl-receipts-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: szl-receipts-server
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/version: {{ .Chart.AppVersion }}
        szl.io/component: receipts-server
      annotations:
        # Force pod restart when configmap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: szl-receipts
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: receipts-server
          # OCI image built from services/szl-receipts-server/Dockerfile.
          # ENTRYPOINT runs /app/server.py; no command override needed.
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}{{ if .Values.server.image.digest }}@{{ .Values.server.image.digest }}{{ end }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            - name: SZL_PORT
              value: "{{ .Values.server.port }}"
            - name: SZL_LOG_LEVEL
              value: "{{ .Values.server.logLevel }}"
            - name: SZL_RECEIPT_STORE
              value: "{{ .Values.server.persistence.mountPath }}"
            # In-memory /receipts window (full chain stays on disk). Tunable
            # per-deploy so the memory ceiling never requires an image rebuild.
            - name: SZL_MAX_IN_MEMORY_RECEIPTS
              value: "{{ .Values.server.maxInMemoryReceipts }}"
            # ── Ed25519 signing (PhD Crypto Finding A2) ──────────────────────
            - name: SZL_ED25519_KEY_PATH
              value: "{{ .Values.signing.keypair.mountPath }}/{{ .Values.signing.keypair.keyFile }}"
            - name: SZL_KEY_ID
              value: "{{ .Values.signing.keyId }}"
            # ── Key-custody backend (file | vault) — see KEY_CUSTODY_RUNBOOK ──
            - name: SZL_SIGNING_BACKEND
              value: "{{ .Values.signing.backend }}"
            {{- if eq .Values.signing.backend "vault" }}
            # Tier 2 (managed-KMS): sign via HashiCorp Vault Transit. The
            # private key never enters this pod — only a Vault token does.
            - name: VAULT_ADDR
              value: "{{ required "signing.vault.address is required when signing.backend=vault" .Values.signing.vault.address }}"
            - name: SZL_VAULT_TRANSIT_MOUNT
              value: "{{ .Values.signing.vault.transitMount }}"
            - name: SZL_VAULT_TRANSIT_KEY
              value: "{{ .Values.signing.vault.transitKey }}"
            - name: SZL_VAULT_AUTH_METHOD
              value: "{{ .Values.signing.vault.auth.method }}"
            {{- if .Values.signing.vault.namespace }}
            - name: VAULT_NAMESPACE
              value: "{{ .Values.signing.vault.namespace }}"
            {{- end }}
            {{- if eq .Values.signing.vault.auth.method "kubernetes" }}
            - name: SZL_VAULT_K8S_ROLE
              value: "{{ .Values.signing.vault.auth.role }}"
            - name: SZL_VAULT_K8S_AUTH_MOUNT
              value: "{{ .Values.signing.vault.auth.mount }}"
            {{- else if eq .Values.signing.vault.auth.method "token" }}
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: "{{ required "signing.vault.auth.tokenSecret.name is required for token auth" .Values.signing.vault.auth.tokenSecret.name }}"
                  key: "{{ .Values.signing.vault.auth.tokenSecret.key }}"
            {{- end }}
            {{- if .Values.signing.vault.tlsSkipVerify }}
            - name: VAULT_SKIP_VERIFY
              value: "true"
            {{- end }}
            {{- if .Values.signing.vault.caCertSecret.name }}
            - name: VAULT_CACERT
              value: "/run/secrets/vault-ca/{{ .Values.signing.vault.caCertSecret.key }}"
            {{- end }}
            {{- end }}
            # ── OpenTelemetry (PhD Systems Scope 9) ──────────────────────────
            # On by default; egress to monitoring/opentelemetry-collector:4317
            # is already permitted by uds-package.yaml. Set otel.endpoint to ""
            # to disable export (server then runs with no exporter).
            {{- if and .Values.otel.enabled .Values.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otel.endpoint }}"
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.otel.serviceName }}"
            {{- end }}
          volumeMounts:
            - name: receipt-store
              mountPath: "{{ .Values.server.persistence.mountPath }}"
            # Ed25519 private key, mounted read-only from the operator-provisioned
            # Secret. Used by the "file" backend; harmless (optional) when
            # signing.backend=vault (the key then lives in Vault, not here).
            - name: ed25519-key
              mountPath: "{{ .Values.signing.keypair.mountPath }}"
              readOnly: true
            {{- if and (eq .Values.signing.backend "vault") .Values.signing.vault.caCertSecret.name }}
            # CA cert for verifying TLS to a Vault with a private CA.
            - name: vault-ca
              mountPath: /run/secrets/vault-ca
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.server.readinessProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.server.livenessProbe | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      {{- if .Values.dashboard.enabled }}
        - name: dashboard
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}{{ if .Values.dashboard.image.digest }}@{{ .Values.dashboard.image.digest }}{{ end }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          ports:
            - name: dashboard
              containerPort: {{ .Values.dashboard.port }}
              protocol: TCP
          volumeMounts:
            - name: dashboard-html
              mountPath: /usr/share/nginx/html
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      {{- end }}
      volumes:
        # PVC-backed receipt store (v0.3.1). When persistence is disabled the
        # store falls back to emptyDir and the chain is lost on pod restart.
        - name: receipt-store
          {{- if .Values.server.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.server.name }}-store
          {{- else }}
          emptyDir: {}
          {{- end }}
        # Ed25519 signing key from the auto-provisioned Secret (szl-key-init).
        # When signing.requireKey is true (default), optional is false: if the
        # Secret is absent the pod will NOT start (readiness never goes Available
        # and the deploy fails loudly) rather than silently signing nothing.
        # Set signing.requireKey=false to allow the legacy unsigned demo mode.
        - name: ed25519-key
          secret:
            secretName: {{ .Values.signing.keypair.secretName }}
            optional: {{ not .Values.signing.requireKey }}
            defaultMode: 0400
        {{- if and (eq .Values.signing.backend "vault") .Values.signing.vault.caCertSecret.name }}
        # CA cert Secret for TLS verification of a private-CA Vault.
        - name: vault-ca
          secret:
            secretName: {{ .Values.signing.vault.caCertSecret.name }}
            optional: false
            defaultMode: 0444
        {{- end }}
        {{- if .Values.dashboard.enabled }}
        - name: dashboard-html
          configMap:
            name: szl-receipts-dashboard-html
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
        {{- end }}
      terminationGracePeriodSeconds: 30
