#
# Pod Security Standards — szl-receipts namespace
#
# Enforces the Kubernetes "restricted" Pod Security Standard (PSS) on the
# szl-receipts namespace. This is the highest PSS tier:
#   - All pods run as non-root
#   - Read-only root filesystem required
#   - No privileged containers
#   - No privilege escalation
#   - Seccomp profile required (RuntimeDefault or Localhost)
#   - All capabilities dropped; only NET_BIND_SERVICE may be added
#
# This aligns with UDS Core security baseline and DoD container hardening guides.
#
# Implementation: Kubernetes built-in PSS via namespace labels (1.25+).
# No external PodSecurityPolicy or OPA Gatekeeper needed.
#
# References:
#   K8s PSS: https://kubernetes.io/docs/concepts/security/pod-security-standards/
#   NSA/CISA K8s Hardening Guide: https://media.defense.gov/2022/Aug/29/2003066362/-1/-1/0/CTR_KUBERNETES_HARDENING_GUIDANCE_1.2_20220829.PDF
#   UDS Core security baseline: https://github.com/defenseunicorns/uds-core

---
# Namespace with PSS restricted labels
# NOTE: This manifest enforces PSS at the namespace level.
# The deployment.yaml already sets all required security contexts.
# If any pod in this namespace violates PSS restricted, it will be REJECTED.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Namespace }}
  labels:
    kubernetes.io/metadata.name: {{ .Release.Namespace }}
    # Pod Security Standards enforcement (Kubernetes 1.25+)
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    # Warn on violations even in older API versions
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
    # Audit log violations (does not block, used for monitoring)
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    # UDS Core namespace labeling
    uds.dev/type: application
    app.kubernetes.io/managed-by: {{ .Release.Service }}

---
# PodDisruptionBudget — ensure at least 1 receipt server pod is always available
# Protects against accidental downtime during node maintenance or rolling updates.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: szl-receipts-server
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts-server
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: szl-receipts-server

---
# ResourceQuota — limits total resource consumption in the namespace.
# Prevents a runaway pod from exhausting cluster capacity.
apiVersion: v1
kind: ResourceQuota
metadata:
  name: szl-receipts-quota
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: resource-quota
spec:
  hard:
    # Compute resources
    requests.cpu: "500m"
    requests.memory: "512Mi"
    limits.cpu: "2000m"
    limits.memory: "1Gi"
    # Object counts
    pods: "10"
    services: "5"
    secrets: "10"
    configmaps: "10"
    persistentvolumeclaims: "2"

---
# LimitRange — enforces per-pod/container resource defaults and limits.
# All containers must declare resource requests; limits cap runaway usage.
apiVersion: v1
kind: LimitRange
metadata:
  name: szl-receipts-limits
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    szl.io/component: limit-range
spec:
  limits:
    - type: Container
      default:
        cpu: "250m"
        memory: "256Mi"
      defaultRequest:
        cpu: "50m"
        memory: "128Mi"
      max:
        cpu: "1000m"
        memory: "512Mi"
      min:
        cpu: "10m"
        memory: "32Mi"
