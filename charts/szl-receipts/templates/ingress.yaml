# UDS uses Istio VirtualService + Gateway for ingress (not standard K8s Ingress).
# This template emits a standard K8s Ingress as a fallback for non-Istio clusters.
# The UDS Package CR (expose/allow blocks) has been consolidated into uds-package.yaml.
#
# Reference: https://github.com/defenseunicorns/uds-core/blob/main/docs/uds-core-concepts.md

{{- if .Values.udsPackage.enabled }}
---
# ServiceMonitor — if prometheus-stack is running, scrape receipt metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: szl-receipts
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/instance: {{ .Release.Name }}
    # This label is required for uds-core's Prometheus to discover the monitor
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: szl-receipts-server
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
{{- end }}
