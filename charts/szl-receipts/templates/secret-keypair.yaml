#
# Ed25519 signing key — NOT provisioned by this chart.
#
# The receipts server signs receipts with an Ed25519 private key read from a
# PEM file mounted from the Secret named in .Values.signing.keypair.secretName.
# This chart does NOT create that Secret and does NOT bake any key material into
# the repo (the prior HMAC demo key was removed in v0.3.1).
#
# Honest labeling (cf. pqc.ts:327 "HSM-in-prod"): this is a software Ed25519
# key stored in a Kubernetes Secret. It is NOT an HSM/KMS-custodied key. Real
# hardware key custody is roadmap, not implemented here.
#
# ── Operator MUST run this BEFORE `helm install`/`helm upgrade` ───────────────
#
#   # 1) Generate an Ed25519 private key (PKCS#8 PEM):
#   openssl genpkey -algorithm ed25519 -out ed25519.pem
#
#   # 2) Create the Secret the Deployment mounts (key MUST be named ed25519.pem):
#   kubectl create secret generic szl-receipts-ed25519 \
#     --namespace <release-namespace> \
#     --from-file=ed25519.pem=ed25519.pem
#
#   # 3) Shred the local copy (the cluster Secret is now the source of truth):
#   shred -u ed25519.pem   # or: rm -P ed25519.pem
#
# If the Secret is absent, the server starts in UNSIGNED mode: it still chains
# and persists receipts but emits an explicit "UNSIGNED-NO-ED25519-KEY" sentinel
# in signatures[].sig — it never fabricates a signature.
#
# A SealedSecret (Bitnami sealed-secrets) is the recommended GitOps path; ship
# the sealed manifest here once the cluster's sealing key is known. We do not
# include a SealedSecret in-repo because it is cluster-key-specific and would be
# inert (and misleading) in any other cluster.
#
# This template intentionally renders no Kubernetes object.
