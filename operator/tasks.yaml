# SZL Fleet Overlay — Maru Task Runner
# Doctrine v11 LOCKED 749/14/163 at kernel commit c7c0ba17
# One-command inner-loop: `uds run dev` spins k3d + deploys all 5 flagships

includes:
  - actions: https://raw.githubusercontent.com/defenseunicorns/uds-common/refs/tags/v1.24.9/tasks/actions.yaml

variables:
  - name: VERSION
    default: "0.1.0"
  - name: ARCH
    default: "amd64"
  - name: REGISTRY
    default: "ghcr.io/szl-holdings"
  - name: CLUSTER_NAME
    default: "szl-local"
  - name: DOMAIN
    default: "uds.dev"
  # Flagships to deploy (space-separated, ordered by dependency)
  - name: FLAGSHIP_ORDER
    default: "a11oy sentra amaru rosie killinchu"

###############################################################################
# DEFAULT — full build + local dev deploy                                     #
###############################################################################
tasks:
  - name: default
    description: "Full build + local k3d dev cluster deploy (alias for: build → dev)"
    actions:
      - task: build
      - task: dev

###############################################################################
# INNER LOOP — one command, all 5 flagships in k3d                            #
###############################################################################
  - name: dev
    description: |
      Inner-loop developer workflow.
      Prerequisites: k3d, kubectl, uds CLI (>=0.27.0), helm, cosign.
      What it does:
        1. Ensures a k3d cluster named ${CLUSTER_NAME} exists
        2. Installs UDS Core (lightweight) if not present
        3. Creates SZL namespaces
        4. Deploys the fleet overlay package (all 5 flagships)
        5. Validates all 5 Package CRs reach Ready phase
        6. Prints the service URLs for local smoke-testing
    actions:
      - task: cluster-up
      - task: uds-core-ensure
      - task: build
      - task: deploy-local
      - task: validate
      - task: urls

  - name: dev-quick
    description: "Re-deploy only — skip cluster bring-up and UDS Core (assumes cluster already running)"
    actions:
      - task: build
      - task: deploy-local
      - task: validate
      - task: urls

###############################################################################
# CLUSTER LIFECYCLE                                                            #
###############################################################################
  - name: cluster-up
    description: "Create k3d cluster ${CLUSTER_NAME} if it does not exist"
    actions:
      - cmd: |
          if k3d cluster list 2>/dev/null | grep -q "${CLUSTER_NAME}"; then
            echo "✓ k3d cluster '${CLUSTER_NAME}' already running"
          else
            echo "→ Creating k3d cluster '${CLUSTER_NAME}' …"
            k3d cluster create "${CLUSTER_NAME}" \
              --servers 1 \
              --agents 2 \
              --port "443:443@loadbalancer" \
              --port "80:80@loadbalancer" \
              --k3s-arg "--disable=traefik@server:0" \
              --wait
            echo "✓ k3d cluster '${CLUSTER_NAME}' created"
          fi
        description: "Ensure k3d cluster exists"

  - name: cluster-down
    description: "Tear down k3d cluster ${CLUSTER_NAME}"
    actions:
      - cmd: k3d cluster delete "${CLUSTER_NAME}"
        description: "Delete k3d cluster"

  - name: cluster-reset
    description: "Full reset — tear down then bring up fresh cluster (data loss)"
    actions:
      - task: cluster-down
      - task: cluster-up

###############################################################################
# UDS CORE                                                                    #
###############################################################################
  - name: uds-core-ensure
    description: |
      Install UDS Core (k3d lightweight bundle) if not already present.
      Skips if the uds-operator deployment already exists in uds namespace.
    actions:
      - cmd: |
          if kubectl get deployment uds-operator -n uds 2>/dev/null | grep -q uds-operator; then
            echo "✓ UDS Core already installed"
          else
            echo "→ Installing UDS Core (k3d dev bundle) …"
            uds deploy k3d-core:latest --confirm
            echo "✓ UDS Core installed"
          fi
        description: "Ensure UDS Core is installed"

###############################################################################
# BUILD                                                                       #
###############################################################################
  - name: build
    description: "Build the szl-fleet-overlay Zarf package"
    actions:
      - cmd: uds zarf package create . -a ${ARCH} --confirm --skip-sbom
        description: "Create szl-fleet-overlay Zarf package"

  - name: build-with-sbom
    description: "Build the Zarf package with SBOM generation (SLSA L1)"
    actions:
      - cmd: uds zarf package create . -a ${ARCH} --confirm
        description: "Create szl-fleet-overlay Zarf package with SBOM"

###############################################################################
# SIGN / RECEIPTS                                                             #
###############################################################################
  - name: sign-receipts
    description: |
      Generate and sign doctrine receipts.
      Requires: COSIGN_KEY_PATH env var pointing to a cosign private key.
      For keyless (CI), set COSIGN_EXPERIMENTAL=1 instead.
    actions:
      - cmd: |
          mkdir -p receipts
          find configs/ -type f -name "*.yaml" | sort | xargs sha256sum > receipts/checksums.txt
          echo "→ checksums.txt:"
          cat receipts/checksums.txt
          if [ -n "${COSIGN_KEY_PATH}" ]; then
            cosign sign-blob \
              --key "${COSIGN_KEY_PATH}" \
              --output-signature receipts/checksums.txt.sig \
              receipts/checksums.txt
            echo "✓ Signed with key ${COSIGN_KEY_PATH}"
          elif [ "${COSIGN_EXPERIMENTAL}" = "1" ]; then
            cosign sign-blob \
              --output-signature receipts/checksums.txt.sig \
              receipts/checksums.txt
            echo "✓ Signed keyless (OIDC)"
          else
            echo "WARN: neither COSIGN_KEY_PATH nor COSIGN_EXPERIMENTAL=1 set; checksums.txt unsigned"
          fi
        description: "Generate checksums and optionally sign"

  - name: verify-receipts
    description: "Verify doctrine receipt signature"
    actions:
      - cmd: |
          if [ -f receipts/checksums.txt.sig ] && [ -f receipts/cosign.pub ]; then
            cosign verify-blob \
              --key receipts/cosign.pub \
              --signature receipts/checksums.txt.sig \
              receipts/checksums.txt && echo "✓ Receipt VALID"
          else
            echo "WARN: cosign.pub or .sig not found — run: uds run sign-receipts first"
            exit 1
          fi
        description: "Verify checksums.txt.sig against cosign.pub"

###############################################################################
# PUBLISH                                                                     #
###############################################################################
  - name: publish
    description: "Publish szl-fleet-overlay package to GHCR"
    actions:
      - cmd: uds zarf package publish zarf-package-szl-fleet-overlay-${ARCH}-${VERSION}.tar.zst oci://${REGISTRY}/
        description: "Push package to GHCR"

###############################################################################
# DEPLOY                                                                      #
###############################################################################
  - name: deploy-local
    description: "Deploy szl-fleet-overlay to the local k3d cluster"
    actions:
      - cmd: uds zarf package deploy zarf-package-szl-fleet-overlay-${ARCH}-*.tar.zst --confirm
        description: "Deploy fleet overlay"

  - name: deploy-all
    description: |
      One-command deploy of all 5 flagships.
      Assumes cluster is up and UDS Core is installed.
      Deploys the fleet overlay which registers all 5 SZL flagships as
      UDS-managed Package CRs (a11oy → sentra → amaru → rosie → killinchu).
    actions:
      - cmd: |
          echo "▶ SZL Fleet Deploy — all 5 flagships"
          echo "  Cluster: ${CLUSTER_NAME}"
          echo "  Domain:  ${DOMAIN}"
          echo "  Registry: ${REGISTRY}"
          echo ""
          # Deploy the fleet overlay (registers all 5 Package CRs in order)
          uds zarf package deploy zarf-package-szl-fleet-overlay-${ARCH}-*.tar.zst --confirm
          echo ""
          echo "▶ Validating Package CRs …"
        description: "Deploy all 5 SZL flagships via fleet overlay"
      - task: validate
      - task: urls

###############################################################################
# VALIDATE                                                                    #
###############################################################################
  - name: validate
    description: "Validate all 5 Package CRs reached Ready phase"
    actions:
      - cmd: |
          echo "▶ Waiting for Package CRs to reach Ready …"
          FAIL=0
          for app in a11oy sentra amaru rosie killinchu; do
            # Poll up to 5 minutes (30s × 10)
            for i in $(seq 1 10); do
              phase=$(kubectl get package szl-${app} -n szl-${app} -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
              if [ "${phase}" = "Ready" ]; then
                echo "  ✓ szl-${app} → Ready"
                break
              fi
              if [ "${i}" = "10" ]; then
                echo "  ✗ szl-${app} → ${phase} (TIMEOUT)"
                FAIL=1
              else
                echo "  … szl-${app} → ${phase} (attempt ${i}/10, retry in 30s)"
                sleep 30
              fi
            done
          done
          if [ "${FAIL}" = "1" ]; then
            echo ""
            echo "✗ One or more Package CRs failed to reach Ready"
            exit 1
          fi
          echo ""
          echo "✓ All 5 flagship Package CRs are Ready"
        description: "Poll Package CRs for Ready status"

  - name: validate-doctrine
    description: "Verify doctrine pin invariants in the deployed receipts"
    actions:
      - cmd: |
          echo "▶ Checking doctrine pin in deployed receipt …"
          PIN=$(kubectl exec -n szl-a11oy \
            $(kubectl get pod -n szl-a11oy -l app=szl-a11oy -o jsonpath='{.items[0].metadata.name}' 2>/dev/null) \
            -- cat /var/szl/receipts/doctrine-pin.yaml 2>/dev/null || \
            cat receipts/doctrine-pin.yaml 2>/dev/null)
          echo "${PIN}"
          # Check doctrine version
          if echo "${PIN}" | grep -q "version: v11"; then
            echo "✓ doctrine version: v11"
          else
            echo "✗ doctrine version mismatch — expected v11"
            exit 1
          fi
          # Check pin
          if echo "${PIN}" | grep -q "749"; then
            echo "✓ doctrine pin: 749/14/163"
          else
            echo "✗ doctrine pin mismatch — expected 749/14/163"
            exit 1
          fi
          echo "✓ Doctrine invariants confirmed"
        description: "Verify deployed doctrine-pin.yaml matches v11 LOCKED"

###############################################################################
# UTILITY                                                                     #
###############################################################################
  - name: urls
    description: "Print local service URLs for all 5 flagships"
    actions:
      - cmd: |
          echo ""
          echo "▶ SZL Flagship Service URLs (local k3d)"
          echo "  Domain: ${DOMAIN}"
          echo ""
          for app in a11oy sentra amaru rosie killinchu; do
            svc=$(kubectl get svc -n szl-${app} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "(not found)")
            echo "  szl-${app}:"
            echo "    k8s service: ${svc}.szl-${app}.svc.cluster.local"
            echo "    ingress:     https://${app}.${DOMAIN}/api/${app}/v1/health"
          done
          echo ""
          echo "  Tip: add '127.0.0.1  *.${DOMAIN}' to /etc/hosts for local DNS"

  - name: logs
    description: "Stream logs from all 5 flagships simultaneously"
    actions:
      - cmd: |
          for app in a11oy sentra amaru rosie killinchu; do
            pod=$(kubectl get pod -n szl-${app} -l app=szl-${app} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
            if [ -n "${pod}" ]; then
              kubectl logs -n szl-${app} "${pod}" -f --tail=50 &
              echo "→ tailing szl-${app} (${pod})"
            else
              echo "→ szl-${app}: no pod found (skip)"
            fi
          done
          echo ""
          echo "Streaming logs (Ctrl-C to stop) …"
          wait

  - name: status
    description: "Print status of all cluster resources across all 5 flagships"
    actions:
      - cmd: |
          echo "▶ SZL Fleet Status"
          echo ""
          for app in a11oy sentra amaru rosie killinchu; do
            echo "─── szl-${app} ───"
            kubectl get all -n szl-${app} 2>/dev/null || echo "  (namespace not found)"
            phase=$(kubectl get package szl-${app} -n szl-${app} -o jsonpath='{.status.phase}' 2>/dev/null || echo "NotFound")
            echo "  Package CR phase: ${phase}"
            echo ""
          done

  - name: clean
    description: "Remove deployed SZL resources from cluster (keeps cluster running)"
    actions:
      - cmd: |
          for app in a11oy sentra amaru rosie killinchu; do
            kubectl delete package szl-${app} -n szl-${app} --ignore-not-found=true
            kubectl delete namespace szl-${app} --ignore-not-found=true
            echo "✓ Removed szl-${app}"
          done
          kubectl delete namespace szl-system --ignore-not-found=true
          echo "✓ SZL resources removed"
        description: "Delete SZL Package CRs and namespaces"

  - name: help
    description: "List all available tasks"
    actions:
      - cmd: |
          echo "SZL Fleet Overlay — Maru Task Runner"
          echo "Doctrine v11 LOCKED 749/14/163 · Λ Conjecture 1 · SLSA L1"
          echo ""
          echo "QUICK START:"
          echo "  uds run dev          # full inner loop: cluster + uds-core + build + deploy + validate"
          echo "  uds run deploy-all   # deploy all 5 flagships (cluster must be up)"
          echo ""
          echo "TASKS:"
          echo "  dev              Full inner-loop (cluster + core + build + deploy + validate)"
          echo "  dev-quick        Re-deploy only (skip cluster bring-up)"
          echo "  cluster-up       Create k3d cluster"
          echo "  cluster-down     Delete k3d cluster"
          echo "  cluster-reset    Tear down + re-create cluster"
          echo "  uds-core-ensure  Install UDS Core if not present"
          echo "  build            Build Zarf package"
          echo "  build-with-sbom  Build with SBOM (SLSA L1)"
          echo "  sign-receipts    Generate + sign doctrine receipts"
          echo "  verify-receipts  Verify receipt signature"
          echo "  publish          Publish to GHCR"
          echo "  deploy-local     Deploy package to local cluster"
          echo "  deploy-all       Deploy all 5 flagships (one command)"
          echo "  validate         Wait for all Package CRs to reach Ready"
          echo "  validate-doctrine Check doctrine pin in deployed receipts"
          echo "  urls             Print local service URLs"
          echo "  logs             Stream logs from all flagships"
          echo "  status           Print cluster resource status"
          echo "  clean            Remove SZL resources from cluster"
          echo "  help             Show this help"
