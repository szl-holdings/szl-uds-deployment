  amaru:
    enabled: true
    namespace: szl-amaru
    servicePort: 8080
    metricsPort: 9090
    clientId: uds-szl-amaru
    displayName: "SZL Amaru"
    peatEnabled: true

  rosie:
    enabled: true
    namespace: szl-rosie
    servicePort: 8080
    metricsPort: 9090
    clientId: uds-szl-rosie
    displayName: "SZL Rosie"
    peatEnabled: true

  killinchu:
    enabled: true
    namespace: szl-killinchu
