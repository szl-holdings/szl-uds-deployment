# Default values for szl-fleet-overlay Helm chart.
# Doctrine v11 LOCKED 749/14/163 at kernel commit c7c0ba17

global:
  domain: uds.dev
  doctrinePinVersion: "v11"
  doctrinePinRef: "749/14/163"
  kernelCommit: "c7c0ba17"
  slsaLevel: "L1"
  ssoGroup: "/szl-operators"
  gatewayName: tenant

apps:
  a11oy:
    enabled: true
    namespace: szl-a11oy
    servicePort: 8080
    metricsPort: 9090
