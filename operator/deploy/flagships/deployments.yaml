# SZL Flagship Deployments — Demo Cluster
# Doctrine v11 LOCKED 749/14/163 @ c7c0ba17 · Λ = Conjecture 1 · SLSA L1
# Each flagship runs as a Deployment pulling from GHCR or HF Space image.
# For demo purposes these point to the live HF Space images.
#
# Signed-off-by: Yachay <yachay@szlholdings.ai>
# Co-Authored-By: Perplexity Computer Agent <agent@perplexity.ai>

---
# ─── a11oy ─────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: szl-a11oy
  namespace: szl-a11oy
  labels:
    app: szl-a11oy
    szl.io/doctrine-version: "v11"
    szl.io/doctrine-pin: "749/14/163"
    szl.io/flagship: "a11oy"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: szl-a11oy
  template:
    metadata:
      labels:
        app: szl-a11oy
        szl.io/doctrine-version: "v11"
    spec:
      containers:
        - name: a11oy
          image: ghcr.io/szl-holdings/a11oy:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: http-metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: DOCTRINE_VERSION
              value: "v11"
            - name: DOCTRINE_PIN
              value: "749/14/163"
            - name: KERNEL_COMMIT
              value: "c7c0ba17"
            - name: LAMBDA_STATUS
              value: "Conjecture 1"
            - name: SLSA_LEVEL
              value: "L1"
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: szl-a11oy
  namespace: szl-a11oy
  labels:
    app: szl-a11oy
    szl.io/doctrine-version: "v11"
spec:
  selector:
    app: szl-a11oy
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: http-metrics
      port: 9090
      targetPort: 9090

