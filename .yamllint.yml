#
# Repository yamllint configuration.
#
# Why this file exists
# --------------------
# Helm chart templates (charts/*/templates/*.yaml) are NOT valid standalone
# YAML: they contain Go templating directives ({{ ... }} / {{- ... }}) that
# yamllint's parser rejects with "syntax error" and "too many spaces inside
# braces". This is the canonical UDS / Helm pattern — chart templates are
# validated by `helm lint` / `helm template` (see .github/workflows/test.yaml),
# not by yamllint. We therefore exclude the template directories here and keep
# yamllint focused on the hand-authored YAML (packages, mesh, kustomize, CI).
#
# The relaxations below mirror the inline ruleset that the Test workflow used
# previously (line-length 200, document-start/truthy disabled) so behaviour is
# unchanged for every file that was already being linted.

extends: default

# Helm renders these; yamllint must not parse them as plain YAML.
# Covers every chart's templates/ dir: the receipts/vessel charts under
# charts/, the UDS operator chart under operator/chart/, and the capability
# charts under capabilities/*/chart/.
ignore: |
  charts/*/templates/
  charts/**/templates/
  operator/**/templates/
  capabilities/**/templates/
  node_modules/
  .git/

rules:
  line-length:
    max: 200
  document-start: disable
  truthy: disable
  # Helm/UDS chart values and CI files frequently use a single space before an
  # inline comment; keep that allowance so existing files stay green.
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
