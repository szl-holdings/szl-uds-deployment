#
# v0.4.0 mesh — per-namespace PeerAuthentication: STRICT
#
# One namespace-wide PeerAuthentication per SZL namespace forces every
# inbound connection to the workloads in that namespace to be an mTLS tunnel
# (TLS with a client cert presented). Plaintext sidecar-to-sidecar traffic is
# rejected. This is the substrate the AuthorizationPolicies build on: principal
# identity in source.principals is only trustworthy because STRICT mTLS proves it.
#
# Schema + semantics (mode STRICT = "Connection is an mTLS tunnel"):
#   https://istio.io/latest/docs/reference/config/security/peer_authentication/
# Namespace-wide policy is named `default` per Istio convention:
#   https://istio.io/latest/docs/tasks/security/authentication/authn-policy/
#
# NOTE: UDS Core's slim-dev ships Istio and (by default) operates the mesh in a
# posture where these resources are additive. Apply AFTER namespaces are labeled
# `istio-injection=enabled` and pods have been restarted so sidecars exist;
# applying STRICT before sidecars are present would break plaintext callers.
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default
  namespace: szl-rosie
  labels:
    szl.io/component: mesh-mtls
    szl.io/mesh-version: v0.4.0
spec:
  mtls:
    mode: STRICT
---
