#
# szl-receipts-ed25519.yaml — Ed25519 signing key Secret for Pepr receipt signing
#
# This Secret MUST be created before deploying szl-uds-deployment. The Pepr module
# (pepr/policies/szl-receipt-on-deploy.ts) reads SZL_HMAC_KEY from environment,
# which is injected from this Secret. Without this Secret, the Pepr module runs in
# demo mode, emitting "UNSIGNED-DEMO-KEY-NOT-CONFIGURED" in signatures[].sig.
#
# ── FOUNDER ACTION REQUIRED ────────────────────────────────────────────────────
# This file contains PLACEHOLDER values. The founder MUST:
#
#   1. Generate the Ed25519 keypair:
#      bash scripts/generate-receipt-key.sh
#
#   2. Apply the real Secret BEFORE deploying this bundle:
#      # The script outputs a kubectl-apply command — run it, OR:
#      kubectl create secret generic szl-receipts-ed25519 \
#        --namespace pepr-system \
#        --from-literal=key.priv="$(openssl genpkey -algorithm Ed25519 | base64 -w0)" \
#        --from-literal=key.pub="$(openssl pkey -in /tmp/ed25519.pem -pubout | base64 -w0)"
#
#   3. For GitOps: encrypt the Secret with Bitnami sealed-secrets and commit
#      the SealedSecret instead of this placeholder:
#      kubeseal --namespace pepr-system < szl-receipts-ed25519.yaml > \
#        szl-receipts-ed25519.sealedsecret.yaml
#
# ── HONEST LABELING ────────────────────────────────────────────────────────────
# This is a software Ed25519 key stored in a Kubernetes Secret. It is NOT an
# HSM/KMS-custodied key. Real hardware key custody is roadmap, not implemented.
#
# ── VERIFY KEY IS ACTIVE ───────────────────────────────────────────────────────
# After deploy, verify Pepr is using the key (not demo mode):
#   kubectl logs -n pepr-system -l app=pepr-admission -f | grep -E "HMAC|SZL_HMAC_KEY|UNSIGNED"
#   # Expected: no "UNSIGNED-DEMO-KEY-NOT-CONFIGURED" in logs
#   # Expected: receipt annotations on new Deployments with real signatures
#
# Refs:
#   Pepr Deep Dive: team/zarf-uds-deep-sweep/PEPR_DEEP_DIVE.md
#   Key generation: scripts/generate-receipt-key.sh
#   SZL_OPERATIONAL_UPGRADES.md U4 (P0, S)
apiVersion: v1
kind: Secret
metadata:
  name: szl-receipts-ed25519
  namespace: pepr-system
  labels:
    app.kubernetes.io/name: szl-receipts
    app.kubernetes.io/component: signing-key
    szl.io/key-type: ed25519
    szl.io/key-purpose: dsse-receipt-signing
  annotations:
    szl.io/founder-action: "FA-KEY-001"
    szl.io/founder-instruction: "Run scripts/generate-receipt-key.sh and apply the output BEFORE bundle deploy"
    szl.io/key-rotation: "manual — rotate annually or on compromise"
    szl.io/honest-label: "software-key — not HSM-custodied"
type: Opaque
data:
  # PLACEHOLDER: base64 of an Ed25519 private key in PKCS#8 PEM format.
  # Replace with real key from scripts/generate-receipt-key.sh
  # DO NOT commit real key material here — use SealedSecret or GHA secrets.
  key.priv: PLACEHOLDER_BASE64_ED25519_PRIVATE_KEY_RUN_GENERATE_SCRIPT
  key.pub: PLACEHOLDER_BASE64_ED25519_PUBLIC_KEY_RUN_GENERATE_SCRIPT
