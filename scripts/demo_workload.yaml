#
# Demo workload manifest — apply to trigger SZL receipt emission
# kubectl apply -f scripts/demo_workload.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: szl-demo-workload
  labels:
    istio.io/dataplane-mode: ambient
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: szl-demo-agent
  namespace: szl-demo-workload
  labels:
    app: szl-demo-agent
    szl.io/workload-type: agentic
    app.kubernetes.io/version: "0.1.0"
  annotations:
    szl.io/description: "Demo agentic workload for Warhacker 2026 — receipt-traced by Pepr policy"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: szl-demo-agent
  template:
    metadata:
      labels:
        app: szl-demo-agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          image: docker.io/library/busybox:1.36
          command: ["sh", "-c", "echo 'SZL demo agent: running since $(date)'; sleep 3600"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
---
apiVersion: batch/v1
kind: Job
metadata:
  name: szl-demo-job
  namespace: szl-demo-workload
  labels:
    szl.io/workload-type: batch
spec:
  template:
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: task
          image: docker.io/library/busybox:1.36
          command: ["sh", "-c", "echo 'SZL batch complete'; exit 0"]
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "50m"
              memory: "32Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            readOnlyRootFilesystem: true
