# zarf.yaml — SZL Vessels Demo Package
#
# Zarf v0.77.0-compliant package manifest.
# Signing is KEYLESS — handled by the CI workflow (uds-package-release.yml)
# via cosign + Sigstore GitHub OIDC. No cosign key provisioning required.
#
# Build:
#   zarf package create . --set VERSION=0.3.1 --architecture amd64 --confirm
#
# Deploy:
#   zarf package deploy zarf-package-szl-vessels-demo-amd64-0.3.1.tar.zst --confirm
#
# Verify signature:
#   zarf package verify zarf-package-szl-vessels-demo-amd64-0.3.1.tar.zst \
#     --certificate-identity "https://github.com/szl-holdings/vessels/.github/workflows/uds-package-release.yml@refs/tags/v0.3.1" \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
#
# References:
#   Zarf schema:   https://docs.zarf.dev/ref/zarf-package/
#   UDS add-on:    https://github.com/defenseunicorns/uds-core
#   vessels repo:  https://github.com/szl-holdings/vessels
#   uds-mesh repo: https://github.com/szl-holdings/uds-mesh
#   a11oy repo:    https://github.com/szl-holdings/a11oy

# yaml-language-server: $schema=https://raw.githubusercontent.com/zarf-dev/zarf/main/zarf.schema.json
kind: ZarfPackageConfig

metadata:
  name: szl-vessels-demo
  # VERSION is injected at build time: --set VERSION=<git-tag-without-v>
  version: "###ZARF_PKG_TMPL_VERSION###"
  description: >-
    SZL maritime vessel intelligence demo — sanctions screening, dark-vessel
    detection, ownership graph analysis, and voyage analytics.
    Includes uds-mesh span schemas, a11oy policy substrate, and Pepr
    DSSE governance receipts.
  url: "https://szlholdings.com"
  authors: "SZL Holdings <eng@szlholdings.com>"
  documentation: "https://github.com/szl-holdings/szl-uds-deployment"
  image: "ghcr.io/szl-holdings/vessels:###ZARF_PKG_TMPL_VERSION###"
  # Keyless cosign signing is applied by the CI workflow after package creation.
  # Consumers verify with:
  #   zarf package verify <pkg> \
  #     --certificate-identity <workflow-ref> \
  #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
  uncompressed: false

# ── Variables ─────────────────────────────────────────────────────────────────
# All variables have defaults; operators override via --set or uds-bundle.yaml.

variables:
  - name: VERSION
    description: "Package version (injected from git tag at build time)"
    default: "0.3.1"

  - name: DOMAIN
    description: "Cluster domain — must match UDS Core DOMAIN"
    default: "uds.dev"

  - name: VESSELS_IMAGE_TAG
    description: "Docker image tag for the vessels service"
    default: "###ZARF_PKG_TMPL_VERSION###"

  - name: UDSMESH_IMAGE_TAG
    description: "Docker image tag for uds-mesh span relay"
    default: "latest"

  - name: A11OY_IMAGE_TAG
    description: "Docker image tag for a11oy policy substrate"
    default: "latest"

  - name: VESSELS_REPLICAS
    description: "Number of vessels-web replicas"
    default: "1"

  - name: VESSELS_IMO_SANCTIONS_URL
    description: "Upstream OFAC/UN sanctions feed URL. Set to empty string in airgap: --set VESSELS_IMO_SANCTIONS_URL=. Airgap-safe mode warns and skips if empty. See docs/AIRGAP.md"
    default: "https://sanctionslist.ofac.treas.gov/Home/SdnList"

  - name: RECEIPT_HMAC_KEY
    description: "Base64-encoded HMAC-SHA-256 key for governance receipts"
    default: "c3psLWRldi1kZW1vLWtleS0yMDI2LXdhcmhhY2tlcg=="
    sensitive: true

  - name: OTEL_ENDPOINT
    description: "OTLP gRPC endpoint for vsp-otel spans (optional)"
    default: ""

# ── Components ────────────────────────────────────────────────────────────────

components:
  # ── 1. Namespace setup ───────────────────────────────────────────────────
  - name: szl-vessels-namespace
    required: true
    description: "Create szl-vessels namespace with UDS labels"
    manifests:
      - name: szl-vessels-ns
        namespace: szl-vessels
        files:
          - manifests/namespace.yaml
          - manifests/network-policy.yaml

  # ── 2. Vessels web service ───────────────────────────────────────────────
  - name: vessels-web
    required: true
    description: >-
      Maritime vessel intelligence service: REST API for sanctions screening,
      dark-vessel detection, ownership graph analysis, and voyage analytics.
    images:
      # Primary application image — built from szl-holdings/vessels
      - ghcr.io/szl-holdings/vessels:###ZARF_PKG_TMPL_VERSION###
      # Sidecar: NGINX reverse proxy for TLS termination inside the mesh
      - docker.io/library/nginx:1.27-alpine
    charts:
      - name: vessels
        namespace: szl-vessels
        version: "###ZARF_PKG_TMPL_VERSION###"
        localPath: charts/vessels
        valuesFiles:
          - values.yaml
        variables:
          - name: VESSELS_REPLICAS
            description: "Vessel replica count"
            path: replicaCount
          - name: VESSELS_IMO_SANCTIONS_URL
            description: "Sanctions feed URL"
            path: vessels.sanctionsUrl
          - name: DOMAIN
            description: "Cluster domain"
            path: global.domain
    actions:
      onDeploy:
        after:
          - description: "Wait for vessels-web Deployment to be Available"
            maxTotalSeconds: 180
            wait:
              cluster:
                kind: Deployment
                name: vessels-web
                namespace: szl-vessels
                condition: Available

  # ── 3. uds-mesh span relay ───────────────────────────────────────────────
  - name: uds-mesh
    required: false
    description: >-
      UDS-mesh cross-component span relay: collects governance receipt spans
      from vessels, a11oy, and Pepr, and forwards them to vsp-otel.
    images:
      - ghcr.io/szl-holdings/uds-mesh:###ZARF_PKG_TMPL_VAR_UDSMESH_IMAGE_TAG###
    charts:
      - name: uds-mesh
        namespace: szl-vessels
        version: "0.1.0"
        localPath: charts/uds-mesh
        variables:
          - name: OTEL_ENDPOINT
            description: "OTLP gRPC endpoint"
            path: otel.endpoint
    actions:
      onDeploy:
        after:
          - description: "Verify uds-mesh relay is running"
            maxTotalSeconds: 90
            wait:
              cluster:
                kind: Deployment
                name: uds-mesh-relay
                namespace: szl-vessels
                condition: Available

  # ── 4. a11oy policy substrate ────────────────────────────────────────────
  - name: a11oy
    required: false
    description: >-
      a11oy vertical alignment substrate: policy measurement and QEC-integrity
      packages for governed AI execution. Runs as a DaemonSet admission sidecar.
    images:
      - ghcr.io/szl-holdings/a11oy:###ZARF_PKG_TMPL_VAR_A11OY_IMAGE_TAG###
    charts:
      - name: a11oy
        namespace: szl-vessels
        version: "0.1.0"
        localPath: charts/a11oy
    actions:
      onDeploy:
        after:
          - description: "Verify a11oy policy engine is ready"
            maxTotalSeconds: 90
            wait:
              cluster:
                kind: DaemonSet
                name: a11oy-policy-agent
                namespace: szl-vessels
                condition: Ready

  # ── 5. Pepr governance receipts ──────────────────────────────────────────
  - name: szl-pepr-receipts
    required: false
    description: >-
      Pepr admission controller: emits DSSE-shaped governance receipts for
      every Deployment and Job, annotates resources, and optionally forwards
      OTLP spans to vsp-otel.
    # The Pepr module is built separately and its compiled output (dist/pepr/)
    # is included here. See uds/pepr/governance-receipts.ts.
    manifests:
      - name: pepr-webhook
        namespace: pepr-system
        files:
          - manifests/pepr-webhook.yaml
    images:
      # Pepr controller image (Defense Unicorns)
      - ghcr.io/defenseunicorns/pepr/controller:latest
    actions:
      onDeploy:
        before:
          - description: "Create pepr-system namespace if absent"
            cmd: |
              ./zarf tools kubectl get namespace pepr-system 2>/dev/null || \
              ./zarf tools kubectl create namespace pepr-system
        after:
          - description: "Verify Pepr webhook is registered"
            maxTotalSeconds: 60
            wait:
              cluster:
                kind: MutatingWebhookConfiguration
                name: szl-governance-receipts
                condition: exists
          - description: "Log Pepr operational status"
            cmd: |
              ./zarf tools kubectl get mutatingwebhookconfigurations \
                szl-governance-receipts \
                -o jsonpath='{.metadata.name}: registered, CABundle length={.webhooks[0].clientConfig.caBundle|length}'
              echo ""

  # ── 6. SBOM manifest ─────────────────────────────────────────────────────
  # The Zarf package automatically bundles SBOMs during package create.
  # The sbom/ directory is populated by `zarf package create --sbom`.
  # Additionally, an SPDX SBOM generated by syft is attested via cosign in CI.

# ── Constants ─────────────────────────────────────────────────────────────────
# Zarf v0.77.0 package signing note:
# Packages built in CI are signed keylessly via:
#   cosign sign-blob --yes --bundle <pkg>.cosign.bundle <pkg>
# The certificate identity will be:
#   https://github.com/szl-holdings/vessels/.github/workflows/uds-package-release.yml@refs/tags/v<VERSION>
# Verification does not require a local cosign key.
