#
# uds-cli task definitions for the SZL Warhacker demo
#
# Usage:
#   uds run start          # full bootstrap + deploy (90 seconds on a modern laptop)
#   uds run demo:workload   # apply a sample workload that gets receipt-traced
#   uds run demo:scenario  # run the Day 3 drone-deny scenario (step 10)
#   uds run demo:verify    # verify the receipt chain in the cluster
#   uds run teardown       # destroy the k3d cluster
#
# Requires: uds CLI, zarf CLI, k3d, docker
# Reference: https://github.com/defenseunicorns/uds-cli/blob/main/docs/tasks.md

variables:
  - name: CLUSTER_NAME
    default: uds-szl-demo

  - name: DOMAIN
    default: uds.dev

  - name: VERSION
    default: "0.4.0"

  # ── Build-flavor selection (Gap 3 fix) ────────────────────────────────────
  # Zarf flavor grammar X.Y.Z-upstream|registry1|unicorn (per uds-core
  # build-your-bundle docs). `upstream` pins the VERIFIED public images and is
  # the only flavor with published artifacts today; `unicorn` (wolfi/registry1)
  # is roadmap (images 404, see team/UDS_PACKAGING_BUILD_REPORT.md §2). The
  # start task fails fast with a clear message if FLAVOR=unicorn is requested
  # before those images are published.
  - name: FLAVOR
    default: "upstream"

  # ── receipts-server image (Gap 1) ─────────────────────────────────────────
  # The OCI image tag the chart pulls (charts/szl-receipts/values.yaml).
  - name: RECEIPTS_IMAGE
    default: "ghcr.io/szl-holdings/szl-receipts-server"
  - name: RECEIPTS_IMAGE_TAG
    default: "uds-v0.4.0"

  # When true (default), the start task builds the receipts-server image locally
  # and imports it into the k3d cluster so deploy never stalls on a GHCR pull —
  # even if the published image is not yet present. Set to false to force a pull
  # of the published ghcr.io image (use after receipts-server-image.yml runs).
  - name: BUILD_RECEIPTS_LOCAL
    default: "true"

  # When true, build + deploy the szl-governance Pepr capability as part of
  # `uds run start`. Requires Docker (pepr build emits a controller image).
  - name: WITH_PEPR
    default: "true"

  # Safety override for `uds run teardown`. Teardown REFUSES to destroy the
  # cluster while it shows in-flight activity (see the idle-check task) unless
  # this is set: `uds run teardown --set FORCE=true`.
  - name: FORCE
    default: "false"

  # How recently a ReplicaSet must have been created for the cluster to count as
  # "still settling" (a fresh RS hash = a recent rollout a pod-phase glance
  # misses). Used by idle-check / teardown.
  - name: IDLE_WINDOW_MINUTES
    default: "10"

includes:
  - test: ./tasks/test.yaml
  - demo: ./tasks/demo.yaml
  - smoke: ./tasks/smoke.yaml

tasks:
  # ── Cold smoke entry point ────────────────────────────────────────────────
  # `uds run smoke`: cold k3d -> deploy szl-warhacker bundle -> honest readiness
  # check of szl-receipts (hard PASS) + the 5 apps (PASS or SKIPPED-on-FA-001).
  # Implemented in tasks/smoke.yaml; aliased here so `uds run smoke` works.
  - name: smoke
    description: "Cold k3d up + deploy + honest readiness of receipts and the 5 apps"
    actions:
      - task: smoke:smoke

  # ── Primary entry point ───────────────────────────────────────────────────
  - name: start
    description: "Provision -> build/publish receipts-server -> uds deploy core -> deploy bundle -> Pepr capability -> verify (clean end-to-end)"
    actions:
      - description: "Check required tools"
        cmd: |
          for tool in uds zarf k3d docker; do
            if ! command -v $tool >/dev/null 2>&1; then
              echo "ERROR: $tool is not installed. See docs/INSTALL.md for setup."
              exit 1
            fi
          done
          echo "All required tools found."

      # ── Gap 3: build-flavor selection ───────────────────────────────────────
      - description: "Validate build flavor (upstream has published images; unicorn is roadmap)"
        cmd: |
          case "${FLAVOR}" in
            upstream)
              echo "FLAVOR=upstream — pinning VERIFIED public images (the only published flavor)."
              ;;
            unicorn|registry1)
              echo "ERROR: FLAVOR=${FLAVOR} selected, but the wolfi/registry1 (0.5.0-wolfi) images"
              echo "       are NOT yet published (HTTP 404 — see team/UDS_PACKAGING_BUILD_REPORT.md §2)."
              echo "       Publish those images first, then re-run with -- --set FLAVOR=${FLAVOR}."
              echo "       For the demo today use the default: uds run start (FLAVOR=upstream)."
              exit 1
              ;;
            *)
              echo "ERROR: unknown FLAVOR='${FLAVOR}' (expected upstream|unicorn|registry1)."; exit 1
              ;;
          esac

      - description: "Create k3d cluster"
        cmd: |
          if k3d cluster list | grep -q "${CLUSTER_NAME}"; then
            echo "Cluster ${CLUSTER_NAME} already exists — skipping create."
          else
            k3d cluster create "${CLUSTER_NAME}" \
              --k3s-arg "--disable=traefik@server:0" \
              --port "80:80@loadbalancer" \
              --port "443:443@loadbalancer" \
              --port "8443:8443@loadbalancer" \
              --wait
            echo "Cluster ${CLUSTER_NAME} created."
          fi

      # ── Gap 1: ensure the receipts-server image is pullable ─────────────────
      # If the published GHCR image is not present (or BUILD_RECEIPTS_LOCAL=true)
      # we build it from services/szl-receipts-server and import it straight into
      # the k3d cluster, so `uds deploy` never stalls pulling it. To rely on the
      # published image instead, run the receipts-server-image.yml workflow
      # (gh workflow run receipts-server-image.yml -f version=${RECEIPTS_IMAGE_TAG})
      # then start with -- --set BUILD_RECEIPTS_LOCAL=false.
      - description: "Build + load szl-receipts-server image into the cluster (if needed)"
        cmd: |
          REF="${RECEIPTS_IMAGE}:${RECEIPTS_IMAGE_TAG}"
          if [ "${BUILD_RECEIPTS_LOCAL}" = "true" ]; then
            echo "Building ${REF} from services/szl-receipts-server ..."
            docker build -t "${REF}" services/szl-receipts-server
            echo "Importing ${REF} into k3d cluster ${CLUSTER_NAME} ..."
            k3d image import "${REF}" -c "${CLUSTER_NAME}"
            echo "receipts-server image is present in-cluster (no GHCR pull needed)."
          else
            echo "BUILD_RECEIPTS_LOCAL=false — relying on published ${REF} from GHCR."
            echo "If deploy stalls pulling it, the image was not published; run:"
            echo "  gh workflow run receipts-server-image.yml -f version=${RECEIPTS_IMAGE_TAG}"
          fi

      # The bundle build (zarf package pre-build into packages/szl-receipts/ +
      # uds create --skip-signature-validation) is encapsulated in the `bundle`
      # task below so `uds run bundle` and `uds run start` share one code path and
      # both build from a CLEAN CHECKOUT with no manual zarf invocations.
      - task: bundle

      - description: "Deploy the SZL receipts bundle (uds deploy core is layer 2 of the bundle)"
        cmd: |
          # `uds create .` builds uds-bundle-szl-receipts-bundle-<arch>-<ver>.tar.zst
          # (metadata name `szl-receipts-bundle`). Detect the newest tarball rather
          # than hard-coding the name/arch so the documented base path never drifts
          # from the bundle metadata again (matches the recreate-full deploy step).
          BUNDLE=$(ls -t uds-bundle-*.tar.zst 2>/dev/null | head -1)
          if [ -z "${BUNDLE}" ]; then
            echo "ERROR: no uds-bundle-*.tar.zst found after build." >&2; exit 1
          fi
          echo "Deploying bundle: ${BUNDLE}"
          uds deploy "${BUNDLE}" \
            --set DOMAIN=${DOMAIN} \
            --set INSECURE_ADMIN_PASSWORD_GENERATION=true \
            --confirm \
            --no-progress

      # ── Gap 3: Pepr capability step (capabilities/szl-governance) ───────────
      # Builds the szl-governance Pepr admission module (emits the controller
      # image + manifests), packages it with Zarf, and deploys it so the
      # a11oy/killinchu receipt-gate is wired into the deploy sequence. Skipped
      # cleanly when WITH_PEPR=false (e.g. environments without Docker).
      - description: "Build + deploy the szl-governance Pepr capability"
        cmd: |
          if [ "${WITH_PEPR}" != "true" ]; then
            echo "WITH_PEPR=false — skipping Pepr capability (set WITH_PEPR=true to enable)."
            exit 0
          fi
          echo "Building szl-governance Pepr module ..."
          ( cd capabilities/szl-governance && npm ci && npm run build )
          echo "Packaging the capability with Zarf ..."
          zarf package create capabilities/szl-governance --confirm --no-progress
          echo "Deploying the capability ..."
          zarf package deploy zarf-package-szl-governance-*.tar.zst --confirm --no-progress
          echo "szl-governance Pepr capability deployed."

      # ── Gap 3: end-to-end verify ────────────────────────────────────────────
      - description: "Verify deploy: receipts-server Ready + (if enabled) Pepr webhook present"
        cmd: |
          echo "Waiting for szl-receipts-server to be Available ..."
          kubectl -n szl-receipts rollout status deployment/szl-receipts-server --timeout=120s
          echo "receipts-server health:"
          kubectl -n szl-receipts get pods -l app.kubernetes.io/name=szl-receipts -o wide || true
          if [ "${WITH_PEPR}" = "true" ]; then
            echo "Checking Pepr admission webhook ..."
            kubectl get mutatingwebhookconfigurations -l pepr.dev/uuid=szl-governance-001 2>/dev/null \
              || kubectl get mutatingwebhookconfigurations 2>/dev/null | grep -i szl-governance \
              || echo "WARN: szl-governance webhook not yet visible — may take up to 30s"
          fi
          echo "Verify complete."

      - description: "Print access info"
        cmd: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║          SZL Receipts — Warhacker 2026 Demo             ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Dashboard:  https://szl.uds.dev (add to /etc/hosts)   ║"
          echo "║  Port-fwd:   kubectl port-forward svc/szl-receipts \\    ║"
          echo "║              8443:8443 -n szl-receipts                 ║"
          echo "║  Then open:  http://localhost:8443                      ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""

  # ── Build-only: airgap UDS bundle ──────────────────────────
  # `uds run bundle`: build the self-contained UDS bundle tarball (init + core +
  # szl-receipts) from a CLEAN CHECKOUT with no manual zarf invocations. Two
  # uds-cli (v0.32.0) gotchas are encapsulated here:
  #   1. For the local `path: ./packages/szl-receipts` package, uds-cli does NOT
  #      build it for you — it looks for
  #      packages/szl-receipts/zarf-package-szl-receipts-amd64-<ver>.tar.zst and
  #      errors "no such file" if absent. So we build the zarf package INTO that
  #      directory first.
  #   2. `uds create` itself needs --skip-signature-validation (not just
  #      `uds deploy`): the init/core OCI packages are cosign-keyless-signed by
  #      different OIDC identities, which strict validation rejects.
  - name: bundle
    description: "Build the airgap UDS bundle tarball from a clean checkout (no manual zarf steps)"
    actions:
      - description: "Pre-build the szl-receipts Zarf package into packages/szl-receipts/ (flavor=${FLAVOR})"
        cmd: |
          zarf package create packages/szl-receipts \
            --flavor ${FLAVOR} \
            --output packages/szl-receipts \
            --confirm \
            --no-progress
      - description: "Create the UDS bundle (--skip-signature-validation: init/core are keyless-signed by different identities)"
        cmd: |
          uds create . \
            --skip-signature-validation \
            --confirm \
            --no-progress

  # ── Idle / in-flight activity check ─────────────────────────────
  # "Idle" is NOT "all pods Running". A Deployment can be mid-rollout while every
  # pod still reads Running (the new ReplicaSet hash is spinning up while the old
  # one drains) -- exactly the grafana/image-renderer window from task #228 that a
  # pod-phase glance missed. scripts/idle-check.sh therefore judges idleness by
  # rollout state (ReplicaSet hash/age + Deployment rollout status) and live
  # deploy processes, not by pod phase. Run standalone to inspect the cluster:
  #   uds run idle-check
  # Exit 0 = idle, exit 1 = busy. Tune the window with --set IDLE_WINDOW_MINUTES=N.
  - name: idle-check
    description: "Report whether the demo cluster is idle (safe to tear down) or has in-flight churn"
    actions:
      - description: "Inspect ${CLUSTER_NAME} for in-flight activity"
        cmd: |
          CLUSTER_NAME="${CLUSTER_NAME}" IDLE_WINDOW_MINUTES="${IDLE_WINDOW_MINUTES}" \
            sh ./scripts/idle-check.sh

  # ── Teardown ────────────────────────────────────────────────────────
  - name: teardown
    description: "Destroy the k3d demo cluster (refuses while work is in flight; override with --set FORCE=true)"
    actions:
      - description: "Refuse to tear down while the cluster has in-flight work"
        cmd: |
          if [ "${FORCE}" = "true" ]; then
            echo "WARNING: FORCE=true -> skipping the in-flight activity check."
          else
            CLUSTER_NAME="${CLUSTER_NAME}" IDLE_WINDOW_MINUTES="${IDLE_WINDOW_MINUTES}" \
              sh ./scripts/idle-check.sh || {
                echo ""
                echo "Refusing to destroy '${CLUSTER_NAME}' -- a sibling task may be mid-deploy."
                echo "Re-run with --set FORCE=true once you have confirmed it is safe:"
                echo "    uds run teardown --set FORCE=true"
                exit 1
              }
          fi
      - description: "Delete k3d cluster"
        cmd: |
          k3d cluster delete "${CLUSTER_NAME}" && echo "Cluster deleted."

  # ── Dependency installer ──────────────────────────────────────────────────
  - name: install-deps
    description: "Install uds, zarf, k3d on macOS/Linux (requires curl)"
    actions:
      - description: "Install uds CLI"
        cmd: |
          if ! command -v uds >/dev/null 2>&1; then
            curl -sL https://github.com/defenseunicorns/uds-cli/releases/latest/download/uds-cli_linux_amd64 \
              -o /usr/local/bin/uds && chmod +x /usr/local/bin/uds
            echo "uds installed: $(uds version)"
          else
            echo "uds already installed: $(uds version)"
          fi

      - description: "Install zarf CLI"
        cmd: |
          if ! command -v zarf >/dev/null 2>&1; then
            curl -sL https://github.com/zarf-dev/zarf/releases/latest/download/zarf_linux_amd64 \
              -o /usr/local/bin/zarf && chmod +x /usr/local/bin/zarf
            echo "zarf installed: $(zarf version)"
          else
            echo "zarf already installed: $(zarf version)"
          fi

      - description: "Install k3d"
        cmd: |
          if ! command -v k3d >/dev/null 2>&1; then
            curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          else
            echo "k3d already installed: $(k3d version)"
          fi

  # ── Port-forward convenience ──────────────────────────────────────────────
  - name: port-forward
    description: "Port-forward szl-receipts to localhost:8443"
    actions:
      - description: "kubectl port-forward"
        cmd: |
          kubectl port-forward svc/szl-receipts-server 8443:8443 -n szl-receipts &
          echo "Dashboard available at http://localhost:8443"
          echo "Press Ctrl+C to stop."
          wait

  # ── CI-required task names (R16/R17/R18 fix) ──────────────────────────────
  # Reference: https://github.com/defenseunicorns/uds-common/blob/main/docs/uds-packages/guidelines/testing-guidelines.md
  - name: test-install
    description: "CI: deploy current branch to a new cluster and run journey tests"
    actions:
      - description: "Create k3d test cluster"
        cmd: |
          k3d cluster create "${CLUSTER_NAME}-test" --wait
      - description: "Zarf init"
        cmd: |
          zarf init --confirm
      - description: "Create and deploy szl-receipts Zarf package"
        cmd: |
          zarf package create . --confirm && \
          zarf package deploy zarf-package-szl-receipts-amd64-${VERSION}.tar.zst --confirm
      - description: "Run Playwright journey tests"
        task: test:all

  - name: test-upgrade
    description: "CI: deploy previous release, then upgrade to current branch"
    actions:
      - description: "Create k3d upgrade-test cluster"
        cmd: |
          k3d cluster create "${CLUSTER_NAME}-upgrade" --wait
      - description: "Zarf init"
        cmd: |
          zarf init --confirm
      - description: "Deploy previous release (v0.3.1) from OCI"
        cmd: |
          zarf package deploy oci://ghcr.io/szl-holdings/packages/szl-receipts:0.3.1 --confirm 2>/dev/null || \
          echo "WARN: Previous OCI release not found — skipping baseline deploy (FA-001 staged)"
      - description: "Build and deploy current branch package"
        cmd: |
          zarf package create . --confirm && \
          zarf package deploy zarf-package-szl-receipts-amd64-${VERSION}.tar.zst --confirm
      - description: "Run Playwright journey tests post-upgrade"
        task: test:all

  - name: test-lint
    description: "Run static validation: yamllint + helm lint (no cluster needed)"
    actions:
      - task: test:lint

  # ── Full safe-recreate (one command) ──────────────────────────────────────
  # `uds run recreate-full`: tear the cluster down and rebuild the COMPLETE
  # pre-recreate workload set — not just the base bundle. The live uds-szl-demo
  # cluster carries more than init + UDS Core + szl-receipts:
  #   * the persistent HashiCorp Vault (ns `vault`) that backs szl-receipts
  #     Tier-2 (Transit) key custody,
  #   * the pepr-szl receipt-on-deploy admission webhook (ns `pepr-system`) plus
  #     its Ed25519 signing-key Secret,
  #   * an (empty) szl-receipts-demo scratch namespace and an (empty)
  #     monitoring namespace.
  # A literal `uds run teardown` + `uds run start` does NOT bring Vault or the
  # pepr-szl module back (start's WITH_PEPR governs only the szl-governance
  # capability, which is NOT what the live cluster runs), so after a plain
  # teardown the cluster comes back missing those. This task restores all of it
  # in one command.
  #
  # SAFETY:
  #   * Destructive by design — it deletes the cluster, which drops the
  #     local-path PVs. That means the Vault file-store (the Transit signing
  #     key) and the in-cluster receipt chain are WIPED: Vault comes back
  #     FRESH/UNINITIALIZED and a NEW signing key must be created (old receipt
  #     signatures will not verify against the new pubkey). It therefore refuses
  #     to run while the cluster shows in-flight work (same idle-check as
  #     `teardown`); override with `--set FORCE=true` only after you have
  #     confirmed a genuine idle window with no sibling work in flight.
  #   * Coexistence-safe — the cluster is recreated PORT-GUARDED: host ports
  #     80/443 are published to the k3d serverlb ONLY if they are free, so a
  #     coexisting public nginx site (e.g. a11oy.net) keeps owning them and
  #     stays up. The serverlb is born clean (kube-API + 8443 only). On a normal
  #     laptop where 80/443 are free this behaves exactly like `start`'s create.
  #
  # Restoring Tier-2 (Vault) signing after a recreate needs a one-time,
  # off-cluster operator step (the unseal-key shares live OFF git/etcd by design
  # and cannot be scripted into the repo) — the final step prints the exact
  # commands. See docs/operations/VAULT_PERSISTENT_RUNBOOK.md. On box
  # 167.233.50.75 the vault-auto-unseal systemd timer keeps Vault unsealed once
  # /root/vault-init/init.json is refreshed with the NEW shares.
  - name: recreate-full
    description: "SAFE one-command full recreate: teardown + port-guarded rebuild + Vault + pepr-szl webhook (the complete pre-recreate workload set, not just the base bundle)"
    actions:
      - description: "Refuse to recreate while the cluster has in-flight work (override with --set FORCE=true)"
        cmd: |
          if [ "${FORCE}" = "true" ]; then
            echo "WARNING: FORCE=true -> skipping the in-flight activity check."
          else
            CLUSTER_NAME="${CLUSTER_NAME}" IDLE_WINDOW_MINUTES="${IDLE_WINDOW_MINUTES}" \
              sh ./scripts/idle-check.sh || {
                echo ""
                echo "Refusing to recreate '${CLUSTER_NAME}' -- a sibling task may be mid-deploy."
                echo "Re-run with --set FORCE=true once you have confirmed a genuine idle window:"
                echo "    uds run recreate-full --set FORCE=true"
                exit 1
              }
          fi

      - description: "Record the namespaces present BEFORE recreate (for the after-comparison)"
        cmd: |
          echo "Namespaces present BEFORE recreate:"
          kubectl get ns -o name 2>/dev/null | sed 's#namespace/#  - #' || echo "  (no reachable cluster)"

      - description: "Tear down the existing cluster"
        cmd: |
          if k3d cluster list 2>/dev/null | grep -q "${CLUSTER_NAME}"; then
            k3d cluster delete "${CLUSTER_NAME}" && echo "Cluster ${CLUSTER_NAME} deleted."
          else
            echo "No existing ${CLUSTER_NAME} cluster — nothing to delete."
          fi

      - description: "Create the k3d cluster PORT-GUARDED (publish host 80/443 only if free) [coexist-portguard]"
        cmd: |
          # coexist-portguard: where nginx already owns host 80/443 (a public
          # site like a11oy.net) we must NOT let the k3d serverlb grab them or
          # the site goes offline. Publish 80/443 to the loadbalancer ONLY when
          # the host port is free; always publish 8443. On a laptop where 80/443
          # are free this is identical to the base `start` create.
          PORTS=( --port "8443:8443@loadbalancer" )
          for P in 80 443; do
            if ss -ltnH "sport = :$P" 2>/dev/null | grep -q .; then
              echo "host port $P is busy (nginx?) — NOT publishing it to the serverlb (coexist)."
            else
              PORTS+=( --port "$P:$P@loadbalancer" )
            fi
          done
          k3d cluster create "${CLUSTER_NAME}" \
            --k3s-arg "--disable=traefik@server:0" \
            "${PORTS[@]}" \
            --wait
          echo "Cluster ${CLUSTER_NAME} created (port-guarded)."

      - description: "Re-apply the persistent Vault (ns + ServiceAccount + PVC + ConfigMap + Deployment + Service) BEFORE receipts"
        cmd: |
          kubectl apply -f manifests/vault-namespace.yaml
          kubectl apply -f k8s/vault/vault-persistent.yaml
          kubectl -n vault rollout status deploy/vault --timeout=120s || \
            echo "WARN: vault not Ready yet — it is intentionally Ready-while-sealed; continuing."

      - description: "Build + load the szl-receipts-server image into the cluster (mirrors start; bundle also bakes it)"
        cmd: |
          REF="${RECEIPTS_IMAGE}:${RECEIPTS_IMAGE_TAG}"
          if [ "${BUILD_RECEIPTS_LOCAL}" = "true" ]; then
            echo "Building ${REF} from services/szl-receipts-server ..."
            docker build -t "${REF}" services/szl-receipts-server
            k3d image import "${REF}" -c "${CLUSTER_NAME}"
            echo "receipts-server image present in-cluster."
          else
            echo "BUILD_RECEIPTS_LOCAL=false — relying on the image baked into the bundle / GHCR."
          fi

      - description: "Build the UDS bundle (init + core + szl-receipts) from a clean checkout"
        task: bundle

      - description: "Deploy the UDS bundle (init + UDS Core + szl-receipts)"
        cmd: |
          # Deploy whatever bundle `uds create .` produced. We detect the newest
          # tarball rather than hard-coding the bundle name (the legacy `start`
          # glob `uds-bundle-szl-warhacker-demo-*` is stale vs the current
          # `szl-receipts-bundle` metadata — see the box-drift task).
          BUNDLE=$(ls -t uds-bundle-*.tar.zst 2>/dev/null | head -1)
          if [ -z "${BUNDLE}" ]; then
            echo "ERROR: no uds-bundle-*.tar.zst found after build." >&2; exit 1
          fi
          echo "Deploying bundle: ${BUNDLE}"
          uds deploy "${BUNDLE}" \
            --set DOMAIN=${DOMAIN} \
            --set INSECURE_ADMIN_PASSWORD_GENERATION=true \
            --confirm \
            --no-progress

      - description: "Ensure the empty scratch namespaces present pre-recreate (szl-receipts-demo, monitoring)"
        cmd: |
          # szl-receipts-demo is a hands-on scratch namespace (ephemeral, no
          # zarf/helm/UDS owner) and `monitoring` is an empty placeholder on this
          # box (no Prometheus/Grafana fits the 2-vCPU node). Neither has a
          # managed source to redeploy, so we just recreate the empty namespaces
          # (idempotent) to match the pre-recreate namespace set. Real scratch
          # workloads are re-applied by hand as needed.
          for NS in szl-receipts-demo monitoring; do
            kubectl create namespace "${NS}" --dry-run=client -o yaml | kubectl apply -f -
          done
          echo "scratch namespaces ensured."

      - description: "Deploy the pepr-szl receipt-on-deploy webhook + Ed25519 signing key (WITH_PEPR=true)"
        cmd: |
          if [ "${WITH_PEPR}" != "true" ]; then
            echo "WITH_PEPR=false — skipping the pepr-szl webhook (set WITH_PEPR=true to enable)."
            exit 0
          fi
          echo "Building + deploying the pepr-szl module from pepr/ ..."
          ( cd pepr && npm ci && npm run deploy )
          echo "Ensuring the Ed25519 signing-key Secret in pepr-system ..."
          if kubectl -n pepr-system get secret szl-receipts-ed25519 >/dev/null 2>&1; then
            echo "  signing-key Secret already present — leaving it in place."
          else
            TMPK=$(mktemp)
            bash scripts/generate-receipt-key.sh > "${TMPK}"
            kubectl apply -f "${TMPK}"
            shred -u "${TMPK}" 2>/dev/null || rm -f "${TMPK}"
            echo "  signing-key Secret created."
          fi
          # Pepr regenerates its Deployment on deploy and drops the key mount; on
          # the box the pepr-key-mount timer re-attaches it (and forces
          # strategy=Recreate so the 2-vCPU node never surge-deadlocks). Run it
          # now if installed.
          [ -x /usr/local/sbin/pepr-key-mount ] && /usr/local/sbin/pepr-key-mount || true
          echo "pepr-szl webhook deployed."

      - description: "Coexistence safety net + Vault re-init guidance"
        cmd: |
          # Belt-and-suspenders in case anything re-grabbed host 80/443.
          [ -x /usr/local/sbin/a11oy-serverlb-deconflict ] && /usr/local/sbin/a11oy-serverlb-deconflict || true
          echo ""
          echo "NOTE: the teardown dropped the Vault PV, so Vault is now FRESH/UNINITIALIZED."
          echo "      A NEW Transit signing key must be created — OLD receipt signatures will"
          echo "      NOT verify against the new pubkey. Initialize it once (off-cluster):"
          echo "        kubectl -n vault exec deploy/vault -- vault operator init -key-shares=1 -key-threshold=1 -format=json   # store OFF-cluster"
          echo "        kubectl -n vault exec deploy/vault -- vault operator unseal <unseal-key>"
          echo "        VAULT_ADDR=http://127.0.0.1:8200 VAULT_TOKEN=<root> scripts/setup-vault-transit.sh --k8s-auth --k8s-namespace szl-receipts --k8s-sa szl-receipts"
          echo "      On box 167.233.50.75, refresh /root/vault-init/init.json with the new"
          echo "      shares so the vault-auto-unseal timer keeps Vault unsealed across restarts,"
          echo "      then delete the receipts pod so it re-inits its Vault signer."

      - description: "Verify: full workload set present + Ready, serverlb clean, a11oy.net reachable"
        cmd: |
          echo "Namespaces present AFTER recreate:"
          kubectl get ns -o name 2>/dev/null | sed 's#namespace/#  - #'
          echo ""
          echo "Key workloads:"
          kubectl -n vault rollout status deploy/vault --timeout=60s || echo "WARN: vault not Ready"
          kubectl -n szl-receipts rollout status deploy/szl-receipts-server --timeout=180s || echo "WARN: szl-receipts-server not Ready"
          if kubectl get mutatingwebhookconfigurations pepr-szl >/dev/null 2>&1; then
            echo "pepr-szl admission webhook present."
          else
            echo "WARN: pepr-szl webhook missing (WITH_PEPR=${WITH_PEPR})."
          fi
          echo ""
          echo "serverlb published host ports (expect kube-API + 8443, NO 80/443):"
          docker ps --filter "name=${CLUSTER_NAME}-serverlb" --format '{{.Ports}}' 2>/dev/null || true
          if command -v curl >/dev/null 2>&1; then
            code=$(curl -s -o /dev/null -w '%{http_code}' https://a11oy.net/ 2>/dev/null || echo "n/a")
            echo "a11oy.net HTTPS status: ${code}"
          fi
          echo ""
          echo "recreate-full complete."
