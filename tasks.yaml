#
# uds-cli task definitions for the SZL Warhacker demo
#
# Usage:
#   uds run start          # full bootstrap + deploy (90 seconds on a modern laptop)
#   uds run demo:workload   # apply a sample workload that gets receipt-traced
#   uds run demo:scenario  # run the Day 3 drone-deny scenario (step 10)
#   uds run demo:verify    # verify the receipt chain in the cluster
#   uds run teardown       # destroy the k3d cluster
#
# Requires: uds CLI, zarf CLI, k3d, docker
# Reference: https://github.com/defenseunicorns/uds-cli/blob/main/docs/tasks.md

variables:
  - name: CLUSTER_NAME
    default: uds-szl-demo

  - name: DOMAIN
    default: uds.dev

  - name: VERSION
    default: "0.3.1"

  # ── Build-flavor selection (Gap 3 fix) ────────────────────────────────────
  # Zarf flavor grammar X.Y.Z-upstream|registry1|unicorn (per uds-core
  # build-your-bundle docs). `upstream` pins the VERIFIED public images and is
  # the only flavor with published artifacts today; `unicorn` (wolfi/registry1)
  # is roadmap (images 404, see team/UDS_PACKAGING_BUILD_REPORT.md §2). The
  # start task fails fast with a clear message if FLAVOR=unicorn is requested
  # before those images are published.
  - name: FLAVOR
    default: "upstream"

  # ── receipts-server image (Gap 1) ─────────────────────────────────────────
  # The OCI image tag the chart pulls (charts/szl-receipts/values.yaml).
  # MUST stay in lockstep with charts/szl-receipts/values.yaml image.tag and the
  # packages/szl-receipts/zarf.yaml images: list, or the deploy ErrImagePulls.
  - name: RECEIPTS_IMAGE
    default: "ghcr.io/szl-holdings/szl-receipts-server"
  - name: RECEIPTS_IMAGE_TAG
    default: "uds-v0.4.0"

  # When true (default), the start task builds the receipts-server image locally
  # and imports it into the k3d cluster so deploy never stalls on a GHCR pull —
  # even if the published image is not yet present. Set to false to force a pull
  # of the published ghcr.io image (use after receipts-server-image.yml runs).
  - name: BUILD_RECEIPTS_LOCAL
    default: "true"

  # Rebuild the airgap bundle tarball even if one is already present. The default
  # (false) reuses an existing uds-bundle-*.tar.zst so re-runs (and offline
  # deploys) are fast; set to true to force a fresh `uds create`.
  - name: REBUILD_BUNDLE
    default: "false"

  # When true, also build + deploy the receipt-on-deploy Pepr admission policy
  # (the in-cluster webhook). Default OFF so the one-command core path (UDS Core
  # + receipts server) stays reliable; the webhook is opt-in and its clean-
  # redeploy survival is tracked separately. Requires Docker + network (pepr
  # build/deploy pulls the Pepr controller image), so it is NOT airgap-safe.
  - name: WITH_PEPR
    default: "false"

includes:
  - test: ./tasks/test.yaml
  - demo: ./tasks/demo.yaml
  - smoke: ./tasks/smoke.yaml

tasks:
  # ── Cold smoke entry point ────────────────────────────────────────────────
  # `uds run smoke`: cold k3d -> deploy szl-warhacker bundle -> honest readiness
  # check of szl-receipts (hard PASS) + the 5 apps (PASS or SKIPPED-on-FA-001).
  # Implemented in tasks/smoke.yaml; aliased here so `uds run smoke` works.
  - name: smoke
    description: "Cold k3d up + deploy + honest readiness of receipts and the 5 apps"
    actions:
      - task: smoke:smoke

  # ── Primary entry point ───────────────────────────────────────────────────
  - name: start
    description: "One command: k3d up -> build receipts image -> uds create + uds deploy (init + UDS Core + receipts) -> verify (clean end-to-end; airgap-capable)"
    actions:
      - description: "Check required tools"
        cmd: |
          for tool in uds zarf k3d docker; do
            if ! command -v $tool >/dev/null 2>&1; then
              echo "ERROR: $tool is not installed. See docs/INSTALL.md for setup."
              exit 1
            fi
          done
          echo "All required tools found."

      # ── Gap 3: build-flavor selection ───────────────────────────────────────
      - description: "Validate build flavor (upstream has published images; unicorn is roadmap)"
        cmd: |
          case "${FLAVOR}" in
            upstream)
              echo "FLAVOR=upstream — pinning VERIFIED public images (the only published flavor)."
              ;;
            unicorn|registry1)
              echo "ERROR: FLAVOR=${FLAVOR} selected, but the wolfi/registry1 (0.5.0-wolfi) images"
              echo "       are NOT yet published (HTTP 404 — see team/UDS_PACKAGING_BUILD_REPORT.md §2)."
              echo "       Publish those images first, then re-run with -- --set FLAVOR=${FLAVOR}."
              echo "       For the demo today use the default: uds run start (FLAVOR=upstream)."
              exit 1
              ;;
            *)
              echo "ERROR: unknown FLAVOR='${FLAVOR}' (expected upstream|unicorn|registry1)."; exit 1
              ;;
          esac

      - description: "Create k3d cluster"
        cmd: |
          if k3d cluster list | grep -q "${CLUSTER_NAME}"; then
            echo "Cluster ${CLUSTER_NAME} already exists — skipping create."
          else
            # coexist-portguard: only publish host 80/443 to the k3d loadbalancer when
            # they are free. On a host where nginx (or anything) already owns
            # 80/443 (e.g. the a11oy.net box) skip them so this cluster never
            # fights for the public site's ports — not even on a full recreate.
            # UDS services are reached via kubectl port-forward / the node IP.
            PORTGUARD=""
            for P in 80 443; do
              if ss -ltnH "sport = :$P" 2>/dev/null | grep -q .; then
                echo "Host port $P already in use — skipping it on the k3d loadbalancer (coexistence mode)."
              else
                PORTGUARD="$PORTGUARD --port $P:$P@loadbalancer"
              fi
            done
            k3d cluster create "${CLUSTER_NAME}" \
              --k3s-arg "--disable=traefik@server:0" \
              --port "8443:8443@loadbalancer" \
              $PORTGUARD \
              --wait
            echo "Cluster ${CLUSTER_NAME} created."
          fi

      # ── Gap 1: ensure the receipts-server image is pullable ─────────────────
      # If the published GHCR image is not present (or BUILD_RECEIPTS_LOCAL=true)
      # we build it from services/szl-receipts-server and import it straight into
      # the k3d cluster, so `uds deploy` never stalls pulling it. To rely on the
      # published image instead, run the receipts-server-image.yml workflow
      # (gh workflow run receipts-server-image.yml -f version=${RECEIPTS_IMAGE_TAG})
      # then start with -- --set BUILD_RECEIPTS_LOCAL=false.
      - description: "Build + load szl-receipts-server image into the cluster (if needed)"
        cmd: |
          REF="${RECEIPTS_IMAGE}:${RECEIPTS_IMAGE_TAG}"
          if [ "${BUILD_RECEIPTS_LOCAL}" = "true" ]; then
            echo "Building ${REF} from services/szl-receipts-server ..."
            docker build -t "${REF}" services/szl-receipts-server
            echo "Importing ${REF} into k3d cluster ${CLUSTER_NAME} ..."
            k3d image import "${REF}" -c "${CLUSTER_NAME}"
            echo "receipts-server image is present in-cluster (no GHCR pull needed)."
          else
            echo "BUILD_RECEIPTS_LOCAL=false — relying on published ${REF} from GHCR."
            echo "If deploy stalls pulling it, the image was not published; run:"
            echo "  gh workflow run receipts-server-image.yml -f version=${RECEIPTS_IMAGE_TAG}"
          fi

      # ── Compose + deploy the bundle in ONE step ─────────────────────────────
      # The bundle (uds-bundle.yaml) composes three layers:
      #   1. Zarf init        ghcr.io/zarf-dev/packages/init
      #   2. UDS Core          ghcr.io/defenseunicorns/packages/uds/core:1.5.0-upstream
      #   3. szl-receipts      ./packages/szl-receipts  (the MODULAR package — it
      #      deliberately excludes the Pepr policy + the absent ui chart, so the
      #      bundle assembles without dist/pepr or ui/).
      # `uds create` runs `zarf package create` on the path: package for us, so we
      # do NOT build the monolithic root zarf.yaml here (it imports dist/pepr and
      # would fail). Building it would also produce the wrong artifact — the bundle
      # is what `uds deploy` consumes.
      - description: "Build the airgap bundle tarball (uds create) — embeds all images"
        cmd: |
          if ls uds-bundle-szl-receipts-bundle-*.tar.zst >/dev/null 2>&1 && [ "${REBUILD_BUNDLE}" != "true" ]; then
            echo "Bundle tarball already present — reusing it (set REBUILD_BUNDLE=true to force a fresh build)."
          else
            echo "Building the bundle (pulls UDS Core + receipts images once, embeds them) ..."
            uds create . --confirm --no-progress
          fi

      # One `uds deploy` brings up init + UDS Core + szl-receipts.
      # --skip-signature-validation: init, Core and the receipts package are
      # keyless-signed (cosign OIDC) by DIFFERENT identities, so strict validation
      # rejects the mixed-identity bundle. This is a demo expedient, NOT a security
      # posture — the receipts package itself is verified by its own cosign/SBOM
      # flow (see the publish-signed follow-up). The same tarball deploys OFFLINE
      # (airgap) because every image is embedded in it.
      - description: "Deploy the bundle (init + UDS Core + szl-receipts) — one uds deploy"
        cmd: |
          uds deploy uds-bundle-szl-receipts-bundle-*.tar.zst \
            --set DOMAIN=${DOMAIN} \
            --skip-signature-validation \
            --confirm \
            --no-progress

      # ── Optional: receipt-on-deploy Pepr admission policy ───────────────────
      # Builds the szl-receipt-policy Pepr module (npm install needs
      # --legacy-peer-deps; the module's deps are declared in pepr/package.json)
      # into dist/pepr, then deploys the admission webhook so every Deployment/Job
      # apply emits a DSSE receipt. OFF by default (see WITH_PEPR) so the core
      # one-command path stays reliable and airgap-safe; the webhook's clean-
      # redeploy survival (chart pod-label fix) is tracked separately.
      - description: "(optional) Build + deploy the receipt-on-deploy Pepr policy"
        cmd: |
          if [ "${WITH_PEPR}" != "true" ]; then
            echo "WITH_PEPR=false — the one-command bundle above brought up UDS Core + the receipts server."
            echo "To also wire the receipt-on-deploy admission webhook: uds run start -- --set WITH_PEPR=true"
            exit 0
          fi
          echo "Building the szl-receipt-policy Pepr module (dist/pepr) ..."
          ( cd pepr && npm install --legacy-peer-deps && npx pepr build )
          echo "Deploying the Pepr admission policy into the cluster ..."
          ( cd pepr && npx pepr deploy --confirm )
          echo "Pepr receipt-on-deploy policy deployed."

      # ── End-to-end verify ───────────────────────────────────────────────────
      - description: "Verify deploy: receipts-server Ready + (if enabled) Pepr webhook present"
        cmd: |
          echo "Waiting for szl-receipts-server to be Available ..."
          kubectl -n szl-receipts rollout status deployment/szl-receipts-server --timeout=180s
          echo "receipts-server health:"
          kubectl -n szl-receipts get pods -l app.kubernetes.io/name=szl-receipts -o wide || true
          if [ "${WITH_PEPR}" = "true" ]; then
            echo "Checking Pepr admission webhook ..."
            kubectl get mutatingwebhookconfigurations 2>/dev/null | grep -i pepr-szl \
              || echo "WARN: Pepr webhook not yet visible — may take up to 30s"
          fi
          echo "Verify complete."

      - description: "Print access info"
        cmd: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║          SZL Receipts — Warhacker 2026 Demo             ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Dashboard:  https://szl.uds.dev (add to /etc/hosts)   ║"
          echo "║  Port-fwd:   kubectl port-forward svc/szl-receipts \\    ║"
          echo "║              8443:8443 -n szl-receipts                 ║"
          echo "║  Then open:  http://localhost:8443                      ║"
          echo "╚══════════════════════════════════════════════════════════╝"
          echo ""

  # ── Airgap bundle build ─────────────────────────────────────────────────────
  # Build the self-contained bundle tarball ONCE on a machine with network. Every
  # image (init, UDS Core, receipts-server, nginx, alpine) is embedded in the
  # resulting uds-bundle-szl-receipts-bundle-*.tar.zst, so it can then be copied
  # to an airgapped box and deployed with no registry access:
  #   uds deploy uds-bundle-szl-receipts-bundle-*.tar.zst --skip-signature-validation --confirm
  - name: bundle
    description: "Build the airgap bundle tarball (uds create) — pulls + embeds all images once, online"
    actions:
      - description: "Build receipts-server image locally (so uds create can embed it)"
        cmd: |
          if [ "${BUILD_RECEIPTS_LOCAL}" = "true" ]; then
            docker build -t "${RECEIPTS_IMAGE}:${RECEIPTS_IMAGE_TAG}" services/szl-receipts-server
          fi
      - description: "uds create the bundle"
        cmd: |
          uds create . --confirm --no-progress
          echo "Bundle built. Copy the tarball to the airgapped target and run:"
          echo "  uds deploy uds-bundle-szl-receipts-bundle-*.tar.zst --skip-signature-validation --confirm"

  # ── Teardown ──────────────────────────────────────────────────────────────
  - name: teardown
    description: "Destroy the k3d demo cluster"
    actions:
      - description: "Delete k3d cluster"
        cmd: |
          k3d cluster delete "${CLUSTER_NAME}" && echo "Cluster deleted."

  # ── Dependency installer ──────────────────────────────────────────────────
  # Versions are PINNED to the set proven to deploy this bundle on the live box
  # (2026-06-07), not "latest" — `latest` is a reproducibility hazard: a future
  # uds/zarf can change bundle semantics or flag names out from under the demo.
  # Each step is a no-op if the tool is already installed (won't downgrade).
  - name: install-deps
    description: "Install pinned uds, zarf, k3d, cosign on Linux (requires curl)"
    actions:
      - description: "Install uds CLI (pinned)"
        cmd: |
          UDS_VERSION="v0.32.0"
          if ! command -v uds >/dev/null 2>&1; then
            curl -sL "https://github.com/defenseunicorns/uds-cli/releases/download/${UDS_VERSION}/uds-cli_${UDS_VERSION}_Linux_amd64" \
              -o /usr/local/bin/uds && chmod +x /usr/local/bin/uds
            echo "uds installed: $(uds version)"
          else
            echo "uds already installed: $(uds version)"
          fi

      - description: "Install zarf CLI (pinned)"
        cmd: |
          ZARF_VERSION="v0.51.0"
          if ! command -v zarf >/dev/null 2>&1; then
            curl -sL "https://github.com/zarf-dev/zarf/releases/download/${ZARF_VERSION}/zarf_${ZARF_VERSION}_Linux_amd64" \
              -o /usr/local/bin/zarf && chmod +x /usr/local/bin/zarf
            echo "zarf installed: $(zarf version)"
          else
            echo "zarf already installed: $(zarf version)"
          fi

      - description: "Install k3d (pinned)"
        cmd: |
          K3D_VERSION="v5.9.0"
          if ! command -v k3d >/dev/null 2>&1; then
            curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG="${K3D_VERSION}" bash
          else
            echo "k3d already installed: $(k3d version)"
          fi

      - description: "Install cosign v2.4.1 (pinned — v3.x changes verify flags)"
        cmd: |
          COSIGN_VERSION="v2.4.1"
          if ! command -v cosign >/dev/null 2>&1; then
            curl -sSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
              -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
            echo "cosign installed: $(cosign version 2>/dev/null | grep -i gitversion || echo ${COSIGN_VERSION})"
          else
            echo "cosign already installed."
          fi

  # ── Port-forward convenience ──────────────────────────────────────────────
  - name: port-forward
    description: "Port-forward szl-receipts to localhost:8443"
    actions:
      - description: "kubectl port-forward"
        cmd: |
          kubectl port-forward svc/szl-receipts-server 8443:8443 -n szl-receipts &
          echo "Dashboard available at http://localhost:8443"
          echo "Press Ctrl+C to stop."
          wait

  # ── CI-required task names (R16/R17/R18 fix) ──────────────────────────────
  # Reference: https://github.com/defenseunicorns/uds-common/blob/main/docs/uds-packages/guidelines/testing-guidelines.md
  - name: test-install
    description: "CI: deploy current branch to a new cluster and run journey tests"
    actions:
      - description: "Create k3d test cluster"
        cmd: |
          k3d cluster create "${CLUSTER_NAME}-test" --wait
      - description: "Zarf init"
        cmd: |
          zarf init --confirm
      - description: "Create and deploy szl-receipts Zarf package"
        cmd: |
          zarf package create . --confirm && \
          zarf package deploy zarf-package-szl-receipts-amd64-0.3.1.tar.zst --confirm
      - description: "Run Playwright journey tests"
        task: test:all

  - name: test-upgrade
    description: "CI: deploy previous release, then upgrade to current branch"
    actions:
      - description: "Create k3d upgrade-test cluster"
        cmd: |
          k3d cluster create "${CLUSTER_NAME}-upgrade" --wait
      - description: "Zarf init"
        cmd: |
          zarf init --confirm
      - description: "Deploy previous release (v0.3.1) from OCI"
        cmd: |
          zarf package deploy oci://ghcr.io/szl-holdings/packages/szl-receipts:0.3.1 --confirm 2>/dev/null || \
          echo "WARN: Previous OCI release not found — skipping baseline deploy (FA-001 staged)"
      - description: "Build and deploy current branch package"
        cmd: |
          zarf package create . --confirm && \
          zarf package deploy zarf-package-szl-receipts-amd64-0.3.1.tar.zst --confirm
      - description: "Run Playwright journey tests post-upgrade"
        task: test:all

  - name: test-lint
    description: "Run static validation: yamllint + helm lint (no cluster needed)"
    actions:
      - task: test:lint
