apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-szl-attestations
  annotations:
    policies.kyverno.io/title: Verify SZL build provenance
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >
      Verifies all szl-holdings images have valid GitHub-signed
      build-provenance attestations issued by Sigstore Fulcio.
spec:
  validationFailureAction: enforce
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-provenance
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - a11oy
                - sentra
                - amaru
                - yupana
                - killinchu
      verifyImages:
        - imageReferences:
            - "ghcr.io/szl-holdings/*"
          required: true
          mutateDigest: true
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/szl-holdings/*/.github/workflows/*"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: "https://rekor.sigstore.dev"
          attestations:
            - type: https://slsa.dev/provenance/v1
              attestors:
                - count: 1
                  entries:
                    - keyless:
                        subject: "https://github.com/szl-holdings/*/.github/workflows/*"
                        issuer: "https://token.actions.githubusercontent.com"
                        rekor:
                          url: "https://rekor.sigstore.dev"
              conditions:
                - all:
                    - key: "{{ buildDefinition.externalParameters.workflow.repository }}"
                      operator: AnyIn
                      value:
                        - https://github.com/szl-holdings/a11oy
                        - https://github.com/szl-holdings/sentra
                        - https://github.com/szl-holdings/amaru
                        - https://github.com/szl-holdings/yupana
                        - https://github.com/szl-holdings/killinchu
