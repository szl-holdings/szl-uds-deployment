# SZL UDS Bundle — catalog-grade 0.4.0
#
# This bundle supersedes the v0.1.0 Warhacker demo bundle and targets
# catalog-grade requirements per Andrew Greene's Option A endorsement (2026-05-22).
#
# Changes from 0.1.0:
#   - init repointed to ghcr.io/zarf-dev/packages/init (the init package moved out
#     of the defenseunicorns org as of uds-core v1.x; see attribution below)
#   - core ref modernized to uds-core 1.5.0 (was 0.34.0-slim-dev, four minors behind)
#   - szl-receipts bumped to 0.4.0
#   - SSO overrides now wired to Keycloak realm
#   - Pepr component enabled by default in this bundle
#
# Ref attribution (mined 2026-05-30 from live Defense Unicorns repos):
#   init coordinate: defenseunicorns/uds-core@v1.5.0/bundles/k3d-slim-dev/uds-bundle.yaml
#                    (init = ghcr.io/zarf-dev/packages/init)
#   core OCI + flavor grammar (X.Y.Z-upstream|registry1|unicorn):
#                    defenseunicorns/uds-core@v1.5.0/docs/getting-started/production/build-your-bundle.mdx
#   slim-dev local-demo bundle: oci://ghcr.io/defenseunicorns/bundles/k3d-core-slim-dev:1.5.0
#
# RESOLVED items:
#   FA-001: RESOLVED (2026-06-15) — vessels CONSOLIDATED into the killinchu organ.
#           There is no longer a standalone ghcr.io/szl-holdings/vessels image to
#           publish: the maritime vessel-intelligence surface (sanctions
#           screening, dark-vessel detection, voyage/ownership analytics) now
#           ships inside the published, cosign-signed killinchu organ image
#           ghcr.io/szl-holdings/killinchu:uds-v0.2.0 (live: GET /vessels and
#           /sanctions both return 200 on the running organ). killinchu deploys
#           via bundles/killinchu (killinchu-bundle:0.5.0, PUBLISHED + current).
#           The prior org admin:packages action for a separate `vessels` package
#           is therefore no longer required, and no deploy path is blocked on it.
#           The legacy szl-vessels-demo package (uds/zarf.yaml), its Helm charts
#           (charts/vessels, charts/uds-mesh), vendored demo manifests, and the
#           uds-package-release / deploy-entry-guard CI that existed only to build
#           and check it have been REMOVED from this repo (superseded by the
#           killinchu organ). The maritime surface lives entirely in the killinchu
#           organ image; this repo's sole first-party Zarf package is szl-receipts.
#   FA-002: RESOLVED (2026-06-13). This bundle is now cryptographically signed —
#           keyless Sigstore via GitHub OIDC, NO org key needed (the prior
#           "pending org key provisioning" premise was obsolete: keyless OIDC is
#           the identical path that already signs the 5-organ szl-uds-bundle).
#           .github/workflows/uds-receipts-bundle-publish.yml publishes this
#           bundle to oci://ghcr.io/szl-holdings/szl-receipts-bundle:<tag>,
#           cosign-signs the published OCI artifact, AND cosign sign-blob's the
#           airgap .tar.zst (-> <tar>.cosign.bundle for OFFLINE verify). `uds
#           deploy` succeeds AND `cosign verify` / `cosign verify-blob` now pass
#           with an exact --certificate-identity (see that workflow header for the
#           exact verify commands).
#
# Deploy:
#   uds run demo:start          # full bootstrap
#   uds deploy uds-bundle-szl-receipts-bundle-amd64-0.4.0.tar.zst --confirm
#
# References:
#   UDS Bundle schema: https://github.com/defenseunicorns/uds-cli
#   UDS Core releases: https://github.com/defenseunicorns/uds-core/releases
#   Option A endorsement: internal doc 2026-05-22 (Andrew Greene, Defense Unicorns)

kind: UDSBundle
metadata:
  name: szl-receipts-bundle
  version: 0.4.0
  description: SZL governance receipt mesh for UDS environments

packages:
  # ── Layer 1: Zarf init — internal registry + agent ──────────────────────────
  # NOTE: the init package moved from ghcr.io/defenseunicorns/packages/init to
  # ghcr.io/zarf-dev/packages/init. v0.77.0 is the ref uds-core v1.5.0 ships with.
  # (defenseunicorns/uds-core@v1.5.0/bundles/k3d-slim-dev/uds-bundle.yaml)
  - name: init
    repository: ghcr.io/zarf-dev/packages/init
    ref: v0.77.0

  # ── Layer 2: UDS Core (slim) — core-base (Istio + Pepr/UDS Operator) +
#            core-identity-authorization (Keycloak + AuthService) ─
  # For the local k3d demo, the documented path is the slim-dev BUNDLE:
  #   oci://ghcr.io/defenseunicorns/bundles/k3d-core-slim-dev:1.5.0
  # The published core PACKAGE is mirrored in two registries with identical content:
  #   registry.defenseunicorns.com/public/core  (Defense Unicorns registry — needs DU creds)
  #   ghcr.io/defenseunicorns/packages/uds/core (public GHCR mirror — anonymous pull)
  # ref flavor: 1.5.0-upstream|1.5.0-registry1|1.5.0-unicorn
  # We pull from the GHCR mirror so a fresh `uds create`/`uds deploy` succeeds with NO
  # Defense Unicorns registry credentials (the DU registry returns "basic credential
  # not found" on this box, which has only a ghcr/github auth). Same image set, no DoD
  # registry access required for the hackathon demo.
  # core 1.5.0 is published as a PACKAGE SPLIT: `core-base` (Istio + Pepr/UDS
  # Operator) and `core-identity-authorization` (Keycloak + AuthService) are the
  # slim, single-node footprint; the monolithic `core` package additionally
  # bundles the FULL observability + runtime-security suite (kube-prometheus-
  # stack, Grafana, Loki, Vector, Falco, NeuVector, Velero). That fat stack
  # reserves more CPU-request budget than this ~2-vCPU node has (it strands even
  # istiod Pending and never reaches Ready), so a full `core` deploy can never
  # complete here. We deploy the two slim packages — the exact composition of
  # Defense Unicorns' own k3d-core-slim-dev bundle — which is all the receipt
  # mesh needs (Istio for the mesh, Pepr for the UDS Operator + receipt webhook,
  # Keycloak for optional SSO) and which fits this box (proven: istiod + keycloak
  # both reach Ready). Both packages pull anonymously from the same GHCR mirror
  # (no Defense Unicorns registry creds). Use the monolithic `core` package on a
  # larger / multi-node cluster that can host the full observability stack.
  - name: core-base
    repository: ghcr.io/defenseunicorns/packages/uds/core-base
    ref: 1.5.0-upstream
    overrides:
      # ── istiod HPA: single-replica for the ~2-vCPU uds-szl-demo node ──────────
      # Pin istiod's HorizontalPodAutoscaler to maxReplicas:1 so a FRESH deploy of
      # core comes up rightsized from the first second — no window at the upstream
      # default (min1/max5). A 2nd istiod (~500m CPU) can never schedule on this
      # ~90%-requested 2-vCPU node, so any autoscale >1 would strand a permanently
      # Pending pod. The runtime guard /usr/local/sbin/istiod-fit-strategy remains
      # as belt-and-suspenders (re-clamps the HPA after any later core upgrade).
      # Drop this override (or raise the value) on multi-node / HA clusters.
      istio-controlplane:
        istiod:
          values:
            - path: pilot.autoscaleMax
              value: 1
            # ── istiod CPU-request right-size for the 2-vCPU uds-szl-demo ──────
            # The istiod chart reserves 500m CPU by default. On this single
            # 2-vCPU node (shared with a11oy.net + the receipt mesh) that reserve
            # saturates the scheduler's CPU-request budget, leaving < keycloak's
            # 100m request free, so the `keycloak` component can never schedule
            # its pod and `uds deploy` times out waiting for it Ready.
            # istiod's real usage on a quiet single-node mesh is ~10-50m, so a
            # 150m request is ample and frees enough budget for keycloak to boot.
            # Drop this override on multi-node / HA clusters that need full istiod.
            - path: pilot.resources.requests.cpu
              value: 150m
      # ── tenant gateway: ClusterIP on the single-node uds-szl-demo ───────
      # This single-node demo box has exactly ONE LoadBalancer slot, already held
      # by the admin gateway (172.18.0.2); nginx owns host 80/443 for a11oy.net.
      # The tenant gateway's Deployment is 0/0 here (no tenant waypoint provisions
      # at this resource ceiling), but its Service defaults to type LoadBalancer,
      # so `helm --wait` blocks forever on an external IP that can never be
      # assigned. Pin it to ClusterIP so a full `uds deploy` completes RC=0 on a
      # single node. Drop this override on multi-node / HA clusters where the
      # tenant gateway must take a real LoadBalancer address.
      istio-tenant-gateway:
        gateway:
          values:
            - path: service.type
              value: ClusterIP

  - name: core-identity-authorization
    repository: ghcr.io/defenseunicorns/packages/uds/core-identity-authorization
    ref: 1.5.0-upstream
    overrides:
      keycloak:
        keycloak:
          values:
            - path: realmInitEnv.INSECURE_ADMIN_PASSWORD_GENERATION
              value: "true"

  # ── Layer 3: SZL Receipts add-on ────────────────────────────────────────────
  # path: local Zarf package built from this directory.
  # v0.4.0: szl-receipts-server now uses the built OCI image
  #   ghcr.io/szl-holdings/szl-receipts-server:uds-v0.4.0
  #   (built from services/szl-receipts-server/Dockerfile). Pushing that image
  #   to GHCR + cosign-signing it ships in a follow-up PR; until then the
  #   bundle references it by tag (imagePullPolicy IfNotPresent).
  - name: szl-receipts
    path: ./packages/szl-receipts
    # ref carries the flavor suffix on purpose. The szl-receipts-server
    # component is flavor-gated (only.flavor: upstream), so the bundle task
    # pre-builds it with `zarf package create --flavor upstream`. zarf (v0.77.0)
    # writes that as zarf-package-szl-receipts-amd64-0.4.0-upstream.tar.zst, and
    # uds-cli locates a local path member as zarf-package-<name>-<arch>-<ref>.tar.zst
    # — so ref MUST be 0.4.0-upstream (matching the published OCI tag
    # ghcr.io/szl-holdings/szl-receipts:0.4.0-upstream). Dropping the suffix back
    # to 0.4.0 makes `uds create` fail "no such file or directory" (incident #75).
    ref: 0.4.0-upstream
    overrides:
      szl-receipts-server:
        szl-receipts:
          variables:
            - name: DOMAIN
              description: "Cluster domain (must match UDS Core DOMAIN)"
              path: global.domain
              default: "uds.dev"
            # RECEIPT_HMAC_KEY override REMOVED (v0.3.1, PhD Crypto Finding A2).
            # Signing uses an operator-provisioned Ed25519 Secret
            # (szl-receipts-ed25519); no signing key flows through the bundle.
            - name: RECEIPTS_REPLICAS
              description: "Receipt server replica count"
              path: server.replicas
              default: "1"
          values:
            - path: server.logLevel
              value: "info"
            - path: ingress.enabled
              value: true
            - path: ingress.host
              value: "receipts.uds.dev"
            # PSS restricted enforcement on namespace
            - path: podSecurityStandard.enforce
              value: "restricted"
