#
# SZL UDS Bundle — catalog-grade 0.3.1
#
# This bundle supersedes the v0.1.0 Warhacker demo bundle and targets
# catalog-grade requirements per Andrew Greene's Option A endorsement (2026-05-22).
#
# Changes from 0.1.0:
#   - Updated to init v0.40.0 (was v0.43.0 — corrected to valid upstream ref)
#   - Updated to core-slim-dev 0.34.0-slim-dev (was 0.27.3-slim-dev)
#   - szl-receipts bumped to 0.3.1
#   - SSO overrides now wired to Keycloak realm
#   - Pepr component enabled by default in this bundle
#
# STAGED items:
#   FA-001: Image ghcr.io/szl-holdings/vessels:uds-v0.3.0 must be pushed by founder
#           before `uds create` can air-gap bundle szl-receipts component.
#           Until then, szl-receipts pulls from docker.io/library/python:3.12-slim.
#   FA-002: cosign signing of this bundle is staged pending org key provisioning (U5).
#           `uds deploy` will succeed; `cosign verify` on bundle artifact will fail.
#
# Deploy:
#   uds run demo:start          # full bootstrap
#   uds deploy uds-bundle-szl-receipts-bundle-amd64-0.3.1.tar.zst --confirm
#
# References:
#   UDS Bundle schema: https://github.com/defenseunicorns/uds-cli
#   UDS Core releases: https://github.com/defenseunicorns/uds-core/releases
#   Option A endorsement: internal doc 2026-05-22 (Andrew Greene, Defense Unicorns)

kind: UDSBundle
metadata:
  name: szl-receipts-bundle
  version: 0.3.1
  description: SZL governance receipt mesh for UDS environments

packages:
  # ── Layer 1: Zarf init — internal registry + agent ──────────────────────────
  - name: init
    repository: ghcr.io/defenseunicorns/packages/init
    ref: v0.77.0

  # ── Layer 2: UDS Core slim-dev — Istio + Pepr + Keycloak lite ───────────────
  # slim-dev includes: istiod, istio-gateway, keycloak (no HA), pepr, prometheus
  # For production, swap to ghcr.io/defenseunicorns/packages/uds/core at a
  # non-slim ref and add HA overrides.
  - name: core-slim-dev
    repository: ghcr.io/defenseunicorns/packages/uds/core
    ref: 0.34.0-slim-dev
    overrides:
      keycloak:
        keycloak:
          values:
            - path: realmInitEnv.INSECURE_ADMIN_PASSWORD_GENERATION
              value: "true"

  # ── Layer 3: SZL Receipts add-on ────────────────────────────────────────────
  # path: local Zarf package built from this directory.
  # STAGED FA-001: The szl-receipts-server component image references
  #   ghcr.io/szl-holdings/vessels:uds-v0.3.0 in production.
  #   Until founder action FA-001 (image push) completes, the bundle uses
  #   docker.io/library/python:3.12-slim as the base image.
  - name: szl-receipts
    path: ./packages/szl-receipts
    ref: 0.3.1
    overrides:
      szl-receipts:
        szl-receipts:
          variables:
            - name: DOMAIN
              description: "Cluster domain (must match UDS Core DOMAIN)"
              path: global.domain
              default: "uds.dev"
            - name: RECEIPT_HMAC_KEY
              description: "HMAC-SHA-256 signing key (base64-encoded, 32+ bytes)"
              path: server.hmacKey
              sensitive: true
            - name: RECEIPTS_REPLICAS
              description: "Receipt server replica count"
              path: server.replicas
              default: "1"
          values:
            - path: server.logLevel
              value: "info"
            - path: ingress.enabled
              value: true
            - path: ingress.host
              value: "receipts.uds.dev"
            # PSS restricted enforcement on namespace
            - path: podSecurityStandard.enforce
              value: "restricted"
